<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zentryx V2505</title>

<style>
body{margin:0;font-family:Arial;background:#eef2f7;color:#111827}
.top{background:#0f172a;color:white;padding:20px}
.wrap{padding:16px}
.card{background:white;border-radius:12px;padding:16px;margin-bottom:12px}
.btn{padding:12px;border:none;border-radius:8px;margin:4px;font-weight:bold}
.big{width:100%;font-size:18px}
.green{background:#16a34a;color:white}
.blue{background:#2563eb;color:white}
.gray{background:#e5e7eb}
.red{background:#dc2626;color:white}
input,select{width:100%;padding:10px;margin:6px 0;border-radius:8px;border:1px solid #ccc}
.tabs{display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap}
.tab{padding:10px;background:#e5e7eb;border-radius:8px;cursor:pointer}
.tab.active{background:#111827;color:white}
.foto{width:120px;height:120px;border-radius:50%;object-fit:cover;background:#ddd}
</style>
</head>

<body>

<div class="top">
<h2>Zentryx V2505</h2>
<button class="btn gray" onclick="salir()">Salir</button>
</div>

<div class="wrap" id="app"></div>

<script>
const URL="https://idtaamivqbiuxtjywuux.supabase.co";
const KEY="sb_publishable_ToDLKonbF2QnTXi56o1nfQ_10IdaPJx";

let user=null;
let usuarios=[];
let usuarioActual=null;

// ================= BASE =================
function api(p,o={}){
return fetch(URL+p,{
method:o.method||"GET",
headers:{
apikey:KEY,
Authorization:"Bearer "+KEY,
"Content-Type":"application/json"
},
body:o.body?JSON.stringify(o.body):undefined
}).then(r=>r.json());
}

function salir(){
localStorage.removeItem("usuario");
location.href="./index.html";
}

function sesion(){
user=JSON.parse(localStorage.getItem("usuario"));
if(!user){location.href="./index.html";return false}
return true;
}

// ================= INICIO =================
function inicio(){
document.getElementById("app").innerHTML=`
<div class="card">
<h2>${user.nombre||user.usuario}</h2>
<p>${user.rol}</p>
</div>

<div class="card">
<button class="btn big green" onclick="fichar()">FICHAR</button>
</div>

<div class="card">
<button class="btn blue" onclick="vistaUsuarios()">Usuarios</button>
<button class="btn blue" onclick="vistaHoras()">Horas</button>
<button class="btn blue" onclick="vistaInformes()">Informes</button>
</div>
`;
}

// ================= FICHAJE =================
async function fichar(){
await api("/rest/v1/fichajes",{method:"POST",body:{user_id:user.id,tipo:"entrada"}});
alert("Fichado");
}

// ================= HORAS =================
async function vistaHoras(){
const data=await api("/rest/v1/horas_extra?select=*&user_id=eq."+user.id);

document.getElementById("app").innerHTML=`
<div class="card">
<button class="btn gray" onclick="inicio()">←</button>
<h2>Horas</h2>
</div>

${data.map(h=>`
<div class="card">${h.minutos} min - ${h.total} €</div>
`).join("")}
`;
}

// ================= USUARIOS =================
async function vistaUsuarios(){
usuarios=await api("/rest/v1/users?select=*");

document.getElementById("app").innerHTML=`
<div class="card">
<button class="btn gray" onclick="inicio()">←</button>
<h2>Usuarios</h2>
</div>

${usuarios.map(u=>`
<div class="card" onclick="abrirUsuario('${u.id}')">
<b>${u.nombre||""}</b><br>
${u.usuario}
</div>
`).join("")}
`;
}

function abrirUsuario(id){
usuarioActual=usuarios.find(u=>u.id==id);

document.getElementById("app").innerHTML=`
<div class="card">
<button class="btn gray" onclick="vistaUsuarios()">←</button>
<h2>${usuarioActual.nombre}</h2>
</div>

<div class="tabs">
<div class="tab active" onclick="tab('datos')">Datos</div>
<div class="tab" onclick="tab('docs')">DNI/Fotos</div>
</div>

<div id="contenido"></div>
`;

tab("datos");
}

function activarTab(t){
document.querySelectorAll(".tab").forEach(e=>e.classList.remove("active"));
document.querySelectorAll(".tab").forEach(e=>{
if(e.innerText.toLowerCase().includes(t)) e.classList.add("active");
});
}

// ================= TABS =================
function tab(t){
activarTab(t);

if(t==="datos"){
document.getElementById("contenido").innerHTML=`
<div class="card">
<input id="nombre" value="${usuarioActual.nombre||""}">
<input id="usuario" value="${usuarioActual.usuario||""}">
<button class="btn blue" onclick="guardarUsuario()">Guardar</button>
</div>
`;
}

if(t==="docs"){
document.getElementById("contenido").innerHTML=`
<div class="card">
<h3>Foto</h3>

${usuarioActual.foto?
`<img class="foto" src="${usuarioActual.foto}">`:
`<div class="foto"></div>`}

<input type="file" id="foto" accept="image/*">
<button class="btn blue" onclick="guardarFoto()">Guardar foto</button>
</div>

<div class="card">
<h3>DNI</h3>

<input type="file" id="dni1" accept="image/*"><br>
<input type="file" id="dni2" accept="image/*"><br>

<button class="btn blue" onclick="guardarDNI()">Guardar DNI</button>
</div>
`;
}
}

// ================= GUARDAR =================
async function guardarUsuario(){
await api("/rest/v1/users?id=eq."+usuarioActual.id,{
method:"PATCH",
body:{
nombre:document.getElementById("nombre").value,
usuario:document.getElementById("usuario").value
}
});
alert("Guardado");
vistaUsuarios();
}

// ================= FOTO =================
async function guardarFoto(){
const file=document.getElementById("foto").files[0];
if(!file){alert("Selecciona imagen");return;}

const reader=new FileReader();
reader.onload=async ()=>{
await api("/rest/v1/users?id=eq."+usuarioActual.id,{
method:"PATCH",
body:{foto:reader.result}
});
alert("Foto guardada");
abrirUsuario(usuarioActual.id);
};
reader.readAsDataURL(file);
}

// ================= DNI =================
async function guardarDNI(){
const f1=document.getElementById("dni1").files[0];
const f2=document.getElementById("dni2").files[0];

if(!f1 || !f2){alert("Sube ambas caras");return;}

const r1=new FileReader();
const r2=new FileReader();

r1.onload=()=>{
r2.onload=async ()=>{
await api("/rest/v1/users?id=eq."+usuarioActual.id,{
method:"PATCH",
body:{
dni_frontal:r1.result,
dni_trasero:r2.result
}
});
alert("DNI guardado");
abrirUsuario(usuarioActual.id);
};
r2.readAsDataURL(f2);
};
r1.readAsDataURL(f1);
}

// ================= INFORMES =================
function vistaInformes(){
document.getElementById("app").innerHTML=`
<div class="card">
<button class="btn gray" onclick="inicio()">←</button>
<h2>Informes</h2>
<button class="btn blue" onclick="window.print()">Imprimir</button>
</div>
`;
}

// ================= INIT =================
if(sesion()){
inicio();
}
</script>

</body>
</html>
