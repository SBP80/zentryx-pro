function escapar(v){
  return String(v ?? "")
    .replaceAll("&","&amp;")
    .replaceAll("<","&lt;")
    .replaceAll(">","&gt;")
    .replaceAll('"',"&quot;")
    .replaceAll("'","&#039;");
}

}

function puedeBorrarUsuarios(){return ROLES_BORRAR_USUARIOS.includes(usuarioSesion.rol);}

async function sha256(texto){
  const buffer = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(texto));
  return Array.from(new Uint8Array(buffer)).map(b => b.toString(16).padStart(2,"0")).join("");
}

async function api(path, opciones = {}){
  const res = await fetch(SUPABASE_URL + path, {
    method: opciones.method || "GET",
    headers: {
      "apikey": SUPABASE_KEY,
      "Authorization": "Bearer " + SUPABASE_KEY,
      "Content-Type": "application/json",
      ...(opciones.headers || {})
    },
    body: opciones.body ? JSON.stringify(opciones.body) : undefined
  });

  const texto = await res.text();
  let data = null;
  try{data = texto ? JSON.parse(texto) : null;}catch{data = texto;}

  if(!res.ok){
    throw new Error(typeof data === "string" ? data : JSON.stringify(data));
  }
  return data;
}

function direccionCompleta(u){
  return [
    u.tipo_via,u.nombre_via,u.numero,
    u.portal ? "Portal " + u.portal : "",
    u.escalera ? "Esc. " + u.escalera : "",
    u.piso ? "Piso " + u.piso : "",
    u.puerta ? "Puerta " + u.puerta : "",
    u.codigo_postal,u.poblacion,u.provincia,u.pais
  ].filter(Boolean).join(", ");
}

async function mostrarUsuarios(){
  const contenido = document.getElementById("contenido");

  if(!puedeVerUsuarios()){
    contenido.innerHTML = `<div class="card"><h2>Acceso restringido</h2><p>No tienes permiso para entrar en Usuarios.</p></div>`;
    return;
  }

  contenido.innerHTML = `<div class="card">Cargando usuarios...</div>`;

  try{
    await cargarUsuarios();
    contenido.innerHTML = `${formularioNuevo()}${listado()}<div id="ficha">${usuarioAbierto ? fichaUsuario(usuarioAbierto) : fichaVacia()}</div>`;
    if(usuarioAbierto){
      await cargarDocumentos(usuarioAbierto.id);
      await cargarFichajes(usuarioAbierto.id);
    }
  }catch(e){
    contenido.innerHTML = `<div class="card"><h2>Usuarios</h2><div class="error">Error cargando usuarios: ${escapar(e.message)}</div></div>`;
  }
}

async function guardarUsuario(){
  if(!puedeEditarUsuarios()) return alert("No tienes permisos para crear usuarios.");

  const msg = document.getElementById("msgNuevo");
  const nuevo = leerNuevo();
  const passwordPlano = nuevo.password;

  msg.className = "error";
  msg.textContent = "";

  if(!nuevo.nombre || !nuevo.usuario || !passwordPlano || !nuevo.rol){
    msg.textContent = "Nombre, usuario, contraseña y rol son obligatorios.";
    return;
  }

  if(usuarios.some(u => String(u.usuario).toLowerCase() === nuevo.usuario)){
    msg.textContent = "Ese usuario ya existe.";
    return;
  }

  nuevo.password = await sha256(passwordPlano);

  try{
    await api("/rest/v1/users", {method:"POST", headers:{"Prefer":"return=representation"}, body:nuevo});
    usuarioAbierto = null;
    await mostrarUsuarios();
  }catch(e){
    msg.textContent = "Error guardando usuario: " + e.message;
  }
}

async function abrirFicha(id){
  const u = usuarios.find(x => String(x.id) === String(id));
  if(!u) return;

  usuarioAbierto = u;
  document.getElementById("ficha").innerHTML = fichaUsuario(u);
  await cargarDocumentos(u.id);
  await cargarFichajes(u.id);
  window.scrollTo({top: document.body.scrollHeight, behavior:"smooth"});
}

async function guardarCambios(){
  if(!puedeEditarUsuarios()) return alert("No tienes permisos para editar usuarios.");
  if(!usuarioAbierto) return;

  const msg = document.getElementById("msgEditar");
  const editado = leerEditado();
  const nuevaPassword = document.getElementById("edit_password").value.trim();

  msg.className = "error";
  msg.textContent = "";

  if(!editado.nombre || !editado.usuario || !editado.rol){
    msg.textContent = "Nombre, usuario y rol son obligatorios.";
    return;
  }

  if(usuarios.some(u => String(u.id) !== String(usuarioAbierto.id) && String(u.usuario).toLowerCase() === editado.usuario)){
    msg.textContent = "Ese usuario ya existe.";
    return;
  }

  if(nuevaPassword) editado.password = await sha256(nuevaPassword);

  try{
    await api("/rest/v1/users?id=eq." + encodeURIComponent(usuarioAbierto.id), {method:"PATCH", headers:{"Prefer":"return=representation"}, body:editado});
    usuarioAbierto = {...usuarioAbierto, ...editado};

    if(String(usuarioSesion.id) === String(usuarioAbierto.id)){
      localStorage.setItem("usuario", JSON.stringify(usuarioAbierto));
      usuarioSesion = usuarioAbierto;
    }

    await cargarUsuarios();
    await mostrarUsuarios();
    await abrirFicha(usuarioAbierto.id);
  }catch(e){
    msg.textContent = "Error guardando cambios: " + e.message;
  }
}

async function borrarUsuario(id){
  if(!puedeBorrarUsuarios()) return alert("No tienes permisos para eliminar usuarios.");

  const u = usuarios.find(x => String(x.id) === String(id));
  if(!u) return;

  if(String(u.usuario).toLowerCase() === "admin") return alert("No se puede borrar admin.");
  if(!confirm("¿Eliminar este usuario?")) return;

  try{
    await api("/rest/v1/users?id=eq." + encodeURIComponent(id), {method:"DELETE"});
    usuarioAbierto = null;
    await mostrarUsuarios();
  }catch(e){
    alert("Error borrando usuario: " + e.message);
  }
}

async function subirArchivo(inputId, carpeta){
  const inputFile = document.getElementById(inputId);
  const file = inputFile.files && inputFile.files[0];

  if(!file) throw new Error("No has seleccionado archivo.");

  const extension = file.name.includes(".") ? file.name.split(".").pop() : "jpg";
  const path = `${carpeta}/${usuarioAbierto.id}/${Date.now()}_${Math.random().toString(16).slice(2)}.${extension}`;

  const { error } = await sb.storage.from(BUCKET).upload(path, file, { upsert:false });
  if(error) throw error;

  const { data } = sb.storage.from(BUCKET).getPublicUrl(path);
  return { nombre:file.name, path, url:data.publicUrl };
}

async function subirFotoDesde(inputId){
  if(!usuarioAbierto) return;

  const msg = document.getElementById("msgFoto");
  msg.className = "muted";
  msg.textContent = "Subiendo foto...";

  try{
    const archivo = await subirArchivo(inputId, "fotos");

    await api("/rest/v1/users?id=eq." + encodeURIComponent(usuarioAbierto.id), {
      method:"PATCH",
      headers:{"Prefer":"return=representation"},
      body:{foto_url: archivo.url}
    });

    usuarioAbierto.foto_url = archivo.url;
    msg.className = "ok";
    msg.textContent = "Foto subida.";
    await cargarUsuarios();
    await abrirFicha(usuarioAbierto.id);
  }catch(e){
    msg.className = "error";
    msg.textContent = "Error subiendo foto: " + e.message;
  }
}

async function subirDocumentoTipo(inputId, tipo){
  if(!usuarioAbierto) return;

  const msg = document.getElementById("msgDoc");
  if(msg){
    msg.className = "muted";
    msg.textContent = "Subiendo documento...";
  }

  try{
    const archivo = await subirArchivo(inputId, "documentos");

    await api("/rest/v1/documentos", {
      method:"POST",
      headers:{"Prefer":"return=representation"},
      body:{
        user_id:String(usuarioAbierto.id),
        nombre:archivo.nombre,
        url:archivo.url,
        tipo:tipo,
        descripcion:tipo
      }
    });

    if(msg){
      msg.className = "ok";
      msg.textContent = "Documento subido.";
    }

    await cargarDocumentos(usuarioAbierto.id);
  }catch(e){
    if(msg){
      msg.className = "error";
      msg.textContent = "Error subiendo documento: " + e.message;
    }else{
      alert("Error subiendo documento: " + e.message);
    }
  }
}

async function cargarDocumentos(userId){
  const cont = document.getElementById("listaDocs");
  if(!cont) return;

  try{
    const data = await api("/rest/v1/documentos?select=*&user_id=eq." + encodeURIComponent(String(userId)) + "&order=fecha.desc");
    documentosActuales = Array.isArray(data) ? data : [];

    if(documentosActuales.length === 0){
      cont.innerHTML = `<p class="muted">No hay documentos.</p>`;
      return;
    }

    cont.innerHTML = documentosActuales.map(d => `
      <div class="docrow">
        <b>${escapar(d.tipo || "documento")}</b><br>
        ${escapar(d.nombre)}<br>
        <a target="_blank" href="${escapar(d.url)}">Ver documento</a>
        ${puedeEditarUsuarios() ? `<button class="btn btn-red" onclick="eliminarDocumento('${escapar(d.id)}')">Eliminar</button>` : ""}
      </div>
    `).join("");
  }catch(e){
    cont.innerHTML = `<div class="error">Error cargando documentos: ${escapar(e.message)}</div>`;
  }
}

async function eliminarDocumento(id){
  if(!puedeEditarUsuarios()) return alert("No tienes permisos.");
  if(!confirm("¿Eliminar documento?")) return;

  try{
    await api("/rest/v1/documentos?id=eq." + encodeURIComponent(id), {method:"DELETE"});
    await cargarDocumentos(usuarioAbierto.id);
  }catch(e){
    alert("Error eliminando documento: " + e.message);
  }
}

function obtenerUbicacion(){
  return new Promise(resolve => {
    if(!navigator.geolocation){
      resolve({lat:null,lng:null,direccion:"Sin ubicación"});
      return;
    }

    navigator.geolocation.getCurrentPosition(
      pos => {
        resolve({
          lat:pos.coords.latitude,
          lng:pos.coords.longitude,
          direccion:"Lat " + pos.coords.latitude + ", Lng " + pos.coords.longitude
        });
      },
      () => resolve({lat:null,lng:null,direccion:"Ubicación no autorizada"}),
      {enableHighAccuracy:true,timeout:10000}
    );
  });
}

async function fichar(tipo){
  if(!usuarioAbierto) return;

  const msg = document.getElementById("msgFichaje");
  msg.className = "muted";
  msg.textContent = "Obteniendo ubicación...";

  try{
    const ubicacion = await obtenerUbicacion();

    msg.textContent = "Guardando fichaje...";

    await api("/rest/v1/fichajes", {
      method:"POST",
      headers:{"Prefer":"return=representation"},
      body:{
        user_id:String(usuarioAbierto.id),
        tipo:tipo,
        lat:ubicacion.lat,
        lng:ubicacion.lng,
        direccion:ubicacion.direccion
      }
    });

    msg.className = "ok";
    msg.textContent = "Fichaje guardado.";
    await cargarFichajes(usuarioAbierto.id);
  }catch(e){
    msg.className = "error";
    msg.textContent = "Error guardando fichaje: " + e.message;
  }
}

async function cargarFichajes(userId){
  const cont = document.getElementById("listaFichajes");
  if(!cont) return;

  try{
    const data = await api("/rest/v1/fichajes?select=*&user_id=eq." + encodeURIComponent(String(userId)) + "&order=fecha.desc&limit=20");

    if(!Array.isArray(data) || data.length === 0){
      cont.innerHTML = `<p class="muted">No hay fichajes.</p>`;
      return;
    }

    cont.innerHTML = data.map(f => `
      <div class="ficrow">
        <b>${escapar(f.tipo)}</b><br>
        ${new Date(f.fecha).toLocaleString("es-ES")}<br>
        <span class="muted">${escapar(f.direccion || "")}</span>
      </div>
    `).join("");
  }catch(e){
    cont.innerHTML = `<div class="error">Error cargando fichajes: ${escapar(e.message)}</div>`;
  }
}

function iniciar(){
  usuarioSesion = leerSesion();

  if(!usuarioSesion){
    window.location.replace("./index.html?v=1000");
    return;
  }

  pintarEstructura();
  mostrarInicio();
}

window.cerrarSesion = cerrarSesion;
window.mostrarInicio = mostrarInicio;
window.mostrarUsuarios = mostrarUsuarios;
window.mostrarConfig = mostrarConfig;
window.guardarUsuario = guardarUsuario;
window.abrirFicha = abrirFicha;
window.guardarCambios = guardarCambios;
window.borrarUsuario = borrarUsuario;
window.subirFotoDesde = subirFotoDesde;
window.subirDocumentoTipo = subirDocumentoTipo;
window.eliminarDocumento = eliminarDocumento;
window.fichar = fichar;

iniciar();
</script>
</body>
