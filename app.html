  if(!u)return null;
  return {

    usuario:u.usuario||u.username||String(u.id),

async function hashPassword(texto){
  const encoder=new TextEncoder();
  const data=encoder.encode(String(texto||""));
  const hash=await crypto.subtle.digest("SHA-256",data);
  return Array.from(new Uint8Array(hash)).map(b=>b.toString(16).padStart(2,"0")).join("");
}

async function passwordCoincide(passEscrita,passGuardada){
  if(!passGuardada)return false;
  const escrita=String(passEscrita||"");
  const guardada=String(passGuardada||"");

  if(escrita===guardada)return true;

  const hash=await hashPassword(escrita);
  return hash===guardada;
}

async function prepararPasswordParaGuardar(pass){
  return await hashPassword(pass);
}

function perfilUsuario(){
  if(!user)return "operario";
  const rol=String(user.rol||"").toLowerCase();

  if(user.es_admin===true || user.es_admin==="true" || user.es_admin===1)return "admin";
  if(rol.includes("admin"))return "admin";
  if(rol.includes("encargado") || rol.includes("jefe") || rol.includes("responsable"))return "encargado";

  return "operario";
}

  return perfilUsuario()==="admin";

}

async function loginUsuario(){
  const usuarioLogin=document.getElementById("login_usuario").value.trim();
  const pass=document.getElementById("login_password").value;

  if(!usuarioLogin){
    mostrarErrorLogin("Escribe el usuario.");
    return;
  }

  const {data,error}=await sb.from("users").select("*").eq("usuario",usuarioLogin).limit(1);

  if(error){
    mostrarErrorLogin("Error leyendo usuario: "+error.message);
    return;
  }

  if(!data||!data[0]){
    mostrarErrorLogin("Usuario no encontrado.");
    return;
  }

  const u=normalizarUsuario(data[0]);

  if(u.activo===false){
    mostrarErrorLogin("Usuario inactivo.");
    return;
  }

  // Recuperación segura del admin si existe pero no tiene password guardada.
  if(u.rol==="admin" && u.usuario==="admin" && !u.password && String(pass)==="admin"){
    const passHash=await prepararPasswordParaGuardar("admin");
    await actualizarUsuarioAdaptativo(u.id,{password:passHash,password_pendiente:false});
    u.password=passHash;
    u.password_pendiente=false;
  }

  if(u.password_pendiente || !u.password){
    mostrarCrearPasswordPrimeraVez(u);
    return;
  }

  const okPass=await passwordCoincide(pass,u.password);

  if(!okPass){
    mostrarErrorLogin("Contraseña incorrecta.");
    return;
  }

  user=u;
  localStorage.setItem("usuario",JSON.stringify(user));
  localStorage.setItem("zentryx_last_user",usuarioLogin);
  await iniciarAppConUsuario();
}

async function guardarPrimeraPassword(id){
  const p1=document.getElementById("pass1").value;
  const p2=document.getElementById("pass2").value;

  if(!p1 || p1.length<4){
    alert("La contraseña debe tener al menos 4 caracteres.");
    return;
  }

  if(p1!==p2){
    alert("Las contraseñas no coinciden.");
    return;
  }

  const passwordHash=await prepararPasswordParaGuardar(p1);

  const {error}=await actualizarUsuarioAdaptativo(id,{
    password:passwordHash,
    password_pendiente:false
  });

  if(error){
    alert("Error guardando contraseña: "+error.message);
    return;
  }

  const {data,error:err2}=await sb.from("users").select("*").eq("id",id).limit(1);

  if(err2 || !data || !data[0]){
    alert("Contraseña creada, pero no se pudo iniciar sesión automáticamente.");
    mostrarLogin();
    return;
  }

  user=normalizarUsuario(data[0]);
  user.password_pendiente=false;
  localStorage.setItem("usuario",JSON.stringify(user));

  await iniciarAppConUsuario();
}

async function cargarUsuarioActual(){
  const guardado=JSON.parse(localStorage.getItem("usuario")||"null");
  if(guardado&&guardado.id){
    const {data,error}=await sb.from("users").select("*").eq("id",guardado.id).limit(1);
    if(!error&&data&&data[0]){
      user=normalizarUsuario(data[0]);
      localStorage.setItem("usuario",JSON.stringify(user));
    }else{
      user=guardado;
    }
    return user;
  }

  return null;
}

}

function fechaSupabaseADate(valor){
  if(!valor)return new Date();
  let s=String(valor).trim();

  // Supabase timestamp sin zona: viene como UTC pero sin Z.
  // Si no trae Z ni offset, se añade Z para convertirlo bien a hora local del navegador.
  if(!/[zZ]$/.test(s) && !/[+-]\d{2}:?\d{2}$/.test(s)){
    s=s.replace(" ","T");
    if(!s.endsWith("Z"))s+="Z";
  }

  return new Date(s);
}

function fechaLocalISODesdeDate(d){
  return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");
}

function horaLocalHHMMDesdeDate(d){
  return String(d.getHours()).padStart(2,"0")+":"+String(d.getMinutes()).padStart(2,"0");
}

function minutosDelDiaDesdeDate(d){
  return d.getHours()*60+d.getMinutes();
}

}

async function abrirEditarFichaje(id){
  if(!esAdmin() && !puedeEditarFichajes()){
    alert("No tienes permiso para editar fichajes.");
    return;
  }

  const {data,error}=await sb.from("fichajes").select("*").eq("id",id).maybeSingle();
  if(error||!data){
    alert("No se pudo cargar el fichaje.");
    return;
  }

  if(await bloquearSiMesPagado(data.user_id||user.id,data.fecha,"Este mes está pagado. No se puede editar este fichaje.")){
    return;
  }

  const d=fechaSupabaseADate(data.fecha);
  const fechaLocal=fechaLocalISODesdeDate(d);
  const horaLocal=horaLocalHHMMDesdeDate(d);

  const motivo=prompt("Motivo obligatorio de la modificación:");
  if(!motivo || !motivo.trim()){
    alert("Debes indicar un motivo.");
    return;
  }

  const tipo=prompt("Tipo de movimiento:",data.tipo||"");
  if(!tipo)return;

  const fechaHora=prompt("Fecha y hora local (YYYY-MM-DDTHH:MM):",`${fechaLocal}T${horaLocal}`);
  if(!fechaHora)return;

  const nuevaFecha=fechaISODesdeInputLocal(fechaHora);
  if(!nuevaFecha){
    alert("Fecha/hora no válida.");
    return;
  }

  if(await bloquearSiMesPagado(data.user_id||user.id,nuevaFecha,"El mes de destino está pagado. No se puede mover el fichaje.")){
    return;
  }

  const update={
    tipo:tipo.trim(),
    fecha:nuevaFecha,
    nota_modificacion:motivo.trim(),
    modificado_por:String(user.id),
    modificado_en:new Date().toISOString()
  };

  const antes=data;
  const {data:despues,error:updateError}=await sb.from("fichajes").update(update).eq("id",id).select().single();

  if(updateError){
    alert("Error editando fichaje: "+updateError.message);
    return;
  }

  await registrarCambio({
    accion:"editar_fichaje",
    tabla:"fichajes",
    registro_id:id,
    motivo:motivo.trim(),
    antes,
    despues
  });

  await cargarFichajesServidor();
  alert("Fichaje modificado.");
  if(vistaActual==="informes"){
    await generarInformeMensual();
  }else{
    await inicio();
  }
}

async function cargarFichajesServidor(){
  if(cargandoFichajes)return;
  cargandoFichajes=true;

  const {data,error}=await sb
    .from("fichajes")
    .select("*")
    .eq("user_id",String(user.id))
    .order("fecha",{ascending:true})
    .limit(300);

  cargandoFichajes=false;

  if(error){
    console.error(error);
    aviso("Error leyendo fichajes: "+error.message,"error");
    return;
  }

  fichajesCache=(data||[]).map(f=>{
    const d=fechaSupabaseADate(f.fecha);
    return {
      id:f.id,
      fecha:fechaLocalISODesdeDate(d),
      hora:horaLocalHHMMDesdeDate(d),
      minutoDia:minutosDelDiaDesdeDate(d),
      tipo:f.tipo,
      ts:d.getTime(),
      direccion:f.direccion_real||f.direccion||"",
      lat:f.lat||null,
      lng:f.lng||null,
      precision_gps:f.precision_gps||null,
      zona_ok:f.zona_ok,
      zona_nombre:f.zona_nombre||"",
      zona_distancia:f.zona_distancia||null,
      zona_radio:f.zona_radio||null,
      zona_modo:f.zona_modo||"",
      zona_motivo:f.zona_motivo||"",
      precision_ok:f.precision_ok,

function movimientosHoy(){return leerFichajes().filter(x=>x.fecha===hoyISO()).sort((a,b)=>a.ts-b.ts)}
function ultimoMovimiento(){const m=movimientosHoy();return m.length?m[m.length-1]:null}

function estadoActual(){
  const u=ultimoMovimiento();
  if(!u)return {txt:"Fuera",clase:"red",accion:"entrada"};
  if(u.tipo==="entrada"||u.tipo==="fin_pausa"||u.tipo==="fin_comida")return {txt:"Trabajando",clase:"green",accion:"salida"};
  if(u.tipo==="inicio_pausa")return {txt:"En pausa",clase:"orange",accion:"fin_pausa"};
  if(u.tipo==="inicio_comida")return {txt:"En comida",clase:"orange",accion:"fin_comida"};
  if(u.tipo==="salida")return {txt:"Fuera",clase:"red",accion:"entrada"};
  return {txt:"Fuera",clase:"red",accion:"entrada"};
}

    inicio_comida:"Inicio comida",

  };
  return map[a]||a;
}


function estadoFichajeActual(){
  const u=ultimoMovimiento();
  if(!u)return "fuera";

  const tipo=String(u.tipo||"");

  if(tipo==="entrada"||tipo==="fin_pausa"||tipo==="fin_comida")return "trabajando";
  if(tipo==="inicio_pausa")return "pausa";
  if(tipo==="inicio_comida")return "comida";
  if(tipo==="salida")return "fuera";

  return "fuera";
}

function movimientoPermitido(tipo){
  const estado=estadoFichajeActual();

  if(tipo==="entrada")return estado==="fuera";
  if(tipo==="salida")return estado==="trabajando";
  if(tipo==="inicio_pausa")return estado==="trabajando";
  if(tipo==="fin_pausa")return estado==="pausa";
  if(tipo==="inicio_comida")return estado==="trabajando";
  if(tipo==="fin_comida")return estado==="comida";

  return false;
}

  if(tipo==="salida" && estado==="pausa")return "No puedes salir estando en pausa. Primero finaliza la pausa.";
  if(tipo==="salida" && estado==="comida")return "No puedes salir estando en comida. Primero finaliza la comida.";

  if(tipo==="inicio_pausa" && estado==="fuera")return "Primero debes fichar entrada para iniciar una pausa.";
  if(tipo==="inicio_pausa" && estado==="pausa")return "Ya tienes una pausa abierta.";
  if(tipo==="inicio_pausa" && estado==="comida")return "No puedes iniciar pausa mientras estás en comida.";

  if(tipo==="fin_pausa" && estado==="trabajando")return "No estás en pausa.";

function calcularDistanciaMetros(lat1,lon1,lat2,lon2){
  const R=6371000;
  const toRad=n=>Number(n)*Math.PI/180;
  const dLat=toRad(lat2-lat1);
  const dLon=toRad(lon2-lon1);
  const a=
    Math.sin(dLat/2)*Math.sin(dLat/2)+
    Math.cos(toRad(lat1))*Math.cos(toRad(lat2))*
    Math.sin(dLon/2)*Math.sin(dLon/2);
  const c=2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
  return R*c;
}

function evaluarPrecisionGPS(gps,config){
  const precision=Number(gps?.precision||0);
  const max=Number(config?.precision_maxima_metros||10);

  if(!gps || !gps.ok){
    return {
      ok:false,
      modo:"sin_gps",
      precision:null,
      max,
      mensaje:"Sin GPS"
    };
  }

  if(!precision || Number.isNaN(precision)){
    return {
      ok:false,
      modo:"sin_precision",
      precision:null,
      max,
      mensaje:"No se ha podido leer la precisión del GPS"
    };
  }

  if(precision<=max){
    return {
      ok:true,
      modo:"precision_ok",
      precision,
      max,
      mensaje:"Precisión GPS correcta"
    };
  }

  return {
    ok:false,
    modo:"precision_mala",
    precision,
    max,
    mensaje:`Precisión GPS insuficiente: ${Math.round(precision)} m. Máximo permitido: ${max} m`
  };
}

function textoResultadoPrecisionGPS(r){
  if(!r)return "";
  if(r.ok)return `Precisión GPS correcta: ${Math.round(r.precision)} m`;
  if(r.modo==="precision_mala")return `GPS impreciso: ${Math.round(r.precision)} m / máximo ${r.max} m`;
  return r.mensaje||"Precisión GPS no válida";
}

}

async function comprobarZonaTrabajo(lat,lng){
  if(lat==null || lng==null){
    return {
      ok:false,
      modo:"sin_gps",
      mensaje:"No se ha podido comprobar zona porque no hay GPS.",
      zona:null,
      zona_id:null,
      distancia:null,
      radio:null
    };
  }

  const zonas=(await leerZonasTrabajo()).filter(z=>z.activa!==false);

  if(!zonas.length){
    return {
      ok:true,
      modo:"sin_zonas",
      mensaje:"No hay zonas configuradas. El fichaje no se valida por zona.",
      zona:null,
      zona_id:null,
      distancia:null,
      radio:null
    };
  }

  let masCercana=null;

  for(const z of zonas){
    if(z.lat==null || z.lng==null)continue;

    const distancia=calcularDistanciaMetros(Number(lat),Number(lng),Number(z.lat),Number(z.lng));
    const radio=Number(z.radio_metros||0);

    if(!masCercana || distancia<masCercana.distancia){
      masCercana={zona:z,distancia,radio};
    }

    if(radio>0 && distancia<=radio){
      return {
        ok:true,
        modo:"dentro",
        mensaje:"Fichaje dentro de zona autorizada.",
        zona:z.nombre||"Zona",
        zona_id:z.id,
        distancia:Math.round(distancia),
        radio:radio
      };
    }
  }

  return {
    ok:false,
    modo:"fuera",
    mensaje:"Fichaje fuera de zona autorizada.",
    zona:masCercana?.zona?.nombre||null,
    zona_id:masCercana?.zona?.id||null,
    distancia:masCercana?Math.round(masCercana.distancia):null,
    radio:masCercana?.radio||null
  };
}

function textoResultadoZona(zona){
  if(!zona)return "";
  if(zona.modo==="sin_zonas")return "Sin zonas configuradas";
  if(zona.modo==="sin_gps")return "Sin GPS";
  if(zona.ok && zona.zona)return `Dentro de ${zona.zona} · ${zona.distancia} m`;
  if(!zona.ok && zona.zona)return `Fuera de zona · más cercana: ${zona.zona} · ${zona.distancia} m`;
  return zona.mensaje||"Zona no comprobada";
}

async function obtenerGPS(){
  return new Promise(resolve=>{
    if(!navigator.geolocation){
      resolve({
        ok:false,
        lat:null,
        lng:null,
        precision:null,
        direccion:"GPS no disponible",
        msg:"GPS no disponible"
      });
      return;
    }

    navigator.geolocation.getCurrentPosition(
      pos=>{
        resolve({
          ok:true,
          lat:pos.coords.latitude,
          lng:pos.coords.longitude,
          precision:pos.coords.accuracy,
          direccion:"Lat "+pos.coords.latitude+", Lng "+pos.coords.longitude,
          msg:"GPS correcto"
        });
      },
      err=>{
        resolve({
          ok:false,
          lat:null,
          lng:null,
          precision:null,
          direccion:"GPS denegado o sin señal",
          msg:"GPS denegado o sin señal"
        });
      },
      {enableHighAccuracy:true,timeout:10000,maximumAge:0}
    );
  });
}

async function obtenerDireccionReal(lat,lng){
  if(lat==null||lng==null)return "Sin ubicación";
  try{
    const url="https://nominatim.openstreetmap.org/reverse?format=jsonv2&lat="+encodeURIComponent(lat)+"&lon="+encodeURIComponent(lng)+"&accept-language=es";
    const r=await fetch(url);
    const data=await r.json();
    return data.display_name || ("Lat "+lat+", Lng "+lng);
  }catch(e){
    return "Lat "+lat+", Lng "+lng;
  }
}

async function guardarMovimiento(tipo){
  await recargarUsuarioActual();
  await registrarCambio({
      accion:"borrado_hoy",
      tabla:"fichajes",
      motivo:"Borrado manual de fichajes del día"
    });
    await cargarFichajesServidor();

  if(await bloquearSiMesPagado(user.id,new Date().toISOString(),"Este mes está pagado. No puedes crear nuevos fichajes.")){
    return;
  }

  const validacion=avisoEstadoFichaje(tipo);
  if(!validacion.permitido){
    alert(validacion.mensaje);
    return;
  }

  const festivo=await comprobarFestivoHoy();
  if(festivo && !confirm("Hoy es festivo: "+textoFestivoHoy()+". ¿Seguro que quieres fichar?")){
    return;
  }

  const gps=await obtenerGPS();

  if(!gps.ok){
    await registrarCambio({
      accion:"fichaje_sin_gps",
      tabla:"fichajes",
      motivo:gps.msg||"GPS no disponible"
    });
  }

  const direccionReal=await obtenerDireccionReal(gps.lat,gps.lng);
  const zona=await comprobarZonaTrabajo(gps.lat,gps.lng);

  let motivoFueraZona="";
  let motivoPrecisionGPS="";
  const configZonas=await leerConfigZonas();
  const precisionGPS=evaluarPrecisionGPS(gps,configZonas);

  if(!precisionGPS.ok && precisionGPS.modo==="precision_mala"){
    const modoPrecision=configZonas.modo_precision_gps||"motivo";

    if(modoPrecision==="bloquear" && !puedeSaltarGPS()){
      await registrarCambio({
        accion:"fichaje_bloqueado_precision_gps",
        tabla:"fichajes",
        motivo:precisionGPS.mensaje,
        despues:{precisionGPS,modoPrecision,permiso_saltar_gps:false}
      });

      await registrarIncidenciaBloqueoFichaje({
        tipo:"bloqueado_precision_baja",
        descripcion:"Fichaje bloqueado por GPS impreciso. "+textoResultadoPrecisionGPS(precisionGPS),
        datos:{precisionGPS,modoPrecision,user_id:user?.id||"",permiso_saltar_gps:false}
      });

      alert("Fichaje bloqueado: "+textoResultadoPrecisionGPS(precisionGPS));
      return;
    }

    if(modoPrecision==="bloquear" && puedeSaltarGPS()){
      motivoPrecisionGPS="Usuario autorizado para saltar control GPS";

      await registrarCambio({
        accion:"usuario_salto_control_gps",
        tabla:"fichajes",
        motivo:"Usuario autorizado para fichar con GPS impreciso",
        despues:{precisionGPS,modoPrecision,user_id:user?.id||"",permiso_saltar_gps:true}
      });
    }

    if(modoPrecision==="motivo"){
      motivoPrecisionGPS=prompt(
        "La precisión del GPS es baja. Indica motivo para continuar:",
        "Precisión GPS insuficiente"
      )||"Sin motivo indicado";
    }

    await registrarCambio({
      accion:"fichaje_precision_gps_baja",
      tabla:"fichajes",
      motivo:precisionGPS.mensaje+(motivoPrecisionGPS?(" · Motivo: "+motivoPrecisionGPS):""),
      despues:{precisionGPS,modoPrecision,motivoPrecisionGPS}
    });

    alert("Aviso: "+textoResultadoPrecisionGPS(precisionGPS)+". Modo: "+textoModoZona(modoPrecision)+". Queda registrado en auditoría.");
  }

  if(!zona.ok){
    const modoControl=zona.modo==="sin_gps" ? configZonas.modo_sin_gps : configZonas.modo_fuera_zona;

    const permisoSaltoControl = zona.modo==="sin_gps" ? puedeSaltarGPS() : puedeSaltarZona();

    if(modoControl==="bloquear" && !permisoSaltoControl){
      await registrarCambio({
        accion:zona.modo==="sin_gps"?"fichaje_bloqueado_sin_gps":"fichaje_bloqueado_fuera_zona",
        tabla:"fichajes",
        motivo:(zona.mensaje||"Zona no válida")+(zona.zona?(" · Zona más cercana: "+zona.zona):""),
        despues:{zona,modoControl,permiso_salto:false}
      });

      await registrarIncidenciaBloqueoFichaje({
        tipo:zona.modo==="sin_gps"?"bloqueado_sin_gps":"bloqueado_fuera_zona",
        descripcion:"Fichaje bloqueado. "+textoResultadoZona(zona),
        datos:{zona,modoControl,user_id:user?.id||"",permiso_salto:false}
      });

      alert("Fichaje bloqueado: "+textoResultadoZona(zona));
      return;
    }

    if(modoControl==="bloquear" && permisoSaltoControl){
      motivoFueraZona = zona.modo==="sin_gps"
        ? "Usuario autorizado para saltar control GPS"
        : "Usuario autorizado para saltar control de zona";

      await registrarCambio({
        accion:zona.modo==="sin_gps"?"usuario_salto_control_gps":"usuario_salto_control_zona",
        tabla:"fichajes",
        motivo:motivoFueraZona,
        despues:{zona,modoControl,user_id:user?.id||"",permiso_salto:true}
      });
    }

    if(modoControl==="motivo"){
      motivoFueraZona=prompt(
        zona.modo==="sin_gps"
          ?"No se puede comprobar la zona porque no hay GPS. Indica motivo para continuar:"
          :"Estás fuera de zona de trabajo. Indica motivo para continuar:",
        zona.modo==="sin_gps"?"GPS no disponible":"Trabajo fuera de zona autorizada"
      )||"Sin motivo indicado";
    }

    await registrarCambio({
      accion:zona.modo==="sin_gps"?"fichaje_sin_comprobacion_zona":"fichaje_fuera_zona",
      tabla:"fichajes",
      motivo:(zona.mensaje||"Zona no válida")+(zona.zona?(" · Zona más cercana: "+zona.zona):"")+(motivoFueraZona?(" · Motivo: "+motivoFueraZona):""),
      despues:{zona,modoControl,motivoFueraZona}
    });

    alert("Aviso: "+textoResultadoZona(zona)+". Modo: "+textoModoZona(modoControl)+". Queda registrado en auditoría.");
  }

  const payload={
    user_id:String(user.id),
    tipo:tipo,
    fecha:new Date().toISOString(),
    lat:gps.lat,
    lng:gps.lng,
    precision_gps:gps.precision,
    zona_ok:zona.ok,
    zona_nombre:zona.zona,
    zona_distancia:zona.distancia,
    zona_radio:zona.radio,
    zona_modo:zona.modo,
    zona_motivo:motivoFueraZona,
    precision_ok:precisionGPS.ok,
    precision_maxima:precisionGPS.max,
    precision_modo:precisionGPS.modo,
    precision_motivo:motivoPrecisionGPS,
    direccion:gps.direccion,
    direccion_real:direccionReal
  };

  const {data:fichajeCreado,error}=await sb.from("fichajes").insert([payload]).select().single();

  if(error){
    console.error(error);
    alert("Error guardando fichaje: "+error.message);
    return;
  }

  if(zona && !zona.ok){
    await registrarIncidenciaFichaje({
      tipo:zona.modo==="sin_gps"?"sin_gps":"fuera_zona",
      descripcion:zona.modo==="sin_gps"
        ?"Fichaje sin comprobación de zona por falta de GPS"
        :("Fichaje fuera de zona. "+textoResultadoZona(zona)),
      fichaje_id:fichajeCreado?.id||"",
      datos:{zona,motivo:motivoFueraZona,payload:fichajeCreado||payload}
    });
  }

  if(precisionGPS && !precisionGPS.ok && precisionGPS.modo==="precision_mala"){
    await registrarIncidenciaFichaje({
      tipo:"precision_baja",
      descripcion:textoResultadoPrecisionGPS(precisionGPS),
      fichaje_id:fichajeCreado?.id||"",
      datos:{precisionGPS,motivo:motivoPrecisionGPS,payload:fichajeCreado||payload}
    });
  }

  await cargarFichajesServidor();
  aviso(nombreAccion(tipo)+" guardado.","ok");
  inicio();
}

function resumenHoy(){
  const mov=movimientosHoy();
  let trabajandoDesde=null, pausaDesde=null, comidaDesde=null;
  let trabajo=0, pausa=0, comida=0;

  for(const m of mov){
    const mm=(m.minutoDia!=null)?m.minutoDia:minutos(m.hora);
    if(m.tipo==="entrada"||m.tipo==="fin_pausa"||m.tipo==="fin_comida"){
      trabajandoDesde=mm;
      pausaDesde=null;
      comidaDesde=null;
    }
    if(m.tipo==="inicio_pausa"){
      if(trabajandoDesde!=null)trabajo+=mm-trabajandoDesde;
      trabajandoDesde=null;
      pausaDesde=mm;
    }
    if(m.tipo==="fin_pausa"){
      if(pausaDesde!=null)pausa+=mm-pausaDesde;
      pausaDesde=null;
      trabajandoDesde=mm;
    }
    if(m.tipo==="inicio_comida"){
      if(trabajandoDesde!=null)trabajo+=mm-trabajandoDesde;
      trabajandoDesde=null;
      comidaDesde=mm;
    }
    if(m.tipo==="fin_comida"){
      if(comidaDesde!=null)comida+=mm-comidaDesde;
      comidaDesde=null;
      trabajandoDesde=mm;
    }
    if(m.tipo==="salida"){
      if(trabajandoDesde!=null)trabajo+=mm-trabajandoDesde;
      trabajandoDesde=null;
    }
  }

  const est=estadoActual();
  const now=minutos(horaHHMM());
  if(est.txt==="Trabajando" && trabajandoDesde!=null)trabajo+=now-trabajandoDesde;
  if(est.txt==="En pausa" && pausaDesde!=null)pausa+=now-pausaDesde;
  if(est.txt==="En comida" && comidaDesde!=null)comida+=now-comidaDesde;

  return {trabajo,pausa,comida,mov};
}

async function cargarNotasServidor(){

    .or(`user_id.eq.${String(user.id)},visibilidad.eq.general`)

function normalizarNotaPro(n){
  let extra={};
  try{
    if(n.meta_json)extra=typeof n.meta_json==="string"?JSON.parse(n.meta_json):n.meta_json;
  }catch(e){extra={}}

  const texto=n.texto||n.txt||"";

  return {
    id:n.id,
    titulo:n.titulo||extra.titulo||texto.split("\n")[0]||"Nota",
    descripcion:n.descripcion||extra.descripcion||texto||"",
    txt:n.titulo||extra.titulo||texto||"",
    fecha:n.fecha_aviso||n.fecha||"",
    hora:n.hora_aviso?String(n.hora_aviso).slice(0,5):(n.hora||""),
    fija:!!n.fija,
    hecha:!!n.hecha,
    creada:n.creada_en||n.creada||"",
    prioridad:n.prioridad||extra.prioridad||"normal",
    prioridad_orden:Number(n.prioridad_orden||extra.prioridad_orden||prioridadOrden(extra.prioridad||"normal")),
    visibilidad:n.visibilidad||extra.visibilidad||"personal",
    responsable:n.responsable||extra.responsable||"",
    creada_por:n.creada_por||extra.creada_por||""
  };
}

function prioridadOrden(p){
  if(p==="alta")return 3;
  if(p==="normal")return 2;
  if(p==="baja")return 1;
  return 2;
}

function fechaInputISO(v){
  if(!v)return "";
  const s=String(v).trim();

  if(/^\d{4}-\d{2}-\d{2}$/.test(s))return s;

  const m=s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/);
  if(m){
    const d=String(m[1]).padStart(2,"0");
    const mo=String(m[2]).padStart(2,"0");
    return `${m[3]}-${mo}-${d}`;
  }

  return "";
}

async function guardarNotaNueva(){
  if(guardandoNotaPro)return;
  guardandoNotaPro=true;
  bloquearBotonNota("btnGuardarNotaNueva");

  try{
    const titulo=document.getElementById("notaTitulo").value.trim();
    const descripcion=document.getElementById("notaTxt").value.trim();

    if(!titulo && !descripcion){
      alert("Escribe título o descripción.");
      return;
    }

    const prioridad=document.getElementById("notaPrioridad").value||"normal";
    const visibilidad=document.getElementById("notaVisibilidad").value||"personal";
    const responsable=document.getElementById("notaResponsable").value.trim();

    const payload={
      user_id:String(user.id),
      titulo:titulo||descripcion.slice(0,50),
      descripcion:descripcion,
      texto:titulo?`${titulo}\n${descripcion}`:descripcion,
      fecha_aviso:leerFechaAvisoNota("notaFecha")||null,
      hora_aviso:document.getElementById("notaHora").value||null,
      fija:document.getElementById("notaFija").value==="true",
      hecha:false,
      prioridad:prioridad,
      prioridad_orden:prioridadOrden(prioridad),
      visibilidad:visibilidad,
      responsable:responsable,
      creada_por:String(user.id),
      creada_en:new Date().toISOString(),
      meta_json:{
        titulo:titulo,
        descripcion:descripcion,
        prioridad:prioridad,
        visibilidad:visibilidad,
        responsable:responsable,
        prioridad_orden:prioridadOrden(prioridad)
      }
    };

    const {data,error}=await sb.from("notas_rapidas").insert([payload]).select().single();

    if(error){
      console.error(error);
      alert("Error guardando nota: "+error.message);
      return;
    }

    await registrarCambio({
      accion:"nota_creada",
      tabla:"notas_rapidas",
      registro_id:data?.id||"",
      motivo:"Creación de nota PRO",
      antes:null,
      despues:data||payload
    });

    await cargarNotasServidor();
    aviso("Nota guardada.","ok");
    await vistaNotasPro("pendientes");
  }finally{
    guardandoNotaPro=false;
    desbloquearBotonNota("btnGuardarNotaNueva");
  }
}

        </div>

            ${n.descripcion?`<span class="small">${n.descripcion}</span><br>`:""}

            ${n.fecha||n.hora?`<br><span class="small">${fechaES(n.fecha)||""} ${n.hora||""}</span>`:""}

function leerAviso(){

  localStorage.removeItem("zentryx_msg");
  const m=JSON.parse(raw);
  return `<p class="${m.tipo}">${m.texto}</p>`;
}

  const inicio=hoyISO()+"T00:00:00";

  if(await bloquearSiMesPagado(user.id,inicio,"Este mes está pagado. No puedes borrar fichajes de hoy.")){

function buscarTipoExtra(tipos,nombres,precioDefecto){
  const limpio=nombres.map(x=>x.toLowerCase());

  const encontrado=(tipos||[]).find(t=>{
    const n=String(t.nombre||"").toLowerCase();
    return limpio.some(x=>n.includes(x));
  });

  if(encontrado){
    return {
      nombre:encontrado.nombre||nombres[0],
      precio:precioTipo(encontrado)
    };
  }

  return {

    precio:precioDefecto
  };
}

function dinero(minutos,precioHora){
  const euros=(Number(minutos||0)/60)*Number(precioHora||0);
  return euros.toLocaleString("es-ES",{minimumFractionDigits:2,maximumFractionDigits:2})+" €";
}

function detectarMinutosNocturnos(movimientos){
  // Nocturno base 22:00 a 06:00. Luego lo afinamos por convenio.
  let total=0;
  let entrada=null;

  const ordenados=movimientos.slice().sort((a,b)=>a.ts-b.ts);

  for(const m of ordenados){
    const tipo=String(m.tipo||"").trim();
    const mm=(m.minutoDia!=null)?m.minutoDia:minutos(m.hora);

    if(tipo==="entrada"||tipo==="fin_pausa"||tipo==="fin_comida"){
      entrada=mm;
      continue;
    }

    if(tipo==="inicio_pausa"||tipo==="inicio_comida"||tipo==="salida"){
      if(entrada!=null){
        total+=minutosNocturnosEntre(entrada,mm);
      }
      entrada=null;
    }
  }

  return total;
}

function minutosNocturnosEntre(inicio,fin){
  if(inicio==null||fin==null)return 0;
  let total=0;

  for(let m=inicio;m<fin;m++){
    const hora=Math.floor((m%1440)/60);
    if(hora>=22 || hora<6)total++;
  }

  return total;
}

function resumenMovimientosDia(mov){
  let trabajandoDesde=null;
  let pausaDesde=null;
  let comidaDesde=null;

  let trabajo=0;
  let pausa=0;
  let comida=0;

  const ordenados=mov.slice().sort((a,b)=>a.ts-b.ts);

  for(const m of ordenados){
    const mm=(m.minutoDia!=null)?m.minutoDia:minutos(m.hora);
    const tipo=String(m.tipo||"").trim();

    if(tipo==="entrada"){
      trabajandoDesde=mm;
      pausaDesde=null;
      comidaDesde=null;
      continue;
    }

    if(tipo==="inicio_pausa"){
      if(trabajandoDesde!=null){
        trabajo+=mm-trabajandoDesde;
        trabajandoDesde=null;
      }
      pausaDesde=mm;
      continue;
    }

    if(tipo==="fin_pausa"){
      if(pausaDesde!=null){
        pausa+=mm-pausaDesde;
        pausaDesde=null;
      }
      trabajandoDesde=mm;
      continue;
    }

    if(tipo==="inicio_comida"){
      if(trabajandoDesde!=null){
        trabajo+=mm-trabajandoDesde;
        trabajandoDesde=null;
      }
      comidaDesde=mm;
      continue;
    }

    if(tipo==="fin_comida"){
      if(comidaDesde!=null){
        comida+=mm-comidaDesde;
        comidaDesde=null;
      }
      trabajandoDesde=mm;
      continue;
    }

    if(tipo==="salida"){
      if(trabajandoDesde!=null){
        trabajo+=mm-trabajandoDesde;
        trabajandoDesde=null;
      }
      pausaDesde=null;
      comidaDesde=null;
      continue;
    }
  }

  return {
    trabajo:Math.max(0,trabajo),
    pausa:Math.max(0,pausa),
    comida:Math.max(0,comida)
  };
}

function agruparPorFecha(lista){
  const mapa={};
  for(const m of lista){
    if(!mapa[m.fecha])mapa[m.fecha]=[];
    mapa[m.fecha].push(m);
  }
  return mapa;
}


function diaSemanaNombreISO(fechaISO){
  const d=new Date(fechaISO+"T00:00:00").getDay();
  return ["domingo","lunes","martes","miércoles","jueves","viernes","sábado"][d];
}

function minutosEntreHoras(inicio,fin){
  if(!inicio||!fin)return 0;
  const a=minutos(String(inicio).slice(0,5));
  const b=minutos(String(fin).slice(0,5));
  return Math.max(0,b-a);
}

function normalMaximaPorHorario(horarioDia){
  if(!horarioDia||!horarioDia.trabaja)return 0;

  const entrada=horaInput(horarioDia.entrada || horarioDia.hora_inicio);
  const salida=horaInput(horarioDia.salida || horarioDia.hora_fin);

  if(!entrada||!salida)return 8*60;

  let total=minutosEntreHoras(entrada,salida);

  const inicioComida=horaInput(horarioDia.inicio_comida);
  const finComida=horaInput(horarioDia.fin_comida);
  const comida=minutosEntreHoras(inicioComida,finComida);

  if(comida>0)total-=comida;

  const descanso=Number(horarioDia.descanso_min||0);
  if(!Number.isNaN(descanso) && descanso>0)total-=descanso;

  return Math.max(0,total);
}

function calcularClasificacionDiaPRO({fecha,res,movs,festivo,horarioDia,tipos}){
  const diaSemana=new Date(fecha+"T00:00:00").getDay();
  const esFinSemana=(diaSemana===0||diaSemana===6);

  const tipoNormal=tipos.tipoNormal;
  const tipoFestivo=tipos.tipoFestivo;
  const tipoFinSemana=tipos.tipoFinSemana;
  const tipoNocturna=tipos.tipoNocturna;

  const precios=tipos.precios;

  const nocturna=detectarMinutosNocturnos(movs);
  const normalMax=normalMaximaPorHorario(horarioDia);

  let normal=0;
  let extraNormal=0;
  let extraFestivo=0;
  let extraFinSemana=0;

  if(festivo){
    normal=0;
    extraFestivo=res.trabajo;
  }else if(esFinSemana){
    normal=0;
    extraFinSemana=res.trabajo;
  }else{
    normal=Math.min(res.trabajo,normalMax || 8*60);
    extraNormal=Math.max(0,res.trabajo-normal);
  }

  const extra=extraNormal+extraFestivo+extraFinSemana+nocturna;

  const eurosNormal=(normal/60)*precios.normal;
  const eurosExtraNormal=(extraNormal/60)*precios.normal;
  const eurosExtraFestivo=(extraFestivo/60)*precios.festivo;
  const eurosExtraFinSemana=(extraFinSemana/60)*precios.finSemana;
  const eurosExtraNocturna=(nocturna/60)*precios.nocturna;
  const eurosDia=eurosNormal+eurosExtraNormal+eurosExtraFestivo+eurosExtraFinSemana+eurosExtraNocturna;

  return {
    fecha,
    festivo,
    esFinSemana,
    horarioDia,
    trabajo:res.trabajo,
    normal,
    extra,
    extraNormal,
    extraFestivo,
    extraFinSemana,
    nocturna,
    pausa:res.pausa,
    comida:res.comida,
    eurosNormal,
    eurosExtraNormal,
    eurosExtraFestivo,
    eurosExtraFinSemana,
    eurosExtraNocturna,
    eurosDia,
    movimientos:movs,
    tipoNormal,
    tipoFestivo,
    tipoFinSemana,
    tipoNocturna
  };
}

  const mes=document.getElementById("inf_mes").value;
  const anio=document.getElementById("inf_anio").value;
  const u=usuarioPorId(uid)||user;

  const inicio=fechaISOdesdePartes(anio,mes,1);
  const fin=fechaISOdesdePartes(anio,mes,ultimoDiaMes(anio,mes));

  const periodo=`${anio}-${String(mes).padStart(2,"0")}`;

  const [fichajes,festivos,tiposExtra,horariosUsuario,cierreMensual]=await Promise.all([
    cargarFichajesUsuarioPeriodo(uid,inicio,fin),
    cargarFestivosPeriodo(inicio,fin),
    leerTiposHorasExtraServidor(),
    cargarHorarioUsuario(uid),
    cargarCierreMensual(uid,mes,anio)
  ]);

  const tipoNormal=buscarTipoExtra(tiposExtra,["normal"],12);
  const tipoFestivo=buscarTipoExtra(tiposExtra,["festiva","festivo"],20);
  const tipoNocturna=buscarTipoExtra(tiposExtra,["nocturna","nocturno"],15);
  const tipoFinSemana=buscarTipoExtra(tiposExtra,["fin de semana","finde","sábado","domingo"],18);

  const precios={
    normal:tipoNormal.precio,
    festivo:tipoFestivo.precio,
    nocturna:tipoNocturna.precio,
    finSemana:tipoFinSemana.precio
  };

  const tipos={tipoNormal,tipoFestivo,tipoNocturna,tipoFinSemana,precios};

  const festivosPorFecha={};
  for(const f of festivos){
    festivosPorFecha[String(f.fecha).slice(0,10)]=f;
  }

  const porFecha=agruparPorFecha(fichajes);
  const dias=Object.keys(porFecha).sort();

  let totalTrabajo=0,totalNormal=0,totalExtra=0,totalExtraNormal=0,totalExtraFestivo=0,totalExtraNocturna=0,totalExtraFinSemana=0;
  let totalPausa=0,totalComida=0,festivosTrabajados=0;

  const filas=dias.map(fecha=>{
    const movs=porFecha[fecha];
    const res=resumenMovimientosDia(movs);
    const festivo=festivosPorFecha[fecha]||null;
    const diaNombre=diaSemanaNombreISO(fecha);
    const horarioDia=horarioPorDia(horariosUsuario,diaNombre);

    const d=calcularClasificacionDiaPRO({fecha,res,movs,festivo,horarioDia,tipos});

    totalTrabajo+=d.trabajo;
    totalNormal+=d.normal;
    totalExtra+=d.extra;
    totalExtraNormal+=d.extraNormal;
    totalExtraFestivo+=d.extraFestivo;
    totalExtraFinSemana+=d.extraFinSemana;
    totalExtraNocturna+=d.nocturna;
    totalPausa+=d.pausa;
    totalComida+=d.comida;
    if(festivo && d.trabajo>0)festivosTrabajados++;

    return d;
  });

  const eurosNormalTotal=(totalNormal/60)*precios.normal;
  const eurosExtraNormalTotal=(totalExtraNormal/60)*precios.normal;
  const eurosExtraFestivoTotal=(totalExtraFestivo/60)*precios.festivo;
  const eurosExtraFinSemanaTotal=(totalExtraFinSemana/60)*precios.finSemana;
  const eurosExtraNocturnaTotal=(totalExtraNocturna/60)*precios.nocturna;
  const totalEurosExtra=eurosExtraNormalTotal+eurosExtraFestivoTotal+eurosExtraFinSemanaTotal+eurosExtraNocturnaTotal;
  const totalEuros=eurosNormalTotal+totalEurosExtra;

  document.getElementById("zonaInforme").innerHTML=`
    <div class="card">
      <h2>${u.nombre}</h2>
      <p>${mes}/${anio}</p>

      <span class="badge">Trabajo total: ${textoMin(totalTrabajo)}</span>
      <span class="badge green">Jornada normal: ${textoMin(totalNormal)}</span>
      <span class="badge orange">Horas extra total: ${textoMin(totalExtra)}</span>
      <span class="badge red">Festivos trabajados: ${festivosTrabajados}</span>
      <span class="badge">Pausas: ${textoMin(totalPausa)}</span>
      <span class="badge">Comida: ${textoMin(totalComida)}</span>

      <div class="row">
        <h3>Importes de horas extra</h3>
        <p class="small">La jornada normal se muestra solo en horas. Zentryx no calcula nóminas ni IRPF; solo calcula importes de horas extra.</p>
        <p><b>Jornada normal:</b> ${textoMin(totalNormal)}</p>
        <p><b>Extra ${tipoNormal.nombre}:</b> ${textoMin(totalExtraNormal)} · ${eurosExtraNormalTotal.toLocaleString("es-ES",{minimumFractionDigits:2,maximumFractionDigits:2})} €</p>
        <p><b>${tipoFestivo.nombre}:</b> ${textoMin(totalExtraFestivo)} · ${eurosExtraFestivoTotal.toLocaleString("es-ES",{minimumFractionDigits:2,maximumFractionDigits:2})} €</p>
        <p><b>${tipoFinSemana.nombre}:</b> ${textoMin(totalExtraFinSemana)} · ${eurosExtraFinSemanaTotal.toLocaleString("es-ES",{minimumFractionDigits:2,maximumFractionDigits:2})} €</p>
        <p><b>${tipoNocturna.nombre}:</b> ${textoMin(totalExtraNocturna)} · ${eurosExtraNocturnaTotal.toLocaleString("es-ES",{minimumFractionDigits:2,maximumFractionDigits:2})} €</p>
        <h2>Total extras a pagar: ${totalEurosExtra.toLocaleString("es-ES",{minimumFractionDigits:2,maximumFractionDigits:2})} €</h2>
      </div>

      <button class="btn gray full" onclick="copiarInformeMensual()">Copiar resumen</button>
    </div>

    ${pintarBloqueCierreMensual({
      uid:uid,
      periodo:periodo,
      mes:mes,
      anio:anio,
      totalEurosExtra:totalEurosExtra,
      cierre:cierreMensual
    })}

    <div class="card">
      <h2>Detalle diario</h2>
      ${filas.length?filas.map(d=>`
        <div class="row">
          <b>${fechaES(d.fecha)}</b><br>
          ${d.festivo?`<span class="badge red">Festivo: ${d.festivo.nombre||"Festivo"}</span><br>`:""}
          ${d.esFinSemana&&!d.festivo?`<span class="badge orange">Fin de semana</span><br>`:""}
          ${d.horarioDia?.trabaja?`<span class="small">Horario: ${horaInput(d.horarioDia.entrada||d.horarioDia.hora_inicio)||"-"} → ${horaInput(d.horarioDia.salida||d.horarioDia.hora_fin)||"-"}</span><br>`:`<span class="small">Sin horario de trabajo definido para este día</span><br>`}
          Trabajo: ${textoMin(d.trabajo)}<br>
          Normal: ${textoMin(d.normal)}<br>
          Extra total: ${textoMin(d.extra)}<br>
          ${d.extraNormal?`Extra normal: ${textoMin(d.extraNormal)} · ${d.eurosExtraNormal.toLocaleString("es-ES",{minimumFractionDigits:2,maximumFractionDigits:2})} €<br>`:""}
          ${d.extraFestivo?`Extra festivo: ${textoMin(d.extraFestivo)} · ${d.eurosExtraFestivo.toLocaleString("es-ES",{minimumFractionDigits:2,maximumFractionDigits:2})} €<br>`:""}
          ${d.extraFinSemana?`Extra fin de semana: ${textoMin(d.extraFinSemana)} · ${d.eurosExtraFinSemana.toLocaleString("es-ES",{minimumFractionDigits:2,maximumFractionDigits:2})} €<br>`:""}
          ${d.nocturna?`Extra nocturna: ${textoMin(d.nocturna)} · ${d.eurosExtraNocturna.toLocaleString("es-ES",{minimumFractionDigits:2,maximumFractionDigits:2})} €<br>`:""}
          Pausas: ${textoMin(d.pausa)} · Comida: ${textoMin(d.comida)}<br>
          <span class="small">Movimientos registrados: ${d.movimientos.length}</span><br>
          <b>Total extras día: ${(d.eurosExtraNormal+d.eurosExtraFestivo+d.eurosExtraFinSemana+d.eurosExtraNocturna).toLocaleString("es-ES",{minimumFractionDigits:2,maximumFractionDigits:2})} €</b>
          <details>
            <summary>Movimientos</summary>
            ${d.movimientos.map(m=>`
              <div class="row">
                ${m.hora} · ${nombreAccion(m.tipo)}${m.direccion?` · ${m.direccion}`:""}
                ${m.nota_modificacion?`<br><span class="small">Motivo modificación: ${m.nota_modificacion}</span>`:""}
                ${m.precision_gps?`<br><span class="small">Precisión GPS: ${Math.round(m.precision_gps)} m${m.precision_maxima?` / máx ${m.precision_maxima} m`:""}</span>`:""}
                ${m.precision_ok===false?`<br><span class="badge red">GPS impreciso</span>${m.precision_motivo?`<br><span class="small">Motivo GPS: ${m.precision_motivo}</span>`:""}`:""}
                ${m.zona_ok===false?`<br><span class="badge red">Fuera de zona</span>${m.zona_nombre?`<br><span class="small">Zona más cercana: ${m.zona_nombre} · ${m.zona_distancia||"-"} m</span>`:""}${m.zona_motivo?`<br><span class="small">Motivo: ${m.zona_motivo}</span>`:""}`:""}
                ${m.zona_ok===true && m.zona_nombre?`<br><span class="badge green">Zona: ${m.zona_nombre}</span>${m.zona_distancia?`<br><span class="small">Distancia: ${m.zona_distancia} m</span>`:""}`:""}
                ${esAdmin()?`<br><button class="btn blue" onclick="abrirEditarFichaje('${m.id}')">Editar</button> <button class="btn red" onclick="eliminarFichajePro('${m.id}')">Eliminar</button>`:""}
              </div>
            `).join("")}
          </details>
        </div>
      `).join(""):"<p>No hay fichajes en este periodo.</p>"}
    </div>
  `;

  window.informeMensualActual={
    uid:String(uid),
    usuario:u.nombre,mes,anio,periodo,cierre:cierreMensual,
    totalTrabajo,totalNormal,totalExtra,totalExtraNormal,totalExtraFestivo,totalExtraFinSemana,totalExtraNocturna,totalPausa,totalComida,festivosTrabajados,
    eurosNormalTotal,eurosExtraNormalTotal,eurosExtraFestivoTotal,eurosExtraFinSemanaTotal,eurosExtraNocturnaTotal,totalEurosExtra,totalEuros,
    tipoNormal,tipoFestivo,tipoFinSemana,tipoNocturna,precios,filas
  };
}

function copiarInformeMensual(){
  const inf=window.informeMensualActual;
  if(!inf){
    alert("Genera primero el informe.");
    return;
  }

  const texto=[
    "INFORME MENSUAL ZENTRYX",
    "Usuario: "+inf.usuario,
    "Periodo: "+inf.mes+"/"+inf.anio,
    "Trabajo total: "+textoMin(inf.totalTrabajo),
    "Jornada normal: "+textoMin(inf.totalNormal),
    "Horas extra total: "+textoMin(inf.totalExtra),
    "Pausas: "+textoMin(inf.totalPausa),
    "Comida: "+textoMin(inf.totalComida),
    "",
    "IMPORTES DE HORAS EXTRA:",
    "Jornada normal: "+textoMin(inf.totalNormal)+" (sin cálculo económico)",
    "Extra normal: "+textoMin(inf.totalExtraNormal)+" · "+inf.eurosExtraNormalTotal.toLocaleString("es-ES",{minimumFractionDigits:2,maximumFractionDigits:2})+" €",
    inf.tipoFestivo.nombre+": "+textoMin(inf.totalExtraFestivo)+" · "+inf.eurosExtraFestivoTotal.toLocaleString("es-ES",{minimumFractionDigits:2,maximumFractionDigits:2})+" €",
    inf.tipoFinSemana.nombre+": "+textoMin(inf.totalExtraFinSemana)+" · "+inf.eurosExtraFinSemanaTotal.toLocaleString("es-ES",{minimumFractionDigits:2,maximumFractionDigits:2})+" €",
    inf.tipoNocturna.nombre+": "+textoMin(inf.totalExtraNocturna)+" · "+inf.eurosExtraNocturnaTotal.toLocaleString("es-ES",{minimumFractionDigits:2,maximumFractionDigits:2})+" €",
    "Total extras a pagar: "+inf.totalEurosExtra.toLocaleString("es-ES",{minimumFractionDigits:2,maximumFractionDigits:2})+" €",
    "",
    "DETALLE:",
    ...inf.filas.map(d=>`${fechaES(d.fecha)} | Trabajo ${textoMin(d.trabajo)} | Normal ${textoMin(d.normal)} | Extra ${textoMin(d.extra)} | Extras a pagar ${(d.eurosExtraNormal+d.eurosExtraFestivo+d.eurosExtraFinSemana+d.eurosExtraNocturna).toLocaleString("es-ES",{minimumFractionDigits:2,maximumFractionDigits:2})} €${d.festivo?" | Festivo "+(d.festivo.nombre||""):""}`)
  ].join("\\n");

  navigator.clipboard.writeText(texto).then(()=>alert("Informe copiado.")).catch(()=>alert(texto));
}



function textoManualZentryx(){
  return `MANUAL DE USO ZENTRYX V2582

1. INICIO
La pantalla de inicio muestra el usuario activo, estado de fichaje, festivo del día y accesos principales.

Estados:
- Fuera: no hay entrada abierta.
- Trabajando: hay una entrada activa.
- Pausa: hay una pausa abierta.
- Comida: hay una comida abierta.

2. FICHAJES
Sirve para registrar entrada, salida, pausa y comida.

Botones:
- Fichar entrada: inicia la jornada.
- Fichar salida: termina la jornada.
- Inicio pausa / Fin pausa: registra descanso.
- Inicio comida / Fin comida: registra comida.
- Borrar fichajes de hoy: borra registros del día.
- Generar fichajes de prueba: crea datos para probar informes.
- Borrar fichajes de prueba: limpia pruebas.

3. MOVIMIENTOS DE HOY
Muestra acciones del día. Si hay ubicación, se puede abrir en mapa.

4. USUARIOS
El administrador gestiona usuarios, fotos, contacto, roles y estado.
Desde la lista se puede llamar, enviar SMS, WhatsApp, email o abrir mapa.

5. FOTOS
Las fotos se guardan en Supabase Storage, bucket usuarios.
La app reduce la imagen para mejorar carga en móvil.

6. CONFIGURACIÓN
Incluye horarios, avisos, horas extra y festivos.

7. HORARIOS
Define la jornada de cada trabajador. Se guardan entrada, salida, comida y descanso_min. El informe usa entrada y salida como base oficial para separar jornada normal y extras.

8. AVISOS
Controla pausas, comidas o situaciones raras.

9. HORAS EXTRA
Define tipos y precios:
- Normal
- Festiva
- Nocturna
- Fin de semana
- Urgencia

Campos:
- Nombre: tipo de hora.
- Precio: importe por hora.
- Hora inicio / fin: tramo horario.
- Días aplicables: todos, sábado, domingo, etc.

10. FESTIVOS
Permite importar o añadir festivos nacionales, autonómicos, locales y de convenio.
Formato visual recomendado: dd/mm/aaaa.

11. INFORMES
Muestra resumen mensual por trabajador:
- Trabajo total
- Jornada normal
- Horas extra
- Festivos trabajados
- Pausas
- Comida
- Importes

12. IMPORTES
Los precios salen de Configuración → Horas extra.

Normal:
Horas normales multiplicadas por precio Normal.

Extra normal:
Horas por encima de la jornada base.

Festiva:
Horas en día festivo.

Fin de semana:
Horas en sábado o domingo.

Nocturna:
Horas entre 22:00 y 06:00.

Total extras:
Suma de extras en euros.

Total extras a pagar:
Normal + extras.

13. DATOS DE PRUEBA
Sirven para comprobar cálculos.
Antes de informes reales, borra los fichajes de prueba.

14. ERRORES FRECUENTES
No aparecen importes:
- revisa que el mes tenga fichajes.
- revisa tipos de horas extra con precio.

Importe raro:
- revisa el precio de Normal.

No se guarda un tipo:
- revisar tabla tipos_horas_extra en Supabase.
- esta versión usa columna precio.

Foto no carga:
- revisar bucket usuarios.
- revisar campo foto_url.

15. ORDEN RECOMENDADO
1. Crear usuarios.
2. Revisar horarios.
3. Crear tipos de horas extra.
4. Importar festivos.
5. Fichar.
6. Generar informe mensual.


17. CIERRE MENSUAL
El cierre mensual controla el estado del informe de un trabajador en un mes.

Estados:
- Abierto: se pueden revisar los datos.
- Validado por trabajador: el trabajador confirma que sus horas son correctas.
- Confirmado por administrador: administración revisa y aprueba.
- Pagado: las horas extra se consideran abonadas.

Zentryx calcula y controla importes de horas extra. No calcula nóminas completas, IRPF ni salarios mensuales.


18. BLOQUEO DE MESES PAGADOS
Cuando un mes está marcado como pagado, Zentryx bloquea la creación y borrado de fichajes de ese periodo.
Esto evita modificar horas después del pago.
Las correcciones posteriores deberán hacerse con un sistema de auditoría administrativa.


19. AUDITORÍA AMPLIADA
La auditoría registra cambios importantes:
- altas, ediciones y eliminaciones de usuarios.
- creación, edición y eliminación de tipos de horas extra.
- validación, confirmación y pago de cierres mensuales.
- borrados de fichajes de prueba o del día.

Cada registro guarda quién hizo el cambio, cuándo, qué tabla se tocó y datos anteriores/posteriores si existen.


20. FICHAJES PRO
Los administradores pueden editar o eliminar fichajes desde Movimientos de hoy o desde el detalle diario del informe.
Toda modificación exige un motivo obligatorio.
Cada cambio queda registrado en Auditoría con datos antes/después.
Si el mes está pagado, la app bloquea la edición y eliminación de fichajes.


21. AUDITORÍA PRO LEGIBLE
La auditoría muestra los cambios en formato claro.
Permite filtrar por acción y por tabla.
Cada registro tiene una vista sencilla y una vista técnica para revisar datos completos.


22. VALIDACIÓN PRO DE FICHAJES
Zentryx controla el orden correcto de los fichajes:
- No permite salida sin entrada.
- No permite dos entradas seguidas.
- No permite salir si hay una pausa o comida abierta.
- No permite finalizar pausa o comida si no estaban iniciadas.
- Muestra mensajes claros para corregir el error.


23. GPS PRO
Zentryx guarda latitud, longitud y precisión GPS cuando el dispositivo lo permite.
Si el usuario deniega el GPS o no hay señal, queda registrado en Auditoría como fichaje_sin_gps.
La precisión se muestra en metros: cuanto menor sea el número, más fiable es la ubicación.


24. ZONAS DE TRABAJO
Las zonas de trabajo permiten revisar si un fichaje se ha hecho dentro de una ubicación autorizada.
Cada zona tiene nombre, latitud, longitud y radio permitido en metros.
En esta versión Zentryx no bloquea el fichaje fuera de zona: avisa y registra el caso en Auditoría.
Esto permite controlar incidencias sin impedir trabajar cuando hay mala cobertura o urgencias.


25. ZONAS PRO POR DIRECCIÓN
Las zonas de trabajo pueden crearse de dos formas:
- Con la ubicación actual del dispositivo.
- Escribiendo una dirección.

Cada zona puede abrirse en Google Maps, Apple Maps o Waze para comprobar la posición.
También se puede cambiar el radio permitido y activar o desactivar una zona.
No se introducen latitud y longitud manualmente en el uso normal.


26. ZONAS DESDE MAPAS
Las zonas pueden crearse pegando un enlace de Google Maps, Apple Maps o Waze.
También se aceptan coordenadas copiadas desde un mapa.
Para abrir una zona existente se usa un desplegable con Google Maps, Apple Maps o Waze, evitando tener demasiados botones visibles.


27. ZONAS DESDE MAPA GUIADO
Para crear una zona desde mapa:
1. Selecciona Google Maps, Apple Maps o Waze.
2. Escribe la zona a abrir, por ejemplo El Ejido.
3. Marca el punto exacto en el mapa.
4. Pulsa Compartir en la app del mapa.
5. Copia el enlace y pégalo en Zentryx.
6. Crea la zona.

Este flujo evita introducir latitud y longitud manualmente.


28. ENLACES DE MAPAS Y COORDENADAS
Algunos mapas comparten enlaces cortos que no contienen coordenadas visibles.
Apple Maps puede generar enlaces tipo maps.apple/p/...; esos enlaces no se pueden leer directamente.
Si ocurre:
- Abre el enlace en Safari y copia una URL más completa si aparece.
- O pega coordenadas copiadas del mapa.
- O usa Google Maps para compartir el punto exacto.

Zentryx avisa automáticamente cuando el enlace no trae ubicación útil.


29. CONTROL REAL DE ZONA EN FICHAJES
Al fichar, Zentryx compara la ubicación GPS con las zonas activas.
Si el trabajador está dentro del radio permitido, el fichaje queda marcado como dentro de zona.
Si está fuera, la app avisa, pide motivo y registra la incidencia en Auditoría.
El fichaje se permite de momento para no bloquear trabajos urgentes, mala cobertura o desplazamientos reales.
En cada fichaje se guarda zona, distancia, radio, precisión GPS y motivo si está fuera.


30. CORRECCIÓN ZONAS
Se corrige la edición de radio de las zonas.
El cambio de radio queda registrado en Auditoría.
También quedan disponibles activar, desactivar y eliminar zona desde la pantalla de configuración.


31. CONTROL CONFIGURABLE DE ZONAS
En Configuración > Zonas se puede decidir qué ocurre cuando alguien ficha fuera de zona:
- Avisar y permitir.
- Pedir motivo y permitir.
- Bloquear fichaje.

También se puede configurar qué ocurre si no hay GPS.
Los bloqueos y avisos quedan registrados en Auditoría.


32. CONTROL DE PRECISIÓN GPS
La precisión GPS se controla de forma independiente al radio de zona.
Ejemplo: aunque el trabajador esté dentro de la zona, si el GPS tiene 12 m de precisión y el máximo configurado es 10 m, Zentryx aplicará la regla configurada.
Opciones:
- Avisar y permitir.
- Pedir motivo y permitir.
- Bloquear fichaje.

Cada fichaje guarda precisión real, precisión máxima configurada y motivo si procede.


33. INCIDENCIAS AUTOMÁTICAS DE FICHAJE
Zentryx crea incidencias cuando detecta:
- fichaje fuera de zona.
- fichaje sin GPS.
- fichaje con precisión GPS baja.

Las incidencias se gestionan desde la pantalla Incidencias.
Un administrador puede marcarlas como resueltas y añadir observaciones.
La auditoría sigue guardando el historial técnico, mientras que incidencias sirve para gestión diaria.


34. BLOQUEO PRO DE FICHAJES
Si en Configuración > Zonas se elige bloquear, Zentryx no guarda el fichaje.
También crea una incidencia de bloqueo y registra el intento en Auditoría.
Los bloqueos disponibles son:
- fuera de zona.
- sin GPS.
- precisión GPS baja.

Esto permite pasar de modo aviso a modo control real cuando la empresa quiera exigir presencia dentro de zona.


35. USUARIOS PRO Y PERMISOS
Se añaden permisos por usuario:
- puede_saltar_zona.
- puede_saltar_gps.
- puede_editar_fichajes.
- puede_ver_informes.
- puede_gestionar_horas.
- es_admin.

Si un control está configurado como bloquear, un usuario normal queda bloqueado.
Un usuario autorizado puede continuar y el salto queda registrado en Auditoría.
Los cambios de permisos pueden registrarse como usuario_cambia_permisos.


36. INTERFAZ PRO Y MULTI-DISPOSITIVO
Se reorganiza la interfaz para uso real en móvil, tablet y PC.
El login se mejora con diseño profesional, usuario recordado y ver/ocultar contraseña.
El inicio queda ordenado por módulos: Fichajes, Usuarios, Incidencias, Informes, Configuración, Notas, Auditoría y Ayuda.
La navegación superior permite moverse rápido entre zonas principales sin perder claridad.


37. NOTAS PRO
El módulo Notas permite gestionar notas personales y generales de empresa.
Cada nota puede tener título, descripción, prioridad, responsable, fecha, hora y estado.
Las notas fijas y vencidas aparecen destacadas en Inicio.
Se puede filtrar por pendientes, fijas, vencidas, hechas y todas.
Crear, editar, resolver y eliminar notas queda registrado en Auditoría.


38. CORRECCIÓN NOTAS

async function leerRegistroPorId(tabla,id){
  if(!tabla||!id)return null;

function parseAuditJSON(valor){
  if(!valor)return null;
  if(typeof valor==="object")return valor;
  try{
    const primero=JSON.parse(valor);
    if(typeof primero==="string"){
      try{return JSON.parse(primero)}catch(e){return primero}
    }
    return primero;
  }catch(e){
    return valor;
  }
}

function valorCorto(v){
  if(v===null||v===undefined||v==="")return "-";
  if(typeof v==="boolean")return v?"Sí":"No";
  return String(v);
}

function camposImportantesAuditoria(obj){
  const data=parseAuditJSON(obj);
  if(!data || typeof data!=="object")return [];

  const campos=[
    "nombre","usuario","rol","activo","tipo","fecha","hora","precio","precio_hora",
    "estado","periodo","total_extras","motivo","nota_modificacion",
    "entrada","salida","inicio_comida","fin_comida","descanso_min",
    "telefono","email","direccion"
  ];

  return campos
    .filter(c=>Object.prototype.hasOwnProperty.call(data,c))
    .map(c=>({campo:c,valor:data[c]}));
}

function resumenAuditoria(x){
  const antes=parseAuditJSON(x.datos_antes);
  const despues=parseAuditJSON(x.datos_despues);

  if(x.accion==="editar_tipo_hora_extra"){
    return `Tipo: ${valorCorto(despues?.nombre||antes?.nombre)} · precio ${valorCorto(antes?.precio??antes?.precio_hora)} → ${valorCorto(despues?.precio??despues?.precio_hora)} €/h`;
  }

  if(x.accion==="editar_fichaje"){
    return `Fichaje: ${valorCorto(antes?.tipo)} → ${valorCorto(despues?.tipo)} · ${valorCorto(antes?.fecha)} → ${valorCorto(despues?.fecha)}`;
  }

  if(x.accion==="eliminar_fichaje"){
    return `Fichaje eliminado: ${valorCorto(antes?.tipo)} · ${valorCorto(antes?.fecha)}`;
  }

  if(x.accion==="crear_usuario"){
    return `Usuario creado: ${valorCorto(despues?.nombre||despues?.usuario)}`;
  }

  if(x.accion==="editar_usuario"){
    return `Usuario editado: ${valorCorto(despues?.nombre||antes?.nombre||despues?.usuario||antes?.usuario)}`;
  }

  if(x.accion==="eliminar_usuario"){
    return `Usuario eliminado: ${valorCorto(antes?.nombre||antes?.usuario)}`;
  }

  if(x.accion==="validar_horas_operario"||x.accion==="confirmar_horas_admin"||x.accion==="marcar_horas_pagadas"){
    return `Periodo ${valorCorto(despues?.periodo||antes?.periodo)} · estado ${valorCorto(antes?.estado)} → ${valorCorto(despues?.estado)}`;
  }

  return x.motivo||"Cambio registrado";
}

function tablaCambiosAuditoria(antesValor,despuesValor){
  const antes=parseAuditJSON(antesValor);
  const despues=parseAuditJSON(despuesValor);

  if(!antes && !despues)return "<p class='small'>Sin datos detallados.</p>";

  const campos=new Set();

  if(antes && typeof antes==="object"){
    Object.keys(antes).forEach(k=>campos.add(k));
  }
  if(despues && typeof despues==="object"){
    Object.keys(despues).forEach(k=>campos.add(k));
  }

  const preferidos=[
    "nombre","usuario","rol","activo","tipo","fecha","precio","precio_hora",
    "estado","periodo","total_extras","entrada","salida","inicio_comida","fin_comida",
    "descanso_min","nota_modificacion","modificado_por","modificado_en"
  ];

  const orden=[...preferidos.filter(k=>campos.has(k)),...[...campos].filter(k=>!preferidos.includes(k)).slice(0,10)];

  return `
    <div class="row">
      <b>Cambios principales</b>
      ${orden.map(k=>`
        <p class="small"><b>${k}:</b> ${valorCorto(antes?.[k])} → ${valorCorto(despues?.[k])}</p>
      `).join("")}
    </div>
  `;
}

function opcionesUnicasAuditoria(lista,campo){
  const valores=[...new Set((lista||[]).map(x=>x[campo]).filter(Boolean))].sort();
  return valores.map(v=>`<option value="${v}">${v}</option>`).join("");
}

function renderAuditoria(lista){
  const accion=document.getElementById("audit_accion")?.value||"";
  const tabla=document.getElementById("audit_tabla")?.value||"";

  const filtrada=(lista||[]).filter(x=>{
    if(accion && x.accion!==accion)return false;
    if(tabla && x.tabla!==tabla)return false;
    return true;
  });

  const total=document.getElementById("audit_total");
  if(total)total.innerHTML=`${filtrada.length} registros`;

  document.getElementById("audit_list").innerHTML=filtrada.length?filtrada.map(x=>`
    <div class="row">
      <b>${x.accion}</b><br>
      <span class="badge">${x.tabla||"-"}</span>
      <p>${resumenAuditoria(x)}</p>
      <span class="small">Usuario: ${x.usuario_nombre||x.user_id||"-"}</span><br>
      <span class="small">${new Date(x.fecha).toLocaleString("es-ES")}</span>
      <details>
        <summary>Ver cambios</summary>
        ${tablaCambiosAuditoria(x.datos_antes,x.datos_despues)}
      </details>
      <details>
        <summary>Ver datos técnicos</summary>
        <pre style="white-space:pre-wrap;font-size:12px;">Antes: ${x.datos_antes?JSON.stringify(parseAuditJSON(x.datos_antes),null,2):"-"}\nDespués: ${x.datos_despues?JSON.stringify(parseAuditJSON(x.datos_despues),null,2):"-"}</pre>
      </details>
    </div>
  `).join(""):"<p>No hay registros con esos filtros.</p>";
}

async function cargarAuditoria(){
  const {data,error}=await sb
    .from("historial_modificaciones")
    .select("*")
    .order("fecha",{ascending:false})
    .limit(200);

  if(error){
    document.getElementById("audit_list").innerHTML="<p>Error leyendo auditoría: "+error.message+"</p>";
    return;
  }

  auditoriaCache=data||[];

  const acc=document.getElementById("audit_accion");
  const tab=document.getElementById("audit_tabla");

  if(acc){
    acc.innerHTML=`<option value="">Todas</option>${opcionesUnicasAuditoria(auditoriaCache,"accion")}`;
  }
  if(tab){
    tab.innerHTML=`<option value="">Todas</option>${opcionesUnicasAuditoria(auditoriaCache,"tabla")}`;
  }

  renderAuditoria(auditoriaCache);
}

function campoOrg(id){
  return document.getElementById(id)?.value?.trim() || "";

async function guardarDatosEmpresaOrg(){
  if(!esPerfilAdmin()){
    alert("Solo administrador.");
    return;
  }

  const btn=document.getElementById("btnGuardarEmpresaOrg");
  if(btn){
    btn.disabled=true;
    btn.textContent="Guardando...";
    btn.style.opacity=".65";
  }

  try{
    const antes=await leerDatosEmpresaOrg();

    const payload={
      id:"principal",
      nombre:campoOrg("org_emp_nombre"),
      razon_social:campoOrg("org_emp_razon_social"),
      cif:campoOrg("org_emp_cif"),
      telefono:campoOrg("org_emp_telefono"),
      email:campoOrg("org_emp_email"),
      web:campoOrg("org_emp_web"),
      direccion:campoOrg("org_emp_direccion"),
      poblacion:campoOrg("org_emp_poblacion"),
      provincia:campoOrg("org_emp_provincia"),
      cp:campoOrg("org_emp_cp"),
      pais:campoOrg("org_emp_pais"),
      sector:campoOrg("org_emp_sector"),
      notas:campoOrg("org_emp_notas"),
      updated_at:new Date().toISOString()
    };

    const {data,error}=await sb
      .from("org_empresa")
      .upsert(payload,{onConflict:"id"})
      .select()
      .single();

    if(error){
      alert("Error guardando empresa: "+error.message);
      return;
    }

    await registrarCambio({
      accion:"organizacion_empresa_guardada",
      tabla:"org_empresa",
      registro_id:"principal",
      motivo:"Actualización de datos de empresa",
      antes,
      despues:data||payload
    });

    aviso("Datos de empresa guardados.","ok");
    await pintarOrganizacionEmpresa();
  }finally{
    if(btn){
      btn.disabled=false;
      btn.textContent="Guardar datos de empresa";
      btn.style.opacity="1";
    }
  }
}

function extraerColumnaFaltante(error){
  const msg=(error&&error.message)?error.message:String(error||"");
  const m=msg.match(/'([^']+)' column/);
  return m?m[1]:null;
}

async function insertarUsuarioAdaptativo(payload){
  let limpio={...payload};

  for(let intento=0; intento<12; intento++){
    const {data,error}=await sb.from("users").insert([limpio]).select().single();

    if(!error)return {data,error:null};

    const col=extraerColumnaFaltante(error);

    if(col && Object.prototype.hasOwnProperty.call(limpio,col)){
      delete limpio[col];
      continue;
    }

    return {data:null,error};
  }

  return {data:null,error:{message:"No se pudo crear usuario por columnas no compatibles en users."}};
}

async function actualizarUsuarioAdaptativo(id,payload){
  let limpio={...payload};

  for(let intento=0; intento<12; intento++){
    const {error}=await sb.from("users").update(limpio).eq("id",id);

    if(!error)return {error:null};

    const col=extraerColumnaFaltante(error);

    if(col && Object.prototype.hasOwnProperty.call(limpio,col)){
      delete limpio[col];
      continue;
    }

    return {error};
  }

  return {error:{message:"No se pudo actualizar usuario por columnas no compatibles en users."}};
}

async function obtenerArchivoFoto(inputId){
  const input=document.getElementById(inputId);
  const file=input&&input.files&&input.files[0];

  if(!file)return null;

  if(!file.type.startsWith("image/")){
    alert("La foto debe ser una imagen.");
    return null;
  }

  return file;
}

function comprimirImagen(file,maxSize=900,calidad=0.78){
  return new Promise((resolve)=>{
    const img=new Image();
    const reader=new FileReader();

    reader.onload=e=>{
      img.onload=()=>{
        let w=img.width;
        let h=img.height;

        if(w>h && w>maxSize){
          h=Math.round(h*(maxSize/w));
          w=maxSize;
        }else if(h>=w && h>maxSize){
          w=Math.round(w*(maxSize/h));
          h=maxSize;
        }

        const canvas=document.createElement("canvas");
        canvas.width=w;
        canvas.height=h;

        const ctx=canvas.getContext("2d");
        ctx.drawImage(img,0,0,w,h);

        canvas.toBlob(blob=>{
          if(!blob){
            resolve(file);
            return;
          }

          const comprimido=new File([blob],"foto_usuario.jpg",{type:"image/jpeg"});
          resolve(comprimido);
        },"image/jpeg",calidad);
      };

      img.onerror=()=>resolve(file);
      img.src=e.target.result;
    };

    reader.onerror=()=>resolve(file);
    reader.readAsDataURL(file);
  });
}

async function subirFotoUsuarioStorage(inputId,uid){
  const file=await obtenerArchivoFoto(inputId);
  if(!file)return "";

  const fotoComprimida=await comprimirImagen(file,900,0.78);
  const nombre="usuarios/"+String(uid)+"/perfil_"+Date.now()+".jpg";

  const {error}=await sb.storage
    .from("usuarios")
    .upload(nombre,fotoComprimida,{cacheControl:"3600",upsert:true,contentType:"image/jpeg"});

  if(error){
    console.error(error);
    alert("No se pudo subir la foto. Revisa que exista el bucket usuarios en Supabase Storage.");
    return "";
  }

  const {data}=sb.storage.from("usuarios").getPublicUrl(nombre);
  return data&&data.publicUrl?data.publicUrl:"";
}

async function guardarEdicionUsuarioPro(id){
  await cargarUsuariosServidor();

  const nuevoUsuario=document.getElementById("e_usuario").value.trim();
  const nuevoNombre=document.getElementById("e_nombre").value.trim();

  if(!nuevoNombre||!nuevoUsuario){
    alert("Nombre y usuario son obligatorios.");
    return;
  }

  if(leerUsuarios().some(x=>String(x.id)!==String(id) && x.usuario.toLowerCase()===nuevoUsuario.toLowerCase())){
    alert("Ese usuario ya existe.");
    return;
  }

  const update={
    nombre:nuevoNombre,
    usuario:nuevoUsuario,
    rol:document.getElementById("e_rol").value,
    puesto:document.getElementById("e_puesto").value.trim(),
    telefono:document.getElementById("e_telefono").value.trim(),
    email:document.getElementById("e_email").value.trim(),
    dni:document.getElementById("e_dni").value.trim(),
    direccion:document.getElementById("e_direccion").value.trim(),
    vacaciones:Number(document.getElementById("e_vacaciones").value||22)
  };

  const fotoUrl=await subirFotoUsuarioStorage("e_foto",id);
  if(fotoUrl){
    update.foto_url=fotoUrl;
    update.foto=fotoUrl;
  }

  const antes=await leerRegistroPorId("users",id);
  const {error}=await actualizarUsuarioAdaptativo(id,update);

  if(error){
    console.error(error);
    alert("Error guardando usuario: "+error.message);
    return;
  }

  await cargarUsuariosServidor();

  if(String(id)===String(user.id)){
    const actualizado=usuarioPorId(id);
    if(actualizado){
      user=actualizado;
      localStorage.setItem("usuario",JSON.stringify(user));
    }
  }

  alert("Usuario guardado.");
  vistaFichaUsuarioPro(id);
}

    alert("Contraseña incorrecta.");
    return;
  }

  await cargarUsuariosServidor();
  const u=usuarioPorId(id);
  if(!u)return;

  if(String(u.id)===String(user.id)){
    alert("No puedes desactivar el usuario actual.");
    return;
  }

  const {error}=await sb.from("users").update({activo:!u.activo}).eq("id",id);

  if(error){
    alert("Error actualizando usuario: "+error.message);
    return;
  }

  await cargarUsuariosServidor();
  vistaFichaUsuarioPro(id);
}

async function resetPasswordUsuarioPro(id){

async function simularPrimeraClave(id){
  if(!esAdmin()){
    alert("Solo admin puede crear o cambiar contraseñas desde ficha.");
    return;
  }

  const p1=prompt("Nueva contraseña del usuario:");
  if(!p1)return;

  const p2=prompt("Repite la contraseña:");
  if(p1!==p2){
    alert("No coinciden.");
    return;
  }

  const passwordHash=await prepararPasswordParaGuardar(p1);
  const {error}=await actualizarUsuarioAdaptativo(id,{password:passwordHash,password_pendiente:false});

  if(error){
    alert("Error guardando contraseña: "+error.message);
    return;
  }

  await cargarUsuariosServidor();

  if(String(id)===String(user?.id)){
    const actualizado=usuarioPorId(id);
    if(actualizado){
      user=actualizado;
      localStorage.setItem("usuario",JSON.stringify(user));
    }
  }

  alert("Contraseña creada.");
  vistaFichaUsuarioPro(id);
}

async function eliminarUsuarioPro(id){
  if(!esAdmin()){
    alert("Solo admin puede eliminar usuarios.");
    return;
  }

  if(!pedirClaveAdmin()){
    alert("Contraseña incorrecta.");
    return;
  }

  if(String(id)===String(user.id)){
    alert("No puedes eliminar el usuario actual.");
    return;
  }

  await cargarUsuariosServidor();
  const u=usuarioPorId(id);
  if(!u)return;

  if(!confirm("¿Eliminar a "+u.nombre+"?"))return;

  await sb.from("fichajes").delete().eq("user_id",String(id));
  await sb.from("notas_rapidas").delete().eq("user_id",String(id));
  await sb.from("horarios_usuario").delete().eq("user_id",String(id));
  await sb.from("avisos_fichaje").delete().eq("user_id",String(id));

  const antes=await leerRegistroPorId("users",id);
  const {error}=await sb.from("users").delete().eq("id",id);

  if(error){
    alert("Error eliminando usuario: "+error.message);
    return;
  }

  await registrarCambio({
    accion:"eliminar_usuario",
    tabla:"users",
    registro_id:id,
    motivo:"Eliminación de usuario",
    antes,
    despues:null
  });
  await cargarUsuariosServidor();
  alert("Usuario eliminado.");
  vistaUsuariosPro();
}


function columnaFaltante(error){
  const msg=(error&&error.message)?error.message:String(error||"");
  const m=msg.match(/'([^']+)' column/);
  return m?m[1]:null;
}

async function insertarAdaptativo(tabla,payload){
  let limpio={...payload};

  for(let i=0;i<12;i++){
    const {error}=await sb.from(tabla).insert([limpio]);
    if(!error)return {error:null};

    const col=columnaFaltante(error);
    if(col && Object.prototype.hasOwnProperty.call(limpio,col)){
      delete limpio[col];
      continue;
    }

    return {error};
  }

  return {error:{message:"No se pudo guardar por columnas incompatibles."}};
}

async function cargarHorarioUsuario(uid){
  const {data,error}=await sb.from("horarios_usuario").select("*").eq("user_id",String(uid));
  if(error){console.error(error);return []}
  return data||[];
}

function horarioPorDia(lista,dia){
  return lista.find(x=>String(x.dia).toLowerCase()===dia.toLowerCase())||{
    dia,trabaja:false,entrada:"",salida:"",inicio_comida:"",fin_comida:"",descanso_min:0
  };
}

function horaInput(v){
  if(!v)return "";
  return String(v).slice(0,5);
}

async function guardarConfigHorarios(uid){
  if(!soloAdminConfig())return;
  const dias=["lunes","martes","miércoles","jueves","viernes","sábado","domingo"];

  for(const d of dias){
    const payload={
      user_id:String(uid),
      dia:d,
      trabaja:document.getElementById("h_trabaja_"+d).value==="true",
      entrada:document.getElementById("h_entrada_"+d).value||null,
      salida:document.getElementById("h_salida_"+d).value||null,
      inicio_comida:document.getElementById("h_inicio_comida_"+d).value||null,
      fin_comida:document.getElementById("h_fin_comida_"+d).value||null,
      descanso_min:Number(document.getElementById("h_descanso_"+d).value||0)
    };

    const {data:existe}=await sb.from("horarios_usuario").select("id").eq("user_id",String(uid)).eq("dia",d).limit(1);

    if(existe&&existe[0]){
      const {error}=await sb.from("horarios_usuario").update(payload).eq("id",existe[0].id);
      if(error){alert("Error guardando "+d+": "+error.message);return}
    }else{
      const {error}=await sb.from("horarios_usuario").insert([payload]);
      if(error){alert("Error guardando "+d+": "+error.message);return}
    }
  }

  alert("Horario guardado.");
  await pintarConfigHorarios();
}

async function editarTipoHoraExtra(id){
  const {data,error}=await sb.from("tipos_horas_extra").select("*").eq("id",id).single();

  if(error||!data){
    alert("No se pudo cargar el tipo.");
    return;
  }

  const nombre=prompt("Nombre:",data.nombre||"");
  if(!nombre)return;

  const precio=prompt("Precio por hora (€):",String(data.precio_hora??data.precio??0));
  if(precio===null)return;

  const horaInicio=prompt("Hora inicio (opcional, formato HH:MM):",data.hora_inicio||"");
  if(horaInicio===null)return;

  const horaFin=prompt("Hora fin (opcional, formato HH:MM):",data.hora_fin||"");
  if(horaFin===null)return;

  const dias=prompt("Días aplicables:",data.dias_aplicables||data.dias||"todos");
  if(dias===null)return;

  const payload={
    nombre:nombre.trim(),
    precio:Number(precio||0),
    hora_inicio:horaInicio||null,
    hora_fin:horaFin||null,
    dias_aplicables:dias.trim()||"todos",
    activo:true
  };

  const antes=await leerRegistroPorId("tipos_horas_extra",id);
  const {error:updateError}=await sb.from("tipos_horas_extra").update(payload).eq("id",id);

  if(updateError){
    alert("Error editando tipo: "+updateError.message);
    return;
  }

  const despues=await leerRegistroPorId("tipos_horas_extra",id);
  await registrarCambio({
    accion:"editar_tipo_hora_extra",
    tabla:"tipos_horas_extra",
    registro_id:id,
    motivo:"Edición de tipo de hora extra",
    antes,
    despues
  });

  await pintarConfigExtras();
}

async function eliminarTipoHoraExtra(id){
  if(!confirm("¿Eliminar tipo de hora extra?"))return;
  const antes=await leerRegistroPorId("tipos_horas_extra",id);
  const {error}=await sb.from("tipos_horas_extra").delete().eq("id",id);
  if(error){alert("Error eliminando: "+error.message);return}
  await pintarConfigExtras();
}
