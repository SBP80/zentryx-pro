<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zentryx V2100</title>

<style>
body{margin:0;font-family:Arial;background:#eef2f7;color:#111827}
.top{background:#0f172a;color:white;padding:20px}
h1{margin:0}
.wrap{padding:16px}
.card{background:white;border-radius:12px;padding:16px;margin-bottom:12px}
.btn{padding:14px;border:none;border-radius:10px;font-weight:bold;margin:4px}
.big{width:100%;font-size:20px}
.green{background:#16a34a;color:white}
.red{background:#dc2626;color:white}
.blue{background:#2563eb;color:white}
.gray{background:#e5e7eb}
.badge{background:#e5e7eb;padding:6px 10px;border-radius:999px}
.row{border:1px solid #ccc;border-radius:10px;padding:10px;margin-bottom:10px}
select,input{width:100%;padding:14px;border-radius:10px;font-size:18px;margin-bottom:10px;border:1px solid #ccc}
</style>
</head>

<body>

<div class="top">
<h1>Zentryx V2100</h1>
<button class="btn red" onclick="salir()">Salir</button>
</div>

<div class="wrap" id="app"></div>

<script>
const URL="https://idtaamivqbiuxtjywuux.supabase.co";
const KEY="sb_publishable_ToDLKonbF2QnTXi56o1nfQ_10IdaPJx";

let user=null;
let panelFichaje=false;
let fichajes=[];
let ultimoFichaje=null;
let horas=[];

// ================= API =================
function api(p,o={}){
return fetch(URL+p,{
method:o.method||"GET",
headers:{
apikey:KEY,
Authorization:"Bearer "+KEY,
"Content-Type":"application/json"
},
body:o.body?JSON.stringify(o.body):undefined
}).then(r=>r.json());
}

// ================= SESIÓN =================
function salir(){
localStorage.removeItem("usuario");
location.href="./index.html";
}

function cargarSesion(){
user=JSON.parse(localStorage.getItem("usuario"));
if(!user){
location.href="./index.html";
return false;
}
return true;
}

function esAdmin(){
return user.rol==="admin" || user.rol==="administrativo";
}

// ================= DATOS =================
async function cargarFichajes(){
fichajes=await api("/rest/v1/fichajes?select=*&user_id=eq."+user.id+"&order=fecha.desc&limit=10");
ultimoFichaje=fichajes.length?fichajes[0]:null;
}

async function cargarHoras(){
if(esAdmin()){
horas=await api("/rest/v1/horas_extra?select=*&estado=neq.pagadas");
}else{
horas=await api("/rest/v1/horas_extra?select=*&user_id=eq."+user.id+"&estado=neq.pagadas");
}
}

// ================= CONFIG =================
async function getConfig(){
const r=await api("/rest/v1/configuracion_horas_extra?id=eq.1");
return r[0];
}

// ================= FESTIVOS =================
async function esFestivo(fecha){
const f=fecha.toISOString().split("T")[0];
const r=await api("/rest/v1/calendario_festivos?fecha=eq."+f);
return r.length>0;
}

// ================= LÓGICA =================
function esNocturna(fecha, cfg){
const m=fecha.getHours()*60+fecha.getMinutes();
const ini=timeToMin(cfg.nocturna_inicio);
const fin=timeToMin(cfg.nocturna_fin);
return ini>fin ? (m>=ini || m<fin) : (m>=ini && m<fin);
}

function timeToMin(t){
const [h,m]=t.split(":");
return h*60+Number(m);
}

function redondear(min,cfg){
if(min<cfg.minimo_minutos) min=cfg.minimo_minutos;
if(cfg.redondeo_minutos>1){
min=Math.ceil(min/cfg.redondeo_minutos)*cfg.redondeo_minutos;
}
return min;
}

// ================= HORAS EXTRA =================
async function crearHoraExtra(tipo,fichaje){
if(tipo!=="salida") return;

const now=new Date();
const cfg=await getConfig();

const festivo=await esFestivo(now);
const nocturna=esNocturna(now,cfg);
const dia=now.getDay();
const finde=(dia===0||dia===6);

const tipos=await api("/rest/v1/tipos_horas_extra");

function getTipo(n){
return tipos.find(t=>t.nombre.toLowerCase()===n);
}

let tipoSel;

if(cfg.prioridad_festivo && festivo){
tipoSel=getTipo("festiva");
}else if(festivo){
tipoSel=getTipo("festiva");
}else if(finde){
tipoSel=getTipo("fin de semana");
}else if(nocturna){
tipoSel=getTipo("nocturna");
}else{
tipoSel=getTipo("normal");
}

let minutos=60; // simplificado (siguiente paso mejoramos con horarios)

minutos=redondear(minutos,cfg);

const total=(minutos/60)*Number(tipoSel.precio||0);

await api("/rest/v1/horas_extra",{
method:"POST",
body:{
user_id:user.id,
tipo_id:tipoSel.id,
minutos:minutos,
precio_unitario:tipoSel.precio,
total:total,
estado:"pendiente"
}
});
}

// ================= FICHAJE =================
function acciones(){
const e=ultimoFichaje?ultimoFichaje.tipo:"fuera";

if(!ultimoFichaje || e==="salida") return ["entrada"];

if(e==="entrada") return ["salida","inicio_descanso","inicio_comida"];
if(e==="inicio_descanso") return ["fin_descanso"];
if(e==="inicio_comida") return ["fin_comida"];

return ["salida"];
}

async function guardarFichaje(){
const tipo=document.getElementById("tipoFichaje").value;

const data=await api("/rest/v1/fichajes",{
method:"POST",
body:{user_id:user.id,tipo:tipo}
});

await crearHoraExtra(tipo,data[0]);

panelFichaje=false;
pintarInicio();
}

// ================= UI =================
async function pintarInicio(){
await cargarFichajes();
await cargarHoras();

const total=horas.reduce((s,h)=>s+Number(h.total||0),0);

document.getElementById("app").innerHTML=`

<div class="card">
<h2>${user.usuario}</h2>
</div>

<div class="card">
<button class="btn big green" onclick="toggleFichaje()">FICHAR</button>

${panelFichaje?`
<select id="tipoFichaje">
${acciones().map(a=>`<option value="${a}">${a}</option>`).join("")}
</select>
<button class="btn blue" onclick="guardarFichaje()">Guardar</button>
`:""}
</div>

<div class="card">
<span class="badge">${total.toFixed(2)} €</span>
<button class="btn blue" onclick="pintarHoras()">Horas</button>
${esAdmin()?`<button class="btn gray" onclick="pintarConfig()">Config</button>`:""}
</div>

<div class="card">
${fichajes.map(f=>`<div class="row">${f.tipo} - ${new Date(f.fecha).toLocaleString()}</div>`).join("")}
</div>
`;
}

function toggleFichaje(){
panelFichaje=!panelFichaje;
pintarInicio();
}

// ================= HORAS UI =================
async function pintarHoras(){
await cargarHoras();
document.getElementById("app").innerHTML=`
<button onclick="pintarInicio()">←</button>
${horas.map(h=>`<div class="card">${h.minutos} min · ${h.total} €</div>`).join("")}
`;
}

// ================= CONFIG UI =================
async function pintarConfig(){
const c=await getConfig();

document.getElementById("app").innerHTML=`
<button onclick="pintarInicio()">←</button>

<input id="ni" type="time" value="${c.nocturna_inicio}">
<input id="nf" type="time" value="${c.nocturna_fin}">

<select id="pf">
<option value="true" ${c.prioridad_festivo?"selected":""}>Festivo prioridad</option>
<option value="false" ${!c.prioridad_festivo?"selected":""}>Normal prioridad</option>
</select>

<select id="rd">
<option value="1">Minuto</option>
<option value="15">15</option>
<option value="30">30</option>
<option value="60">60</option>
</select>

<button onclick="guardarConfig()">Guardar</button>
`;
}

async function guardarConfig(){
await api("/rest/v1/configuracion_horas_extra?id=eq.1",{
method:"PATCH",
body:{
nocturna_inicio:document.getElementById("ni").value,
nocturna_fin:document.getElementById("nf").value,
prioridad_festivo:document.getElementById("pf").value==="true",
redondeo_minutos:Number(document.getElementById("rd").value)
}
});
pintarInicio();
}

// ================= INIT =================
if(cargarSesion()){
pintarInicio();
}
</script>

</body>
</html>
