<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zentryx V2301</title>

<style>
body{margin:0;font-family:Arial;background:#eef2f7}
.top{background:#0f172a;color:white;padding:20px}
.wrap{padding:16px}
.card{background:white;border-radius:12px;padding:16px;margin-bottom:12px}
.btn{padding:12px;border:none;border-radius:8px;margin:4px}
.blue{background:#2563eb;color:white}
.gray{background:#e5e7eb}
.red{background:#dc2626;color:white}
.table{width:100%;border-collapse:collapse}
.table td,.table th{border:1px solid #ccc;padding:6px}
</style>
</head>

<body>

<div class="top">
<h1>Zentryx V2301</h1>
<button class="btn red" onclick="salir()">Salir</button>
</div>

<div class="wrap" id="app"></div>

<script>
const URL="https://idtaamivqbiuxtjywuux.supabase.co";
const KEY="sb_publishable_ToDLKonbF2QnTXi56o1nfQ_10IdaPJx";

let user=null;

function api(p){
return fetch(URL+p,{
headers:{apikey:KEY,Authorization:"Bearer "+KEY}
}).then(r=>r.json());
}

function salir(){
localStorage.removeItem("usuario");
location.href="./index.html";
}

function cargarSesion(){
user=JSON.parse(localStorage.getItem("usuario"));
if(!user){location.href="./index.html";return false;}
return true;
}

function esAdmin(){
return user.rol==="admin"||user.rol==="administrativo";
}

function pintarInicio(){
document.getElementById("app").innerHTML=`
<div class="card">
<h2>${user.usuario}</h2>
<button class="btn blue" onclick="pintarInforme()">Informes</button>
</div>`;
}

async function pintarInforme(){
const hoy=new Date();

document.getElementById("app").innerHTML=`
<div class="card">
<button class="btn gray" onclick="pintarInicio()">←</button>

<h2>Informe</h2>

<input id="mes" type="number" value="${hoy.getMonth()+1}">
<input id="anio" type="number" value="${hoy.getFullYear()}">

<button class="btn blue" onclick="generar()">Generar</button>
<button class="btn blue" onclick="window.print()">Imprimir</button>

<div id="res"></div>
</div>`;
}

async function generar(){

const mes=String(document.getElementById("mes").value).padStart(2,"0");
const anio=document.getElementById("anio").value;

const ini=`${anio}-${mes}-01`;
const fin=`${anio}-${mes}-31`;

let url=`/rest/v1/horas_extra?select=*`;

if(!esAdmin()){
url+=`&user_id=eq.${user.id}`;
}

const data=await api(url);

// filtro manual por fecha
const filtrado=data.filter(h=>{
if(!h.created_at) return true;
return h.created_at>=ini && h.created_at<=fin;
});

const usuarios={};

filtrado.forEach(h=>{
const u=h.user_id;
if(!usuarios[u]) usuarios[u]={total:0};

usuarios[u].total+=Number(h.total||0);
});

let html="";

for(const u in usuarios){
html+=`
<div class="card">
<h3>Usuario ${u}</h3>
Total: ${usuarios[u].total.toFixed(2)} €
</div>`;
}

let total=0;
filtrado.forEach(h=>total+=Number(h.total||0));

html+=`<div class="card"><b>Total empresa: ${total.toFixed(2)} €</b></div>`;

document.getElementById("res").innerHTML=html;
}

if(cargarSesion()){
pintarInicio();
}
</script>

</body>
</html>
