<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zentryx V2504</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{margin:0;font-family:Arial;background:#eef2f7;color:#111827}
.top{background:#0f172a;color:white;padding:20px}
.wrap{padding:16px}
.card{background:white;border-radius:12px;padding:16px;margin-bottom:12px}
.btn{padding:12px;border:none;border-radius:8px;margin:4px;font-weight:bold}
.big{width:100%;font-size:18px}
.green{background:#16a34a;color:white}
.blue{background:#2563eb;color:white}
.red{background:#dc2626;color:white}
.gray{background:#e5e7eb}
.dark{background:#111827;color:white}
input,select{width:100%;padding:10px;margin:6px 0;border-radius:8px;border:1px solid #ccc;box-sizing:border-box}
.tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px}
.tab{padding:10px;background:#e5e7eb;border-radius:8px;cursor:pointer}
.tab.active{background:#111827;color:white}
.foto{width:120px;height:120px;border-radius:50%;object-fit:cover;background:#e5e7eb;border:1px solid #ccc}
.doc{border:1px solid #ccc;border-radius:10px;padding:10px;margin-bottom:8px}
.oculto{display:none}
.ok{color:#15803d;font-weight:bold}
.error{color:#b91c1c;font-weight:bold}
</style>
</head>

<body>

<div class="top">
<h2>Zentryx V2504</h2>
<button class="btn gray" onclick="salir()">Salir</button>
</div>

<div class="wrap" id="app"></div>

<script>
const URL="https://idtaamivqbiuxtjywuux.supabase.co";
const KEY="sb_publishable_ToDLKonbF2QnTXi56o1nfQ_10IdaPJx";
const BUCKET="usuarios";

const sb=window.supabase.createClient(URL,KEY);

let user=null;
let usuariosCache=[];
let usuarioAbierto=null;

function api(p,o={}){
return fetch(URL+p,{
method:o.method||"GET",
headers:{
apikey:KEY,
Authorization:"Bearer "+KEY,
"Content-Type":"application/json",
...(o.headers||{})
},
body:o.body?JSON.stringify(o.body):undefined
}).then(async r=>{
const txt=await r.text();
let data=null;
try{data=txt?JSON.parse(txt):null}catch{data=txt}
if(!r.ok)throw new Error(txt||"Error");
return data;
});
}

function esc(v){
return String(v??"")
.replaceAll("&","&amp;")
.replaceAll("<","&lt;")
.replaceAll(">","&gt;")
.replaceAll('"',"&quot;");
}

function salir(){
localStorage.removeItem("usuario");
localStorage.removeItem("user");
location.href="./index.html?v=1000";
}

function cargarSesion(){
try{user=JSON.parse(localStorage.getItem("usuario"))}catch{user=null}
if(!user){location.href="./index.html?v=1000";return false}
return true;
}

function inicio(){
document.getElementById("app").innerHTML=`
<div class="card">
<h2>${esc(user.nombre||user.usuario)}</h2>
<p>${esc(user.rol)}</p>
</div>

<div class="card">
<button class="btn big green" onclick="fichar()">FICHAR</button>
</div>

<div class="card">
<button class="btn blue" onclick="vistaHoras()">Horas</button>
<button class="btn blue" onclick="vistaUsuarios()">Usuarios</button>
<button class="btn blue" onclick="vistaInformes()">Informes</button>
</div>
`;
}

async function fichar(){
await api("/rest/v1/fichajes",{method:"POST",body:{user_id:String(user.id),tipo:"entrada"}});
alert("Fichaje registrado");
}

async function vistaHoras(){
const data=await api("/rest/v1/horas_extra?select=*&user_id=eq."+encodeURIComponent(user.id));

document.getElementById("app").innerHTML=`
<div class="card">
<button class="btn gray" onclick="inicio()">←</button>
<h2>Horas</h2>
</div>

${data.map(h=>`
<div class="card">
${h.minutos||0} min - ${Number(h.total||0).toFixed(2)} €
</div>
`).join("")}
`;
}

async function vistaUsuarios(){
usuariosCache=await api("/rest/v1/users?select=*&order=id.asc");

document.getElementById("app").innerHTML=`
<div class="card">
<button class="btn gray" onclick="inicio()">←</button>
<h2>Usuarios</h2>
</div>

${usuariosCache.map(u=>`
<div class="card" onclick="abrirUsuario('${esc(u.id)}')">
<b>${esc(u.nombre||"")}</b><br>
${esc(u.usuario)}<br>
${esc(u.rol)}
</div>
`).join("")}
`;
}

async function abrirUsuario(id){
const data=await api("/rest/v1/users?select=*&id=eq."+encodeURIComponent(id)+"&limit=1");
usuarioAbierto=data[0];

if(!usuarioAbierto){
alert("Usuario no encontrado");
return;
}

document.getElementById("app").innerHTML=`
<div class="card">
<button class="btn gray" onclick="vistaUsuarios()">←</button>
<h2>${esc(usuarioAbierto.nombre||"Usuario")}</h2>
</div>

<div class="tabs">
<div class="tab active" onclick="tabUsuario('datos')">Datos</div>
<div class="tab" onclick="tabUsuario('docs')">Foto/DNI</div>
<div class="tab" onclick="tabUsuario('horarios')">Horarios</div>
<div class="tab" onclick="tabUsuario('historial')">Historial</div>
</div>

<div id="contenidoUsuario"></div>
`;

tabUsuario("datos");
}

function activarTab(nombre){
document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
document.querySelectorAll(".tab").forEach(t=>{
if(t.textContent.toLowerCase().includes(nombre==="docs"?"foto":nombre)){
t.classList.add("active");
}
});
}

function tabUsuario(tab){
if(!usuarioAbierto)return;

activarTab(tab);

if(tab==="datos"){
document.getElementById("contenidoUsuario").innerHTML=`
<div class="card">
<label>Nombre</label>
<input id="nombre" value="${esc(usuarioAbierto.nombre||"")}">

<label>Usuario</label>
<input id="usuario" value="${esc(usuarioAbierto.usuario||"")}">

<label>Teléfono</label>
<input id="tel" value="${esc(usuarioAbierto.telefono||"")}">

<label>Email</label>
<input id="email" value="${esc(usuarioAbierto.email||"")}">

<label>Rol</label>
<select id="rol">
<option ${usuarioAbierto.rol==="operario"?"selected":""}>operario</option>
<option ${usuarioAbierto.rol==="encargado"?"selected":""}>encargado</option>
<option ${usuarioAbierto.rol==="administrativo"?"selected":""}>administrativo</option>
<option ${usuarioAbierto.rol==="admin"?"selected":""}>admin</option>
</select>

<button class="btn blue" onclick="guardarUsuario('${esc(usuarioAbierto.id)}')">Guardar</button>
<div id="msgUsuario"></div>
</div>
`;
}

if(tab==="docs"){
pintarDocumentos();
}

if(tab==="horarios"){
document.getElementById("contenidoUsuario").innerHTML=`
<div class="card">
<h3>Horarios</h3>
<p>Próximo paso: horario semanal completo.</p>
</div>`;
}

if(tab==="historial"){
document.getElementById("contenidoUsuario").innerHTML=`
<div class="card">
<h3>Historial</h3>
<p>Próximo paso: fichajes, horas extra, vacaciones y ausencias.</p>
</div>`;
}
}

async function guardarUsuario(id){
const msg=document.getElementById("msgUsuario");
msg.className="";
msg.textContent="Guardando...";

try{
await api("/rest/v1/users?id=eq."+encodeURIComponent(id),{
method:"PATCH",
headers:{"Prefer":"return=representation"},
body:{
nombre:document.getElementById("nombre").value.trim(),
usuario:document.getElementById("usuario").value.trim().toLowerCase(),
telefono:document.getElementById("tel").value.trim(),
email:document.getElementById("email").value.trim(),
rol:document.getElementById("rol").value
}
});

msg.className="ok";
msg.textContent="Guardado correctamente.";
}catch(e){
msg.className="error";
msg.textContent="Error: "+e.message;
}
}

async function pintarDocumentos(){
document.getElementById("contenidoUsuario").innerHTML=`
<div class="card">
<h3>Foto de perfil</h3>
${usuarioAbierto.foto_url?`<img class="foto" src="${esc(usuarioAbierto.foto_url)}">`:`<div class="foto"></div>`}

<input class="oculto" id="foto_camara" type="file" accept="image/*" capture="environment" onchange="subirFoto('foto_camara')">
<input class="oculto" id="foto_archivo" type="file" accept="image/*" onchange="subirFoto('foto_archivo')">

<button class="btn gray" onclick="document.getElementById('foto_camara').click()">Hacer foto</button>
<button class="btn blue" onclick="document.getElementById('foto_archivo').click()">Elegir foto</button>

<div id="msgFoto"></div>
</div>

<div class="card">
<h3>DNI</h3>

<input class="oculto" id="dni_frontal" type="file" accept="image/*" capture="environment" onchange="subirDocumento('dni_frontal','DNI frontal')">
<input class="oculto" id="dni_reverso" type="file" accept="image/*" capture="environment" onchange="subirDocumento('dni_reverso','DNI reverso')">

<button class="btn gray" onclick="document.getElementById('dni_frontal').click()">Foto DNI frontal</button>
<button class="btn gray" onclick="document.getElementById('dni_reverso').click()">Foto DNI reverso</button>

<div id="msgDoc"></div>
</div>

<div class="card">
<h3>Otros documentos</h3>

<input class="oculto" id="doc_archivo" type="file" accept="image/*,.pdf,.doc,.docx,.xls,.xlsx" onchange="subirDocumento('doc_archivo','documento')">
<input class="oculto" id="doc_camara" type="file" accept="image/*" capture="environment" onchange="subirDocumento('doc_camara','documento foto')">

<button class="btn blue" onclick="document.getElementById('doc_archivo').click()">Subir archivo</button>
<button class="btn gray" onclick="document.getElementById('doc_camara').click()">Hacer foto documento</button>
</div>

<div class="card">
<h3>Documentos guardados</h3>
<div id="listaDocs">Cargando...</div>
</div>
`;

await cargarDocumentos();
}

function limpiarNombre(nombre){
return String(nombre||"archivo")
.replaceAll(" ","_")
.replaceAll("/","_")
.replaceAll("\\","_")
.replaceAll(":","_");
}

async function subirArchivo(inputId, carpeta){
const input=document.getElementById(inputId);
const file=input.files&&input.files[0];

if(!file)throw new Error("No has seleccionado archivo.");

const nombre=limpiarNombre(file.name);
const path=`${carpeta}/${usuarioAbierto.id}/${Date.now()}_${nombre}`;

const {error}=await sb.storage.from(BUCKET).upload(path,file,{upsert:false});
if(error)throw error;

const {data}=sb.storage.from(BUCKET).getPublicUrl(path);

return {
nombre:file.name,
url:data.publicUrl,
path:path
};
}

async function subirFoto(inputId){
const msg=document.getElementById("msgFoto");
msg.className="";
msg.textContent="Subiendo foto...";

try{
const archivo=await subirArchivo(inputId,"fotos");

await api("/rest/v1/users?id=eq."+encodeURIComponent(usuarioAbierto.id),{
method:"PATCH",
headers:{"Prefer":"return=representation"},
body:{foto_url:archivo.url}
});

usuarioAbierto.foto_url=archivo.url;

msg.className="ok";
msg.textContent="Foto guardada.";

await pintarDocumentos();
}catch(e){
msg.className="error";
msg.textContent="Error: "+e.message;
}
}

async function subirDocumento(inputId,tipo){
const msg=document.getElementById("msgDoc");
if(msg){
msg.className="";
msg.textContent="Subiendo documento...";
}

try{
const archivo=await subirArchivo(inputId,"documentos");

await api("/rest/v1/documentos",{
method:"POST",
headers:{"Prefer":"return=representation"},
body:{
user_id:String(usuarioAbierto.id),
nombre:archivo.nombre,
url:archivo.url,
tipo:tipo,
descripcion:tipo
}
});

if(msg){
msg.className="ok";
msg.textContent="Documento guardado.";
}

await cargarDocumentos();
}catch(e){
if(msg){
msg.className="error";
msg.textContent="Error: "+e.message;
}else{
alert("Error: "+e.message);
}
}
}

async function cargarDocumentos(){
const cont=document.getElementById("listaDocs");
if(!cont)return;

try{
const docs=await api("/rest/v1/documentos?select=*&user_id=eq."+encodeURIComponent(String(usuarioAbierto.id))+"&order=fecha.desc");

if(!docs.length){
cont.innerHTML="<p>No hay documentos.</p>";
return;
}

cont.innerHTML=docs.map(d=>`
<div class="doc">
<b>${esc(d.tipo||"documento")}</b><br>
${esc(d.nombre||"")}

<br><br>
<a href="${esc(d.url)}" target="_blank">Ver</a>
<button class="btn red" onclick="eliminarDocumento('${esc(d.id)}')">Eliminar</button>
</div>
`).join("");
}catch(e){
cont.innerHTML=`<span class="error">Error cargando documentos: ${esc(e.message)}</span>`;
}
}

async function eliminarDocumento(id){
if(!confirm("¿Eliminar documento?"))return;

try{
await api("/rest/v1/documentos?id=eq."+encodeURIComponent(id),{
method:"DELETE"
});
await cargarDocumentos();
}catch(e){
alert("Error: "+e.message);
}
}

function vistaInformes(){
document.getElementById("app").innerHTML=`
<div class="card">
<button class="btn gray" onclick="inicio()">←</button>
<h2>Informes</h2>
<button class="btn blue" onclick="window.print()">Imprimir</button>
</div>
`;
}

window.salir=salir;
window.fichar=fichar;
window.vistaHoras=vistaHoras;
window.vistaUsuarios=vistaUsuarios;
window.abrirUsuario=abrirUsuario;
window.tabUsuario=tabUsuario;
window.guardarUsuario=guardarUsuario;
window.subirFoto=subirFoto;
window.subirDocumento=subirDocumento;
window.eliminarDocumento=eliminarDocumento;
window.vistaInformes=vistaInformes;
window.inicio=inicio;

if(cargarSesion()){
inicio();
}
</script>

</body>
</html>
