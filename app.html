<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zentryx</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>
body{font-family:Arial;margin:0;background:#f2f2f2}
header{background:#0b1a2f;color:#fff;padding:15px;display:flex;justify-content:space-between;align-items:center}
button{padding:10px;border-radius:8px;border:none}
.btn{margin-top:10px}
.blue{background:#2d6cdf;color:#fff}
.orange{background:#ff9800;color:#fff}
.red{background:#e53935;color:#fff}
.gray{background:#ccc}
.card{background:#fff;padding:15px;margin:10px;border-radius:10px}
</style>
</head>

<body>

<header>
<h2>Zentryx V2546</h2>
<button onclick="logout()" class="red">Salir</button>
</header>

<div id="app"></div>

<script>

// 🔐 TU CONFIG REAL (la que ya tienes)
const SUPABASE_URL="https://idtaamivqbiuxtjvwuux.supabase.co";
const SUPABASE_KEY="sb_publishable_ToDLKonbF2QnTXi56o1nfQ_10IdaPJx";

const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let user = JSON.parse(localStorage.getItem("usuario")||"null");

// ---------- LOGIN ----------
if(!user){
document.getElementById("app").innerHTML=`
<div class="card">
<h2>Login</h2>
<input id="u" placeholder="usuario"><br><br>
<input id="p" type="password" placeholder="password"><br><br>
<button class="blue" onclick="login()">Entrar</button>
</div>`;
}

async function login(){
let u=document.getElementById("u").value;
let p=document.getElementById("p").value;

const {data}=await sb.from("users").select("*").eq("usuario",u).eq("password",p);

if(data.length){
localStorage.setItem("usuario",JSON.stringify(data[0]));
location.reload();
}else{
alert("Error login");
}
}

// ---------- APP ----------
if(user) inicio();

function inicio(){
document.getElementById("app").innerHTML=`
<div class="card">
<h2>Inicio</h2>

<button class="orange" onclick="generarFichajesPrueba()">Generar fichajes prueba</button>
<button class="red" onclick="borrarFichajesPrueba()">Borrar fichajes prueba</button>
<button class="blue" onclick="vistaInformes()">Informes</button>

</div>`;
}

// ---------- GENERAR DATOS ----------
async function generarFichajesPrueba(){

const hoy=new Date();

for(let i=1;i<=10;i++){

let d=new Date();
d.setDate(hoy.getDate()-i);

let fecha=d.toISOString().slice(0,10);

let base=[
{h:"08:00",t:"entrada"},
{h:"11:00",t:"inicio_pausa"},
{h:"11:15",t:"fin_pausa"},
{h:"14:00",t:"inicio_comida"},
{h:"15:00",t:"fin_comida"},
{h:i%3==0?"19:00":"18:00",t:"salida"}
];

for(let m of base){
await sb.from("fichajes").insert({
user_id:user.id,
tipo:m.t,
fecha:fecha+"T"+m.h+":00",
direccion:"PRUEBA"
});
}
}

alert("Datos creados");
}

// ---------- BORRAR ----------
async function borrarFichajesPrueba(){
await sb.from("fichajes").delete().eq("direccion","PRUEBA");
alert("Borrados");
}

// ---------- INFORMES ----------
async function vistaInformes(){

const {data}=await sb.from("fichajes").select("*").eq("user_id",user.id);

let total=0;

data.forEach(f=>{
if(f.tipo=="entrada") total+=8*60;
});

document.getElementById("app").innerHTML=`
<div class="card">
<h2>Informe</h2>
Total horas aproximadas: ${total/60}h
<button onclick="inicio()">Volver</button>
</div>`;
}

// ---------- LOGOUT ----------
function logout(){
localStorage.removeItem("usuario");
location.reload();
}

</script>
</body>
</html>
