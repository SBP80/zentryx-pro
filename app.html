function normalizarUsuarioBD(u){
  if(!u) return null;
  return {
    id:String(u.id),
    nombre:u.nombre || u.name || u.usuario || "Usuario",
    usuario:u.usuario || u.username || String(u.id),
    rol:u.rol || u.role || "operario",

    telefono:u.telefono || "",
    email:u.email || "",
    dni:u.dni || "",

    asuntos:u.asuntos ?? 0,
    vacaciones_usadas:u.vacaciones_usadas ?? 0,
    asuntos_usados:u.asuntos_usados ?? 0
  };
}

async function asegurarUsuarioActual(){
  const guardado = JSON.parse(localStorage.getItem("usuario") || "null");
  if(guardado && guardado.id){
    user = guardado;
    return user;
  }
  const {data,error}=await sb.from("users").select("*").eq("usuario","admin").limit(1);
  if(!error && data && data[0]){
    user = normalizarUsuarioBD(data[0]);
  }else{
    user = {id:"1",nombre:"Administrador",usuario:"admin",rol:"admin"};
  }
  localStorage.setItem("usuario", JSON.stringify(user));
  return user;
}

function ahora(){return new Date()}

function hoyISO(){
  const d=new Date();
  return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");
}

function fechaES(iso){
  if(!iso)return "";
  const p=iso.split("-");
  return p[2]+"/"+p[1]+"/"+p[0];
}

function horaHHMM(){
  const d=new Date();
  return String(d.getHours()).padStart(2,"0")+":"+String(d.getMinutes()).padStart(2,"0");
}

function minutos(h){
  if(!h)return null;
  const p=h.split(":").map(Number);
  return p[0]*60+p[1];
}

function textoMin(total){
  if(total==null)return "0 h 0 min";
  if(total<0)total=0;
  const h=Math.floor(total/60);
  const m=total%60;
  return h+" h "+m+" min";
}

  document.getElementById("horaActual").textContent=d.toLocaleTimeString("es-ES",{hour:"2-digit",minute:"2-digit",second:"2-digit"});
}

// ===== FICHAJES SUPABASE =====
let fichajesCache=[];

async function cargarFichajesServidor(){
  await asegurarUsuarioActual();
  const {data,error}=await sb
    .from("fichajes")
    .select("*")
    .eq("user_id", String(user.id))
    .order("fecha", {ascending:false})
    .limit(80);

  if(error){
    console.error(error);
    aviso("Error leyendo fichajes: "+error.message,"error");
    fichajesCache=[];
    return [];
  }

  fichajesCache=(data||[]).map(f=>({
    id:f.id,
    fecha_iso:f.fecha,
    fecha: String(f.fecha||"").slice(0,10),
    hora: new Date(f.fecha).toLocaleTimeString("es-ES",{hour:"2-digit",minute:"2-digit",second:"2-digit"}),
    tipo:f.tipo,
    ts:new Date(f.fecha).getTime(),
    lat:f.lat,
    lng:f.lng,
    direccion:f.direccion_real || f.direccion || "",
    aviso_horario:f.aviso_horario || "",
    estado_horario:f.estado_horario || ""
  })).sort((a,b)=>a.ts-b.ts);

  return fichajesCache;
}

function leerFichajes(){return fichajesCache}
function guardarFichajes(v){fichajesCache=v||[]}

function movimientosHoy(){
  return leerFichajes()
    .filter(x=>x.fecha===hoyISO())
    .sort((a,b)=>a.ts-b.ts);
}

function ultimoMovimiento(){
  const m=movimientosHoy();
  return m.length?m[m.length-1]:null;
}

function tipoPermitido(tipo){
  const est=estadoActual().txt;
  if(est==="Fuera") return tipo==="entrada";
  if(est==="Trabajando") return ["salida","inicio_pausa","inicio_comida"].includes(tipo);
  if(est==="En pausa") return tipo==="fin_pausa";
  if(est==="En comida") return tipo==="fin_comida";
  return tipo==="entrada";
}

function mensajeNoPermitido(tipo){
  const est=estadoActual().txt;
  if(est==="Fuera") return "No puedes iniciar pausa, comida o salida sin haber fichado entrada.";
  if(est==="Trabajando" && tipo==="entrada") return "Ya estás trabajando.";
  if(est==="En pausa") return "Estás en pausa. Primero finaliza la pausa.";
  if(est==="En comida") return "Estás en comida. Primero finaliza la comida.";
  return "Movimiento no permitido.";
}

  notasCache=(data||[]).map(n=>({
    id:n.id,
    txt:n.texto,
    fecha:n.fecha_aviso || "",

    fija:!!n.fija,

function leerNotas(){return notasCache}
function guardarNotas(v){notasCache=v||[]}

function aviso(texto,tipo){

  localStorage.removeItem("zentryx_msg");
  const m=JSON.parse(raw);
  return `<p class="${m.tipo}">${m.texto}</p>`;

async function limpiarPrueba(){
  if(!esAdmin()){alert("Solo admin.");return}
  const pass=prompt("Contraseña admin:");
  if(pass!=="admin"){alert("Contraseña incorrecta.");return}
  if(!confirm("¿Borrar fichajes de hoy?"))return;

  await asegurarUsuarioActual();
  const inicioDia = hoyISO()+"T00:00:00";
  const finDia = hoyISO()+"T23:59:59";
  const {error}=await sb
    .from("fichajes")
    .delete()
    .eq("user_id", String(user.id))
    .gte("fecha", inicioDia)
    .lte("fecha", finDia);

  if(error){
    alert("Error borrando fichajes: "+error.message);
    return;
  }
  await cargarFichajesServidor();
  inicio();
}

    usuariosCache=[user];

  }

}

}

    encargado:"Encargado",

      <button class="btn gray" onclick="vistaUsuariosPro()">← Usuarios</button>

function guardarAltaUsuarioPro(){
  const nombre=document.getElementById("u_nombre").value.trim();
  const usuarioLogin=document.getElementById("u_usuario").value.trim();
  const rol=document.getElementById("u_rol").value;
  const puesto=document.getElementById("u_puesto").value.trim();
  const telefono=document.getElementById("u_telefono").value.trim();
  const email=document.getElementById("u_email").value.trim();
  const dni=document.getElementById("u_dni").value.trim();
  const vacaciones=Number(document.getElementById("u_vacaciones").value||22);
  const asuntos=Number(document.getElementById("u_asuntos").value||0);

  if(!nombre||!usuarioLogin){
    alert("Nombre y usuario son obligatorios.");
    return;
  }

  const lista=leerUsuarios();

  if(lista.some(u=>u.usuario.toLowerCase()===usuarioLogin.toLowerCase())){
    alert("Ese usuario ya existe.");
    return;
  }

  const nuevo={
    id:"u_"+Date.now(),
    nombre,
    usuario:usuarioLogin,
    rol,
    puesto,
    telefono,
    email,
    dni,
    activo:true,
    password:"",
    password_pendiente:true,
    vacaciones,
    asuntos,
    creado:new Date().toISOString()
  };

  lista.push(nuevo);
  guardarUsuarios(lista);

  crearHorarioBaseLocal(nuevo.id);
  crearAvisosBaseLocal(nuevo.id);

  alert("Usuario creado. La contraseña queda pendiente.");
  vistaUsuariosPro();
}

function crearHorarioBaseLocal(uid){
  const dias=["domingo","lunes","martes","miércoles","jueves","viernes","sábado"];
  const horario=dias.map(d=>({
    dia:d,
    trabaja:["lunes","martes","miércoles","jueves","viernes"].includes(d),
    entrada:["lunes","martes","miércoles","jueves","viernes"].includes(d)?"08:00":"",
    salida:["lunes","martes","miércoles","jueves","viernes"].includes(d)?"17:00":"",
    inicio_comida:"",
    fin_comida:"",
    descanso_min:0
  }));
  localStorage.setItem("zentryx_horario_"+uid,JSON.stringify(horario));
}

function crearAvisosBaseLocal(uid){
  localStorage.setItem("zentryx_avisos_"+uid,JSON.stringify({
    activo:true,
    margen_entrada:10,
    salida_antes:10,
    max_comida:90,
    max_descanso:30
  }));
}

    return;
  }

  document.getElementById("app").innerHTML=`
    <div class="card">
      <button class="btn gray" onclick="vistaUsuariosPro()">← Usuarios</button>
      <h2>${u.nombre}</h2>
      <p>${u.usuario} · ${rolNombre(u.rol)}</p>
      <p>${u.puesto||"Sin puesto"}</p>
      ${estadoUsuario(u)}
    </div>

    <div class="card">
      <h2>Datos</h2>
      <p><b>Teléfono:</b> ${u.telefono||"-"}</p>
      <p><b>Email:</b> ${u.email||"-"}</p>
      <p><b>DNI:</b> ${u.dni||"-"}</p>
      <p><b>Vacaciones:</b> ${u.vacaciones??22}</p>
      <p><b>Horas asuntos propios:</b> ${u.asuntos??0} h</p><p><b>Asuntos usados:</b> ${u.asuntos_usados??0} h</p><p><b>Asuntos restantes:</b> ${Number(u.asuntos??0)-Number(u.asuntos_usados??0)} h</p><p><b>Vacaciones usadas:</b> ${u.vacaciones_usadas??0} días</p><p><b>Vacaciones restantes:</b> ${Number(u.vacaciones??22)-Number(u.vacaciones_usadas??0)} días</p>
    </div>

    <div class="card">

        <button class="btn gray full" onclick="resetPasswordUsuarioPro('${u.id}')">Resetear contraseña</button>
        <button class="btn blue full" onclick="simularPrimeraClave('${u.id}')">Crear contraseña de usuario</button>
      `:""}
    </div>

    ${esAdmin()?`
    <div class="card">
      <h2>Zona protegida</h2>
      <button class="btn blue full" onclick="vistaEditarUsuarioPro('${u.id}')">Editar usuario</button>
      <button class="btn orange full" onclick="toggleActivoUsuarioPro('${u.id}')">${u.activo?"Desactivar usuario":"Activar usuario"}</button>
      ${u.id!==user.id?`<button class="btn red full" onclick="eliminarUsuarioPro('${u.id}')">Eliminar usuario</button>`:""}

function vistaEditarUsuarioPro(id){
  if(!pedirClaveAdmin()){
    alert("Contraseña incorrecta.");
    return;
  }

  const u=usuarioPorId(id);
  if(!u)return;

  document.getElementById("app").innerHTML=`
    <div class="card">
      <button class="btn gray" onclick="vistaFichaUsuarioPro('${u.id}')">← Ficha</button>
      <h2>Editar usuario</h2>

      <label>Nombre y apellidos</label>
      <input id="e_nombre" value="${u.nombre||""}">

      <label>Usuario / login</label>
      <input id="e_usuario" value="${u.usuario||""}">

      <label>Rol</label>
      <select id="e_rol">
        <option value="operario" ${u.rol==="operario"?"selected":""}>Operario</option>
        <option value="encargado" ${u.rol==="encargado"?"selected":""}>Encargado</option>
        <option value="oficina" ${u.rol==="oficina"?"selected":""}>Oficina</option>
        <option value="admin" ${u.rol==="admin"?"selected":""}>Administrador</option>
      </select>

      <label>Puesto / cargo real</label>
      <input id="e_puesto" value="${u.puesto||""}">

      <label>Teléfono</label>
      <input id="e_telefono" value="${u.telefono||""}">

      <label>Email</label>
      <input id="e_email" value="${u.email||""}">

      <label>DNI</label>
      <input id="e_dni" value="${u.dni||""}">

      <label>Días de vacaciones anuales</label>
      <input id="e_vacaciones" type="number" value="${u.vacaciones??22}">

      <label>Horas asuntos propios anuales</label>
      <input id="e_asuntos" type="number" value="${u.asuntos??0}">

      <button class="btn green full" onclick="guardarEdicionUsuarioPro('${u.id}')">Guardar cambios</button>
    </div>`;
}

function guardarEdicionUsuarioPro(id){
  const lista=leerUsuarios();
  const u=lista.find(x=>String(x.id)===String(id));
  if(!u)return;

  const nuevoUsuario=document.getElementById("e_usuario").value.trim();
  if(!document.getElementById("e_nombre").value.trim()||!nuevoUsuario){
    alert("Nombre y usuario son obligatorios.");
    return;
  }

  if(lista.some(x=>x.id!==id && x.usuario.toLowerCase()===nuevoUsuario.toLowerCase())){
    alert("Ese usuario ya existe.");
    return;
  }

  u.nombre=document.getElementById("e_nombre").value.trim();
  u.usuario=nuevoUsuario;
  u.rol=document.getElementById("e_rol").value;
  u.puesto=document.getElementById("e_puesto").value.trim();
  u.telefono=document.getElementById("e_telefono").value.trim();
  u.email=document.getElementById("e_email").value.trim();
  u.dni=document.getElementById("e_dni").value.trim();
  u.vacaciones=Number(document.getElementById("e_vacaciones").value||22);
  u.asuntos=Number(document.getElementById("e_asuntos").value||0);

  guardarUsuarios(lista);
  alert("Usuario guardado.");
  vistaFichaUsuarioPro(id);
}

function toggleActivoUsuarioPro(id){
  if(!pedirClaveAdmin()){
    alert("Contraseña incorrecta.");
    return;
  }

  const lista=leerUsuarios();
  const u=lista.find(x=>String(x.id)===String(id));
  if(!u)return;

  if(u.id===user.id){
    alert("No puedes desactivar el usuario actual.");
    return;
  }

  u.activo=!u.activo;
  guardarUsuarios(lista);
  vistaFichaUsuarioPro(id);
}

function resetPasswordUsuarioPro(id){
  if(!pedirClaveAdmin()){
    alert("Contraseña incorrecta.");
    return;
  }

  const lista=leerUsuarios();
  const u=lista.find(x=>String(x.id)===String(id));
  if(!u)return;

  u.password="";
  u.password_pendiente=true;
  guardarUsuarios(lista);
  alert("Contraseña reseteada. El usuario deberá crear una nueva.");
  vistaFichaUsuarioPro(id);
}

function simularPrimeraClave(id){
  const lista=leerUsuarios();
  const u=lista.find(x=>String(x.id)===String(id));
  if(!u)return;

  const p1=prompt("Nueva contraseña del usuario:");
  if(!p1)return;

  const p2=prompt("Repite la contraseña:");
  if(p1!==p2){
    alert("No coinciden.");
    return;
  }

  u.password=p1;
  u.password_pendiente=false;
  guardarUsuarios(lista);
  alert("Contraseña creada.");
  vistaFichaUsuarioPro(id);
}

function eliminarUsuarioPro(id){
  if(!pedirClaveAdmin()){
    alert("Contraseña incorrecta.");
    return;
  }

  if(id===user.id){
    alert("No puedes eliminar el usuario actual.");
    return;
  }

  const u=usuarioPorId(id);
  if(!u)return;

  if(!confirm("¿Eliminar a "+u.nombre+"?"))return;

  guardarUsuarios(leerUsuarios().filter(x=>String(x.id)!==String(id)));
  localStorage.removeItem("zentryx_horario_"+id);
  localStorage.removeItem("zentryx_avisos_"+id);
  localStorage.removeItem("zentryx_fichajes_"+id);
  alert("Usuario eliminado.");
  vistaUsuariosPro();
}


// ===== SOLICITUDES PRO =====
function kSolicitudes(){return "zentryx_solicitudes_pro"}

function leerSolicitudes(){
  return JSON.parse(localStorage.getItem(kSolicitudes())||"[]");
}

function guardarSolicitudes(lista){
  localStorage.setItem(kSolicitudes(),JSON.stringify(lista));
}

function tipoSolicitudNombre(t){
  const m={
    vacaciones:"Vacaciones",
    asuntos_horas:"Asuntos propios por horas",
    medico:"Médico",
    permiso:"Permiso",
    baja:"Baja",
    formacion:"Formación",
    ausencia:"Ausencia"
  };
  return m[t]||t;
}

function estadoSolicitudHTML(e){
  if(e==="aprobada")return '<span class="badge green">Aprobada</span>';
  if(e==="rechazada")return '<span class="badge red">Rechazada</span>';
  return '<span class="badge orange">Pendiente</span>';
}

function solicitudesDeUsuario(uid){
  const lista=leerSolicitudes();
  if(esAdmin())return lista;
  return lista.filter(s=>String(s.user_id)===String(uid));
}

function vistaSolicitudesPro(){
  const lista=solicitudesDeUsuario(user.id).sort((a,b)=>b.creada.localeCompare(a.creada));

  document.getElementById("app").innerHTML=`
    <div class="card">
      <button class="btn gray" onclick="inicio()">← Volver</button>
      <h2>Solicitudes</h2>
      <p>Vacaciones, asuntos propios por horas, médico, permisos, bajas y formación.</p>
      <button class="btn green full" onclick="vistaNuevaSolicitudPro()">Nueva solicitud</button>
    </div>

    <div class="card">
      <h2>${esAdmin()?"Todas las solicitudes":"Mis solicitudes"}</h2>
      ${lista.length?lista.map(s=>solicitudHTML(s)).join(""):"<p>No hay solicitudes todavía.</p>"}
    </div>`;
}

function solicitudHTML(s){
  const u=usuarioPorId(s.user_id)||{nombre:s.user_id};
  return `
    <div class="row">
      <b>${tipoSolicitudNombre(s.tipo)}</b><br>
      ${esAdmin()?`<span class="muted">${u.nombre}</span><br>`:""}
      ${s.fecha_inicio||"-"} ${s.fecha_fin?`→ ${s.fecha_fin}`:""}<br>
      ${s.horas?`Horas solicitadas: ${s.horas} h<br>`:""}
      ${s.motivo?`<span class="muted">${s.motivo}</span><br>`:""}
      ${estadoSolicitudHTML(s.estado)}<br>
      ${esAdmin()&&s.estado==="pendiente"?`
        <button class="btn green" onclick="resolverSolicitudPro('${s.id}','aprobada')">Aprobar</button>
        <button class="btn red" onclick="resolverSolicitudPro('${s.id}','rechazada')">Rechazar</button>
      `:""}
      ${s.estado==="pendiente"&&String(s.user_id)===String(user.id)?`
        <button class="btn red" onclick="cancelarSolicitudPro('${s.id}')">Cancelar</button>
      `:""}
    </div>`;
}

function vistaNuevaSolicitudPro(){
  const usuarios=leerUsuarios();

  document.getElementById("app").innerHTML=`
    <div class="card">
      <button class="btn gray" onclick="vistaSolicitudesPro()">← Solicitudes</button>
      <h2>Nueva solicitud</h2>

      ${esAdmin()?`
      <label>Trabajador</label>
      <select id="sol_user">
        ${usuarios.filter(u=>u.activo!==false).map(u=>`<option value="${u.id}">${u.nombre} · ${rolNombre(u.rol)}</option>`).join("")}
      </select>`:""}

      <label>Tipo</label>
      <select id="sol_tipo" onchange="actualizarCamposSolicitud()">
        <option value="vacaciones">Vacaciones</option>
        <option value="asuntos_horas">Asuntos propios por horas</option>
        <option value="medico">Médico</option>
        <option value="permiso">Permiso</option>
        <option value="baja">Baja</option>
        <option value="formacion">Formación</option>
        <option value="ausencia">Ausencia</option>
      </select>

      <label>Fecha inicio</label>
      <input id="sol_inicio" type="date">

      <label>Fecha fin</label>
      <input id="sol_fin" type="date">

      <div id="bloqueHorasSolicitud">
        <label>Horas</label>
        <input id="sol_horas" type="number" step="0.25" value="0">
      </div>

      <label>Motivo / comentario</label>
      <textarea id="sol_motivo" placeholder="Explica brevemente la solicitud..."></textarea>

      <button class="btn green full" onclick="guardarSolicitudPro()">Enviar solicitud</button>
    </div>`;

  actualizarCamposSolicitud();
}

function actualizarCamposSolicitud(){
  const tipo=document.getElementById("sol_tipo")?.value;
  const bloque=document.getElementById("bloqueHorasSolicitud");
  if(!bloque)return;
  bloque.style.display=(tipo==="asuntos_horas"||tipo==="medico"||tipo==="permiso")?"block":"none";
}

function diasEntreFechas(inicio,fin){
  if(!inicio)return 0;
  const a=new Date(inicio+"T00:00:00");
  const b=new Date((fin||inicio)+"T00:00:00");
  const d=Math.round((b-a)/(1000*60*60*24))+1;
  return d<1?1:d;
}

function guardarSolicitudPro(){
  const tipo=document.getElementById("sol_tipo").value;
  const uid=esAdmin()?document.getElementById("sol_user").value:user.id;
  const inicio=document.getElementById("sol_inicio").value;
  const fin=document.getElementById("sol_fin").value;
  const horas=Number(document.getElementById("sol_horas")?.value||0);
  const motivo=document.getElementById("sol_motivo").value.trim();

  if(!inicio){
    alert("La fecha de inicio es obligatoria.");
    return;
  }

  if((tipo==="asuntos_horas"||tipo==="medico"||tipo==="permiso") && horas<=0){
    alert("Indica las horas solicitadas.");
    return;
  }

  const lista=leerSolicitudes();
  lista.unshift({
    id:"s_"+Date.now(),
    user_id:String(uid),
    tipo,
    fecha_inicio:inicio,
    fecha_fin:fin||inicio,
    horas:(tipo==="asuntos_horas"||tipo==="medico"||tipo==="permiso")?horas:0,
    dias:diasEntreFechas(inicio,fin||inicio),
    motivo,
    estado:esAdmin()?"aprobada":"pendiente",
    creada:new Date().toISOString(),
    resuelta:"",
    resuelta_por:"",
    comentario_resolucion:""
  });
  guardarSolicitudes(lista);
  alert(esAdmin()?"Solicitud creada como aprobada.":"Solicitud enviada.");
  vistaSolicitudesPro();
}

function cancelarSolicitudPro(id){
  if(!confirm("¿Cancelar solicitud?"))return;
  guardarSolicitudes(leerSolicitudes().filter(s=>s.id!==id));
  vistaSolicitudesPro();
}

function resolverSolicitudPro(id,estado){
  if(!pedirClaveAdmin()){
    alert("Contraseña incorrecta.");
    return;
  }

  const lista=leerSolicitudes();
  const s=lista.find(x=>x.id===id);
  if(!s)return;

  const comentario=prompt("Comentario de resolución:")||"";
  s.estado=estado;
  s.resuelta=new Date().toISOString();
  s.resuelta_por=user.id;
  s.comentario_resolucion=comentario;

  if(estado==="aprobada"){
    aplicarDescuentoSolicitud(s);
  }

  guardarSolicitudes(lista);
  vistaSolicitudesPro();
}

function aplicarDescuentoSolicitud(s){
  const lista=leerUsuarios();
  const u=lista.find(x=>String(x.id)===String(s.user_id));
  if(!u)return;

  if(s.tipo==="vacaciones"){
    u.vacaciones_usadas=Number(u.vacaciones_usadas||0)+Number(s.dias||0);
  }

  if(s.tipo==="asuntos_horas"){
    u.asuntos_usados=Number(u.asuntos_usados||0)+Number(s.horas||0);
  }

  guardarUsuarios(lista);
}

async function initApp(){
  await asegurarUsuarioActual();
  await cargarUsuariosServidor();
  await cargarFichajesServidor();
  await cargarNotasServidor();
  inicio();

  setInterval(async()=>{
    await cargarFichajesServidor();
    await cargarNotasServidor();
    inicio();
  }, 15000);
}

initApp();
</script>
