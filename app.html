<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zentryx V2529</title>
<style>
:root{
  --dark:#0f172a;
  --bg:#eef2f7;
  --card:#ffffff;
  --line:#d1d5db;
  --text:#111827;
  --muted:#6b7280;
  --blue:#2563eb;
  --green:#16a34a;
  --red:#dc2626;
  --orange:#f59e0b;
  --gray:#e5e7eb;
}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--text);font-family:Arial,Helvetica,sans-serif}
.header{background:var(--dark);color:#fff;padding:22px 18px}
.header h1{margin:0;font-size:34px;line-height:1.1}
.header .fecha{margin-top:10px;font-size:18px;color:#cbd5e1}
.header .hora{font-size:32px;font-weight:bold;margin-top:6px}
.page{padding:14px;max-width:950px;margin:0 auto}
.card{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:16px;margin-bottom:14px}
h2{font-size:28px;margin:0 0 10px}
h3{font-size:22px;margin:0 0 8px}
p{margin:6px 0;color:var(--muted);font-size:16px;line-height:1.35}
.badge{display:inline-block;background:var(--gray);border-radius:999px;padding:8px 12px;font-weight:bold;margin:4px 4px 4px 0}
.badge.green{background:#dcfce7;color:#166534}
.badge.orange{background:#fef3c7;color:#92400e}
.badge.red{background:#fee2e2;color:#991b1b}
.btn{border:0;border-radius:14px;padding:13px 16px;font-weight:bold;font-size:17px;cursor:pointer;margin:5px 4px 5px 0}
.btn.full{width:100%;margin-top:10px}
.btn.blue{background:var(--blue);color:white}
.btn.green{background:var(--green);color:white}
.btn.red{background:var(--red);color:white}
.btn.orange{background:var(--orange);color:white}
.btn.gray{background:var(--gray);color:#2563eb}
.btn.dark{background:var(--dark);color:white}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.module{background:white;border:1px solid var(--line);border-radius:16px;padding:14px}
.module h3{font-size:20px}
.module p{font-size:14px;min-height:38px}
.module button{width:100%;min-height:48px}
.row{border:1px solid var(--line);border-radius:14px;padding:12px;margin:10px 0;background:#fff}
.row b{font-size:18px}
.ok{color:#15803d;font-weight:bold}
.warn{color:#a16207;font-weight:bold}
.error{color:#b91c1c;font-weight:bold}
input,select,textarea{width:100%;padding:13px;border:1px solid #c7c7c7;border-radius:12px;font-size:17px;margin:6px 0 12px;background:white}
textarea{min-height:120px}
label{display:block;font-size:15px;font-weight:bold;margin-top:6px}
.actions{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.note-fixed{border:2px solid var(--orange);background:#fffbeb}
.small{font-size:13px;color:var(--muted)}
@media(max-width:560px){
  .grid{grid-template-columns:1fr 1fr;gap:8px}
  .actions{grid-template-columns:1fr 1fr}
  .header h1{font-size:32px}
  .header .hora{font-size:30px}
  .module{padding:12px}
  .module h3{font-size:18px}
  .module p{font-size:13px}
  .btn{font-size:16px}
}
</style>
</head>
<body>
<div class="header">
  <h1>Zentryx V2529</h1>
  <div class="fecha" id="fechaActual"></div>
  <div class="hora" id="horaActual"></div>
</div>
<div class="page" id="app"></div>

<script>
const VERSION="2529";

let user={
  id:"admin",
  nombre:"Administrador",
  usuario:"admin",
  rol:"admin"
};

function esAdmin(){return user.rol==="admin"}

function ahora(){return new Date()}

function hoyISO(){
  const d=new Date();
  return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");
}

function fechaES(iso){
  if(!iso)return "";
  const p=iso.split("-");
  return p[2]+"/"+p[1]+"/"+p[0];
}

function horaHHMM(){
  const d=new Date();
  return String(d.getHours()).padStart(2,"0")+":"+String(d.getMinutes()).padStart(2,"0");
}

function minutos(h){
  if(!h)return null;
  const p=h.split(":").map(Number);
  return p[0]*60+p[1];
}

function textoMin(total){
  if(total==null)return "0 h 0 min";
  if(total<0)total=0;
  const h=Math.floor(total/60);
  const m=total%60;
  return h+" h "+m+" min";
}

function actualizarReloj(){
  const d=new Date();
  document.getElementById("fechaActual").textContent=d.toLocaleDateString("es-ES",{weekday:"long",year:"numeric",month:"long",day:"numeric"});
  document.getElementById("horaActual").textContent=d.toLocaleTimeString("es-ES",{hour:"2-digit",minute:"2-digit",second:"2-digit"});
}
setInterval(actualizarReloj,1000);
actualizarReloj();

function kFichajes(){return "zentryx_fichajes_"+user.id}
function leerFichajes(){return JSON.parse(localStorage.getItem(kFichajes())||"[]")}
function guardarFichajes(v){localStorage.setItem(kFichajes(),JSON.stringify(v))}
function movimientosHoy(){return leerFichajes().filter(x=>x.fecha===hoyISO()).sort((a,b)=>a.ts-b.ts)}
function ultimoMovimiento(){const m=movimientosHoy();return m.length?m[m.length-1]:null}

function estadoActual(){
  const u=ultimoMovimiento();
  if(!u)return {txt:"Fuera",clase:"red",accion:"entrada"};
  if(u.tipo==="entrada"||u.tipo==="fin_pausa"||u.tipo==="fin_comida")return {txt:"Trabajando",clase:"green",accion:"salida"};
  if(u.tipo==="inicio_pausa")return {txt:"En pausa",clase:"orange",accion:"fin_pausa"};
  if(u.tipo==="inicio_comida")return {txt:"En comida",clase:"orange",accion:"fin_comida"};
  if(u.tipo==="salida")return {txt:"Fuera",clase:"red",accion:"entrada"};
  return {txt:"Fuera",clase:"red",accion:"entrada"};
}

function nombreAccion(a){
  const map={
    entrada:"Fichar entrada",
    salida:"Fichar salida",
    inicio_pausa:"Inicio pausa",
    fin_pausa:"Fin pausa",
    inicio_comida:"Inicio comida",
    fin_comida:"Fin comida"
  };
  return map[a]||a;
}

function guardarMovimiento(tipo){
  const lista=leerFichajes();
  lista.push({id:Date.now(),fecha:hoyISO(),hora:horaHHMM(),tipo,ts:Date.now()});
  guardarFichajes(lista);
  aviso(nombreAccion(tipo)+" guardado.","ok");
  inicio();
}

function accionPrincipal(){
  const e=estadoActual();
  if(e.accion==="entrada")guardarMovimiento("entrada");
  else if(e.accion==="salida"){
    if(confirm("¿Registrar salida y cerrar jornada?"))guardarMovimiento("salida");
  }
  else guardarMovimiento(e.accion);
}

function resumenHoy(){
  const mov=movimientosHoy();
  let trabajandoDesde=null, pausaDesde=null, comidaDesde=null;
  let trabajo=0, pausa=0, comida=0;

  for(const m of mov){
    const mm=minutos(m.hora);
    if(m.tipo==="entrada"||m.tipo==="fin_pausa"||m.tipo==="fin_comida"){
      trabajandoDesde=mm;
      pausaDesde=null;
      comidaDesde=null;
    }
    if(m.tipo==="inicio_pausa"){
      if(trabajandoDesde!=null)trabajo+=mm-trabajandoDesde;
      trabajandoDesde=null;
      pausaDesde=mm;
    }
    if(m.tipo==="fin_pausa"){
      if(pausaDesde!=null)pausa+=mm-pausaDesde;
      pausaDesde=null;
      trabajandoDesde=mm;
    }
    if(m.tipo==="inicio_comida"){
      if(trabajandoDesde!=null)trabajo+=mm-trabajandoDesde;
      trabajandoDesde=null;
      comidaDesde=mm;
    }
    if(m.tipo==="fin_comida"){
      if(comidaDesde!=null)comida+=mm-comidaDesde;
      comidaDesde=null;
      trabajandoDesde=mm;
    }
    if(m.tipo==="salida"){
      if(trabajandoDesde!=null)trabajo+=mm-trabajandoDesde;
      trabajandoDesde=null;
    }
  }

  const est=estadoActual();
  const now=minutos(horaHHMM());
  if(est.txt==="Trabajando" && trabajandoDesde!=null)trabajo+=now-trabajandoDesde;
  if(est.txt==="En pausa" && pausaDesde!=null)pausa+=now-pausaDesde;
  if(est.txt==="En comida" && comidaDesde!=null)comida+=now-comidaDesde;

  return {trabajo,pausa,comida,mov};
}

function kNotas(){return "zentryx_notas_"+user.id}
function leerNotas(){return JSON.parse(localStorage.getItem(kNotas())||"[]")}
function guardarNotas(v){localStorage.setItem(kNotas(),JSON.stringify(v))}

function notaVencida(n){
  if(n.hecha)return false;
  if(!n.fecha||!n.hora)return false;
  return new Date(n.fecha+"T"+n.hora) <= new Date();
}

function crearNota(){
  document.getElementById("app").innerHTML=`
    <div class="card">
      <button class="btn gray" onclick="inicio()">← Volver</button>
      <h2>Nueva nota rápida</h2>
      <label>Nota</label>
      <textarea id="notaTxt" placeholder="Escribe aquí la nota..."></textarea>
      <label>Fecha aviso</label>
      <input id="notaFecha" type="date">
      <label>Hora aviso</label>
      <input id="notaHora" type="time">
      <label>Fijar permanente</label>
      <select id="notaFija">
        <option value="false">No</option>
        <option value="true">Sí</option>
      </select>
      <button class="btn green full" onclick="guardarNotaNueva()">Guardar nota</button>
    </div>`;
}

function guardarNotaNueva(){
  const txt=document.getElementById("notaTxt").value.trim();
  if(!txt){alert("Escribe una nota.");return}
  const lista=leerNotas();
  lista.unshift({
    id:Date.now(),
    txt,
    fecha:document.getElementById("notaFecha").value,
    hora:document.getElementById("notaHora").value,
    fija:document.getElementById("notaFija").value==="true",
    hecha:false,
    creada:new Date().toISOString()
  });
  guardarNotas(lista);
  aviso("Nota guardada.","ok");
  inicio();
}

function marcarNotaHecha(id){
  const lista=leerNotas();
  const n=lista.find(x=>x.id===id);
  if(n)n.hecha=true;
  guardarNotas(lista);
  inicio();
}

function eliminarNota(id){
  if(!confirm("¿Eliminar nota?"))return;
  guardarNotas(leerNotas().filter(x=>x.id!==id));
  inicio();
}

function aviso(texto,tipo){
  localStorage.setItem("zentryx_msg",JSON.stringify({texto,tipo}));
}

function leerAviso(){
  const raw=localStorage.getItem("zentryx_msg");
  if(!raw)return "";
  localStorage.removeItem("zentryx_msg");
  const m=JSON.parse(raw);
  return `<p class="${m.tipo}">${m.texto}</p>`;
}

function limpiarPrueba(){
  if(!esAdmin()){alert("Solo admin.");return}
  const pass=prompt("Contraseña admin:");
  if(pass!=="admin"){alert("Contraseña incorrecta.");return}
  if(!confirm("¿Borrar fichajes de hoy?"))return;
  guardarFichajes(leerFichajes().filter(x=>x.fecha!==hoyISO()));
  inicio();
}

function inicio(){
  const est=estadoActual();
  const res=resumenHoy();
  const notas=leerNotas().filter(n=>!n.hecha);
  const fijas=notas.filter(n=>n.fija);
  const vencidas=notas.filter(notaVencida);
  const otras=notas.filter(n=>!n.fija&&!notaVencida(n)).slice(0,5);

  document.getElementById("app").innerHTML=`
    <div class="card">
      <h2>Inicio</h2>
      <b>${user.nombre}</b>
      <p>${user.usuario} · ${user.rol}</p>
      <span class="badge ${est.clase}">${est.txt}</span>
      ${leerAviso()}
    </div>

    ${fijas.length?`
    <div class="card note-fixed">
      <h2>Notas fijas</h2>
      ${fijas.map(n=>notaHTML(n)).join("")}
    </div>`:""}

    ${vencidas.length?`
    <div class="card note-fixed">
      <h2>Avisos pendientes</h2>
      ${vencidas.map(n=>notaHTML(n)).join("")}
    </div>`:""}

    <div class="card">
      <h2>Jornada de hoy</h2>
      <span class="badge">Trabajo: ${textoMin(res.trabajo)}</span>
      <span class="badge">Pausas: ${textoMin(res.pausa)}</span>
      <span class="badge">Comida: ${textoMin(res.comida)}</span>
      <button class="btn green full" onclick="accionPrincipal()">${nombreAccion(est.accion)}</button>
      <div class="actions">
        <button class="btn orange" onclick="guardarMovimiento('inicio_pausa')">Inicio pausa</button>
        <button class="btn orange" onclick="guardarMovimiento('inicio_comida')">Inicio comida</button>
      </div>
      ${esAdmin()?`<button class="btn gray full" onclick="limpiarPrueba()">Borrar fichajes de hoy</button>`:""}
    </div>

    <div class="card">
      <h2>Notas rápidas</h2>
      <button class="btn blue full" onclick="crearNota()">+ Nota rápida</button>
      ${otras.length?otras.map(n=>notaHTML(n)).join(""):"<p>No hay notas pendientes.</p>"}
    </div>

    <div class="grid">
      <div class="module">
        <h3>Usuarios</h3>
        <p>Alta, ficha, horarios y documentos.</p>
        <button class="btn dark" onclick="vistaUsuariosPro()">Abrir</button>
      </div>
      <div class="module">
        <h3>Solicitudes</h3>
        <p>Vacaciones, permisos y bajas.</p>
        <button class="btn blue" onclick="vistaPendiente('Solicitudes PRO')">Abrir</button>
      </div>
      <div class="module">
        <h3>Configuración</h3>
        <p>Horarios, avisos y horas extra.</p>
        <button class="btn gray" onclick="vistaPendiente('Configuración PRO')">Abrir</button>
      </div>
      <div class="module">
        <h3>Informes</h3>
        <p>Resumen mensual y fichajes.</p>
        <button class="btn blue" onclick="vistaInformes()">Abrir</button>
      </div>
    </div>

    <div class="card">
      <h2>Movimientos de hoy</h2>
      ${res.mov.length?res.mov.slice().reverse().map(m=>`
        <div class="row">
          <b>${nombreAccion(m.tipo)}</b><br>
          ${m.hora}
        </div>`).join(""):"<p>No hay movimientos todavía.</p>"}
    </div>
  `;
}

function notaHTML(n){
  return `
    <div class="row">
      <b>${n.txt}</b><br>
      ${n.fecha||n.hora?`<span class="small">Aviso: ${n.fecha||""} ${n.hora||""}</span><br>`:""}
      ${n.fija?`<span class="badge orange">Fija</span>`:""}
      ${notaVencida(n)?`<span class="badge red">Vencida</span>`:""}
      <br>
      <button class="btn green" onclick="marcarNotaHecha(${n.id})">Hecha</button>
      <button class="btn red" onclick="eliminarNota(${n.id})">Eliminar</button>
    </div>`;
}

function vistaPendiente(titulo){
  document.getElementById("app").innerHTML=`
    <div class="card">
      <button class="btn gray" onclick="inicio()">← Volver</button>
      <h2>${titulo}</h2>
      <p>Este bloque será el siguiente en conectar con base de datos y permisos.</p>
    </div>`;
}

function vistaInformes(){
  const lista=leerFichajes().slice().reverse();
  document.getElementById("app").innerHTML=`
    <div class="card">
      <button class="btn gray" onclick="inicio()">← Volver</button>
      <h2>Informes</h2>
      <p>Resumen de movimientos guardados en este dispositivo.</p>
    </div>
    <div class="card">
      <h3>Movimientos</h3>
      ${lista.length?lista.map(m=>`
        <div class="row">
          <b>${fechaES(m.fecha)} · ${m.hora}</b><br>
          ${nombreAccion(m.tipo)}
        </div>`).join(""):"<p>No hay datos.</p>"}
    </div>`;
}


// ===== USUARIOS PRO =====
const ADMIN_PASS="admin";

function kUsuarios(){return "zentryx_usuarios_pro"}

function usuariosBase(){
  return [{
    id:"admin",
    nombre:"Administrador",
    usuario:"admin",
    rol:"admin",
    puesto:"Administrador",
    telefono:"",
    email:"",
    dni:"",
    activo:true,
    password:"admin",
    password_pendiente:false,
    creado:new Date().toISOString()
  }];
}

function leerUsuarios(){
  const raw=localStorage.getItem(kUsuarios());
  if(!raw){
    localStorage.setItem(kUsuarios(),JSON.stringify(usuariosBase()));
    return usuariosBase();
  }
  return JSON.parse(raw);
}

function guardarUsuarios(lista){
  localStorage.setItem(kUsuarios(),JSON.stringify(lista));
}

function pedirClaveAdmin(){
  const pass=prompt("Contraseña del administrador:");
  return pass===ADMIN_PASS;
}

function usuarioPorId(id){
  return leerUsuarios().find(u=>String(u.id)===String(id));
}

function rolNombre(rol){
  const m={
    admin:"Administrador",
    encargado:"Encargado",
    operario:"Operario",
    oficina:"Oficina"
  };
  return m[rol]||rol;
}

function estadoUsuario(u){
  if(!u.activo)return '<span class="badge red">Inactivo</span>';
  if(u.password_pendiente)return '<span class="badge orange">Contraseña pendiente</span>';
  return '<span class="badge green">Activo</span>';
}

function vistaUsuariosPro(){
  const lista=leerUsuarios();

  document.getElementById("app").innerHTML=`
    <div class="card">
      <button class="btn gray" onclick="inicio()">← Volver</button>
      <h2>Usuarios</h2>
      <p>Alta, edición protegida, contraseña y estado.</p>
      ${esAdmin()?`<button class="btn green full" onclick="vistaAltaUsuarioPro()">Crear usuario</button>`:""}
    </div>

    <div class="card">
      <h2>Lista de usuarios</h2>
      ${lista.map(u=>`
        <div class="row">
          <b>${u.nombre}</b><br>
          ${u.usuario} · ${rolNombre(u.rol)}<br>
          <span class="muted">${u.puesto||"Sin puesto"}</span><br>
          ${estadoUsuario(u)}<br>
          <button class="btn blue" onclick="vistaFichaUsuarioPro('${u.id}')">Abrir ficha</button>
        </div>
      `).join("")}
    </div>`;
}

function vistaAltaUsuarioPro(){
  if(!esAdmin()){
    alert("Solo admin puede crear usuarios.");
    return;
  }

  document.getElementById("app").innerHTML=`
    <div class="card">
      <button class="btn gray" onclick="vistaUsuariosPro()">← Usuarios</button>
      <h2>Alta de usuario</h2>
      <p>Al crear el usuario, la contraseña queda pendiente. El usuario la crea en su primer acceso.</p>

      <label>Nombre y apellidos</label>
      <input id="u_nombre" placeholder="Nombre y apellidos">

      <label>Usuario / login</label>
      <input id="u_usuario" placeholder="usuario">

      <label>Rol</label>
      <select id="u_rol">
        <option value="operario">Operario</option>
        <option value="encargado">Encargado</option>
        <option value="oficina">Oficina</option>
        <option value="admin">Administrador</option>
      </select>

      <label>Puesto / cargo real</label>
      <input id="u_puesto" placeholder="Instalador, oficial, ayudante, oficina...">

      <label>Teléfono</label>
      <input id="u_telefono" placeholder="Teléfono">

      <label>Email</label>
      <input id="u_email" placeholder="Email">

      <label>DNI</label>
      <input id="u_dni" placeholder="DNI">

      <label>Días de vacaciones anuales</label>
      <input id="u_vacaciones" type="number" value="22">

      <label>Asuntos propios anuales</label>
      <input id="u_asuntos" type="number" value="0">

      <button class="btn green full" onclick="guardarAltaUsuarioPro()">Crear usuario</button>
    </div>`;
}

function guardarAltaUsuarioPro(){
  const nombre=document.getElementById("u_nombre").value.trim();
  const usuarioLogin=document.getElementById("u_usuario").value.trim();
  const rol=document.getElementById("u_rol").value;
  const puesto=document.getElementById("u_puesto").value.trim();
  const telefono=document.getElementById("u_telefono").value.trim();
  const email=document.getElementById("u_email").value.trim();
  const dni=document.getElementById("u_dni").value.trim();
  const vacaciones=Number(document.getElementById("u_vacaciones").value||22);
  const asuntos=Number(document.getElementById("u_asuntos").value||0);

  if(!nombre||!usuarioLogin){
    alert("Nombre y usuario son obligatorios.");
    return;
  }

  const lista=leerUsuarios();

  if(lista.some(u=>u.usuario.toLowerCase()===usuarioLogin.toLowerCase())){
    alert("Ese usuario ya existe.");
    return;
  }

  const nuevo={
    id:"u_"+Date.now(),
    nombre,
    usuario:usuarioLogin,
    rol,
    puesto,
    telefono,
    email,
    dni,
    activo:true,
    password:"",
    password_pendiente:true,
    vacaciones,
    asuntos,
    creado:new Date().toISOString()
  };

  lista.push(nuevo);
  guardarUsuarios(lista);

  crearHorarioBaseLocal(nuevo.id);
  crearAvisosBaseLocal(nuevo.id);

  alert("Usuario creado. La contraseña queda pendiente.");
  vistaUsuariosPro();
}

function crearHorarioBaseLocal(uid){
  const dias=["domingo","lunes","martes","miércoles","jueves","viernes","sábado"];
  const horario=dias.map(d=>({
    dia:d,
    trabaja:["lunes","martes","miércoles","jueves","viernes"].includes(d),
    entrada:["lunes","martes","miércoles","jueves","viernes"].includes(d)?"08:00":"",
    salida:["lunes","martes","miércoles","jueves","viernes"].includes(d)?"17:00":"",
    inicio_comida:"",
    fin_comida:"",
    descanso_min:0
  }));
  localStorage.setItem("zentryx_horario_"+uid,JSON.stringify(horario));
}

function crearAvisosBaseLocal(uid){
  localStorage.setItem("zentryx_avisos_"+uid,JSON.stringify({
    activo:true,
    margen_entrada:10,
    salida_antes:10,
    max_comida:90,
    max_descanso:30
  }));
}

function vistaFichaUsuarioPro(id){
  const u=usuarioPorId(id);
  if(!u){
    alert("Usuario no encontrado.");
    return;
  }

  document.getElementById("app").innerHTML=`
    <div class="card">
      <button class="btn gray" onclick="vistaUsuariosPro()">← Usuarios</button>
      <h2>${u.nombre}</h2>
      <p>${u.usuario} · ${rolNombre(u.rol)}</p>
      <p>${u.puesto||"Sin puesto"}</p>
      ${estadoUsuario(u)}
    </div>

    <div class="card">
      <h2>Datos</h2>
      <p><b>Teléfono:</b> ${u.telefono||"-"}</p>
      <p><b>Email:</b> ${u.email||"-"}</p>
      <p><b>DNI:</b> ${u.dni||"-"}</p>
      <p><b>Vacaciones:</b> ${u.vacaciones??22}</p>
      <p><b>Asuntos propios:</b> ${u.asuntos??0}</p>
    </div>

    <div class="card">
      <h2>Seguridad</h2>
      <p><b>Contraseña:</b> ${u.password_pendiente?"Pendiente de crear":"Creada"}</p>
      ${esAdmin()?`
        <button class="btn gray full" onclick="resetPasswordUsuarioPro('${u.id}')">Resetear contraseña</button>
        <button class="btn blue full" onclick="simularPrimeraClave('${u.id}')">Crear contraseña de usuario</button>
      `:""}
    </div>

    ${esAdmin()?`
    <div class="card">
      <h2>Zona protegida</h2>
      <button class="btn blue full" onclick="vistaEditarUsuarioPro('${u.id}')">Editar usuario</button>
      <button class="btn orange full" onclick="toggleActivoUsuarioPro('${u.id}')">${u.activo?"Desactivar usuario":"Activar usuario"}</button>
      ${u.id!==user.id?`<button class="btn red full" onclick="eliminarUsuarioPro('${u.id}')">Eliminar usuario</button>`:""}
    </div>`:""}
  `;
}

function vistaEditarUsuarioPro(id){
  if(!pedirClaveAdmin()){
    alert("Contraseña incorrecta.");
    return;
  }

  const u=usuarioPorId(id);
  if(!u)return;

  document.getElementById("app").innerHTML=`
    <div class="card">
      <button class="btn gray" onclick="vistaFichaUsuarioPro('${u.id}')">← Ficha</button>
      <h2>Editar usuario</h2>

      <label>Nombre y apellidos</label>
      <input id="e_nombre" value="${u.nombre||""}">

      <label>Usuario / login</label>
      <input id="e_usuario" value="${u.usuario||""}">

      <label>Rol</label>
      <select id="e_rol">
        <option value="operario" ${u.rol==="operario"?"selected":""}>Operario</option>
        <option value="encargado" ${u.rol==="encargado"?"selected":""}>Encargado</option>
        <option value="oficina" ${u.rol==="oficina"?"selected":""}>Oficina</option>
        <option value="admin" ${u.rol==="admin"?"selected":""}>Administrador</option>
      </select>

      <label>Puesto / cargo real</label>
      <input id="e_puesto" value="${u.puesto||""}">

      <label>Teléfono</label>
      <input id="e_telefono" value="${u.telefono||""}">

      <label>Email</label>
      <input id="e_email" value="${u.email||""}">

      <label>DNI</label>
      <input id="e_dni" value="${u.dni||""}">

      <label>Días de vacaciones anuales</label>
      <input id="e_vacaciones" type="number" value="${u.vacaciones??22}">

      <label>Asuntos propios anuales</label>
      <input id="e_asuntos" type="number" value="${u.asuntos??0}">

      <button class="btn green full" onclick="guardarEdicionUsuarioPro('${u.id}')">Guardar cambios</button>
    </div>`;
}

function guardarEdicionUsuarioPro(id){
  const lista=leerUsuarios();
  const u=lista.find(x=>String(x.id)===String(id));
  if(!u)return;

  const nuevoUsuario=document.getElementById("e_usuario").value.trim();
  if(!document.getElementById("e_nombre").value.trim()||!nuevoUsuario){
    alert("Nombre y usuario son obligatorios.");
    return;
  }

  if(lista.some(x=>x.id!==id && x.usuario.toLowerCase()===nuevoUsuario.toLowerCase())){
    alert("Ese usuario ya existe.");
    return;
  }

  u.nombre=document.getElementById("e_nombre").value.trim();
  u.usuario=nuevoUsuario;
  u.rol=document.getElementById("e_rol").value;
  u.puesto=document.getElementById("e_puesto").value.trim();
  u.telefono=document.getElementById("e_telefono").value.trim();
  u.email=document.getElementById("e_email").value.trim();
  u.dni=document.getElementById("e_dni").value.trim();
  u.vacaciones=Number(document.getElementById("e_vacaciones").value||22);
  u.asuntos=Number(document.getElementById("e_asuntos").value||0);

  guardarUsuarios(lista);
  alert("Usuario guardado.");
  vistaFichaUsuarioPro(id);
}

function toggleActivoUsuarioPro(id){
  if(!pedirClaveAdmin()){
    alert("Contraseña incorrecta.");
    return;
  }

  const lista=leerUsuarios();
  const u=lista.find(x=>String(x.id)===String(id));
  if(!u)return;

  if(u.id===user.id){
    alert("No puedes desactivar el usuario actual.");
    return;
  }

  u.activo=!u.activo;
  guardarUsuarios(lista);
  vistaFichaUsuarioPro(id);
}

function resetPasswordUsuarioPro(id){
  if(!pedirClaveAdmin()){
    alert("Contraseña incorrecta.");
    return;
  }

  const lista=leerUsuarios();
  const u=lista.find(x=>String(x.id)===String(id));
  if(!u)return;

  u.password="";
  u.password_pendiente=true;
  guardarUsuarios(lista);
  alert("Contraseña reseteada. El usuario deberá crear una nueva.");
  vistaFichaUsuarioPro(id);
}

function simularPrimeraClave(id){
  const lista=leerUsuarios();
  const u=lista.find(x=>String(x.id)===String(id));
  if(!u)return;

  const p1=prompt("Nueva contraseña del usuario:");
  if(!p1)return;

  const p2=prompt("Repite la contraseña:");
  if(p1!==p2){
    alert("No coinciden.");
    return;
  }

  u.password=p1;
  u.password_pendiente=false;
  guardarUsuarios(lista);
  alert("Contraseña creada.");
  vistaFichaUsuarioPro(id);
}

function eliminarUsuarioPro(id){
  if(!pedirClaveAdmin()){
    alert("Contraseña incorrecta.");
    return;
  }

  if(id===user.id){
    alert("No puedes eliminar el usuario actual.");
    return;
  }

  const u=usuarioPorId(id);
  if(!u)return;

  if(!confirm("¿Eliminar a "+u.nombre+"?"))return;

  guardarUsuarios(leerUsuarios().filter(x=>String(x.id)!==String(id)));
  localStorage.removeItem("zentryx_horario_"+id);
  localStorage.removeItem("zentryx_avisos_"+id);
  localStorage.removeItem("zentryx_fichajes_"+id);
  alert("Usuario eliminado.");
  vistaUsuariosPro();
}

inicio();
</script>

</html>
