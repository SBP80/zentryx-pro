<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zentryx V2200</title>
<style>
body{margin:0;font-family:Arial;background:#eef2f7;color:#111827}
.top{background:#0f172a;color:white;padding:20px}
h1{margin:0}
.wrap{padding:16px}
.card{background:white;border-radius:12px;padding:16px;margin-bottom:12px}
.btn{padding:14px;border:none;border-radius:10px;font-weight:bold;margin:4px}
.big{width:100%;font-size:20px}
.green{background:#16a34a;color:white}
.red{background:#dc2626;color:white}
.blue{background:#2563eb;color:white}
.gray{background:#e5e7eb}
.badge{background:#e5e7eb;padding:6px 10px;border-radius:999px}
.row{border:1px solid #ccc;border-radius:10px;padding:10px;margin-bottom:10px}
select,input{width:100%;padding:14px;border-radius:10px;font-size:18px;margin-bottom:10px;border:1px solid #ccc;box-sizing:border-box}
</style>
</head>

<body>
<div class="top">
<h1>Zentryx V2200</h1>
<button class="btn red" onclick="salir()">Salir</button>
</div>

<div class="wrap" id="app"></div>

<script>
const URL="https://idtaamivqbiuxtjywuux.supabase.co";
const KEY="sb_publishable_ToDLKonbF2QnTXi56o1nfQ_10IdaPJx";

let user=null;
let panelFichaje=false;
let fichajes=[];
let ultimoFichaje=null;
let horas=[];

function api(p,o={}){
return fetch(URL+p,{
method:o.method||"GET",
headers:{
apikey:KEY,
Authorization:"Bearer "+KEY,
"Content-Type":"application/json",
...(o.headers||{})
},
body:o.body?JSON.stringify(o.body):undefined
}).then(async r=>{
const txt=await r.text();
let data=null;
try{data=txt?JSON.parse(txt):null}catch{data=txt}
if(!r.ok) throw new Error(txt||"Error Supabase");
return data;
});
}

function salir(){
localStorage.removeItem("usuario");
localStorage.removeItem("user");
location.href="./index.html?v=1000";
}

function cargarSesion(){
try{user=JSON.parse(localStorage.getItem("usuario"));}catch{user=null;}
if(!user){location.href="./index.html?v=1000";return false;}
return true;
}

function esAdmin(){
return user.rol==="admin" || user.rol==="administrativo";
}

function timeToMin(t){
const [h,m]=String(t||"00:00").split(":");
return Number(h||0)*60+Number(m||0);
}

function minutosDeFecha(f){
return f.getHours()*60+f.getMinutes();
}

function fechaISO(d){
return d.toISOString().split("T")[0];
}

async function cargarFichajes(){
fichajes=await api("/rest/v1/fichajes?select=*&user_id=eq."+encodeURIComponent(user.id)+"&order=fecha.desc&limit=10");
ultimoFichaje=fichajes.length?fichajes[0]:null;
}

async function cargarHoras(){
if(esAdmin()){
horas=await api("/rest/v1/horas_extra?select=*&estado=neq.pagadas&order=fecha.desc");
}else{
horas=await api("/rest/v1/horas_extra?select=*&user_id=eq."+encodeURIComponent(user.id)+"&estado=neq.pagadas&order=fecha.desc");
}
}

async function getConfig(){
const r=await api("/rest/v1/configuracion_horas_extra?select=*&id=eq.1&limit=1");
return r[0] || {
nocturna_inicio:"22:00",
nocturna_fin:"06:00",
prioridad_festivo:true,
redondeo_minutos:1,
minimo_minutos:0
};
}

async function esFestivo(fecha){
const f=fechaISO(fecha);
const r=await api("/rest/v1/calendario_festivos?select=*&fecha=eq."+encodeURIComponent(f)+"&limit=1");
return r.length>0;
}

function esNocturna(fecha,cfg){
const m=minutosDeFecha(fecha);
const ini=timeToMin(cfg.nocturna_inicio);
const fin=timeToMin(cfg.nocturna_fin);
if(ini>fin) return m>=ini || m<fin;
return m>=ini && m<fin;
}

function redondear(min,cfg){
let m=Math.max(0,Number(min||0));
const minimo=Number(cfg.minimo_minutos||0);
const redondeo=Number(cfg.redondeo_minutos||1);

if(m>0 && m<minimo) m=minimo;
if(redondeo>1) m=Math.ceil(m/redondeo)*redondeo;

return m;
}

async function elegirTipoHoraExtra(fecha,cfg){
const tipos=await api("/rest/v1/tipos_horas_extra?select=*&activo=eq.true");

function buscar(nombre){
return tipos.find(t=>String(t.nombre).toLowerCase()===nombre);
}

const festivo=await esFestivo(fecha);
const dia=fecha.getDay();
const finde=dia===0 || dia===6;
const nocturna=esNocturna(fecha,cfg);

if(cfg.prioridad_festivo && festivo && buscar("festiva")) return buscar("festiva");
if(festivo && buscar("festiva")) return buscar("festiva");
if(finde && buscar("fin de semana")) return buscar("fin de semana");
if(nocturna && buscar("nocturna")) return buscar("nocturna");

return buscar("normal") || tipos[0];
}

async function obtenerFichajeEntradaAbierta(){
const abiertos=await api(
"/rest/v1/fichajes?select=*&user_id=eq."+encodeURIComponent(user.id)+
"&tipo=eq.entrada&order=fecha.desc&limit=1"
);
return abiertos.length?abiertos[0]:null;
}

async function crearHoraExtraAutomatica(tipo,fichajeSalida){
if(tipo!=="salida") return;

const salida=new Date(fichajeSalida.fecha);
const dia=salida.getDay();
const cfg=await getConfig();

const horarios=await api(
"/rest/v1/horarios_usuario?select=*&user_id=eq."+encodeURIComponent(user.id)+
"&dia_semana=eq."+dia+"&limit=1"
);

const horario=horarios.length?horarios[0]:null;
let minutos=0;
let motivo="";

if(!horario || horario.trabaja===false){
const entrada=await obtenerFichajeEntradaAbierta();
if(entrada){
const entradaFecha=new Date(entrada.fecha);
minutos=Math.round((salida-entradaFecha)/60000);
motivo="Día no laboral: se computa la jornada fichada completa";
}else{
minutos=Number(cfg.minimo_minutos||60) || 60;
motivo="Día no laboral sin entrada localizada";
}
}else if(horario.hora_salida){
const salidaPlan=new Date(salida);
const salidaMin=timeToMin(horario.hora_salida);
salidaPlan.setHours(Math.floor(salidaMin/60),salidaMin%60,0,0);
minutos=Math.max(0,Math.round((salida-salidaPlan)/60000));
motivo="Salida posterior al horario previsto";
}

minutos=redondear(minutos,cfg);
if(minutos<=0) return;

const tipoHora=await elegirTipoHoraExtra(salida,cfg);
if(!tipoHora) return;

const precio=Number(tipoHora.precio||0);
const total=Number(((minutos/60)*precio).toFixed(2));

await api("/rest/v1/horas_extra",{
method:"POST",
headers:{"Prefer":"return=representation"},
body:{
user_id:String(user.id),
fichaje_id:fichajeSalida.id,
tipo_id:tipoHora.id,
minutos:minutos,
precio_unitario:precio,
total:total,
estado:"pendiente",
validado_usuario:false,
validado_admin:false,
admin_confirmo_pago:false,
usuario_confirmo_cobro:false,
motivo:motivo
}
});
}

function acciones(){
const e=ultimoFichaje?ultimoFichaje.tipo:"fuera";

if(!ultimoFichaje || e==="salida") return ["entrada"];
if(e==="entrada" || e==="fin_descanso" || e==="fin_comida") return ["inicio_descanso","inicio_comida","salida"];
if(e==="inicio_descanso") return ["fin_descanso"];
if(e==="inicio_comida") return ["fin_comida"];

return ["entrada"];
}

async function guardarFichaje(){
const tipo=document.getElementById("tipoFichaje").value;
const msg=document.getElementById("msgFichaje");
msg.innerHTML="Guardando...";

try{
const data=await api("/rest/v1/fichajes",{
method:"POST",
headers:{"Prefer":"return=representation"},
body:{
user_id:String(user.id),
tipo:tipo,
direccion:"Pendiente de ubicación"
}
});

const fichaje=Array.isArray(data)?data[0]:data;

await crearHoraExtraAutomatica(tipo,fichaje);

panelFichaje=false;
await pintarInicio();

}catch(e){
msg.innerHTML="Error: "+e.message;
}
}

async function pintarInicio(){
await cargarFichajes();
await cargarHoras();

const total=horas.reduce((s,h)=>s+Number(h.total||0),0);

document.getElementById("app").innerHTML=`
<div class="card">
<h2>${user.usuario}</h2>
<p>${user.nombre||""}</p>
</div>

<div class="card">
<h3>Fichaje rápido</h3>
<span class="badge">Estado: ${ultimoFichaje?ultimoFichaje.tipo:"fuera"}</span><br><br>
<button class="btn big green" onclick="toggleFichaje()">FICHAR</button>

${panelFichaje?`
<select id="tipoFichaje">
${acciones().map(a=>`<option value="${a}">${a}</option>`).join("")}
</select>
<button class="btn blue" onclick="guardarFichaje()">Guardar</button>
<div id="msgFichaje"></div>
`:""}
</div>

<div class="card">
<h3>Horas extra</h3>
<span class="badge">${total.toFixed(2)} € pendientes</span><br><br>
<button class="btn blue" onclick="pintarHoras()">Ver horas</button>
${esAdmin()?`<button class="btn gray" onclick="pintarConfig()">Config horas</button>`:""}
</div>

<div class="card">
<h3>Últimos fichajes</h3>
${fichajes.length?fichajes.map(f=>`
<div class="row">
<b>${f.tipo}</b><br>
${new Date(f.fecha).toLocaleString("es-ES")}<br>
${f.direccion||""}
</div>
`).join(""):"<p>No hay fichajes</p>"}
</div>
`;
}

function toggleFichaje(){
panelFichaje=!panelFichaje;
pintarInicio();
}

async function pintarHoras(){
await cargarHoras();

document.getElementById("app").innerHTML=`
<div class="card">
<button class="btn gray" onclick="pintarInicio()">← Volver</button>
<h2>Horas extra</h2>
</div>

${horas.length?horas.map(h=>`
<div class="card">
${h.minutos||0} min · ${Number(h.total||0).toFixed(2)} €<br>
Estado: ${h.estado||"pendiente"}<br>
${h.motivo?`<small>${h.motivo}</small><br>`:""}
${!h.validado_usuario ? `<button class="btn green" onclick="validarUsuario('${h.id}')">Validar</button>` : ""}
${esAdmin() && h.validado_usuario && !h.validado_admin ? `<button class="btn blue" onclick="validarAdmin('${h.id}')">Validar admin</button>` : ""}
${esAdmin() && h.validado_admin && !h.admin_confirmo_pago ? `<button class="btn blue" onclick="pagoAdmin('${h.id}')">Horas pagadas</button>` : ""}
${h.admin_confirmo_pago && !h.usuario_confirmo_cobro ? `<button class="btn green" onclick="cobroUsuario('${h.id}')">Horas cobradas</button>` : ""}
</div>
`).join(""):"<div class='card'>No hay horas extra pendientes.</div>"}
`;
}

async function validarUsuario(id){
await api("/rest/v1/horas_extra?id=eq."+encodeURIComponent(id),{
method:"PATCH",
headers:{"Prefer":"return=representation"},
body:{validado_usuario:true,estado:"pendiente_admin"}
});
await pintarHoras();
}

async function validarAdmin(id){
await api("/rest/v1/horas_extra?id=eq."+encodeURIComponent(id),{
method:"PATCH",
headers:{"Prefer":"return=representation"},
body:{validado_admin:true,estado:"validado_admin"}
});
await pintarHoras();
}

async function pagoAdmin(id){
await api("/rest/v1/horas_extra?id=eq."+encodeURIComponent(id),{
method:"PATCH",
headers:{"Prefer":"return=representation"},
body:{admin_confirmo_pago:true,fecha_admin_pago:new Date().toISOString()}
});
await pintarHoras();
}

async function cobroUsuario(id){
await api("/rest/v1/horas_extra?id=eq."+encodeURIComponent(id),{
method:"PATCH",
headers:{"Prefer":"return=representation"},
body:{usuario_confirmo_cobro:true,fecha_usuario_cobro:new Date().toISOString(),estado:"pagadas"}
});
await pintarHoras();
}

async function getConfig(){
const r=await api("/rest/v1/configuracion_horas_extra?select=*&id=eq.1&limit=1");
return r[0] || {};
}

async function pintarConfig(){
const c=await getConfig();

document.getElementById("app").innerHTML=`
<div class="card">
<button class="btn gray" onclick="pintarInicio()">← Volver</button>
<h2>Config horas extra</h2>

<label>Inicio nocturna</label>
<input id="ni" type="time" value="${c.nocturna_inicio||"22:00"}">

<label>Fin nocturna</label>
<input id="nf" type="time" value="${c.nocturna_fin||"06:00"}">

<label>Redondeo minutos</label>
<select id="rd">
<option value="1" ${Number(c.redondeo_minutos)===1?"selected":""}>Exacto</option>
<option value="15" ${Number(c.redondeo_minutos)===15?"selected":""}>15 min</option>
<option value="30" ${Number(c.redondeo_minutos)===30?"selected":""}>30 min</option>
<option value="60" ${Number(c.redondeo_minutos)===60?"selected":""}>60 min</option>
</select>

<label>Mínimo facturable</label>
<select id="min">
<option value="0" ${Number(c.minimo_minutos)===0?"selected":""}>Sin mínimo</option>
<option value="30" ${Number(c.minimo_minutos)===30?"selected":""}>30 min</option>
<option value="60" ${Number(c.minimo_minutos)===60?"selected":""}>60 min</option>
</select>

<button class="btn blue" onclick="guardarConfig()">Guardar</button>
<div id="msgConfig"></div>
</div>
`;
}

async function guardarConfig(){
await api("/rest/v1/configuracion_horas_extra?id=eq.1",{
method:"PATCH",
headers:{"Prefer":"return=representation"},
body:{
nocturna_inicio:document.getElementById("ni").value,
nocturna_fin:document.getElementById("nf").value,
redondeo_minutos:Number(document.getElementById("rd").value),
minimo_minutos:Number(document.getElementById("min").value),
actualizado_en:new Date().toISOString()
}
});
document.getElementById("msgConfig").innerHTML="Guardado.";
}

window.salir=salir;
window.toggleFichaje=toggleFichaje;
window.guardarFichaje=guardarFichaje;
window.pintarHoras=pintarHoras;
window.validarUsuario=validarUsuario;
window.validarAdmin=validarAdmin;
window.pagoAdmin=pagoAdmin;
window.cobroUsuario=cobroUsuario;
window.pintarConfig=pintarConfig;
window.guardarConfig=guardarConfig;

if(cargarSesion()){
pintarInicio();
}
</script>
</body>
</html>
