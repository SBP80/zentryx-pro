<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zentryx V1300</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>
body{font-family:sans-serif;background:#eef2f5;margin:0;padding:20px;}
.card{background:white;padding:20px;border-radius:15px;margin-bottom:20px;}
button{padding:10px 15px;border:none;border-radius:10px;margin:5px;}
.primary{background:#0b1f33;color:white;}
.danger{background:#e53935;color:white;}
.gray{background:#ddd;}
img{width:100px;height:100px;border-radius:50%;object-fit:cover;}
</style>
</head>

<body>

<div class="card">
<h2>Zentryx</h2>
<button onclick="logout()" class="danger">Salir</button>
</div>

<div class="card">
<h3>Foto usuario</h3>
<img id="foto" src="">
<input type="file" id="fileFoto">
<button onclick="subirFoto()" class="primary">Subir foto</button>
</div>

<div class="card">
<h3>Documentos</h3>
<input type="file" id="fileDoc">
<button onclick="subirDoc()" class="primary">Subir documento</button>
<div id="listaDocs"></div>
</div>

<div class="card">
<h3>Fichajes</h3>
<button onclick="fichar('entrada')" class="primary">Entrada</button>
<button onclick="fichar('salida')" class="danger">Salida</button>
<div id="historial"></div>
</div>

<script>
const SUPABASE_URL = "TU_URL";
const SUPABASE_KEY = "TU_PUBLIC_KEY";

const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const user = JSON.parse(localStorage.getItem("user"));

if(!user){ location.href="index.html"; }

// FOTO
async function subirFoto(){
    const file = document.getElementById("fileFoto").files[0];
    if(!file) return;

    const path = user.id + "_foto";

    await supabase.storage.from('usuarios').upload(path, file, {upsert:true});

    const { data } = supabase.storage.from('usuarios').getPublicUrl(path);

    await supabase.from("users").update({foto_url:data.publicUrl}).eq("id", user.id);

    cargarFoto();
}

async function cargarFoto(){
    const { data } = await supabase.from("users").select("foto_url").eq("id", user.id).single();
    if(data?.foto_url){
        document.getElementById("foto").src = data.foto_url;
    }
}

// DOCUMENTOS
async function subirDoc(){
    const file = document.getElementById("fileDoc").files[0];
    if(!file) return;

    const path = user.id + "_" + Date.now();

    await supabase.storage.from('usuarios').upload(path, file);

    const { data } = supabase.storage.from('usuarios').getPublicUrl(path);

    await supabase.from("documentos").insert({
        user_id:user.id,
        nombre:file.name,
        url:data.publicUrl
    });

    cargarDocs();
}

async function cargarDocs(){
    const { data } = await supabase.from("documentos").select("*").eq("user_id", user.id);

    let html="";
    data.forEach(d=>{
        html+=`
        <div>
            ${d.nombre}
            <a href="${d.url}" target="_blank">Ver</a>
            <button onclick="eliminarDoc('${d.id}','${d.url}')" class="danger">Eliminar</button>
        </div>`;
    });

    document.getElementById("listaDocs").innerHTML = html;
}

async function eliminarDoc(id,url){
    const path = url.split("/usuarios/")[1];

    await supabase.storage.from("usuarios").remove([path]);
    await supabase.from("documentos").delete().eq("id", id);

    cargarDocs();
}

// FICHAJES
async function fichar(tipo){
    await supabase.from("fichajes").insert({
        user_id:user.id,
        tipo:tipo
    });

    cargarFichajes();
}

async function cargarFichajes(){
    const { data } = await supabase.from("fichajes")
    .select("*")
    .eq("user_id", user.id)
    .order("fecha",{ascending:false});

    let html="";
    data.forEach(f=>{
        html+=`<div>${f.tipo} - ${new Date(f.fecha).toLocaleString()}</div>`;
    });

    document.getElementById("historial").innerHTML = html;
}

// LOGOUT
function logout(){
    localStorage.removeItem("user");
    location.href="index.html";
}

// INIT
cargarFoto();
cargarDocs();
cargarFichajes();

</script>

</body>
</html>
