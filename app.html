<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zentryx V2500</title>
<style>
body{margin:0;font-family:Arial;background:#eef2f7;color:#111827}
.top{background:#0f172a;color:white;padding:22px}
h1{margin:0;font-size:38px}
.wrap{padding:16px}
.card{background:white;border-radius:14px;padding:16px;margin-bottom:14px;border:1px solid #d1d5db}
.btn{padding:13px 15px;border:0;border-radius:10px;margin:4px;font-weight:bold;font-size:16px}
.big{width:100%;font-size:22px;padding:20px}
.green{background:#16a34a;color:white}.red{background:#dc2626;color:white}.blue{background:#2563eb;color:white}.gray{background:#e5e7eb}.orange{background:#f97316;color:white}.dark{background:#0f172a;color:white}
.badge{background:#e5e7eb;padding:7px 11px;border-radius:999px;font-weight:bold;display:inline-block}
.row{border:1px solid #ccc;border-radius:10px;padding:10px;margin-bottom:10px}
input,select{width:100%;padding:13px;border-radius:10px;border:1px solid #bbb;font-size:17px;margin:6px 0 12px 0;box-sizing:border-box}
table{width:100%;border-collapse:collapse;margin-top:10px}td,th{border:1px solid #ccc;padding:7px;text-align:left}
.muted{color:#6b7280}.error{color:#b91c1c;font-weight:bold}
@media print{.top,.no-print,.btn{display:none!important}.card{box-shadow:none;border:1px solid #999}}
</style>
</head>
<body>

<div class="top">
<h1>Zentryx V2500</h1>
<button class="btn red" onclick="salir()">Salir</button>
</div>

<div class="wrap" id="app">Cargando...</div>

<script>
const URL="https://idtaamivqbiuxtjywuux.supabase.co";
const KEY="sb_publishable_ToDLKonbF2QnTXi56o1nfQ_10IdaPJx";

let user=null,fichajes=[],ultimo=null,horas=[],usuarios=[],tipos=[],panel=false;

function api(p,o={}){
return fetch(URL+p,{method:o.method||"GET",headers:{apikey:KEY,Authorization:"Bearer "+KEY,"Content-Type":"application/json",...(o.headers||{})},body:o.body?JSON.stringify(o.body):undefined})
.then(async r=>{const t=await r.text();let d=null;try{d=t?JSON.parse(t):null}catch{d=t}if(!r.ok)throw new Error(t||"Error");return d;});
}
function esc(v){return String(v??"").replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;")}
function salir(){localStorage.removeItem("usuario");localStorage.removeItem("user");location.href="./index.html?v=1000"}
function sesion(){try{user=JSON.parse(localStorage.getItem("usuario"))}catch{user=null}if(!user){location.href="./index.html?v=1000";return false}return true}
function admin(){return user.rol==="admin"||user.rol==="administrativo"}
function mando(){return admin()||user.rol==="encargado"}

async function cargarBase(){
tipos=await api("/rest/v1/tipos_horas_extra?select=*");
if(mando()) usuarios=await api("/rest/v1/users?select=*&order=id.asc");
}
async function cargarFichajes(){
fichajes=await api("/rest/v1/fichajes?select=*&user_id=eq."+encodeURIComponent(user.id)+"&order=fecha.desc&limit=10");
ultimo=fichajes.length?fichajes[0]:null;
}
async function cargarHoras(){
let q="/rest/v1/horas_extra?select=*&estado=neq.pagadas&order=fecha.desc";
if(!mando()) q+="&user_id=eq."+encodeURIComponent(user.id);
horas=await api(q);
}
function nombreUsuario(id){const u=usuarios.find(x=>String(x.id)===String(id));return u?(u.nombre||u.usuario):id}
function nombreTipo(id){const t=tipos.find(x=>String(x.id)===String(id));return t?t.nombre:"Hora extra"}

function acciones(){
const e=ultimo?ultimo.tipo:"fuera";
if(!ultimo||e==="salida")return["entrada"];
if(["entrada","fin_descanso","fin_comida"].includes(e))return["inicio_descanso","inicio_comida","salida"];
if(e==="inicio_descanso")return["fin_descanso"];
if(e==="inicio_comida")return["fin_comida"];
return["entrada"];
}

async function inicio(){
await cargarBase();await cargarFichajes();await cargarHoras();
const total=horas.reduce((s,h)=>s+Number(h.total||0),0);
app.innerHTML=`
<div class="card"><h2>Inicio</h2><b>${esc(user.nombre||user.usuario)}</b><p class="muted">${esc(user.rol)} · ${esc(user.usuario)}</p></div>
<div class="card">
<h2>Fichaje rápido</h2><span class="badge">Estado: ${esc(ultimo?ultimo.tipo:"fuera")}</span><br><br>
<button class="btn big green" onclick="toggleFichaje()">FICHAR</button>
${panel?`<div class="card"><select id="tipoFichaje">${acciones().map(a=>`<option value="${a}">${a}</option>`).join("")}</select><button class="btn blue" onclick="guardarFichaje()">Guardar fichaje</button><div id="msg"></div></div>`:""}
</div>
<div class="card"><h2>Horas extra</h2><span class="badge">${total.toFixed(2)} € pendientes</span><br><br><button class="btn blue" onclick="vistaHoras()">Ver horas</button>${admin()?`<button class="btn gray" onclick="vistaConfig()">Ajustes horas</button>`:""}</div>
<div class="card"><h2>Informes</h2><button class="btn blue" onclick="vistaInformes()">Informes mensuales</button></div>
${mando()?`<div class="card"><h2>Usuarios</h2><button class="btn dark" onclick="vistaUsuarios()">Ver usuarios</button></div>`:""}
<div class="card"><h2>Últimos fichajes</h2>${fichajes.length?fichajes.map(f=>`<div class="row"><b>${esc(f.tipo)}</b><br>${new Date(f.fecha).toLocaleString("es-ES")}<br><span class="muted">${esc(f.direccion||"Sin ubicación")}</span></div>`).join(""):"No hay fichajes"}</div>`;
}
function toggleFichaje(){panel=!panel;inicio()}

function ubicacion(){return new Promise(r=>{if(!navigator.geolocation){r({lat:null,lng:null,direccion:"Sin ubicación"});return}navigator.geolocation.getCurrentPosition(p=>r({lat:p.coords.latitude,lng:p.coords.longitude,direccion:"Lat "+p.coords.latitude+", Lng "+p.coords.longitude}),()=>r({lat:null,lng:null,direccion:"Ubicación no autorizada"}),{enableHighAccuracy:true,timeout:10000})})}
function minHora(t){const [h,m]=String(t||"00:00").split(":");return Number(h||0)*60+Number(m||0)}
function minFecha(d){return d.getHours()*60+d.getMinutes()}
function iso(d){return d.toISOString().split("T")[0]}
async function config(){const r=await api("/rest/v1/configuracion_horas_extra?select=*&id=eq.1&limit=1");return r[0]||{nocturna_inicio:"22:00",nocturna_fin:"06:00",redondeo_minutos:1,minimo_minutos:0,prioridad_festivo:true}}
async function festivo(d){const r=await api("/rest/v1/calendario_festivos?select=*&fecha=eq."+encodeURIComponent(iso(d))+"&limit=1");return r.length>0}
function nocturna(d,c){const m=minFecha(d),i=minHora(c.nocturna_inicio),f=minHora(c.nocturna_fin);return i>f?m>=i||m<f:m>=i&&m<f}
function redondear(m,c){m=Math.max(0,Number(m||0));const min=Number(c.minimo_minutos||0),red=Number(c.redondeo_minutos||1);if(m>0&&m<min)m=min;if(red>1)m=Math.ceil(m/red)*red;return m}
async function tipoExtra(d,c){
const fs=await festivo(d),finde=[0,6].includes(d.getDay()),noc=nocturna(d,c);
function busca(n){return tipos.find(t=>String(t.nombre).toLowerCase()===n)}
if(c.prioridad_festivo&&fs&&busca("festiva"))return busca("festiva");
if(fs&&busca("festiva"))return busca("festiva");
if(finde&&busca("fin de semana"))return busca("fin de semana");
if(noc&&busca("nocturna"))return busca("nocturna");
return busca("normal")||tipos[0];
}
async function crearExtra(tipo,fichaje){
if(tipo!=="salida")return;
const salida=new Date(fichaje.fecha),dia=salida.getDay(),c=await config();
const hs=await api("/rest/v1/horarios_usuario?select=*&user_id=eq."+encodeURIComponent(user.id)+"&dia_semana=eq."+dia+"&limit=1");
const h=hs.length?hs[0]:null;let min=0,motivo="";
if(!h||h.trabaja===false){
const ent=await api("/rest/v1/fichajes?select=*&user_id=eq."+encodeURIComponent(user.id)+"&tipo=eq.entrada&order=fecha.desc&limit=1");
min=ent.length?Math.round((salida-new Date(ent[0].fecha))/60000):(Number(c.minimo_minutos||60)||60);
motivo="Día no laboral";
}else if(h.hora_salida){
const sp=new Date(salida),sm=minHora(h.hora_salida);sp.setHours(Math.floor(sm/60),sm%60,0,0);
min=Math.max(0,Math.round((salida-sp)/60000));motivo="Salida posterior al horario";
}
min=redondear(min,c);if(min<=0)return;
const t=await tipoExtra(salida,c);if(!t)return;
const precio=Number(t.precio||0),total=Number(((min/60)*precio).toFixed(2));
await api("/rest/v1/horas_extra",{method:"POST",headers:{"Prefer":"return=representation"},body:{user_id:String(user.id),fichaje_id:fichaje.id,tipo_id:t.id,minutos:min,precio_unitario:precio,total,estado:"pendiente",validado_usuario:false,validado_admin:false,admin_confirmo_pago:false,usuario_confirmo_cobro:false,motivo}});
}
async function guardarFichaje(){
const msg=document.getElementById("msg"),tipo=document.getElementById("tipoFichaje").value;msg.textContent="Guardando...";
try{const u=await ubicacion();const d=await api("/rest/v1/fichajes",{method:"POST",headers:{"Prefer":"return=representation"},body:{user_id:String(user.id),tipo,lat:u.lat,lng:u.lng,direccion:u.direccion}});await crearExtra(tipo,Array.isArray(d)?d[0]:d);panel=false;await inicio()}catch(e){msg.innerHTML="<span class='error'>"+esc(e.message)+"</span>"}}

async function cierreDeMes(mes,anio){
const r=await api("/rest/v1/cierre_mensual?select=*&mes=eq."+mes+"&anio=eq."+anio+"&cerrado=eq.true&limit=1");
return r.length?true:false;
}

function mesAnioDeFecha(fechaTxt){
const d=new Date(fechaTxt);
return {mes:d.getMonth()+1,anio:d.getFullYear()};
}

async function accionBloqueadaPorCierre(horaId){
const r=await api("/rest/v1/horas_extra?select=fecha,created_at&id=eq."+encodeURIComponent(horaId)+"&limit=1");
if(!r.length)return true;
const f=r[0].fecha||r[0].created_at;
const ma=mesAnioDeFecha(f);
return await cierreDeMes(ma.mes,ma.anio);
}

async function vistaHoras(){await cargarBase();await cargarHoras();app.innerHTML=`<div class="card no-print"><button class="btn gray" onclick="inicio()">← Volver</button><h2>Horas extra</h2></div>${horas.length?horas.map(h=>horaCard(h)).join(""):"<div class='card'>No hay horas extra pendientes.</div>"}`}
function horaCard(h){
return `<div class="card">${mando()?`<b>Trabajador:</b> ${esc(nombreUsuario(h.user_id))}<br>`:""}<b>${esc(nombreTipo(h.tipo_id))}</b><br>${Number(h.minutos||0)} min · ${Number(h.total||0).toFixed(2)} €<br><span class="muted">Estado: ${esc(h.estado||"pendiente")}</span><br>${h.motivo?`<small>${esc(h.motivo)}</small><br>`:""}${!h.validado_usuario&&String(user.id)===String(h.user_id)?`<button class="btn green" onclick="validarUsuario('${h.id}')">Validar</button>`:""}${admin()&&h.validado_usuario&&!h.validado_admin?`<button class="btn blue" onclick="validarAdmin('${h.id}')">Validar admin</button>`:""}${admin()&&h.validado_admin&&!h.admin_confirmo_pago?`<button class="btn orange" onclick="pagoAdmin('${h.id}')">Horas pagadas</button>`:""}${h.admin_confirmo_pago&&!h.usuario_confirmo_cobro&&String(user.id)===String(h.user_id)?`<button class="btn green" onclick="cobroUsuario('${h.id}')">Horas cobradas</button>`:""}</div>`;
}
async function patchHora(id,b){
if(await accionBloqueadaPorCierre(id)){alert("Mes cerrado. No se puede modificar.");return}
await api("/rest/v1/horas_extra?id=eq."+encodeURIComponent(id),{method:"PATCH",headers:{"Prefer":"return=representation"},body:b});
await vistaHoras();
}
function validarUsuario(id){patchHora(id,{validado_usuario:true,estado:"pendiente_admin"})}
function validarAdmin(id){patchHora(id,{validado_admin:true,estado:"validado_admin"})}
function pagoAdmin(id){patchHora(id,{admin_confirmo_pago:true,fecha_admin_pago:new Date().toISOString()})}
function cobroUsuario(id){patchHora(id,{usuario_confirmo_cobro:true,fecha_usuario_cobro:new Date().toISOString(),estado:"pagadas",pagada:true,fecha_pago:new Date().toISOString()})}

async function vistaConfig(){const c=await config();app.innerHTML=`<div class="card"><button class="btn gray" onclick="inicio()">← Volver</button><h2>Ajustes horas extra</h2><label>Inicio nocturna</label><input id="ni" type="time" value="${c.nocturna_inicio||"22:00"}"><label>Fin nocturna</label><input id="nf" type="time" value="${c.nocturna_fin||"06:00"}"><label>Redondeo</label><select id="rd"><option value="1">Exacto</option><option value="15">15 min</option><option value="30">30 min</option><option value="60">60 min</option></select><label>Mínimo</label><select id="mi"><option value="0">Sin mínimo</option><option value="30">30 min</option><option value="60">60 min</option></select><button class="btn blue" onclick="guardarConfig()">Guardar</button><div id="mc"></div></div>`;document.getElementById("rd").value=String(c.redondeo_minutos||1);document.getElementById("mi").value=String(c.minimo_minutos||0)}
async function guardarConfig(){await api("/rest/v1/configuracion_horas_extra?id=eq.1",{method:"PATCH",headers:{"Prefer":"return=representation"},body:{nocturna_inicio:ni.value,nocturna_fin:nf.value,redondeo_minutos:Number(rd.value),minimo_minutos:Number(mi.value),actualizado_en:new Date().toISOString()}});mc.textContent="Guardado"}

async function vistaUsuarios(){await cargarBase();app.innerHTML=`<div class="card"><button class="btn gray" onclick="inicio()">← Volver</button><h2>Usuarios</h2></div>${usuarios.map(u=>`<div class="card"><b>${esc(u.nombre||"-")}</b><br>${esc(u.usuario)} · ${esc(u.rol)}<br>${esc(u.telefono||"")}<br>${esc(u.email||"")}</div>`).join("")}`}

async function vistaInformes(){
const h=new Date();
app.innerHTML=`<div class="card no-print"><button class="btn gray" onclick="inicio()">← Volver</button><h2>Informes</h2><label>Mes</label><input id="mes" type="number" value="${h.getMonth()+1}"><label>Año</label><input id="anio" type="number" value="${h.getFullYear()}"><button class="btn blue" onclick="generarInforme()">Generar</button><button class="btn green" onclick="window.print()">Imprimir</button>${admin()?`<button class="btn red" onclick="cerrarMes()">Cerrar mes</button><button class="btn orange" onclick="reabrirMes()">Reabrir mes</button>`:""}</div><div id="res"></div>`;
}

async function generarInforme(){
await cargarBase();
const mes=String(document.getElementById("mes").value).padStart(2,"0"),anio=document.getElementById("anio").value,ini=`${anio}-${mes}-01`,fin=`${anio}-${mes}-31`;
let cerrado=await cierreDeMes(Number(mes),Number(anio));
let data=await api("/rest/v1/horas_extra?select=*&order=fecha.desc");
if(!mando())data=data.filter(h=>String(h.user_id)===String(user.id));
data=data.filter(h=>{const f=String(h.fecha||h.created_at||"");return !f||(f>=ini&&f<=fin)});
const porUser={};let total=0;
data.forEach(h=>{const u=String(h.user_id),t=nombreTipo(h.tipo_id);if(!porUser[u])porUser[u]={total:0,tipos:{}};if(!porUser[u].tipos[t])porUser[u].tipos[t]={min:0,eur:0};porUser[u].tipos[t].min+=Number(h.minutos||0);porUser[u].tipos[t].eur+=Number(h.total||0);porUser[u].total+=Number(h.total||0);total+=Number(h.total||0)});
let html=`<div class="card"><h2>Informe ${mes}/${anio}</h2><span class="badge">${cerrado?"MES CERRADO":"MES ABIERTO"}</span></div>`;
Object.keys(porUser).forEach(u=>{html+=`<div class="card"><h3>${esc(nombreUsuario(u))}</h3><table><tr><th>Tipo</th><th>Min</th><th>€</th></tr>`;Object.keys(porUser[u].tipos).forEach(t=>{const v=porUser[u].tipos[t];html+=`<tr><td>${esc(t)}</td><td>${v.min}</td><td>${v.eur.toFixed(2)}</td></tr>`});html+=`</table><br><b>Total usuario: ${porUser[u].total.toFixed(2)} €</b></div>`});
html+=`<div class="card"><h2>Total empresa: ${total.toFixed(2)} €</h2></div>`;
res.innerHTML=html;
}

async function cerrarMes(){
if(!admin())return;
const mes=Number(document.getElementById("mes").value),anio=Number(document.getElementById("anio").value);
if(await cierreDeMes(mes,anio)){alert("Ese mes ya está cerrado.");return}
if(!confirm("¿Cerrar mes y marcar horas como pagadas?"))return;
const mm=String(mes).padStart(2,"0"),ini=`${anio}-${mm}-01`,fin=`${anio}-${mm}-31`;
await api("/rest/v1/horas_extra?fecha=gte."+ini+"&fecha=lte."+fin,{method:"PATCH",headers:{"Prefer":"return=representation"},body:{estado:"pagadas",pagada:true,fecha_pago:new Date().toISOString(),validado_usuario:true,validado_admin:true,admin_confirmo_pago:true,usuario_confirmo_cobro:true}});
await api("/rest/v1/cierre_mensual",{method:"POST",headers:{"Prefer":"return=representation"},body:{mes,anio,cerrado:true,cerrado_por:String(user.id)}});
await generarInforme();
}

async function reabrirMes(){
if(!admin())return;
const mes=Number(document.getElementById("mes").value),anio=Number(document.getElementById("anio").value);
if(!confirm("¿Reabrir mes? Las horas quedarán pagadas, pero el mes dejará de estar bloqueado."))return;
await api("/rest/v1/cierre_mensual?mes=eq."+mes+"&anio=eq."+anio,{method:"PATCH",headers:{"Prefer":"return=representation"},body:{cerrado:false}});
await generarInforme();
}

window.salir=salir;window.toggleFichaje=toggleFichaje;window.guardarFichaje=guardarFichaje;window.vistaHoras=vistaHoras;window.validarUsuario=validarUsuario;window.validarAdmin=validarAdmin;window.pagoAdmin=pagoAdmin;window.cobroUsuario=cobroUsuario;window.vistaConfig=vistaConfig;window.guardarConfig=guardarConfig;window.vistaUsuarios=vistaUsuarios;window.vistaInformes=vistaInformes;window.generarInforme=generarInforme;window.cerrarMes=cerrarMes;window.reabrirMes=reabrirMes;window.inicio=inicio;
if(sesion())inicio();
</script>
</body>
</html>
