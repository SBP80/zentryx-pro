<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Zentryx APP V1000</title>
  <style>
    body{margin:0;font-family:Arial,sans-serif;background:#eef2f7;color:#111827;}
    .top{background:#0f172a;color:white;padding:24px 20px;}
    .version{color:#fb7185;font-size:30px;font-weight:900;margin-bottom:8px;}
    .top h1{margin:0;font-size:42px;}
    .top p{margin:8px 0 18px 0;font-size:19px;}
    .wrap{padding:20px;}
    .menu{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:20px;}
    .menu button{padding:14px 18px;border:none;border-radius:14px;background:#dbe0e8;color:#2563eb;font-size:18px;font-weight:900;}
    .card{background:white;border-radius:18px;padding:22px;margin-bottom:18px;box-shadow:0 10px 30px rgba(0,0,0,.07);border:1px solid #e5e7eb;}
    h2{margin-top:0;font-size:34px;}
    h3{font-size:26px;}
    input,select{width:100%;height:54px;box-sizing:border-box;padding:0 16px;border:1px solid #d1d5db;border-radius:14px;font-size:18px;margin-bottom:12px;background:white;}
    .btn{border:none;border-radius:14px;padding:14px 18px;font-size:18px;font-weight:900;margin:4px;}
    .btn-dark{background:#0f172a;color:white}.btn-red{background:#dc2626;color:white}.btn-gray{background:#e5e7eb;color:#111827}
    .item{border:1px solid #d1d5db;border-radius:16px;padding:16px;margin-bottom:12px;}
    .muted{color:#6b7280}.ok{color:#15803d;font-weight:900}.error{color:#b91c1c;font-weight:900}
    .acciones a{display:inline-block;text-decoration:none;color:#111827;background:#e5e7eb;padding:13px 16px;border-radius:14px;font-weight:900;margin:5px;font-size:18px;}
  </style>
</head>

<body>
<div id="app"></div>

<script>
const SUPABASE_URL = "https://idtaamivqbiuxtjywuux.supabase.co";
const SUPABASE_KEY = "sb_publishable_ToDLKonbF2QnTXi56o1nfQ_10IdaPJx";

const app = document.getElementById("app");

let usuarioSesion = null;
let usuarios = [];
let usuarioAbierto = null;

function escapar(v){
  return String(v ?? "")
    .replaceAll("&","&amp;")
    .replaceAll("<","&lt;")
    .replaceAll(">","&gt;")
    .replaceAll('"',"&quot;")
    .replaceAll("'","&#039;");
}

function sesion(){
  try{return JSON.parse(localStorage.getItem("usuario") || "null");}
  catch{return null;}
}

function cerrarSesion(){
  localStorage.removeItem("usuario");
  window.location.href = "./index.html?v=1000";
}

async function sha256(texto){
  const buffer = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(texto));
  return Array.from(new Uint8Array(buffer)).map(b => b.toString(16).padStart(2,"0")).join("");
}

async function api(path, opciones = {}){
  const res = await fetch(SUPABASE_URL + path, {
    method: opciones.method || "GET",
    headers: {
      "apikey": SUPABASE_KEY,
      "Authorization": "Bearer " + SUPABASE_KEY,
      "Content-Type": "application/json",
      ...(opciones.headers || {})
    },
    body: opciones.body ? JSON.stringify(opciones.body) : undefined
  });

  const texto = await res.text();
  let data = null;

  try{data = texto ? JSON.parse(texto) : null;}
  catch{data = texto;}

  if(!res.ok){
    throw new Error(typeof data === "string" ? data : JSON.stringify(data));
  }

  return data;
}

function pintarEstructura(){
  app.innerHTML = `
    <div class="top">
      <div class="version">APP V1000</div>
      <h1>Zentryx</h1>
      <p>${escapar(usuarioSesion.nombre)} · ${escapar(usuarioSesion.rol)}</p>
      <button class="btn btn-red" onclick="cerrarSesion()">Salir</button>
    </div>

    <div class="wrap">
      <div class="menu">
        <button onclick="mostrarInicio()">Inicio</button>
        ${usuarioSesion.rol === "admin" ? `<button onclick="mostrarUsuarios()">Usuarios</button>` : ""}
        ${usuarioSesion.rol === "admin" ? `<button onclick="mostrarConfig()">Configuración</button>` : ""}
      </div>
      <div id="contenido"></div>
    </div>
  `;
}

function mostrarInicio(){
  document.getElementById("contenido").innerHTML = `
    <div class="card">
      <h2>Inicio</h2>
      <p><b>Nombre:</b> ${escapar(usuarioSesion.nombre)}</p>
      <p><b>Usuario:</b> ${escapar(usuarioSesion.usuario)}</p>
      <p><b>Rol:</b> ${escapar(usuarioSesion.rol)}</p>
    </div>
  `;
}

function mostrarConfig(){
  document.getElementById("contenido").innerHTML = `
    <div class="card">
      <h2>Configuración</h2>
      <p>Módulo pendiente.</p>
    </div>
  `;
}

async function cargarUsuarios(){
  const data = await api("/rest/v1/users?select=*&order=id.asc");
  usuarios = Array.isArray(data) ? data : [];
}

function formularioNuevo(){
  return `
    <div class="card">
      <h2>Nuevo usuario</h2>

      <input id="nuevo_nombre" placeholder="Nombre">
      <input id="nuevo_usuario" placeholder="Usuario">
      <input id="nuevo_password" placeholder="Contraseña">

      <select id="nuevo_rol">
        <option value="operario">operario</option>
        <option value="admin">admin</option>
      </select>

      <input id="nuevo_telefono" placeholder="Teléfono">
      <input id="nuevo_email" placeholder="Email">
      <input id="nuevo_direccion" placeholder="Dirección">

      <button class="btn btn-dark" onclick="guardarUsuario()">Guardar usuario</button>
      <div id="msgNuevo" style="margin-top:12px;"></div>
    </div>
  `;
}

function listado(){
  if(usuarios.length === 0){
    return `<div class="card"><h2>Listado</h2><p>No hay usuarios.</p></div>`;
  }

  return `
    <div class="card">
      <h2>Listado</h2>
      ${usuarios.map(u => `
        <div class="item">
          <h3 style="margin:0 0 8px 0;">${escapar(u.nombre)}</h3>
          <div class="muted">Usuario: ${escapar(u.usuario)}</div>
          <div class="muted">Rol: ${escapar(u.rol)}</div>
          <div class="muted">Teléfono: ${escapar(u.telefono || "-")}</div>
          <div class="muted">Email: ${escapar(u.email || "-")}</div>

          <div style="margin-top:12px;">
            <button class="btn btn-gray" onclick="abrirFicha('${escapar(u.id)}')">Abrir ficha</button>
            ${String(u.usuario).toLowerCase() !== "admin" ? `
              <button class="btn btn-red" onclick="borrarUsuario('${escapar(u.id)}')">Eliminar</button>
            ` : ""}
          </div>
        </div>
      `).join("")}
    </div>
  `;
}

function fichaVacia(){
  return `<div class="card"><h2>Ficha de usuario</h2><p>Selecciona un usuario.</p></div>`;
}

function fichaUsuario(u){
  const tel = String(u.telefono || "").replaceAll(" ", "");
  const telWhatsapp = tel.replaceAll("+", "");
  const direccion = String(u.direccion || "").trim();

  return `
    <div class="card">
      <h2>Ficha de usuario</h2>

      <input id="edit_nombre" value="${escapar(u.nombre)}" placeholder="Nombre">
      <input id="edit_usuario" value="${escapar(u.usuario)}" placeholder="Usuario">
      <input id="edit_password" type="password" placeholder="Nueva contraseña (dejar vacío para no cambiar)">

      <select id="edit_rol">
        <option value="operario" ${u.rol === "operario" ? "selected" : ""}>operario</option>
        <option value="admin" ${u.rol === "admin" ? "selected" : ""}>admin</option>
      </select>

      <input id="edit_telefono" value="${escapar(u.telefono || "")}" placeholder="Teléfono">
      <input id="edit_email" value="${escapar(u.email || "")}" placeholder="Email">
      <input id="edit_direccion" value="${escapar(u.direccion || "")}" placeholder="Dirección">

      <button class="btn btn-dark" onclick="guardarCambios()">Guardar cambios</button>
      <div id="msgEditar" style="margin-top:12px;"></div>

      <hr style="margin:22px 0;">

      <h2>Acciones rápidas</h2>
      <div class="acciones">
        ${tel ? `<a href="tel:${encodeURIComponent(tel)}">Llamar</a>` : ""}
        ${tel ? `<a href="sms:${encodeURIComponent(tel)}">SMS</a>` : ""}
        ${tel ? `<a target="_blank" href="https://wa.me/${encodeURIComponent(telWhatsapp)}">WhatsApp</a>` : ""}
        ${u.email ? `<a href="mailto:${encodeURIComponent(u.email)}">Email</a>` : ""}
        ${direccion ? `<a target="_blank" href="https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(direccion)}">Google Maps</a>` : ""}
        ${direccion ? `<a target="_blank" href="https://waze.com/ul?q=${encodeURIComponent(direccion)}&navigate=yes">Waze</a>` : ""}
        ${direccion ? `<a target="_blank" href="https://maps.apple.com/?q=${encodeURIComponent(direccion)}">Mapas Apple</a>` : ""}
      </div>
    </div>
  `;
}

async function mostrarUsuarios(){
  const contenido = document.getElementById("contenido");
  contenido.innerHTML = `<div class="card">Cargando usuarios...</div>`;

  try{
    await cargarUsuarios();
    contenido.innerHTML = `
      ${formularioNuevo()}
      ${listado()}
      <div id="ficha">${usuarioAbierto ? fichaUsuario(usuarioAbierto) : fichaVacia()}</div>
    `;
  }catch(e){
    contenido.innerHTML = `
      <div class="card">
        <h2>Usuarios</h2>
        <div class="error">Error cargando usuarios: ${escapar(e.message)}</div>
      </div>
    `;
  }
}

async function guardarUsuario(){
  const msg = document.getElementById("msgNuevo");

  const passwordPlano = document.getElementById("nuevo_password").value.trim();

  const nuevo = {
    nombre: document.getElementById("nuevo_nombre").value.trim(),
    usuario: document.getElementById("nuevo_usuario").value.trim().toLowerCase(),
    password: passwordPlano ? await sha256(passwordPlano) : "",
    rol: document.getElementById("nuevo_rol").value.trim(),
    telefono: document.getElementById("nuevo_telefono").value.trim(),
    email: document.getElementById("nuevo_email").value.trim(),
    direccion: document.getElementById("nuevo_direccion").value.trim()
  };

  msg.className = "error";
  msg.textContent = "";

  if(!nuevo.nombre || !nuevo.usuario || !passwordPlano || !nuevo.rol){
    msg.textContent = "Nombre, usuario, contraseña y rol son obligatorios.";
    return;
  }

  const repetido = usuarios.some(u => String(u.usuario).toLowerCase() === nuevo.usuario);
  if(repetido){
    msg.textContent = "Ese usuario ya existe.";
    return;
  }

  try{
    await api("/rest/v1/users", {
      method: "POST",
      headers: {"Prefer":"return=representation"},
      body: nuevo
    });

    usuarioAbierto = null;
    await mostrarUsuarios();

  }catch(e){
    msg.textContent = "Error guardando usuario: " + e.message;
  }
}

function abrirFicha(id){
  const u = usuarios.find(x => String(x.id) === String(id));
  if(!u) return;

  usuarioAbierto = u;
  document.getElementById("ficha").innerHTML = fichaUsuario(u);
  window.scrollTo({top: document.body.scrollHeight, behavior:"smooth"});
}

async function guardarCambios(){
  if(!usuarioAbierto) return;

  const msg = document.getElementById("msgEditar");
  const nuevaPassword = document.getElementById("edit_password").value.trim();

  const editado = {
    nombre: document.getElementById("edit_nombre").value.trim(),
    usuario: document.getElementById("edit_usuario").value.trim().toLowerCase(),
    rol: document.getElementById("edit_rol").value.trim(),
    telefono: document.getElementById("edit_telefono").value.trim(),
    email: document.getElementById("edit_email").value.trim(),
    direccion: document.getElementById("edit_direccion").value.trim()
  };

  if(nuevaPassword){
    editado.password = await sha256(nuevaPassword);
  }

  msg.className = "error";
  msg.textContent = "";

  if(!editado.nombre || !editado.usuario || !editado.rol){
    msg.textContent = "Nombre, usuario y rol son obligatorios.";
    return;
  }

  const repetido = usuarios.some(u =>
    String(u.id) !== String(usuarioAbierto.id) &&
    String(u.usuario).toLowerCase() === editado.usuario
  );

  if(repetido){
    msg.textContent = "Ese usuario ya existe.";
    return;
  }

  try{
    await api("/rest/v1/users?id=eq." + encodeURIComponent(usuarioAbierto.id), {
      method: "PATCH",
      headers: {"Prefer":"return=representation"},
      body: editado
    });

    usuarioAbierto = {...usuarioAbierto, ...editado};

    if(String(usuarioSesion.id) === String(usuarioAbierto.id)){
      localStorage.setItem("usuario", JSON.stringify(usuarioAbierto));
      usuarioSesion = usuarioAbierto;
    }

    msg.className = "ok";
    msg.textContent = "Cambios guardados.";

    await cargarUsuarios();
    await mostrarUsuarios();
    abrirFicha(usuarioAbierto.id);

  }catch(e){
    msg.textContent = "Error guardando cambios: " + e.message;
  }
}

async function borrarUsuario(id){
  const u = usuarios.find(x => String(x.id) === String(id));
  if(!u) return;

  if(String(u.usuario).toLowerCase() === "admin"){
    alert("No se puede borrar admin.");
    return;
  }

  if(!confirm("¿Eliminar este usuario?")) return;

  try{
    await api("/rest/v1/users?id=eq." + encodeURIComponent(id), {method:"DELETE"});
    usuarioAbierto = null;
    await mostrarUsuarios();
  }catch(e){
    alert("Error borrando usuario: " + e.message);
  }
}

function iniciar(){
  usuarioSesion = sesion();

  if(!usuarioSesion){
    window.location.href = "./index.html?v=1000";
    return;
  }

  pintarEstructura();
  mostrarInicio();
}

window.cerrarSesion = cerrarSesion;
window.mostrarInicio = mostrarInicio;
window.mostrarUsuarios = mostrarUsuarios;
window.mostrarConfig = mostrarConfig;
window.guardarUsuario = guardarUsuario;
window.abrirFicha = abrirFicha;
window.guardarCambios = guardarCambios;
window.borrarUsuario = borrarUsuario;

iniciar();
</script>

</body>
</html>
