<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zentryx APP V1801</title>

<style>
body{margin:0;font-family:Arial,sans-serif;background:#eef2f7;color:#111827;}
.top{background:#0f172a;color:white;padding:28px 20px;}
.version{color:#fb7185;font-size:28px;font-weight:900;margin-bottom:8px;}
.top h1{margin:0;font-size:38px;}
.wrap{padding:20px;}
.card{background:white;border-radius:16px;padding:18px;margin-bottom:16px;border:1px solid #e5e7eb;}
.btn{border:none;border-radius:12px;padding:12px 16px;font-size:16px;font-weight:700;margin:4px;}
.btn-dark{background:#0f172a;color:white;}
.btn-red{background:#dc2626;color:white;}
.btn-gray{background:#e5e7eb;}
.btn-green{background:#16a34a;color:white;}
.btn-blue{background:#2563eb;color:white;}
.btn-orange{background:#f97316;color:white;}
.badge{background:#e5e7eb;border-radius:999px;padding:6px 10px;font-weight:700;}
.row{border:1px solid #d1d5db;border-radius:12px;padding:12px;margin-bottom:10px;}
</style>
</head>

<body>

<div class="top">
  <div class="version">APP V1801</div>
  <h1>Zentryx</h1>
</div>

<div class="wrap" id="app">Cargando...</div>

<script>
const URL="https://idtaamivqbiuxtjywuux.supabase.co";
const KEY="sb_publishable_ToDLKonbF2QnTXi56o1nfQ_10IdaPJx";

let usuarioReal=null;
let usuarioAbierto=null;
let horas=[]; let tipos=[];

function api(path,opt={}){
 return fetch(URL+path,{
  method:opt.method||"GET",
  headers:{
   "apikey":KEY,
   "Authorization":"Bearer "+KEY,
   "Content-Type":"application/json"
  },
  body:opt.body?JSON.stringify(opt.body):undefined
 }).then(r=>r.json());
}

function esc(v){return v||"";}

async function inicio(){
 let u=JSON.parse(localStorage.getItem("usuario")||"null");
 if(!u){document.getElementById("app").innerHTML="No hay sesión";return;}
 usuarioReal=u;
 await cargarHoras();
}

async function cargarHoras(){
 horas=await api("/rest/v1/horas_extra?select=*&user_id=eq."+usuarioReal.id);
 tipos=await api("/rest/v1/tipos_horas_extra?select=*");
 pintar();
}

function pintar(){

 let pendientes=horas.filter(h=>h.estado!=="pagadas");
 let total=pendientes.reduce((s,h)=>s+Number(h.total||0),0);

 document.getElementById("app").innerHTML=`
 <div class="card">
  <h2>Horas extra</h2>
  <span class="badge">Pendiente: ${total.toFixed(2)} €</span>
 </div>

 ${pendientes.map(h=>{
   let t=tipos.find(x=>x.id===h.tipo_id);
   return `
   <div class="row">
    <b>${esc(t?.nombre)}</b><br>
    ${h.minutos} min · ${Number(h.total).toFixed(2)} €<br>

    Estado: ${h.estado}<br>

    ${
      usuarioReal.id==h.user_id && !h.validado_usuario
      ? `<button class="btn btn-green" onclick="validarUsuario('${h.id}')">Validar</button>`:""
    }

    ${
      usuarioReal.rol==="admin" && h.validado_usuario && !h.validado_admin
      ? `<button class="btn btn-blue" onclick="validarAdmin('${h.id}')">Validar admin</button>`:""
    }

    ${
      usuarioReal.rol==="admin" && h.validado_admin && !h.admin_confirmo_pago
      ? `<button class="btn btn-orange" onclick="pagoAdmin('${h.id}')">Horas pagadas</button>`:""
    }

    ${
      usuarioReal.id==h.user_id && h.admin_confirmo_pago && !h.usuario_confirmo_cobro
      ? `<button class="btn btn-dark" onclick="cobroUsuario('${h.id}')">Horas cobradas</button>`:""
    }

   </div>
   `;
 }).join("")}
 `;
}

async function validarUsuario(id){
 await api("/rest/v1/horas_extra?id=eq."+id,{
  method:"PATCH",
  body:{validado_usuario:true,estado:"pendiente_admin"}
 });
 await cargarHoras();
}

async function validarAdmin(id){
 await api("/rest/v1/horas_extra?id=eq."+id,{
  method:"PATCH",
  body:{validado_admin:true,estado:"validado_admin"}
 });
 await cargarHoras();
}

async function pagoAdmin(id){
 await api("/rest/v1/horas_extra?id=eq."+id,{
  method:"PATCH",
  body:{admin_confirmo_pago:true}
 });
 await cargarHoras();
}

async function cobroUsuario(id){
 await api("/rest/v1/horas_extra?id=eq."+id,{
  method:"PATCH",
  body:{usuario_confirmo_cobro:true,estado:"pagadas"}
 });
 await cargarHoras();
}

inicio();
</script>

</body>
</html>
