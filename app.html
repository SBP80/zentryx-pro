<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zentryx V2515</title>

<style>
body{margin:0;font-family:Arial;background:#eef2f7}
.top{background:#0f172a;color:#fff;padding:20px}
.wrap{padding:15px}
.card{background:#fff;border-radius:12px;padding:15px;margin-bottom:12px}
.btn{padding:12px;border-radius:10px;border:0;margin:5px;font-weight:bold}
.green{background:#16a34a;color:#fff}
.blue{background:#2563eb;color:#fff}
.red{background:#dc2626;color:#fff}
.gray{background:#e5e7eb}
.badge{background:#e5e7eb;padding:6px 10px;border-radius:999px}
input,select{width:100%;padding:10px;border-radius:8px;border:1px solid #ccc;margin:5px 0}
.row{border:1px solid #ccc;padding:10px;border-radius:10px;margin-bottom:8px}
</style>
</head>

<body>

<div class="top">
<h1>Zentryx V2515</h1>
<button class="btn red" onclick="salir()">Salir</button>
</div>

<div class="wrap" id="app"></div>

<script>
const URL="https://idtaamivqbiuxtjywuux.supabase.co";
const KEY="sb_publishable_ToDLKonbF2QnTXi56o1nfQ_10IdaPJx";

let user=JSON.parse(localStorage.getItem("usuario"));

function salir(){
localStorage.clear();
location.href="index.html";
}

async function api(p,o={}){
return fetch(URL+p,{
method:o.method||"GET",
headers:{
apikey:KEY,
Authorization:"Bearer "+KEY,
"Content-Type":"application/json"
},
body:o.body?JSON.stringify(o.body):undefined
}).then(r=>r.json());
}

/* =========================
   GEO DIRECCIÓN REAL
========================= */

async function direccionReal(lat,lng){
try{
let r=await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lng}`);
let d=await r.json();
return d.display_name || "Sin dirección";
}catch{
return "Sin dirección";
}
}

/* =========================
   MAPAS
========================= */

function abrirMapa(lat,lng){
let url=prompt("1 Google Maps\n2 Apple Maps\n3 Waze");
if(url==="1")window.open(`https://www.google.com/maps?q=${lat},${lng}`);
if(url==="2")window.open(`http://maps.apple.com/?ll=${lat},${lng}`);
if(url==="3")window.open(`https://waze.com/ul?ll=${lat},${lng}&navigate=yes`);
}

/* =========================
   CONTACTO
========================= */

function llamar(tel){
window.location.href="tel:"+tel;
}

function whatsapp(tel){
window.open(`https://wa.me/${tel}`);
}

function email(mail){
window.location.href="mailto:"+mail;
}

/* =========================
   FICHAJE
========================= */

async function fichar(tipo){

navigator.geolocation.getCurrentPosition(async pos=>{
let lat=pos.coords.latitude;
let lng=pos.coords.longitude;

let dir=await direccionReal(lat,lng);

await api("/rest/v1/fichajes",{
method:"POST",
body:{
user_id:user.id,
tipo,
lat,lng,
direccion:dir
}
});

inicio();
});
}

/* =========================
   HORAS EXTRA VALIDAR FIX
========================= */

async function validar(id){
await api("/rest/v1/horas_extra?id=eq."+id,{
method:"PATCH",
body:{
validado_usuario:true,
estado:"pendiente_admin"
}
});
vistaHoras();
}

/* =========================
   EDITAR FICHAJE PRO
========================= */

function editarFichaje(id){

document.getElementById("app").innerHTML=`
<div class="card">
<h3>Editar fichaje</h3>

<label>Fecha</label>
<input type="date" id="f">

<label>Hora</label>
<input type="time" id="h">

<label>Motivo</label>
<input id="m">

<button class="btn blue" onclick="guardarEdit('${id}')">Guardar</button>
<button class="btn gray" onclick="inicio()">Cancelar</button>
</div>
`;
}

async function guardarEdit(id){
let f=document.getElementById("f").value;
let h=document.getElementById("h").value;
let m=document.getElementById("m").value;

let fecha=new Date(f+"T"+h);

await api("/rest/v1/fichajes?id=eq."+id,{
method:"PATCH",
body:{
fecha:fecha,
modificado:true,
motivo_modificacion:m
}
});

inicio();
}

/* =========================
   HORAS
========================= */

async function vistaHoras(){
let h=await api("/rest/v1/horas_extra");

document.getElementById("app").innerHTML=`
<div class="card">
<button onclick="inicio()">Volver</button>
<h2>Horas</h2>
</div>

${h.map(x=>`
<div class="card">
${x.total} €

<button class="btn green" onclick="validar('${x.id}')">Validar</button>
</div>
`).join("")}
`;
}

/* =========================
   USUARIOS
========================= */

async function vistaUsuarios(){
let u=await api("/rest/v1/users");

document.getElementById("app").innerHTML=`
<div class="card">
<button onclick="inicio()">Volver</button>
<h2>Usuarios</h2>
</div>

${u.map(x=>`
<div class="card">
<b>${x.nombre}</b><br>

<button onclick="llamar('${x.telefono}')">📞</button>
<button onclick="whatsapp('${x.telefono}')">💬</button>
<button onclick="email('${x.email}')">✉️</button>

</div>
`).join("")}
`;
}

/* =========================
   INICIO
========================= */

async function inicio(){

let f=await api("/rest/v1/fichajes?order=fecha.desc&limit=5");

document.getElementById("app").innerHTML=`
<div class="card">
<b>${user.nombre}</b>
</div>

<div class="card">
<h2>Fichaje</h2>

<button class="btn green" onclick="fichar('entrada')">Entrada</button>
<button class="btn gray" onclick="fichar('inicio_descanso')">Descanso</button>
<button class="btn gray" onclick="fichar('inicio_comida')">Comida</button>
<button class="btn red" onclick="fichar('salida')">Salida</button>

</div>

<div class="card">
<button class="btn blue" onclick="vistaHoras()">Horas</button>
<button class="btn gray" onclick="vistaUsuarios()">Usuarios</button>
</div>

<div class="card">
<h3>Fichajes</h3>

${f.map(x=>`
<div class="row">
${x.tipo}<br>
${new Date(x.fecha).toLocaleString()}<br>
${x.direccion || ""}
<br>
<button onclick="abrirMapa(${x.lat},${x.lng})">Mapa</button>
<button onclick="editarFichaje('${x.id}')">Editar</button>
</div>
`).join("")}
</div>
`;
}

inicio();
</script>

</body>
</html>
