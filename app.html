<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<title>Zentryx V1601</title>

<style>
body{font-family:Arial;margin:0;background:#eef2f7;}
.top{background:#0f172a;color:#fff;padding:20px;}
.wrap{padding:20px;}
.card{background:#fff;padding:20px;border-radius:14px;margin-bottom:15px;}
.btn{padding:12px;border:none;border-radius:10px;margin:4px;font-weight:700;}
.btn-dark{background:#111;color:#fff}
.btn-gray{background:#ddd}
.btn-red{background:#dc2626;color:#fff}
</style>
</head>

<body>

<div class="top">
<h2>Zentryx</h2>
<button class="btn btn-red" onclick="volver()">Volver</button>
</div>

<div class="wrap" id="app"></div>

<script>

// 🔴 CONFIGURA ESTO
const supabase = window.supabase.createClient(
  "TU_URL_SUPABASE",
  "TU_PUBLIC_KEY"
)

let usuarios = []
let usuarioActual = null

// 🔵 CARGAR USUARIOS
async function cargarUsuarios(){

  const { data, error } = await supabase
    .from("users")
    .select("*")

  if(error){
    document.getElementById("app").innerHTML = "Error cargando usuarios"
    return
  }

  usuarios = data
  renderListado()
}

// 🔵 LISTADO
function renderListado(){

  document.getElementById("app").innerHTML = `
    <div class="card">
      <h3>Usuarios</h3>
      ${usuarios.map(u=>`
        <div class="card">
          <b>${u.nombre}</b><br>
          ${u.usuario}<br>
          ${u.rol}<br>
          <button class="btn btn-dark" onclick="abrirUsuario(${u.id})">Abrir</button>
        </div>
      `).join("")}
    </div>
  `
}

// 🔵 ABRIR USUARIO
function abrirUsuario(id){

  usuarioActual = usuarios.find(u => u.id === id)

  document.getElementById("app").innerHTML = `
    <div class="card">
      <h2>${usuarioActual.nombre}</h2>
      <p>Usuario: ${usuarioActual.usuario}</p>
      <p>Rol: ${usuarioActual.rol}</p>
    </div>
  `
}

// 🔵 VOLVER
function volver(){
  usuarioActual = null
  renderListado()
}

// 🔵 INICIO
cargarUsuarios()

</script>

</body>
</html>
