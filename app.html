<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zentryx V2508</title>

<style>
body{margin:0;font-family:Arial;background:#eef2f7;color:#111827}
.top{background:#0f172a;color:white;padding:20px}
.wrap{padding:16px}
.card{background:white;border-radius:12px;padding:16px;margin-bottom:12px}
.btn{padding:12px;border:none;border-radius:8px;margin:4px;font-weight:bold}
.green{background:#16a34a;color:white}
.blue{background:#2563eb;color:white}
.gray{background:#e5e7eb}
.red{background:#dc2626;color:white}
.badge{background:#e5e7eb;padding:6px 10px;border-radius:999px}
select{width:100%;padding:10px;margin-top:10px}
</style>
</head>

<body>

<div class="top">
<h2>Zentryx V2508</h2>
<button class="btn gray" onclick="salir()">Salir</button>
</div>

<div class="wrap" id="app"></div>

<script>
const URL="https://idtaamivqbiuxtjywuux.supabase.co";
const KEY="sb_publishable_ToDLKonbF2QnTXi56o1nfQ_10IdaPJx";

let user=null;
let ultimo=null;
let horarios=[];

// ================= BASE =================
function api(p,o={}){
return fetch(URL+p,{
method:o.method||"GET",
headers:{
apikey:KEY,
Authorization:"Bearer "+KEY,
"Content-Type":"application/json"
},
body:o.body?JSON.stringify(o.body):undefined
}).then(r=>r.json());
}

function salir(){
localStorage.removeItem("usuario");
location.href="./index.html";
}

function sesion(){
user=JSON.parse(localStorage.getItem("usuario"));
if(!user){location.href="./index.html";return false}
return true;
}

// ================= INICIO =================
async function inicio(){

await cargarEstado();

app.innerHTML=`
<div class="card">
<h2>${user.nombre||user.usuario}</h2>
<p>${user.rol}</p>
</div>

<div class="card">
<b>Estado actual:</b><br>
<span class="badge">${ultimo?ultimo.tipo:"FUERA"}</span>
</div>

<div class="card">
<button class="btn green" onclick="abrirFichaje()">FICHAR</button>
</div>

<div id="panel"></div>
`;
}

// ================= ESTADO =================
async function cargarEstado(){

let fichajes=await api("/rest/v1/fichajes?select=*&user_id=eq."+user.id+"&order=fecha.desc&limit=1");
ultimo=fichajes[0]||null;

horarios=await api("/rest/v1/horarios_usuario?select=*&user_id=eq."+user.id);
}

// ================= LOGICA =================
function opciones(){

if(!ultimo) return ["entrada"];

switch(ultimo.tipo){

case "entrada":
case "fin_descanso":
case "fin_comida":
return ["inicio_descanso","inicio_comida","salida"];

case "inicio_descanso":
return ["fin_descanso"];

case "inicio_comida":
return ["fin_comida"];

case "salida":
return ["entrada"];
}

return ["entrada"];
}

// ================= UI =================
function abrirFichaje(){

let ops=opciones();

panel.innerHTML=`
<div class="card">
<select id="tipo">
${ops.map(o=>`<option>${o}</option>`).join("")}
</select>

<button class="btn blue" onclick="fichar()">Confirmar</button>
<div id="msg"></div>
</div>
`;
}

// ================= VALIDACION =================
function validar(tipo){

if(!ultimo && tipo!=="entrada") return "Debes fichar entrada primero";

if(ultimo?.tipo==="entrada" && tipo==="entrada") return "Ya estás dentro";

if(ultimo?.tipo==="salida" && tipo!=="entrada") return "Primero entrada";

if(ultimo?.tipo==="inicio_descanso" && tipo!=="fin_descanso")
return "Debes cerrar descanso";

if(ultimo?.tipo==="inicio_comida" && tipo!=="fin_comida")
return "Debes cerrar comida";

return null;
}

// ================= FICHAJE =================
async function fichar(){

let tipo=document.getElementById("tipo").value;
let error=validar(tipo);

if(error){
msg.innerHTML="<span style='color:red'>"+error+"</span>";
return;
}

msg.innerText="Guardando...";

await api("/rest/v1/fichajes",{
method:"POST",
body:{
user_id:user.id,
tipo:tipo,
fecha:new Date().toISOString()
}
});

msg.innerText="OK";

await inicio();
}

// ================= INIT =================
if(sesion()){
inicio();
}
</script>

</body>
</html>
