<!DOCTYPE html>

<style>
body{margin:0;font-family:Arial;background:#eef2f7;color:#111827}

h1{margin:0;font-size:38px}

.badge{background:#e5e7eb;padding:7px 11px;border-radius:999px;font-weight:bold;display:inline-block}

<body>

<div class="top">
<h1>Zentryx V2514</h1>
<button class="btn red" onclick="salir()">Salir</button>
</div>

<div class="wrap" id="app">Cargando...</div>

<script>
const URL="https://idtaamivqbiuxtjywuux.supabase.co";
const KEY="sb_publishable_ToDLKonbF2QnTXi56o1nfQ_10IdaPJx";
const BUCKET="usuarios";

let user=null,fichajes=[],ultimo=null,horas=[],usuarios=[],tipos=[],panel=false,usuarioAbierto=null,horariosUsuario=[],docsUsuario=[];

function api(p,o={}){
return fetch(URL+p,{
method:o.method||"GET",
headers:{apikey:KEY,Authorization:"Bearer "+KEY,"Content-Type":"application/json",...(o.headers||{})},
body:o.body?JSON.stringify(o.body):undefined
}).then(async r=>{
const t=await r.text();
let d=null;
try{d=t?JSON.parse(t):null}catch{d=t}
if(!r.ok)throw new Error(t||"Error");
return d;
});
}

function esc(v){return String(v??"").replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;").replaceAll('"',"&quot;")}
function salir(){localStorage.removeItem("usuario");localStorage.removeItem("user");location.href="./index.html?v=1000"}
function sesion(){try{user=JSON.parse(localStorage.getItem("usuario"))}catch{user=null}if(!user){location.href="./index.html?v=1000";return false}return true}
function admin(){return user.rol==="admin"||user.rol==="administrativo"}
function mando(){return admin()||user.rol==="encargado"}

async function cargarBase(){
tipos=await api("/rest/v1/tipos_horas_extra?select=*");
if(mando()) usuarios=await api("/rest/v1/users?select=*&order=id.asc");
}

async function cargarFichajes(){
fichajes=await api("/rest/v1/fichajes?select=*&user_id=eq."+encodeURIComponent(user.id)+"&order=fecha.desc&limit=10");
ultimo=fichajes.length?fichajes[0]:null;
}

async function cargarHoras(){
let q="/rest/v1/horas_extra?select=*&estado=neq.pagadas&order=fecha.desc";
if(!mando()) q+="&user_id=eq."+encodeURIComponent(user.id);
horas=await api(q);
}

function nombreUsuario(id){const u=usuarios.find(x=>String(x.id)===String(id));return u?(u.nombre||u.usuario):id}
function nombreTipo(id){const t=tipos.find(x=>String(x.id)===String(id));return t?t.nombre:"Hora extra"}

function estadoReal(){
if(!ultimo||ultimo.tipo==="salida")return "fuera";
if(ultimo.tipo==="entrada"||ultimo.tipo==="fin_descanso"||ultimo.tipo==="fin_comida")return "trabajando";
if(ultimo.tipo==="inicio_descanso")return "descanso";
if(ultimo.tipo==="inicio_comida")return "comida";
return "fuera";
}

function acciones(){
const e=estadoReal();
if(e==="fuera")return["entrada"];
if(e==="trabajando")return["inicio_descanso","inicio_comida","salida"];
if(e==="descanso")return["fin_descanso"];
if(e==="comida")return["fin_comida"];
return["entrada"];
}

function textoEstado(){
const e=estadoReal();
if(e==="fuera")return "Fuera";
if(e==="trabajando")return "Trabajando";
if(e==="descanso")return "En descanso";
if(e==="comida")return "En comida";
return e;
}

async function inicio(){
await cargarBase();await cargarFichajes();await cargarHoras();
const total=horas.reduce((s,h)=>s+Number(h.total||0),0);

document.getElementById("app").innerHTML=`
<div class="card"><h2>Inicio</h2><b>${esc(user.nombre||user.usuario)}</b><p class="muted">${esc(user.rol)} · ${esc(user.usuario)}</p></div>

<div class="card">
<h2>Fichaje rápido</h2>
<span class="badge">${esc(textoEstado())}</span><br><br>
<button class="btn big green" onclick="toggleFichaje()">FICHAR</button>
${panel?`
<div class="card">
<select id="tipoFichaje">${acciones().map(a=>`<option value="${a}">${a}</option>`).join("")}</select>
<button class="btn blue" onclick="guardarFichaje()">Guardar fichaje</button>
<div id="msg"></div>
</div>`:""}
</div>

<div class="card"><h2>Horas extra</h2><span class="badge">${total.toFixed(2)} € pendientes</span><br><br><button class="btn blue" onclick="vistaHoras()">Ver horas</button>${admin()?`<button class="btn gray" onclick="vistaConfig()">Ajustes horas</button>`:""}</div>
<div class="card"><h2>Informes</h2><button class="btn blue" onclick="vistaInformes()">Informes mensuales</button></div>
${mando()?`<div class="card"><h2>Usuarios</h2><button class="btn dark" onclick="vistaUsuarios()">Ver usuarios</button></div>`:""}

<div class="card"><h2>Últimos fichajes</h2>
${fichajes.length?fichajes.map(f=>`
<div class="row">
<b>${esc(f.tipo)}</b><br>
${new Date(f.fecha).toLocaleString("es-ES")}<br>
<span class="muted">${esc(f.direccion||"Sin ubicación")}</span>
${f.aviso_horario?`<br><span class="warn">${esc(f.aviso_horario)}</span>`:""}
</div>`).join(""):"No hay fichajes"}
</div>`;
}

function toggleFichaje(){panel=!panel;inicio()}

function ubicacion(){
return new Promise(r=>{
if(!navigator.geolocation){r({lat:null,lng:null,direccion:"Sin ubicación"});return}
navigator.geolocation.getCurrentPosition(
p=>r({lat:p.coords.latitude,lng:p.coords.longitude,direccion:"Lat "+p.coords.latitude+", Lng "+p.coords.longitude}),
()=>r({lat:null,lng:null,direccion:"Ubicación no autorizada"}),
{enableHighAccuracy:true,timeout:10000}
)
})
}

function minHora(t){const [h,m]=String(t||"00:00").split(":");return Number(h||0)*60+Number(m||0)}
function minFecha(d){return d.getHours()*60+d.getMinutes()}
function iso(d){return d.toISOString().split("T")[0]}

async function horarioHoy(userId,fecha){
const dia=fecha.getDay();
const r=await api("/rest/v1/horarios_usuario?select=*&user_id=eq."+encodeURIComponent(String(userId))+"&dia_semana=eq."+dia+"&limit=1");
return r.length?r[0]:null;
}

function evaluarHorario(tipo,fecha,h){
if(!h||h.trabaja===false)return {estado:"fuera_horario",aviso:"Día no laboral o sin horario configurado"};

const ahora=minFecha(fecha);
const entrada=minHora(h.hora_entrada);
const salida=minHora(h.hora_salida);

if(tipo==="entrada"){
if(h.hora_entrada&&ahora<entrada)return {estado:"fuera_horario",aviso:"Entrada antes del horario previsto"};
if(h.hora_entrada&&ahora>entrada+15)return {estado:"fuera_horario",aviso:"Entrada posterior al horario previsto"};
}

if(tipo==="salida"){
if(h.hora_salida&&ahora<salida)return {estado:"fuera_horario",aviso:"Salida antes del horario previsto"};
if(h.hora_salida&&ahora>salida)return {estado:"fuera_horario",aviso:"Salida posterior al horario previsto"};
}

if(tipo==="inicio_comida"&&h.inicio_comida){
const c1=minHora(h.inicio_comida);
if(Math.abs(ahora-c1)>30)return {estado:"fuera_horario",aviso:"Comida fuera del horario previsto"};
}

if(tipo==="fin_comida"&&h.fin_comida){
const c2=minHora(h.fin_comida);
if(Math.abs(ahora-c2)>30)return {estado:"fuera_horario",aviso:"Fin de comida fuera del horario previsto"};
}

return {estado:"correcto",aviso:""};
}

function validarFlujo(tipo){
const e=estadoReal();

if(e==="fuera"&&tipo!=="entrada")return "Debes fichar entrada primero.";
if(e!=="fuera"&&tipo==="entrada")return "Ya tienes una jornada abierta.";
if(e==="trabajando"&&!["inicio_descanso","inicio_comida","salida"].includes(tipo))return "Acción no permitida.";
if(e==="descanso"&&tipo!=="fin_descanso")return "Primero debes finalizar el descanso.";
if(e==="comida"&&tipo!=="fin_comida")return "Primero debes finalizar la comida.";
if(tipo==="salida"&&(e==="descanso"||e==="comida"))return "No puedes salir con una pausa abierta.";

return "";
}

function jornadaActualId(tipo){
if(tipo==="entrada")return crypto.randomUUID();
if(ultimo&&ultimo.jornada_id)return ultimo.jornada_id;
return crypto.randomUUID();
}

function estadoJornadaPara(tipo){
if(tipo==="entrada")return "trabajando";
if(tipo==="inicio_descanso")return "descanso";
if(tipo==="fin_descanso")return "trabajando";
if(tipo==="inicio_comida")return "comida";
if(tipo==="fin_comida")return "trabajando";
if(tipo==="salida")return "cerrada";
return "";
}

async function config(){
const r=await api("/rest/v1/configuracion_horas_extra?select=*&id=eq.1&limit=1");
return r[0]||{nocturna_inicio:"22:00",nocturna_fin:"06:00",redondeo_minutos:1,minimo_minutos:0,prioridad_festivo:true}
}

async function festivo(d){
const r=await api("/rest/v1/calendario_festivos?select=*&fecha=eq."+encodeURIComponent(iso(d))+"&limit=1");
return r.length>0
}

function nocturna(d,c){
const m=minFecha(d),i=minHora(c.nocturna_inicio),f=minHora(c.nocturna_fin);
return i>f?m>=i||m<f:m>=i&&m<f
}

function redondear(m,c){
m=Math.max(0,Number(m||0));
const min=Number(c.minimo_minutos||0),red=Number(c.redondeo_minutos||1);
if(m>0&&m<min)m=min;
if(red>1)m=Math.ceil(m/red)*red;
return m
}

async function tipoExtra(d,c){
const fs=await festivo(d),finde=[0,6].includes(d.getDay()),noc=nocturna(d,c);
function busca(n){return tipos.find(t=>String(t.nombre).toLowerCase()===n)}
if(c.prioridad_festivo&&fs&&busca("festiva"))return busca("festiva");
if(fs&&busca("festiva"))return busca("festiva");
if(finde&&busca("fin de semana"))return busca("fin de semana");
if(noc&&busca("nocturna"))return busca("nocturna");
return busca("normal")||tipos[0];
}

async function crearExtra(tipo,fichaje){
if(tipo!=="salida")return;
const salida=new Date(fichaje.fecha),c=await config();
const h=await horarioHoy(user.id,salida);
let min=0,motivo="";

if(!h||h.trabaja===false){
let q="/rest/v1/fichajes?select=*&user_id=eq."+encodeURIComponent(user.id)+"&tipo=eq.entrada&order=fecha.desc&limit=1";
if(fichaje.jornada_id)q="/rest/v1/fichajes?select=*&jornada_id=eq."+encodeURIComponent(fichaje.jornada_id)+"&tipo=eq.entrada&order=fecha.asc&limit=1";
const ent=await api(q);
min=ent.length?Math.round((salida-new Date(ent[0].fecha))/60000):(Number(c.minimo_minutos||60)||60);
motivo="Día no laboral";
}else if(h.hora_salida){
const sp=new Date(salida),sm=minHora(h.hora_salida);
sp.setHours(Math.floor(sm/60),sm%60,0,0);
min=Math.max(0,Math.round((salida-sp)/60000));
motivo="Salida posterior al horario";
}

min=redondear(min,c);
if(min<=0)return;

const t=await tipoExtra(salida,c);
if(!t)return;

const precio=Number(t.precio||0),total=Number(((min/60)*precio).toFixed(2));

await api("/rest/v1/horas_extra",{
method:"POST",
headers:{"Prefer":"return=representation"},
body:{user_id:String(user.id),fichaje_id:fichaje.id,tipo_id:t.id,minutos:min,precio_unitario:precio,total,estado:"pendiente",validado_usuario:false,validado_admin:false,admin_confirmo_pago:false,usuario_confirmo_cobro:false,motivo}
});
}

async function guardarFichaje(){
const msg=document.getElementById("msg"),tipo=document.getElementById("tipoFichaje").value;
msg.textContent="Comprobando...";

const error=validarFlujo(tipo);
if(error){msg.innerHTML="<span class='error'>"+esc(error)+"</span>";return}

try{
const ahora=new Date();
const h=await horarioHoy(user.id,ahora);
const ev=evaluarHorario(tipo,ahora,h);

if(ev.aviso){
const seguir=confirm(ev.aviso+". ¿Registrar igualmente?");
if(!seguir){msg.innerHTML="<span class='error'>Fichaje cancelado.</span>";return}
}

msg.textContent="Guardando...";
const u=await ubicacion();
const jid=jornadaActualId(tipo);
const ej=estadoJornadaPara(tipo);

const d=await api("/rest/v1/fichajes",{
method:"POST",
headers:{"Prefer":"return=representation"},
body:{
user_id:String(user.id),
tipo,
lat:u.lat,
lng:u.lng,
direccion:u.direccion,
estado_horario:ev.estado,
aviso_horario:ev.aviso,
jornada_id:jid,
estado_jornada:ej,
bloqueo_motivo:""
}
});

await crearExtra(tipo,Array.isArray(d)?d[0]:d);

panel=false;
await inicio()
}catch(e){msg.innerHTML="<span class='error'>"+esc(e.message)+"</span>"}
}

async function cierreDeMes(mes,anio){
const r=await api("/rest/v1/cierre_mensual?select=*&mes=eq."+mes+"&anio=eq."+anio+"&cerrado=eq.true&limit=1");
return r.length?true:false;
}

function mesAnioDeFecha(fechaTxt){
const d=new Date(fechaTxt);
return {mes:d.getMonth()+1,anio:d.getFullYear()}
}

async function accionBloqueadaPorCierre(horaId){
const r=await api("/rest/v1/horas_extra?select=fecha,created_at&id=eq."+encodeURIComponent(horaId)+"&limit=1");
if(!r.length)return true;
const f=r[0].fecha||r[0].created_at;
const ma=mesAnioDeFecha(f);
return await cierreDeMes(ma.mes,ma.anio)
}

async function vistaHoras(){
await cargarBase();await cargarHoras();
document.getElementById("app").innerHTML=`<div class="card no-print"><button class="btn gray" onclick="inicio()">← Volver</button><h2>Horas extra</h2></div>${horas.length?horas.map(h=>horaCard(h)).join(""):"<div class='card'>No hay horas extra pendientes.</div>"}`
}

function horaCard(h){
return `<div class="card">${mando()?`<b>Trabajador:</b> ${esc(nombreUsuario(h.user_id))}<br>`:""}<b>${esc(nombreTipo(h.tipo_id))}</b><br>${Number(h.minutos||0)} min · ${Number(h.total||0).toFixed(2)} €<br><span class="muted">Estado: ${esc(h.estado||"pendiente")}</span><br>${h.motivo?`<small>${esc(h.motivo)}</small><br>`:""}${!h.validado_usuario&&String(user.id)===String(h.user_id)?`<button class="btn green" onclick="validarUsuario('${h.id}')">Validar</button>`:""}${admin()&&h.validado_usuario&&!h.validado_admin?`<button class="btn blue" onclick="validarAdmin('${h.id}')">Validar admin</button>`:""}${admin()&&h.validado_admin&&!h.admin_confirmo_pago?`<button class="btn orange" onclick="pagoAdmin('${h.id}')">Horas pagadas</button>`:""}${h.admin_confirmo_pago&&!h.usuario_confirmo_cobro&&String(user.id)===String(h.user_id)?`<button class="btn green" onclick="cobroUsuario('${h.id}')">Horas cobradas</button>`:""}</div>`;
}

async function patchHora(id,b){
if(await accionBloqueadaPorCierre(id)){alert("Mes cerrado. No se puede modificar.");return}
await api("/rest/v1/horas_extra?id=eq."+encodeURIComponent(id),{method:"PATCH",headers:{"Prefer":"return=representation"},body:b});
await vistaHoras()
}

function validarUsuario(id){patchHora(id,{validado_usuario:true,estado:"pendiente_admin"})}
function validarAdmin(id){patchHora(id,{validado_admin:true,estado:"validado_admin"})}
function pagoAdmin(id){patchHora(id,{admin_confirmo_pago:true,fecha_admin_pago:new Date().toISOString()})}
function cobroUsuario(id){patchHora(id,{usuario_confirmo_cobro:true,fecha_usuario_cobro:new Date().toISOString(),estado:"pagadas",pagada:true,fecha_pago:new Date().toISOString()})}

async function vistaConfig(){
const c=await config();
document.getElementById("app").innerHTML=`<div class="card"><button class="btn gray" onclick="inicio()">← Volver</button><h2>Ajustes horas extra</h2><label>Inicio nocturna</label><input id="ni" type="time" value="${c.nocturna_inicio||"22:00"}"><label>Fin nocturna</label><input id="nf" type="time" value="${c.nocturna_fin||"06:00"}"><label>Redondeo</label><select id="rd"><option value="1">Exacto</option><option value="15">15 min</option><option value="30">30 min</option><option value="60">60 min</option></select><label>Mínimo</label><select id="mi"><option value="0">Sin mínimo</option><option value="30">30 min</option><option value="60">60 min</option></select><button class="btn blue" onclick="guardarConfig()">Guardar</button><div id="mc"></div></div>`;
document.getElementById("rd").value=String(c.redondeo_minutos||1);
document.getElementById("mi").value=String(c.minimo_minutos||0)
}

async function guardarConfig(){
await api("/rest/v1/configuracion_horas_extra?id=eq.1",{method:"PATCH",headers:{"Prefer":"return=representation"},body:{nocturna_inicio:ni.value,nocturna_fin:nf.value,redondeo_minutos:Number(rd.value),minimo_minutos:Number(mi.value),actualizado_en:new Date().toISOString()}});
mc.textContent="Guardado"
}

async function vistaUsuarios(){
await cargarBase();
document.getElementById("app").innerHTML=`
<div class="card">
<button class="btn gray" onclick="inicio()">← Volver</button>
<h2>Usuarios</h2>
<p class="muted">Pulsa un usuario para abrir su ficha.</p>
</div>
${usuarios.map(u=>`
<div class="card" onclick="abrirUsuario('${esc(u.id)}')">
<b>${esc(u.nombre||"-")}</b><br>
${esc(u.usuario)} · ${esc(u.rol)}<br>
<span class="muted">${esc(u.telefono||"")} ${esc(u.email||"")}</span>
</div>
`).join("")}`;
}

const data=await api("/rest/v1/users?select=*&id=eq."+encodeURIComponent(id)+"&limit=1");
usuarioAbierto=data[0];
if(!usuarioAbierto){alert("Usuario no encontrado");return}
document.getElementById("app").innerHTML=`
<div class="card">
<button class="btn gray" onclick="vistaUsuarios()">← Usuarios</button>
<h2>${esc(usuarioAbierto.nombre||"Usuario")}</h2>
<p class="muted">${esc(usuarioAbierto.usuario)} · ${esc(usuarioAbierto.rol)}</p>
</div>

<div class="tabs">
<button class="tab active" onclick="tabUsuario('datos')">Datos</button>
<button class="tab" onclick="tabUsuario('documentos')">Documentos</button>

<button class="tab" onclick="tabUsuario('historial')">Historial</button>
</div>

<div id="zonaUsuario"></div>`;

}

function marcarTab(nombre){
document.querySelectorAll(".tab").forEach(b=>b.classList.remove("active"));
document.querySelectorAll(".tab").forEach(b=>{
if(b.textContent.toLowerCase().includes(nombre==="documentos"?"documentos":nombre))b.classList.add("active")
})
}

async function tabUsuario(tab){
if(!usuarioAbierto)return;
marcarTab(tab);

if(tab==="datos"){
zonaUsuario.innerHTML=`
<div class="card">
<h3>Datos personales</h3>
<label>Nombre</label><input id="u_nombre" value="${esc(usuarioAbierto.nombre||"")}">
<label>Usuario</label><input id="u_usuario" value="${esc(usuarioAbierto.usuario||"")}">
<label>DNI</label><input id="u_dni" value="${esc(usuarioAbierto.dni||"")}">
<label>Teléfono</label><input id="u_telefono" value="${esc(usuarioAbierto.telefono||"")}">
<label>Email</label><input id="u_email" value="${esc(usuarioAbierto.email||"")}">
</div>

<div class="card">
<h3>Dirección</h3>

function limpiarNombre(n){return String(n||"archivo").replaceAll(" ","_").replaceAll("/","_").replaceAll("\\","_").replaceAll(":","_").replaceAll("?","_")}
function urlPublica(path){return URL+"/storage/v1/object/public/"+BUCKET+"/"+path.split("/").map(encodeURIComponent).join("/")}

async function subirAStorage(file,tipo){
const carpeta=tipo.replaceAll(" ","_").toLowerCase();
const nombre=limpiarNombre(file.name);
const path=carpeta+"/"+usuarioAbierto.id+"/"+Date.now()+"_"+nombre;

const res=await fetch(URL+"/storage/v1/object/"+BUCKET+"/"+path,{
method:"POST",
headers:{apikey:KEY,Authorization:"Bearer "+KEY,"Content-Type":file.type||"application/octet-stream","x-upsert":"false"},
body:file
});

if(!res.ok)throw new Error(await res.text());

return {nombre:file.name,path,url:urlPublica(path)};
}

async function subirDocumentoInput(inputId,tipo){
const input=document.getElementById(inputId);
const file=input.files&&input.files[0];
const msg=document.getElementById("msgDocs");
if(!file){alert("Selecciona un archivo");return}

if(msg){msg.className="muted";msg.textContent="Subiendo..."}

try{
const archivo=await subirAStorage(file,tipo);
await guardarDocumentoBD(tipo,archivo);
if(msg){msg.className="ok";msg.textContent="Guardado."}
await cargarDocumentosUsuario();
}catch(e){
if(msg){msg.className="error";msg.textContent="Error: "+e.message}else alert("Error: "+e.message)
}
}

async function eliminarDocumento(id,path){
if(!confirm("¿Eliminar documento?"))return;

try{
await api("/rest/v1/documentos?id=eq."+encodeURIComponent(id),{method:"DELETE"});

if(path){
await fetch(URL+"/storage/v1/object/"+BUCKET,{
method:"DELETE",
headers:{apikey:KEY,Authorization:"Bearer "+KEY,"Content-Type":"application/json"},
body:JSON.stringify({prefixes:[path]})
});
}

await cargarDocumentosUsuario();
}catch(e){
alert("Error: "+e.message);
}
}

async function guardarHorariosUsuario(){

hora_salida:document.getElementById("s_"+i).value||null,

fin_comida:document.getElementById("c2_"+i).value||null,

actualizado_en:new Date().toISOString()
};
let ex=horariosUsuario.find(x=>Number(x.dia_semana)===i);
if(ex){
await api("/rest/v1/horarios_usuario?id=eq."+encodeURIComponent(ex.id),{method:"PATCH",headers:{"Prefer":"return=representation"},body});
}else{
await api("/rest/v1/horarios_usuario",{method:"POST",headers:{"Prefer":"return=representation"},body});
}
}
msg.className="ok";
msg.textContent="Horarios guardados correctamente.";
await cargarHorariosUsuario();
}catch(e){
msg.className="error";
msg.textContent="Error: "+e.message;
}

<div class="row">

html+=`<div class="card"><h3>Horas extra</h3>`;
html+=hs.length?hs.map(h=>`

<b>${esc(nombreTipo(h.tipo_id))}</b><br>

${h.motivo?`<span class="muted">${esc(h.motivo)}</span>`:""}

html+=`<div class="card"><h3>Ausencias / Vacaciones</h3>

async function vistaInformes(){
const h=new Date();
document.getElementById("app").innerHTML=`<div class="card no-print"><button class="btn gray" onclick="inicio()">← Volver</button><h2>Informes</h2><label>Mes</label><input id="mes" type="number" value="${h.getMonth()+1}"><label>Año</label><input id="anio" type="number" value="${h.getFullYear()}"><button class="btn blue" onclick="generarInforme()">Generar</button><button class="btn green" onclick="window.print()">Imprimir</button>${admin()?`<button class="btn red" onclick="cerrarMes()">Cerrar mes</button><button class="btn orange" onclick="reabrirMes()">Reabrir mes</button>`:""}</div><div id="res"></div>`;
}

async function generarInforme(){
await cargarBase();
const mes=String(document.getElementById("mes").value).padStart(2,"0"),anio=document.getElementById("anio").value,ini=`${anio}-${mes}-01`,fin=`${anio}-${mes}-31`;
let cerrado=await cierreDeMes(Number(mes),Number(anio));
let data=await api("/rest/v1/horas_extra?select=*&order=fecha.desc");
if(!mando())data=data.filter(h=>String(h.user_id)===String(user.id));
data=data.filter(h=>{const f=String(h.fecha||h.created_at||"");return !f||(f>=ini&&f<=fin)});
const porUser={};let total=0;
data.forEach(h=>{
const u=String(h.user_id),t=nombreTipo(h.tipo_id);
if(!porUser[u])porUser[u]={total:0,tipos:{}};
if(!porUser[u].tipos[t])porUser[u].tipos[t]={min:0,eur:0};
porUser[u].tipos[t].min+=Number(h.minutos||0);
porUser[u].tipos[t].eur+=Number(h.total||0);
porUser[u].total+=Number(h.total||0);
total+=Number(h.total||0)
});
let html=`<div class="card"><h2>Informe ${mes}/${anio}</h2><span class="badge">${cerrado?"MES CERRADO":"MES ABIERTO"}</span></div>`;
Object.keys(porUser).forEach(u=>{
html+=`<div class="card"><h3>${esc(nombreUsuario(u))}</h3><table><tr><th>Tipo</th><th>Min</th><th>€</th></tr>`;
Object.keys(porUser[u].tipos).forEach(t=>{
const v=porUser[u].tipos[t];
html+=`<tr><td>${esc(t)}</td><td>${v.min}</td><td>${v.eur.toFixed(2)}</td></tr>`
});
html+=`</table><br><b>Total usuario: ${porUser[u].total.toFixed(2)} €</b></div>`
});
html+=`<div class="card"><h2>Total empresa: ${total.toFixed(2)} €</h2></div>`;
res.innerHTML=html;
}

async function cerrarMes(){
if(!admin())return;
const mes=Number(document.getElementById("mes").value),anio=Number(document.getElementById("anio").value);
if(await cierreDeMes(mes,anio)){alert("Ese mes ya está cerrado.");return}
if(!confirm("¿Cerrar mes y marcar horas como pagadas?"))return;
const mm=String(mes).padStart(2,"0"),ini=`${anio}-${mm}-01`,fin=`${anio}-${mm}-31`;
await api("/rest/v1/horas_extra?fecha=gte."+ini+"&fecha=lte."+fin,{method:"PATCH",headers:{"Prefer":"return=representation"},body:{estado:"pagadas",pagada:true,fecha_pago:new Date().toISOString(),validado_usuario:true,validado_admin:true,admin_confirmo_pago:true,usuario_confirmo_cobro:true}});
await api("/rest/v1/cierre_mensual",{method:"POST",headers:{"Prefer":"return=representation"},body:{mes,anio,cerrado:true,cerrado_por:String(user.id)}});
await generarInforme();
}

async function reabrirMes(){
if(!admin())return;
const mes=Number(document.getElementById("mes").value),anio=Number(document.getElementById("anio").value);
if(!confirm("¿Reabrir mes? Las horas quedan pagadas, pero el mes deja de estar bloqueado."))return;
await api("/rest/v1/cierre_mensual?mes=eq."+mes+"&anio=eq."+anio,{method:"PATCH",headers:{"Prefer":"return=representation"},body:{cerrado:false}});
await generarInforme();
}
