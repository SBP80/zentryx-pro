<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zentryx V1900</title>

<style>
body{margin:0;font-family:Arial;background:#eef2f7;color:#111827}
.top{background:#0f172a;color:white;padding:20px}
h1{margin:0}
.wrap{padding:16px}
.card{background:white;border-radius:12px;padding:16px;margin-bottom:12px}
.btn{padding:14px;border:none;border-radius:10px;font-weight:bold;margin:4px}
.big{width:100%;font-size:20px}
.green{background:#16a34a;color:white}
.red{background:#dc2626;color:white}
.blue{background:#2563eb;color:white}
.badge{background:#e5e7eb;padding:6px 10px;border-radius:999px}
</style>
</head>

<body>

<div class="top">
<h1>Zentryx</h1>
<button class="btn red" onclick="salir()">Salir</button>
</div>

<div class="wrap" id="app"></div>

<script>
const URL="https://idtaamivqbiuxtjywuux.supabase.co";
const KEY="TU_KEY_AQUI";

let user=null;

function api(p,o={}){
return fetch(URL+p,{
method:o.method||"GET",
headers:{
apikey:KEY,
Authorization:"Bearer "+KEY,
"Content-Type":"application/json"
},
body:o.body?JSON.stringify(o.body):undefined
}).then(r=>r.json());
}

function salir(){
localStorage.removeItem("usuario");
location.href="./index.html";
}

function cargarSesion(){
user=JSON.parse(localStorage.getItem("usuario"));
if(!user){
location.href="./index.html";
return false;
}
return true;
}
async function pintarInicio(){

let horas;

if(user.rol==="admin"){
horas=await api("/rest/v1/horas_extra?select=*&estado=neq.pagadas");
}else{
horas=await api("/rest/v1/horas_extra?select=*&user_id=eq."+user.id+"&estado=neq.pagadas");
}

let total=horas.reduce((s,h)=>s+Number(h.total||0),0);

document.getElementById("app").innerHTML=`

<div class="card">
<h2>Bienvenido ${user.usuario}</h2>
</div>

<div class="card">
<button class="btn big green" onclick="fichar()">FICHAR</button>
</div>

<div class="card">
<h3>Horas extra</h3>
<span class="badge">${total.toFixed(2)} € pendientes</span><br><br>
<button class="btn blue" onclick="verHoras()">Ver horas</button>
</div>

<div class="card">
<button class="btn blue" onclick="verUsuarios()">Usuarios</button>
</div>

`;
}
function verHoras(){
pintarHoras();
}

function verUsuarios(){
pintarUsuarios();
}
async function pintarHoras(){

let horas;
let tipos=await api("/rest/v1/tipos_horas_extra?select=*");

if(user.rol==="admin"){
horas=await api("/rest/v1/horas_extra?select=*&estado=neq.pagadas");
}else{
horas=await api("/rest/v1/horas_extra?select=*&user_id=eq."+user.id+"&estado=neq.pagadas");
}

document.getElementById("app").innerHTML=`
<div class="card">
<button class="btn" onclick="pintarInicio()">← Volver</button>
<h2>Horas extra</h2>
</div>

${horas.map(h=>{

let t=tipos.find(x=>x.id==h.tipo_id);
let botones="";
let texto="";

if(!h.validado_usuario){
texto="Pendiente trabajador";
if(user.id==h.user_id){
botones+=`<button class="btn green" onclick="valUser('${h.id}')">Validar</button>`;
}
}
else if(!h.validado_admin){
texto="Pendiente admin";
if(user.rol==="admin"){
botones+=`<button class="btn blue" onclick="valAdmin('${h.id}')">Validar admin</button>`;
}
}
else if(!h.admin_confirmo_pago){
texto="Pendiente pago";
if(user.rol==="admin"){
botones+=`<button class="btn blue" onclick="pagoAdmin('${h.id}')">Horas pagadas</button>`;
}
}
else if(!h.usuario_confirmo_cobro){
texto="Pendiente cobro";
if(user.id==h.user_id){
botones+=`<button class="btn green" onclick="cobroUser('${h.id}')">Cobrado</button>`;
}
}

return `
<div class="card">
<b>${t?.nombre||""}</b><br>
${h.minutos} min · ${h.total} €<br>
${texto}<br>
${botones}
</div>
`;

}).join("")}
`;
}
async function valUser(id){
await api("/rest/v1/horas_extra?id=eq."+id,{
method:"PATCH",
body:{validado_usuario:true,estado:"pendiente_admin"}
});
pintarHoras();
}

async function valAdmin(id){
await api("/rest/v1/horas_extra?id=eq."+id,{
method:"PATCH",
body:{validado_admin:true}
});
pintarHoras();
}

async function pagoAdmin(id){
await api("/rest/v1/horas_extra?id=eq."+id,{
method:"PATCH",
body:{admin_confirmo_pago:true}
});
pintarHoras();
}

async function cobroUser(id){
await api("/rest/v1/horas_extra?id=eq."+id,{
method:"PATCH",
body:{usuario_confirmo_cobro:true,estado:"pagadas"}
});
pintarHoras();
}
if(cargarSesion()){
pintarInicio();
}
