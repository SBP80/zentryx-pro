<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zentryx V2527</title>

<style>
body{
  font-family: Arial;
  margin:0;
  background:#f5f6f8;
}

.header{
  background:#0f172a;
  color:#fff;
  padding:20px;
  font-size:22px;
  font-weight:bold;
}

.container{
  padding:15px;
}

.card{
  background:#fff;
  border-radius:12px;
  padding:15px;
  margin-bottom:15px;
  box-shadow:0 2px 6px rgba(0,0,0,0.08);
}

.btn{
  display:block;
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:8px;
  font-size:16px;
  cursor:pointer;
}

.btn-blue{background:#2563eb;color:#fff;}
.btn-green{background:#16a34a;color:#fff;}
.btn-gray{background:#e5e7eb;}
.btn-red{background:#dc2626;color:#fff;}

h2{margin-top:0;}
</style>
</head>

<body>

<div class="header">
Zentryx V2527
</div>

<div class="container" id="app"></div>

<script>

let user = {rol:"admin"}; // simulado de momento

function inicio(){

  document.getElementById("app").innerHTML = `

  <div class="card">
    <h2>Jornada</h2>
    <button class="btn btn-blue" onclick="fichar()">Fichar ahora</button>
    <button class="btn btn-gray">Ver jornada</button>
  </div>

  <div class="card">
    <h2>Usuarios</h2>
    ${user.rol==="admin" ? `<button class="btn btn-green">Gestionar usuarios</button>`:""}
  </div>

  <div class="card">
    <h2>Solicitudes</h2>
    <button class="btn btn-gray">Vacaciones / permisos</button>
  </div>

  <div class="card">
    <h2>Configuración</h2>
    ${user.rol==="admin" ? `<button class="btn btn-gray">Configurar sistema</button>`:""}
  </div>

  <div class="card">
    <h2>Informes</h2>
    <button class="btn btn-gray">Ver informes</button>
  </div>

  `;
}

function fichar(){
  alert("Aquí irá el fichaje real (siguiente paso)");
}

inicio();

</script>

</body>
</html>
