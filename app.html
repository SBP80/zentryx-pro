<!-- ZENTRYX APP V2000 -->
<!-- Mantiene fichaje rápido + horas extra + configuración configurable -->
<!-- Pegar entero en app.html -->

<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zentryx V2000</title>
<style>
body{margin:0;font-family:Arial;background:#eef2f7;color:#111827}
.top{background:#0f172a;color:white;padding:20px}
h1{margin:0}
.wrap{padding:16px}
.card{background:white;border-radius:12px;padding:16px;margin-bottom:12px}
.btn{padding:14px;border:none;border-radius:10px;font-weight:bold;margin:4px}
.big{width:100%;font-size:20px}
.green{background:#16a34a;color:white}
.red{background:#dc2626;color:white}
.blue{background:#2563eb;color:white}
.gray{background:#e5e7eb}
.badge{background:#e5e7eb;padding:6px 10px;border-radius:999px}
.row{border:1px solid #ccc;border-radius:10px;padding:10px;margin-bottom:10px}
select,input{width:100%;padding:14px;border-radius:10px;font-size:18px;margin-bottom:10px;box-sizing:border-box;border:1px solid #ccc}
</style>
</head>

<body>

<div class="top">
<h1>Zentryx V2000</h1>
<button class="btn red" onclick="salir()">Salir</button>
</div>

<div class="wrap" id="app"></div>

<script>
const URL="https://idtaamivqbiuxtjywuux.supabase.co";
const KEY="sb_publishable_ToDLKonbF2QnTXi56o1nfQ_10IdaPJx";

let user=null;
let horas=[];
let fichajes=[];
let ultimoFichaje=null;
let panelFichaje=false;

function api(p,o={}){
return fetch(URL+p,{
method:o.method||"GET",
headers:{
apikey:KEY,
Authorization:"Bearer "+KEY,
"Content-Type":"application/json",
...(o.headers||{})
},
body:o.body?JSON.stringify(o.body):undefined
}).then(async r=>{
const txt=await r.text();
let data=null;
try{data=txt?JSON.parse(txt):null}catch{data=txt}
if(!r.ok) throw new Error(txt||"Error Supabase");
return data;
});
}

function salir(){
localStorage.removeItem("usuario");
localStorage.removeItem("user");
location.href="./index.html?v=1000";
}

function cargarSesion(){
try{user=JSON.parse(localStorage.getItem("usuario"));}catch{user=null;}
if(!user){location.href="./index.html?v=1000";return false;}
return true;
}

function esAdmin(){
return user.rol==="admin" || user.rol==="administrativo";
}

async function cargarHoras(){
let data;
if(user.rol==="admin" || user.rol==="administrativo" || user.rol==="encargado"){
data=await api("/rest/v1/horas_extra?select=*&estado=neq.pagadas");
}else{
data=await api("/rest/v1/horas_extra?select=*&user_id=eq."+encodeURIComponent(user.id)+"&estado=neq.pagadas");
}
horas=data||[];
}

async function cargarFichajes(){
fichajes=await api("/rest/v1/fichajes?select=*&user_id=eq."+encodeURIComponent(user.id)+"&order=fecha.desc&limit=10")||[];
ultimoFichaje=fichajes.length?fichajes[0]:null;
}

function accionesDisponibles(){
const estado=ultimoFichaje?ultimoFichaje.tipo:"fuera";
if(!ultimoFichaje || estado==="salida") return [{v:"entrada",t:"Entrada"}];
if(estado==="entrada" || estado==="fin_descanso" || estado==="fin_comida"){
return [
{v:"inicio_descanso",t:"Inicio descanso"},
{v:"inicio_comida",t:"Inicio comida"},
{v:"salida",t:"Salida"}
];
}
if(estado==="inicio_descanso") return [{v:"fin_descanso",t:"Fin descanso"}];
if(estado==="inicio_comida") return [{v:"fin_comida",t:"Fin comida"}];
return [];
}

async function pintarInicio(){
await cargarHoras();
await cargarFichajes();

let total=horas.reduce((s,h)=>s+Number(h.total||0),0);
let estado=ultimoFichaje?ultimoFichaje.tipo:"fuera";
let acciones=accionesDisponibles();

document.getElementById("app").innerHTML=`

<div class="card">
<h2>Bienvenido ${user.usuario}</h2>
<p>${user.nombre||""}</p>
</div>

<div class="card">
<h3>Fichaje rápido</h3>
<span class="badge">Estado: ${estado}</span><br><br>
<button class="btn big green" onclick="toggleFichaje()">FICHAR</button>

${panelFichaje?`
<div class="card">
<h3>Nuevo fichaje</h3>
<select id="tipoFichaje">
${acciones.map(a=>`<option value="${a.v}">${a.t}</option>`).join("")}
</select>
<button class="btn blue" onclick="guardarFichaje()">Guardar fichaje</button>
<div id="msgFichaje"></div>
</div>
`:""}
</div>

<div class="card">
<h3>Horas extra</h3>
<span class="badge">${total.toFixed(2)} € pendientes</span><br><br>
<button class="btn blue" onclick="pintarHoras()">Ver horas</button>
${esAdmin()?`<button class="btn gray" onclick="pintarConfiguracionHoras()">Configuración horas extra</button>`:""}
</div>

<div class="card">
<h3>Últimos fichajes</h3>
${
fichajes.length
? fichajes.map(f=>`
<div class="row">
<b>${f.tipo}</b><br>
${new Date(f.fecha).toLocaleString("es-ES")}<br>
${f.direccion||"Sin ubicación"}
</div>
`).join("")
:"<p>No hay fichajes</p>"
}
</div>
`;
}

function toggleFichaje(){
panelFichaje=!panelFichaje;
pintarInicio();
}

function obtenerUbicacion(){
return new Promise(resolve=>{
if(!navigator.geolocation){
resolve({lat:null,lng:null,direccion:"Sin ubicación"});
return;
}
navigator.geolocation.getCurrentPosition(
pos=>resolve({
lat:pos.coords.latitude,
lng:pos.coords.longitude,
direccion:"Lat "+pos.coords.latitude+", Lng "+pos.coords.longitude
}),
()=>resolve({lat:null,lng:null,direccion:"Ubicación no autorizada"}),
{enableHighAccuracy:true,timeout:10000}
);
});
}

function minutosDesdeHora(hora){
const [h,m]=String(hora||"00:00").split(":");
return Number(h)*60+Number(m||0);
}

function esNocturna(fecha, config){
const min=fecha.getHours()*60+fecha.getMinutes();
const ini=minutosDesdeHora(config.nocturna_inicio);
const fin=minutosDesdeHora(config.nocturna_fin);
if(ini>fin) return min>=ini || min<fin;
return min>=ini && min<fin;
}

function redondearMinutos(minutos, config){
let m=Math.max(0, minutos);
const minimo=Number(config.minimo_minutos||0);
const redondeo=Number(config.redondeo_minutos||1);
if(m>0 && m<minimo) m=minimo;
if(redondeo>1) m=Math.ceil(m/redondeo)*redondeo;
return m;
}

async function elegirTipoHoraExtra(fecha, config){
const tipos=await api("/rest/v1/tipos_horas_extra?select=*&activo=eq.true");

const dia=fecha.getDay();
const finde=dia===0 || dia===6;
const nocturna=esNocturna(fecha, config);

function buscar(nombre){
return tipos.find(t=>String(t.nombre).toLowerCase()===nombre);
}

if(config.prioridad_festivo){
/* Festivos reales se conectan en siguiente paso con tabla calendario_festivos */
}

if(finde && buscar("fin de semana")) return buscar("fin de semana");
if(nocturna && buscar("nocturna")) return buscar("nocturna");
return buscar("normal") || tipos[0];
}

async function cargarConfiguracionHoras(){
const data=await api("/rest/v1/configuracion_horas_extra?select=*&id=eq.1&limit=1");
return data && data.length ? data[0] : {
nocturna_inicio:"22:00",
nocturna_fin:"06:00",
prioridad_festivo:true,
redondeo_minutos:1,
minimo_minutos:0
};
}

async function crearHoraExtraAutomatica(tipo,fichaje){
if(tipo!=="salida") return;

const ahora=new Date();
const dia=ahora.getDay();
const config=await cargarConfiguracionHoras();

const horarios=await api("/rest/v1/horarios_usuario?select=*&user_id=eq."+encodeURIComponent(user.id)+"&dia_semana=eq."+dia+"&limit=1");
const horario=horarios.length?horarios[0]:null;

const tipoHora=await elegirTipoHoraExtra(ahora,config);
if(!tipoHora) return;

let minutos=0;

if(!horario || horario.trabaja===false){
minutos=Number(config.minimo_minutos||60);
if(minutos<=0) minutos=60;
}else if(horario.hora_salida){
const partes=String(horario.hora_salida).split(":");
const salidaPlan=new Date();
salidaPlan.setHours(Number(partes[0]||0),Number(partes[1]||0),0,0);
minutos=Math.max(0,Math.round((ahora-salidaPlan)/60000));
}

minutos=redondearMinutos(minutos,config);
if(minutos<=0) return;

const precio=Number(tipoHora.precio||0);
const total=Number(((minutos/60)*precio).toFixed(2));

await api("/rest/v1/horas_extra",{
method:"POST",
headers:{"Prefer":"return=representation"},
body:{
user_id:String(user.id),
fichaje_id:fichaje.id,
tipo_id:tipoHora.id,
minutos:minutos,
precio_unitario:precio,
total:total,
estado:"pendiente",
validado_usuario:false,
validado_admin:false,
admin_confirmo_pago:false,
usuario_confirmo_cobro:false
}
});
}

async function guardarFichaje(){
const tipo=document.getElementById("tipoFichaje").value;
const msg=document.getElementById("msgFichaje");

msg.innerHTML="Obteniendo ubicación...";

try{
const ubi=await obtenerUbicacion();
msg.innerHTML="Guardando...";

const data=await api("/rest/v1/fichajes",{
method:"POST",
headers:{"Prefer":"return=representation"},
body:{
user_id:String(user.id),
tipo:tipo,
lat:ubi.lat,
lng:ubi.lng,
direccion:ubi.direccion
}
});

const fichaje=Array.isArray(data)?data[0]:data;
await crearHoraExtraAutomatica(tipo,fichaje);

panelFichaje=false;
await pintarInicio();

}catch(e){
msg.innerHTML="Error: "+e.message;
}
}

async function pintarHoras(){
await cargarHoras();

document.getElementById("app").innerHTML=`
<div class="card">
<button class="btn gray" onclick="pintarInicio()">← Volver</button>
<h2>Horas extra</h2>
</div>

${
horas.length
? horas.map(h=>`
<div class="card">
${h.minutos||0} min · ${Number(h.total||0).toFixed(2)} €<br>
Estado: ${h.estado||"pendiente"}<br>
${!h.validado_usuario ? `<button class="btn green" onclick="validarUsuario('${h.id}')">Validar</button>` : ""}
${esAdmin() && h.validado_usuario && !h.validado_admin ? `<button class="btn blue" onclick="validarAdmin('${h.id}')">Validar admin</button>` : ""}
${esAdmin() && h.validado_admin && !h.admin_confirmo_pago ? `<button class="btn blue" onclick="pagoAdmin('${h.id}')">Horas pagadas</button>` : ""}
${h.admin_confirmo_pago && !h.usuario_confirmo_cobro ? `<button class="btn green" onclick="cobroUsuario('${h.id}')">Horas cobradas</button>` : ""}
</div>
`).join("")
:"<div class='card'>No hay horas extra pendientes.</div>"
}
`;
}

async function validarUsuario(id){
await api("/rest/v1/horas_extra?id=eq."+encodeURIComponent(id),{
method:"PATCH",
headers:{"Prefer":"return=representation"},
body:{validado_usuario:true,estado:"pendiente_admin"}
});
await pintarHoras();
}

async function validarAdmin(id){
await api("/rest/v1/horas_extra?id=eq."+encodeURIComponent(id),{
method:"PATCH",
headers:{"Prefer":"return=representation"},
body:{validado_admin:true,estado:"validado_admin"}
});
await pintarHoras();
}

async function pagoAdmin(id){
await api("/rest/v1/horas_extra?id=eq."+encodeURIComponent(id),{
method:"PATCH",
headers:{"Prefer":"return=representation"},
body:{admin_confirmo_pago:true,fecha_admin_pago:new Date().toISOString()}
});
await pintarHoras();
}

async function cobroUsuario(id){
await api("/rest/v1/horas_extra?id=eq."+encodeURIComponent(id),{
method:"PATCH",
headers:{"Prefer":"return=representation"},
body:{usuario_confirmo_cobro:true,fecha_usuario_cobro:new Date().toISOString(),estado:"pagadas"}
});
await pintarHoras();
}

async function pintarConfiguracionHoras(){
if(!esAdmin()) return;

const c=await cargarConfiguracionHoras();

document.getElementById("app").innerHTML=`
<div class="card">
<button class="btn gray" onclick="pintarInicio()">← Volver</button>
<h2>Configuración horas extra</h2>

<label>Inicio nocturna</label>
<input id="cfg_nocturna_inicio" type="time" value="${c.nocturna_inicio||"22:00"}">

<label>Fin nocturna</label>
<input id="cfg_nocturna_fin" type="time" value="${c.nocturna_fin||"06:00"}">

<label>Prioridad festivo</label>
<select id="cfg_prioridad_festivo">
<option value="true" ${c.prioridad_festivo?"selected":""}>Sí</option>
<option value="false" ${!c.prioridad_festivo?"selected":""}>No</option>
</select>

<label>Redondeo minutos</label>
<select id="cfg_redondeo">
<option value="1" ${Number(c.redondeo_minutos)===1?"selected":""}>Exacto al minuto</option>
<option value="15" ${Number(c.redondeo_minutos)===15?"selected":""}>Cada 15 minutos</option>
<option value="30" ${Number(c.redondeo_minutos)===30?"selected":""}>Cada 30 minutos</option>
<option value="60" ${Number(c.redondeo_minutos)===60?"selected":""}>Cada hora</option>
</select>

<label>Mínimo facturable</label>
<select id="cfg_minimo">
<option value="0" ${Number(c.minimo_minutos)===0?"selected":""}>Sin mínimo</option>
<option value="30" ${Number(c.minimo_minutos)===30?"selected":""}>30 minutos</option>
<option value="60" ${Number(c.minimo_minutos)===60?"selected":""}>60 minutos</option>
</select>

<button class="btn blue" onclick="guardarConfiguracionHoras()">Guardar configuración</button>
<div id="msgConfig"></div>
</div>
`;
}

async function guardarConfiguracionHoras(){
const msg=document.getElementById("msgConfig");
msg.innerHTML="Guardando...";

try{
await api("/rest/v1/configuracion_horas_extra?id=eq.1",{
method:"PATCH",
headers:{"Prefer":"return=representation"},
body:{
nocturna_inicio:document.getElementById("cfg_nocturna_inicio").value,
nocturna_fin:document.getElementById("cfg_nocturna_fin").value,
prioridad_festivo:document.getElementById("cfg_prioridad_festivo").value==="true",
redondeo_minutos:Number(document.getElementById("cfg_redondeo").value),
minimo_minutos:Number(document.getElementById("cfg_minimo").value),
actualizado_en:new Date().toISOString()
}
});
msg.innerHTML="Configuración guardada.";
}catch(e){
msg.innerHTML="Error: "+e.message;
}
}

window.salir=salir;
window.toggleFichaje=toggleFichaje;
window.guardarFichaje=guardarFichaje;
window.pintarHoras=pintarHoras;
window.validarUsuario=validarUsuario;
window.validarAdmin=validarAdmin;
window.pagoAdmin=pagoAdmin;
window.cobroUsuario=cobroUsuario;
window.pintarConfiguracionHoras=pintarConfiguracionHoras;
window.guardarConfiguracionHoras=guardarConfiguracionHoras;

if(cargarSesion()){
pintarInicio();
}
</script>

</body>
</html>
