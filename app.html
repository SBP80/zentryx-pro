function normalizarUsuario(u){
  if(!u)return null;
  return {

}

async function hashPassword(texto){
  const encoder=new TextEncoder();
  const data=encoder.encode(String(texto||""));
  const hash=await crypto.subtle.digest("SHA-256",data);
  return Array.from(new Uint8Array(hash)).map(b=>b.toString(16).padStart(2,"0")).join("");
}

async function passwordCoincide(passEscrita,passGuardada){
  if(!passGuardada)return false;
  const escrita=String(passEscrita||"");
  const guardada=String(passGuardada||"");

  if(escrita===guardada)return true;

  const hash=await hashPassword(escrita);
  return hash===guardada;
}

async function prepararPasswordParaGuardar(pass){
  return await hashPassword(pass);
}

function fechaES(iso){
  if(!iso)return "";
  const s=String(iso).slice(0,10);
  if(!s.includes("-"))return s;
  const p=s.split("-");
  return p[2]+"/"+p[1]+"/"+p[0];
}

function fechaDisplayAInput(v){
  if(!v)return "";
  const s=String(v).trim();
  if(/^\d{4}-\d{2}-\d{2}$/.test(s))return s;
  const m=s.match(/^(\d{2})\/(\d{2})\/(\d{4})$/);
  if(!m)return "";
  return `${m[3]}-${m[2]}-${m[1]}`;
}

function fechaSupabaseADate(valor){
  if(!valor)return new Date();
  let s=String(valor).trim();

  // Supabase timestamp sin zona: viene como UTC pero sin Z.
  // Si no trae Z ni offset, se añade Z para convertirlo bien a hora local del navegador.
  if(!/[zZ]$/.test(s) && !/[+-]\d{2}:?\d{2}$/.test(s)){
    s=s.replace(" ","T");
    if(!s.endsWith("Z"))s+="Z";
  }

  return new Date(s);
}

function fechaLocalISODesdeDate(d){
  return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");
}

function horaLocalHHMMDesdeDate(d){
  return String(d.getHours()).padStart(2,"0")+":"+String(d.getMinutes()).padStart(2,"0");
}

function minutosDelDiaDesdeDate(d){
  return d.getHours()*60+d.getMinutes();
}

async function cargarFichajesServidor(){
  if(cargandoFichajes)return;
  cargandoFichajes=true;

  const {data,error}=await sb
    .from("fichajes")
    .select("*")
    .eq("user_id",String(user.id))
    .order("fecha",{ascending:true})
    .limit(300);

  cargandoFichajes=false;

  if(error){
    console.error(error);
    aviso("Error leyendo fichajes: "+error.message,"error");
    return;
  }

  fichajesCache=(data||[]).map(f=>{
    const d=fechaSupabaseADate(f.fecha);
    return {
      id:f.id,
      fecha:fechaLocalISODesdeDate(d),
      hora:horaLocalHHMMDesdeDate(d),
      minutoDia:minutosDelDiaDesdeDate(d),
      tipo:f.tipo,
      ts:d.getTime(),
      direccion:f.direccion_real||f.direccion||"",
      lat:f.lat||null,
      lng:f.lng||null
    };
  });

  localStorage.setItem(kFichajes(),JSON.stringify(fichajesCache));
}

function leerFichajes(){
  if(fichajesCache.length)return fichajesCache;
  return JSON.parse(localStorage.getItem(kFichajes())||"[]");
}

function guardarFichajes(v){
  fichajesCache=v;
  localStorage.setItem(kFichajes(),JSON.stringify(v));
}

  const u=ultimoMovimiento();
  if(!u)return {txt:"Fuera",clase:"red",accion:"entrada"};
  if(u.tipo==="entrada"||u.tipo==="fin_pausa"||u.tipo==="fin_comida")return {txt:"Trabajando",clase:"green",accion:"salida"};
  if(u.tipo==="inicio_pausa")return {txt:"En pausa",clase:"orange",accion:"fin_pausa"};
  if(u.tipo==="inicio_comida")return {txt:"En comida",clase:"orange",accion:"fin_comida"};
  if(u.tipo==="salida")return {txt:"Fuera",clase:"red",accion:"entrada"};
  return {txt:"Fuera",clase:"red",accion:"entrada"};
}

function nombreAccion(a){
  const map={
    entrada:"Fichar entrada",
    salida:"Fichar salida",
    inicio_pausa:"Inicio pausa",
    fin_pausa:"Fin pausa",
    inicio_comida:"Inicio comida",
    fin_comida:"Fin comida"
  };
  return map[a]||a;
}

function movimientoPermitido(tipo){
  const est=estadoActual().txt;

  if(est==="Fuera")return tipo==="entrada";
  if(est==="Trabajando")return ["salida","inicio_pausa","inicio_comida"].includes(tipo);
  if(est==="En pausa")return tipo==="fin_pausa";
  if(est==="En comida")return tipo==="fin_comida";

  return tipo==="entrada";
}

function textoMovimientoNoPermitido(tipo){
  const est=estadoActual().txt;
  if(est==="Fuera")return "No puedes iniciar pausa, comida o salida sin haber fichado entrada.";
  if(est==="Trabajando"&&tipo==="entrada")return "Ya estás trabajando.";
  if(est==="En pausa")return "Estás en pausa. Primero finaliza la pausa.";
  if(est==="En comida")return "Estás en comida. Primero finaliza la comida.";
  return "Movimiento no permitido.";
}

function obtenerGPS(){
  return new Promise(resolve=>{
    if(!navigator.geolocation){
      resolve({lat:null,lng:null,direccion:"GPS no disponible"});
      return;
    }

    navigator.geolocation.getCurrentPosition(
      pos=>{
        resolve({
          lat:pos.coords.latitude,
          lng:pos.coords.longitude,
          direccion:"Lat "+pos.coords.latitude+", Lng "+pos.coords.longitude
        });
      },
      err=>{
        resolve({lat:null,lng:null,direccion:"GPS denegado o sin señal"});
      },
      {enableHighAccuracy:true,timeout:10000,maximumAge:0}
    );
  });
}

async function obtenerDireccionReal(lat,lng){
  if(lat==null||lng==null)return "Sin ubicación";
  try{
    const url="https://nominatim.openstreetmap.org/reverse?format=jsonv2&lat="+encodeURIComponent(lat)+"&lon="+encodeURIComponent(lng)+"&accept-language=es";
    const r=await fetch(url);
    const data=await r.json();
    return data.display_name || ("Lat "+lat+", Lng "+lng);
  }catch(e){
    return "Lat "+lat+", Lng "+lng;
  }
}

function abrirMapaMovimiento(lat,lng,direccion){
  abrirSelectorMapa(lat,lng,direccion);
}

async function guardarMovimiento(tipo){
  await cargarFichajesServidor();

  if(!movimientoPermitido(tipo)){
    alert(textoMovimientoNoPermitido(tipo));
    return;
  }

  const festivo=await comprobarFestivoHoy();
  if(festivo && !confirm("Hoy es festivo: "+textoFestivoHoy()+". ¿Seguro que quieres fichar?")){
    return;
  }

  const gps=await obtenerGPS();
  const direccionReal=await obtenerDireccionReal(gps.lat,gps.lng);

  const payload={
    user_id:String(user.id),
    tipo:tipo,
    fecha:new Date().toISOString(),
    lat:gps.lat,
    lng:gps.lng,
    direccion:gps.direccion,
    direccion_real:direccionReal
  };

  const {error}=await sb.from("fichajes").insert([payload]);

  if(error){
    console.error(error);
    alert("Error guardando fichaje: "+error.message);
    return;
  }

  await cargarFichajesServidor();
  aviso(nombreAccion(tipo)+" guardado.","ok");
  inicio();
}

async function accionPrincipal(){
  const e=estadoActual();
  if(e.accion==="entrada")await guardarMovimiento("entrada");
  else if(e.accion==="salida"){
    if(confirm("¿Registrar salida y cerrar jornada?"))await guardarMovimiento("salida");
  }
  else await guardarMovimiento(e.accion);
}

function resumenHoy(){
  const mov=movimientosHoy();
  let trabajandoDesde=null, pausaDesde=null, comidaDesde=null;
  let trabajo=0, pausa=0, comida=0;

  for(const m of mov){
    const mm=(m.minutoDia!=null)?m.minutoDia:minutos(m.hora);
    if(m.tipo==="entrada"||m.tipo==="fin_pausa"||m.tipo==="fin_comida"){
      trabajandoDesde=mm;
      pausaDesde=null;
      comidaDesde=null;
    }
    if(m.tipo==="inicio_pausa"){
      if(trabajandoDesde!=null)trabajo+=mm-trabajandoDesde;
      trabajandoDesde=null;
      pausaDesde=mm;
    }
    if(m.tipo==="fin_pausa"){
      if(pausaDesde!=null)pausa+=mm-pausaDesde;
      pausaDesde=null;
      trabajandoDesde=mm;
    }
    if(m.tipo==="inicio_comida"){
      if(trabajandoDesde!=null)trabajo+=mm-trabajandoDesde;
      trabajandoDesde=null;
      comidaDesde=mm;
    }
    if(m.tipo==="fin_comida"){
      if(comidaDesde!=null)comida+=mm-comidaDesde;
      comidaDesde=null;
      trabajandoDesde=mm;
    }
    if(m.tipo==="salida"){
      if(trabajandoDesde!=null)trabajo+=mm-trabajandoDesde;
      trabajandoDesde=null;
    }
  }

  const est=estadoActual();
  const now=minutos(horaHHMM());
  if(est.txt==="Trabajando" && trabajandoDesde!=null)trabajo+=now-trabajandoDesde;
  if(est.txt==="En pausa" && pausaDesde!=null)pausa+=now-pausaDesde;
  if(est.txt==="En comida" && comidaDesde!=null)comida+=now-comidaDesde;

  return {trabajo,pausa,comida,mov};
}

function extraerColumnaFaltante(error){
  const msg=(error&&error.message)?error.message:String(error||"");
  const m=msg.match(/'([^']+)' column/);
  return m?m[1]:null;
}

async function insertarUsuarioAdaptativo(payload){
  let limpio={...payload};

  for(let intento=0; intento<12; intento++){
    const {data,error}=await sb.from("users").insert([limpio]).select().single();

    if(!error)return {data,error:null};

    const col=extraerColumnaFaltante(error);

    if(col && Object.prototype.hasOwnProperty.call(limpio,col)){
      delete limpio[col];
      continue;
    }

    return {data:null,error};
  }

  return {data:null,error:{message:"No se pudo crear usuario por columnas no compatibles en users."}};
}

async function actualizarUsuarioAdaptativo(id,payload){
  let limpio={...payload};

  for(let intento=0; intento<12; intento++){
    const {error}=await sb.from("users").update(limpio).eq("id",id);

    if(!error)return {error:null};

    const col=extraerColumnaFaltante(error);

    if(col && Object.prototype.hasOwnProperty.call(limpio,col)){
      delete limpio[col];
      continue;
    }

    return {error};
  }

  return {error:{message:"No se pudo actualizar usuario por columnas no compatibles en users."}};
}

async function obtenerFotoDesdeInput(inputId){
  return new Promise(resolve=>{
    const input=document.getElementById(inputId);
    const file=input&&input.files&&input.files[0];

    if(!file){
      resolve("");
      return;
    }

    if(!file.type.startsWith("image/")){
      alert("La foto debe ser una imagen.");
      resolve("");
      return;
    }

    const reader=new FileReader();
    reader.onload=()=>resolve(reader.result);
    reader.onerror=()=>resolve("");
    reader.readAsDataURL(file);
  });
}

function columnaFaltante(error){
  const msg=(error&&error.message)?error.message:String(error||"");
  const m=msg.match(/'([^']+)' column/);
  return m?m[1]:null;
}

async function insertarAdaptativo(tabla,payload){
  let limpio={...payload};

  for(let i=0;i<12;i++){
    const {error}=await sb.from(tabla).insert([limpio]);
    if(!error)return {error:null};

    const col=columnaFaltante(error);
    if(col && Object.prototype.hasOwnProperty.call(limpio,col)){
      delete limpio[col];
      continue;
    }

    return {error};
  }

  return {error:{message:"No se pudo guardar por columnas incompatibles."}};
}

      if(error){alert("Error creando "+d+": "+error.message);return}

    max_comida_min:Number(document.getElementById("av_comida").value||90),
    max_descanso_min:Number(document.getElementById("av_descanso").value||30),
    sonido:document.getElementById("av_sonido").value==="true",
    actualizado_en:new Date().toISOString()
  };

  const {data}=await sb.from("avisos_fichaje").select("id").eq("user_id",String(uid)).limit(1);

  if(data&&data[0]){
    const {error}=await sb.from("avisos_fichaje").update(payload).eq("id",data[0].id);

function prepararPeticionCalendario(){
  const anio=document.getElementById("cal_anio").value.trim();
  const pais=document.getElementById("cal_pais").value.trim()||"España";
  const comunidad=document.getElementById("cal_comunidad").value.trim();
  const provincia=document.getElementById("cal_provincia").value.trim();
  const poblacion=document.getElementById("cal_poblacion").value.trim();
  const convenio=document.getElementById("cal_convenio").value.trim();

  const texto=
`Prepárame los festivos laborales para importar en Zentryx con este formato por línea:
dd/mm/aaaa | Nombre | Tipo | Convenio | Comunidad | Población

Datos:
Año: ${anio}
País: ${pais}
Comunidad autónoma: ${comunidad||"general"}
Provincia: ${provincia||"general"}
Población: ${poblacion||"general"}
Convenio: ${convenio||"general"}

Incluye festivos nacionales, autonómicos, locales y de convenio si son públicos y verificables.`;

  document.getElementById("cal_peticion").value=texto;
}

function parseLineaFestivo(linea){
  const partes=linea.split("|").map(x=>x.trim());
  if(partes.length<2)return null;
  const fecha=fechaDisplayAInput(partes[0]);
  if(!fecha)return null;

  return {
    fecha:fecha,
    nombre:partes[1]||"Festivo",
    tipo:partes[2]||"general",
    convenio:partes[3]||null,
    comunidad:partes[4]||null,
    region:partes[4]||null,
    poblacion:partes[5]||null
  };
}

async function importarFestivosTexto(){
  const txt=document.getElementById("festivos_importar").value.trim();
  if(!txt){
    alert("Pega primero el calendario.");
    return;
  }

  const registros=txt.split("\n").map(x=>parseLineaFestivo(x)).filter(Boolean);

  if(!registros.length){
    alert("No se han detectado líneas válidas.");
    return;
  }

  if(!confirm("Se van a importar "+registros.length+" festivos. ¿Continuar?"))return;

  let creados=0;

  for(const r of registros){
    const {error}=await insertarAdaptativo("calendario_festivos",r);
    if(!error)creados++;
  }

  alert("Importados "+creados+" festivos.");
  await pintarConfigFestivos();
}

async function crearFestivo(){
  const payload={
    fecha:inputFechaTexto("festivo_fecha"),
    nombre:document.getElementById("festivo_nombre").value.trim(),
    convenio:document.getElementById("festivo_convenio").value.trim()||null,
    comunidad:document.getElementById("festivo_comunidad").value.trim()||null,
    region:document.getElementById("festivo_comunidad").value.trim()||null,
    poblacion:document.getElementById("festivo_poblacion").value.trim()||null,
    tipo:document.getElementById("festivo_tipo").value
  };

  if(!payload.fecha){
    alert("Escribe la fecha en formato dd/mm/aaaa.");
    return;
  }

  const {error}=await insertarAdaptativo("calendario_festivos",payload);
  if(error){
    alert("Error creando festivo: "+error.message);
    return;
  }

  await pintarConfigFestivos();
}

async function eliminarFestivo(id){
  if(!confirm("¿Eliminar festivo?"))return;
  const {error}=await sb.from("calendario_festivos").delete().eq("id",id);
  if(error){alert("Error eliminando: "+error.message);return}
  await pintarConfigFestivos();
}


// ===== SOLICITUDES PRO =====
function kSolicitudes(){return "zentryx_solicitudes_pro"}

function leerSolicitudes(){
  return JSON.parse(localStorage.getItem(kSolicitudes())||"[]");
}

function guardarSolicitudes(lista){
  localStorage.setItem(kSolicitudes(),JSON.stringify(lista));
}

function tipoSolicitudNombre(t){
  const m={
    vacaciones:"Vacaciones",
    asuntos_horas:"Asuntos propios por horas",
    medico:"Médico",
    permiso:"Permiso",
    baja:"Baja",
    formacion:"Formación",
    ausencia:"Ausencia"
  };
  return m[t]||t;
}

function estadoSolicitudHTML(e){
  if(e==="aprobada")return '<span class="badge green">Aprobada</span>';
  if(e==="rechazada")return '<span class="badge red">Rechazada</span>';
  return '<span class="badge orange">Pendiente</span>';
}

function solicitudesDeUsuario(uid){
  const lista=leerSolicitudes();
  if(esAdmin())return lista;
  return lista.filter(s=>String(s.user_id)===String(uid));
}

function vistaSolicitudesPro(){
  vistaActual='solicitudes';
  const lista=solicitudesDeUsuario(user.id).sort((a,b)=>b.creada.localeCompare(a.creada));

  document.getElementById("app").innerHTML=`
    <div class="card">
      <button class="btn gray" onclick="inicio()">← Volver</button>
      <h2>Solicitudes</h2>
      <p>Vacaciones, asuntos propios por horas, médico, permisos, bajas y formación.</p>
      <button class="btn green full" onclick="vistaNuevaSolicitudPro()">Nueva solicitud</button>
    </div>

    <div class="card">
      <h2>${esAdmin()?"Todas las solicitudes":"Mis solicitudes"}</h2>
      ${lista.length?lista.map(s=>solicitudHTML(s)).join(""):"<p>No hay solicitudes todavía.</p>"}
    </div>`;
}

function solicitudHTML(s){
  const u=usuarioPorId(s.user_id)||{nombre:s.user_id};
  return `
    <div class="row">
      <b>${tipoSolicitudNombre(s.tipo)}</b><br>
      ${esAdmin()?`<span class="muted">${u.nombre}</span><br>`:""}
      ${fechaES(s.fecha_inicio)||"-"} ${s.fecha_fin?`→ ${fechaES(s.fecha_fin)}`:""}<br>
      ${s.horas?`Horas solicitadas: ${s.horas} h<br>`:""}
      ${s.motivo?`<span class="muted">${s.motivo}</span><br>`:""}
      ${estadoSolicitudHTML(s.estado)}<br>
      ${esAdmin()&&s.estado==="pendiente"?`
        <button class="btn green" onclick="resolverSolicitudPro('${s.id}','aprobada')">Aprobar</button>
        <button class="btn red" onclick="resolverSolicitudPro('${s.id}','rechazada')">Rechazar</button>
      `:""}
      ${s.estado==="pendiente"&&String(s.user_id)===String(user.id)?`
        <button class="btn red" onclick="cancelarSolicitudPro('${s.id}')">Cancelar</button>
      `:""}
    </div>`;
}

function vistaNuevaSolicitudPro(){
  vistaActual='solicitudes';
  const usuarios=leerUsuarios();

  document.getElementById("app").innerHTML=`
    <div class="card">
      <button class="btn gray" onclick="vistaSolicitudesPro()">← Solicitudes</button>
      <h2>Nueva solicitud</h2>

      ${esAdmin()?`
      <label>Trabajador</label>
      <select id="sol_user">
        ${usuarios.filter(u=>u.activo!==false).map(u=>`<option value="${u.id}">${u.nombre} · ${rolNombre(u.rol)}</option>`).join("")}
      </select>`:""}

      <label>Tipo</label>
      <select id="sol_tipo" onchange="actualizarCamposSolicitud()">
        <option value="vacaciones">Vacaciones</option>
        <option value="asuntos_horas">Asuntos propios por horas</option>
        <option value="medico">Médico</option>
        <option value="permiso">Permiso</option>
        <option value="baja">Baja</option>
        <option value="formacion">Formación</option>
        <option value="ausencia">Ausencia</option>
      </select>

      <label>Fecha inicio</label>
      <input id="sol_inicio" placeholder="dd/mm/aaaa">

      <label>Fecha fin</label>
      <input id="sol_fin" placeholder="dd/mm/aaaa">

      <div id="bloqueHorasSolicitud">
        <label>Horas</label>
        <input id="sol_horas" type="number" step="0.25" value="0">
      </div>

      <label>Motivo / comentario</label>
      <textarea id="sol_motivo" placeholder="Explica brevemente la solicitud..."></textarea>

      <button class="btn green full" onclick="guardarSolicitudPro()">Enviar solicitud</button>
    </div>`;

  actualizarCamposSolicitud();
}

function actualizarCamposSolicitud(){
  const tipo=document.getElementById("sol_tipo")?.value;
  const bloque=document.getElementById("bloqueHorasSolicitud");
  if(!bloque)return;
  bloque.style.display=(tipo==="asuntos_horas"||tipo==="medico"||tipo==="permiso")?"block":"none";
}

function diasEntreFechas(inicio,fin){
  if(!inicio)return 0;
  const a=new Date(inicio+"T00:00:00");
  const b=new Date((fin||inicio)+"T00:00:00");
  const d=Math.round((b-a)/(1000*60*60*24))+1;
  return d<1?1:d;
}

function guardarSolicitudPro(){
  const tipo=document.getElementById("sol_tipo").value;
  const uid=esAdmin()?document.getElementById("sol_user").value:user.id;
  const inicio=inputFechaTexto("sol_inicio");
  const fin=inputFechaTexto("sol_fin");
  const horas=Number(document.getElementById("sol_horas")?.value||0);
  const motivo=document.getElementById("sol_motivo").value.trim();

  if(!inicio){
    alert("La fecha de inicio es obligatoria.");
    return;
  }

  if((tipo==="asuntos_horas"||tipo==="medico"||tipo==="permiso") && horas<=0){
    alert("Indica las horas solicitadas.");
    return;
  }

  const lista=leerSolicitudes();
  lista.unshift({
    id:"s_"+Date.now(),
    user_id:String(uid),
    tipo,
    fecha_inicio:inicio,
    fecha_fin:fin||inicio,
    horas:(tipo==="asuntos_horas"||tipo==="medico"||tipo==="permiso")?horas:0,
    dias:diasEntreFechas(inicio,fin||inicio),
    motivo,
    estado:esAdmin()?"aprobada":"pendiente",
    creada:new Date().toISOString(),
    resuelta:"",
    resuelta_por:"",
    comentario_resolucion:""
  });
  guardarSolicitudes(lista);
  alert(esAdmin()?"Solicitud creada como aprobada.":"Solicitud enviada.");
  vistaSolicitudesPro();
}

function cancelarSolicitudPro(id){
  if(!confirm("¿Cancelar solicitud?"))return;
  guardarSolicitudes(leerSolicitudes().filter(s=>s.id!==id));
  vistaSolicitudesPro();
}

async function resolverSolicitudPro(id,estado){
  if(!pedirClaveAdmin()){
    alert("Contraseña incorrecta.");
    return;
  }

  const lista=leerSolicitudes();
  const s=lista.find(x=>x.id===id);
  if(!s)return;

  const comentario=prompt("Comentario de resolución:")||"";
  s.estado=estado;
  s.resuelta=new Date().toISOString();
  s.resuelta_por=user.id;
  s.comentario_resolucion=comentario;

  if(estado==="aprobada"){
    await aplicarDescuentoSolicitud(s);
  }

  guardarSolicitudes(lista);
  vistaSolicitudesPro();
}

async function aplicarDescuentoSolicitud(s){
  await cargarUsuariosServidor();
  const u=usuarioPorId(s.user_id);
  if(!u)return;

  const update={};

  if(s.tipo==="vacaciones"){
    update.vacaciones_usadas=Number(u.vacaciones_usadas||0)+Number(s.dias||0);
  }

  if(s.tipo==="asuntos_horas"){
    // Pendiente de columna en Supabase: asuntos_usados o asuntos_horas_usadas.
  }

  if(Object.keys(update).length){
    await sb.from("users").update(update).eq("id",s.user_id);
    await cargarUsuariosServidor();
  }
}

let intervaloSync=null;

async function iniciarAppConUsuario(){
  await cargarUsuarioActual();

  if(!user){
    mostrarLogin();
    return;
  }

  await cargarUsuariosServidor();
  await cargarFichajesServidor();
  await cargarNotasServidor();
  await inicio();

  if(intervaloSync)clearInterval(intervaloSync);

  intervaloSync=setInterval(async()=>{
    if(!user)return;
    await cargarFichajesServidor();
    await cargarNotasServidor();
    if(vistaActual==="inicio")await inicio();
  },15000);
}

async function iniciarApp(){
  const sesion=JSON.parse(localStorage.getItem("usuario")||"null");

  if(!sesion || !sesion.id){
    mostrarLogin();
    return;
  }

  user=sesion;
  await iniciarAppConUsuario();
}

iniciarApp().catch(err=>{
  console.error(err);
  const app=document.getElementById("app");
  if(app){
    app.innerHTML=`
      <div class="card">
        <h2>Error de carga</h2>
        <p class="error">${err.message||err}</p>
        <button class="btn gray full" onclick="location.reload()">Recargar</button>
        <button class="btn red full" onclick="cerrarSesion()">Salir</button>
      </div>`;
  }
});
</script>
