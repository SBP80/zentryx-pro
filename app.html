function esc(v){return String(v??"").replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;").replaceAll('"',"&quot;")}

function dos(n){return String(n).padStart(2,"0")}
function fechaLocalISO(d=new Date()){
  return d.getFullYear()+"-"+dos(d.getMonth()+1)+"-"+dos(d.getDate())+"T"+dos(d.getHours())+":"+dos(d.getMinutes())+":"+dos(d.getSeconds());
}
function parseFechaLocal(v){
  if(!v)return new Date();
  const s=String(v).replace(" ","T");
  if(/[zZ]|[+-]\d\d:\d\d$/.test(s))return new Date(s);
  const p=s.split(/[T.]/);
  const f=(p[0]||"").split("-").map(Number);
  const h=(p[1]||"00:00:00").split(":").map(Number);
  return new Date(f[0]||1970,(f[1]||1)-1,f[2]||1,h[0]||0,h[1]||0,h[2]||0);
}
function fechaTexto(v){return parseFechaLocal(v).toLocaleString("es-ES")}
function toggleMenu(id){

function admin(){return user && (user.rol==="admin"||user.rol==="administrativo")}

async function api(p,o={}){
  const r=await fetch(URL+p,{
    method:o.method||"GET",
    headers:{
      apikey:KEY,
      Authorization:"Bearer "+KEY,
      "Content-Type":"application/json",
      ...(o.headers||{})
    },
    body:o.body?JSON.stringify(o.body):undefined
  });
  const t=await r.text();
  let d=null;
  try{d=t?JSON.parse(t):null}catch{d=t}
  if(!r.ok)throw new Error(t||"Error Supabase");
  return d;
}

function estadoReal(){
  if(!ultimo || ultimo.tipo==="salida")return "fuera";

}

function acciones(){

  if(e==="trabajando")return["inicio_descanso","inicio_comida","salida"];
  if(e==="descanso")return["fin_descanso"];
  if(e==="comida")return["fin_comida"];

}

function textoEstado(){

async function direccionDesdeCoords(lat,lng){
  try{
    const r=await fetch("https://nominatim.openstreetmap.org/reverse?format=jsonv2&lat="+encodeURIComponent(lat)+"&lon="+encodeURIComponent(lng));
    const d=await r.json();
    return d.display_name || "Lat "+lat+", Lng "+lng;
  }catch(e){
    return "Lat "+lat+", Lng "+lng;
  }
}

function ubicacion(){
  return new Promise(r=>{
    if(!navigator.geolocation){
      r({lat:null,lng:null,direccion:"Sin ubicación",direccion_real:""});
      return;
    }
    navigator.geolocation.getCurrentPosition(
      async p=>{
        const lat=p.coords.latitude;
        const lng=p.coords.longitude;
        const real=await direccionDesdeCoords(lat,lng);
        r({
          lat,
          lng,
          direccion:"Lat "+lat+", Lng "+lng,
          direccion_real:real
        });
      },
      ()=>r({lat:null,lng:null,direccion:"Ubicación no autorizada",direccion_real:""}),
      {enableHighAccuracy:true,timeout:10000}
    );
  });
}

function minHora(t){
  const [h,m]=String(t||"00:00").split(":");
  return Number(h||0)*60+Number(m||0);
}

function minFecha(d){
  return d.getHours()*60+d.getMinutes();
}

function iso(d){
  return d.toISOString().split("T")[0];
}

async function horarioHoy(userId,fecha){
  const dia=fecha.getDay();
  const r=await api("/rest/v1/horarios_usuario?select=*&user_id=eq."+encodeURIComponent(String(userId))+"&dia_semana=eq."+dia+"&limit=1");
  return r.length?r[0]:null;
}

function evaluarHorario(tipo,fecha,h){
  if(!h || h.trabaja===false){
    return {estado:"fuera_horario",aviso:"Día no laboral o sin horario configurado"};
  }

  const ahora=minFecha(fecha);
  const entrada=minHora(h.hora_entrada);
  const salida=minHora(h.hora_salida);

  if(tipo==="entrada"){
    if(h.hora_entrada && ahora<entrada)return {estado:"fuera_horario",aviso:"Entrada antes del horario previsto"};
    if(h.hora_entrada && ahora>entrada+15)return {estado:"fuera_horario",aviso:"Entrada posterior al horario previsto"};
  }

  if(tipo==="salida"){
    if(h.hora_salida && ahora<salida)return {estado:"fuera_horario",aviso:"Salida antes del horario previsto"};
    if(h.hora_salida && ahora>salida)return {estado:"fuera_horario",aviso:"Salida posterior al horario previsto"};
  }

  if(tipo==="inicio_comida" && h.inicio_comida){
    const c1=minHora(h.inicio_comida);
    if(Math.abs(ahora-c1)>30)return {estado:"fuera_horario",aviso:"Comida fuera del horario previsto"};
  }

  if(tipo==="fin_comida" && h.fin_comida){
    const c2=minHora(h.fin_comida);
    if(Math.abs(ahora-c2)>30)return {estado:"fuera_horario",aviso:"Fin de comida fuera del horario previsto"};
  }

  return {estado:"correcto",aviso:""};
}

function validarFlujo(tipo){
  const e=estadoReal();
  if(e==="fuera" && tipo!=="entrada")return "Debes fichar entrada primero.";
  if(e!=="fuera" && tipo==="entrada")return "Ya tienes una jornada abierta.";
  if(e==="trabajando" && !["inicio_descanso","inicio_comida","salida"].includes(tipo))return "Acción no permitida.";
  if(e==="descanso" && tipo!=="fin_descanso")return "Primero debes finalizar el descanso.";
  if(e==="comida" && tipo!=="fin_comida")return "Primero debes finalizar la comida.";
  if(tipo==="salida" && (e==="descanso" || e==="comida"))return "No puedes salir con una pausa abierta.";
  return "";
}

function jornadaActualId(tipo){
  if(tipo==="entrada")return crypto.randomUUID();
  if(ultimo && ultimo.jornada_id)return ultimo.jornada_id;
  return crypto.randomUUID();
}

function estadoJornadaPara(tipo){
  if(tipo==="entrada")return "trabajando";
  if(tipo==="inicio_descanso")return "descanso";
  if(tipo==="fin_descanso")return "trabajando";
  if(tipo==="inicio_comida")return "comida";
  if(tipo==="fin_comida")return "trabajando";
  if(tipo==="salida")return "cerrada";
  return "";
}

async function config(){
  const r=await api("/rest/v1/configuracion_horas_extra?select=*&id=eq.1&limit=1");
  return r[0] || {
    nocturna_inicio:"22:00",
    nocturna_fin:"06:00",
    redondeo_minutos:1,
    minimo_minutos:0,
    prioridad_festivo:true
  };
}

async function festivo(d){
  const r=await api("/rest/v1/calendario_festivos?select=*&fecha=eq."+encodeURIComponent(iso(d))+"&limit=1");
  return r.length>0;
}

function nocturna(d,c){
  const m=minFecha(d);
  const i=minHora(c.nocturna_inicio);
  const f=minHora(c.nocturna_fin);
  return i>f ? m>=i || m<f : m>=i && m<f;
}

function redondear(m,c){
  m=Math.max(0,Number(m||0));
  const min=Number(c.minimo_minutos||0);
  const red=Number(c.redondeo_minutos||1);
  if(m>0 && m<min)m=min;
  if(red>1)m=Math.ceil(m/red)*red;
  return m;
}

async function tipoExtra(d,c){
  const fs=await festivo(d);
  const finde=[0,6].includes(d.getDay());
  const noc=nocturna(d,c);

  function busca(n){
    return tipos.find(t=>String(t.nombre).toLowerCase()===n);
  }

  if(c.prioridad_festivo && fs && busca("festiva"))return busca("festiva");
  if(fs && busca("festiva"))return busca("festiva");
  if(finde && busca("fin de semana"))return busca("fin de semana");
  if(noc && busca("nocturna"))return busca("nocturna");

  return busca("normal") || tipos[0];
}

async function crearExtra(tipo,fichaje){
  if(tipo!=="salida")return;

  const salida=parseFechaLocal(fichaje.fecha);
  const c=await config();
  const h=await horarioHoy(user.id,salida);

  let min=0;
  let motivo="";

  if(!h || h.trabaja===false){
    let q="/rest/v1/fichajes?select=*&user_id=eq."+encodeURIComponent(String(user.id))+"&tipo=eq.entrada&order=fecha.desc&limit=1";
    if(fichaje.jornada_id){
      q="/rest/v1/fichajes?select=*&jornada_id=eq."+encodeURIComponent(fichaje.jornada_id)+"&tipo=eq.entrada&order=fecha.asc&limit=1";
    }
    const ent=await api(q);
    min=ent.length ? Math.round((salida-parseFechaLocal(ent[0].fecha))/60000) : (Number(c.minimo_minutos||60)||60);
    motivo="Día no laboral";
  }else if(h.hora_salida){
    const sp=new Date(salida);
    const sm=minHora(h.hora_salida);
    sp.setHours(Math.floor(sm/60),sm%60,0,0);
    min=Math.max(0,Math.round((salida-sp)/60000));
    motivo="Salida posterior al horario";
  }

  min=redondear(min,c);
  if(min<=0)return;

  const t=await tipoExtra(salida,c);
  if(!t)return;

  const precio=Number(t.precio||0);
  const total=Number(((min/60)*precio).toFixed(2));

  await api("/rest/v1/horas_extra",{
    method:"POST",
    headers:{"Prefer":"return=representation"},
    body:{
      user_id:String(user.id),
      fichaje_id:fichaje.id,
      tipo_id:t.id,
      minutos:min,
      precio_unitario:precio,
      total,
      estado:"pendiente",
      validado_usuario:false,
      validado_admin:false,
      admin_confirmo_pago:false,
      usuario_confirmo_cobro:false,
      motivo
    }
  });
}

async function guardarFichaje(){
  const msg=el("msg");
  const tipo=el("tipoFichaje").value;

  msg.textContent="Comprobando...";

  const error=validarFlujo(tipo);
  if(error){
    msg.innerHTML="<span class='error'>"+esc(error)+"</span>";
    return;
  }

  try{
    const ahora=new Date();
    const h=await horarioHoy(user.id,ahora);
    const ev=evaluarHorario(tipo,ahora,h);

    if(ev.aviso){
      const seguir=confirm(ev.aviso+". ¿Registrar igualmente?");
      if(!seguir){
        msg.innerHTML="<span class='error'>Fichaje cancelado.</span>";
        return;
      }
    }

    msg.textContent="Guardando...";

    const u=await ubicacion();
    const jid=jornadaActualId(tipo);
    const ej=estadoJornadaPara(tipo);

    const d=await api("/rest/v1/fichajes",{
      method:"POST",
      headers:{"Prefer":"return=representation"},
      body:{
        user_id:String(user.id),
        tipo,
        fecha:fechaLocalISO(),
        lat:u.lat,
        lng:u.lng,
        direccion:u.direccion,
        direccion_real:u.direccion_real,
        estado_horario:ev.estado,
        aviso_horario:ev.aviso,
        jornada_id:jid,
        estado_jornada:ej,
        bloqueo_motivo:""
      }
    });

    await crearExtra(tipo,Array.isArray(d)?d[0]:d);

    panel=false;
    await inicio();
  }catch(e){
    msg.innerHTML="<span class='error'>"+esc(e.message)+"</span>";
  }
}

async function cierreDeMes(mes,anio){
  const r=await api("/rest/v1/cierre_mensual?select=*&mes=eq."+mes+"&anio=eq."+anio+"&cerrado=eq.true&limit=1");
  return r.length?true:false;
}

function mesAnioDeFecha(fechaTxt){
  const d=new Date(fechaTxt);
  return {mes:d.getMonth()+1,anio:d.getFullYear()};
}

async function accionBloqueadaPorCierre(horaId){
  const r=await api("/rest/v1/horas_extra?select=fecha,created_at&id=eq."+encodeURIComponent(horaId)+"&limit=1");
  if(!r.length)return true;
  const f=r[0].fecha || r[0].created_at;
  const ma=mesAnioDeFecha(f);
  return await cierreDeMes(ma.mes,ma.anio);
}

function horaCard(h){
  return `
  <div class="card">
    ${mando()?`<b>Trabajador:</b> ${esc(nombreUsuario(h.user_id))}<br>`:""}
    <b>${esc(nombreTipo(h.tipo_id))}</b><br>
    ${Number(h.minutos||0)} min · ${Number(h.total||0).toFixed(2)} €<br>
    <span class="muted">Estado: ${esc(h.estado||"pendiente")}</span><br>
    ${h.motivo?`<small>${esc(h.motivo)}</small><br>`:""}

    ${!h.validado_usuario && String(user.id)===String(h.user_id)?`
    <button class="btn green" onclick="validarUsuario('${h.id}')">Validar usuario</button>`:""}

    ${admin() && h.validado_usuario && !h.validado_admin?`
    <button class="btn blue" onclick="validarAdmin('${h.id}')">Validar admin</button>`:""}

    ${admin() && h.validado_admin && !h.admin_confirmo_pago?`
    <button class="btn orange" onclick="pagoAdmin('${h.id}')">Horas pagadas</button>`:""}

    ${h.admin_confirmo_pago && !h.usuario_confirmo_cobro && String(user.id)===String(h.user_id)?`
    <button class="btn green" onclick="cobroUsuario('${h.id}')">Horas cobradas</button>`:""}
  </div>`;
}

async function patchHora(id,b){
  try{
    if(await accionBloqueadaPorCierre(id)){
      alert("Mes cerrado. No se puede modificar.");
      return;
    }

    await api("/rest/v1/horas_extra?id=eq."+encodeURIComponent(id),{
      method:"PATCH",
      headers:{"Prefer":"return=representation"},
      body:b
    });

    await vistaHoras();
  }catch(e){
    alert("Error: "+e.message);
  }
}

function validarUsuario(id){
  patchHora(id,{validado_usuario:true,estado:"pendiente_admin"});
}

function validarAdmin(id){
  patchHora(id,{validado_admin:true,estado:"validado_admin"});
}

function pagoAdmin(id){
  patchHora(id,{admin_confirmo_pago:true,fecha_admin_pago:new Date().toISOString()});
}

function cobroUsuario(id){
  patchHora(id,{
    usuario_confirmo_cobro:true,
    fecha_usuario_cobro:new Date().toISOString(),
    estado:"pagadas",
    pagada:true,
    fecha_pago:new Date().toISOString()
  });
}

function marcarTab(nombre){
  document.querySelectorAll(".tab").forEach(b=>b.classList.remove("active"));
  document.querySelectorAll(".tab").forEach(b=>{
    const txt=b.textContent.toLowerCase();
    if(txt.includes(nombre==="documentos"?"documentos":nombre)){
      b.classList.add("active");
    }
  });
}

function limpiarNombre(n){
  return String(n||"archivo")
    .replaceAll(" ","_")
    .replaceAll("/","_")
    .replaceAll("\\","_")
    .replaceAll(":","_")
    .replaceAll("?","_");
}

function urlPublica(path){
  return URL+"/storage/v1/object/public/"+BUCKET+"/"+path.split("/").map(encodeURIComponent).join("/");
}

async function subirAStorage(file,tipo){
  const carpeta=tipo.replaceAll(" ","_").toLowerCase();
  const nombre=limpiarNombre(file.name);
  const path=carpeta+"/"+usuarioAbierto.id+"/"+Date.now()+"_"+nombre;

  const res=await fetch(URL+"/storage/v1/object/"+BUCKET+"/"+path,{
    method:"POST",
    headers:{
      apikey:KEY,
      Authorization:"Bearer "+KEY,
      "Content-Type":file.type||"application/octet-stream",
      "x-upsert":"false"
    },
    body:file
  });

  if(!res.ok)throw new Error(await res.text());
  return {nombre:file.name,path,url:urlPublica(path)};
}

async function subirDocumentoInput(inputId,tipo){
  const input=el(inputId);
  const file=input.files && input.files[0];
  const msg=el("msgDocs");

  if(!file){
    alert("Selecciona un archivo");
    return;
  }

  if(msg){
    msg.className="muted";
    msg.textContent="Subiendo...";
  }

  try{
    const archivo=await subirAStorage(file,tipo);
    await guardarDocumentoBD(tipo,archivo);

    if(tipo==="foto_perfil"){
      await api("/rest/v1/users?id=eq."+encodeURIComponent(usuarioAbierto.id),{
        method:"PATCH",
        headers:{"Prefer":"return=representation"},
        body:{foto_url:archivo.url}
      });
      usuarioAbierto.foto_url=archivo.url;
    }

    if(msg){
      msg.className="ok";
      msg.textContent="Guardado.";
    }

    await cargarDocumentosUsuario();
  }catch(e){
    if(msg){
      msg.className="error";
      msg.textContent="Error: "+e.message;
    }else{
      alert("Error: "+e.message);
    }
  }
}

async function eliminarDocumento(id,path){
  if(!confirm("¿Eliminar documento?"))return;

  try{
    await api("/rest/v1/documentos?id=eq."+encodeURIComponent(id),{method:"DELETE"});

    if(path){
      await fetch(URL+"/storage/v1/object/"+BUCKET,{
        method:"DELETE",
        headers:{
          apikey:KEY,
          Authorization:"Bearer "+KEY,
          "Content-Type":"application/json"
        },
        body:JSON.stringify({prefixes:[path]})
      });
    }

    await cargarDocumentosUsuario();
  }catch(e){
    alert("Error: "+e.message);
  }
}

async function cargarHorariosUsuario(){
  horariosUsuario=await api("/rest/v1/horarios_usuario?select=*&user_id=eq."+encodeURIComponent(usuarioAbierto.id));

  let html=`<div class="card"><h3>Horario semanal</h3></div>`;

  for(let i=0;i<7;i++){
    let h=horariosUsuario.find(x=>Number(x.dia_semana)===i)||{};

    html+=`
    <div class="card">
      <b>${diasSemana[i]}</b>

      <label>Trabaja</label>
      <select id="t_${i}">
        <option value="true" ${h.trabaja!==false?"selected":""}>Sí</option>
        <option value="false" ${h.trabaja===false?"selected":""}>No</option>
      </select>

      <label>Entrada</label>
      <input type="time" id="e_${i}" value="${esc(h.hora_entrada||"")}">

      <label>Salida</label>
      <input type="time" id="s_${i}" value="${esc(h.hora_salida||"")}">

      <label>Inicio comida</label>
      <input type="time" id="c1_${i}" value="${esc(h.inicio_comida||"")}">

      <label>Fin comida</label>
      <input type="time" id="c2_${i}" value="${esc(h.fin_comida||"")}">

      <label>Descanso permitido (min)</label>
      <input type="number" id="d_${i}" value="${esc(h.minutos_descanso||0)}">
    </div>`;
  }

  html+=`
  <button class="btn green" onclick="guardarHorariosUsuario()">Guardar horarios</button>
  <div id="msgHorario"></div>`;

  zona().innerHTML=html;
}

async function guardarHorariosUsuario(){
  const msg=el("msgHorario");
  msg.className="muted";
  msg.textContent="Guardando horarios...";

  try{
    for(let i=0;i<7;i++){
      let body={
        user_id:String(usuarioAbierto.id),
        dia_semana:i,
        trabaja:el("t_"+i).value==="true",
        hora_entrada:el("e_"+i).value||null,
        hora_salida:el("s_"+i).value||null,
        inicio_comida:el("c1_"+i).value||null,
        fin_comida:el("c2_"+i).value||null,
        minutos_descanso:Number(el("d_"+i).value||0),
        actualizado_en:new Date().toISOString()
      };

      let ex=horariosUsuario.find(x=>Number(x.dia_semana)===i);

      if(ex){
        await api("/rest/v1/horarios_usuario?id=eq."+encodeURIComponent(ex.id),{
          method:"PATCH",
          headers:{"Prefer":"return=representation"},
          body
        });
      }else{
        await api("/rest/v1/horarios_usuario",{
          method:"POST",
          headers:{"Prefer":"return=representation"},
          body
        });
      }
    }

    msg.className="ok";
    msg.textContent="Horarios guardados correctamente.";
    await cargarHorariosUsuario();
  }catch(e){
    msg.className="error";
    msg.textContent="Error: "+e.message;
  }
}

async function cargarHistorialUsuario(){
  const fs=await api("/rest/v1/fichajes?select=*&user_id=eq."+encodeURIComponent(usuarioAbierto.id)+"&order=fecha.desc");
  const hs=await api("/rest/v1/horas_extra?select=*&user_id=eq."+encodeURIComponent(usuarioAbierto.id)+"&order=id.desc");
  const aus=await api("/rest/v1/ausencias_usuario?select=*&user_id=eq."+encodeURIComponent(usuarioAbierto.id)+"&order=fecha_inicio.desc");

  let html=`<div class="card"><h3>Historial completo</h3></div>`;

  html+=`<div class="card"><h3>Fichajes</h3>`;

  html+=fs.length?fs.map(f=>`
  <div class="row">
    <b>${esc(f.tipo)}</b><br>
    ${fechaTexto(f.fecha)}<br>
    <span class="muted">${esc(f.direccion_real||f.direccion||"")}</span>
    ${f.aviso_horario?`<br><span class="warn">${esc(f.aviso_horario)}</span>`:""}
    ${f.modificado?`<br><span class="error">Modificado: ${esc(f.motivo_modificacion||"")}</span>`:""}

    ${botonesMapa(f)}

    ${admin()?`
    <br><button class="btn blue small" onclick="editarFichajePanel('${esc(f.id)}')">Editar</button>`:""}
  </div>`).join(""):`<p class="muted">Sin fichajes.</p>`;

  html+=`</div>`;

  html+=`<div class="card"><h3>Horas extra</h3>`;

  html+=hs.length?hs.map(h=>`
  <div class="row">
    <b>${esc(nombreTipo(h.tipo_id))}</b><br>
    ${Number(h.minutos||0)} min · ${Number(h.total||0).toFixed(2)} €<br>
    Estado: ${esc(h.estado||"pendiente")}<br>
    ${h.motivo?`<span class="muted">${esc(h.motivo)}</span>`:""}
  </div>`).join(""):`<p class="muted">Sin horas extra.</p>`;

  html+=`</div>`;

  html+=`
  <div class="card">
    <h3>Ausencias / Vacaciones</h3>
    <button class="btn blue" onclick="nuevaAusencia()">Añadir ausencia</button>`;

  html+=aus.length?aus.map(a=>`
  <div class="row">
    <b>${esc(a.tipo)}</b><br>
    ${esc(a.fecha_inicio)} → ${esc(a.fecha_fin)}<br>
    ${esc(a.motivo||"")}<br>
    Estado: ${esc(a.estado||"pendiente")}
  </div>`).join(""):`<p class="muted">Sin ausencias.</p>`;

  html+=`</div>`;

  zona().innerHTML=html;
}

async function editarFichajePanel(id){
  const r=await api("/rest/v1/fichajes?select=*&id=eq."+encodeURIComponent(id)+"&limit=1");
  const f=r[0];

  if(!f){
    alert("Fichaje no encontrado");
    return;
  }

  const d=parseFechaLocal(f.fecha);
  const fecha=d.toISOString().slice(0,10);
  const hora=String(d.getHours()).padStart(2,"0")+":"+String(d.getMinutes()).padStart(2,"0");

  zona().innerHTML=`
  <div class="card">
    <button class="btn gray" onclick="cargarHistorialUsuario()">← Volver historial</button>
    <h3>Editar fichaje</h3>

    <label>Fecha</label>
    <input type="date" id="editFecha" value="${fecha}">

    <label>Hora</label>
    <input type="time" id="editHora" value="${hora}">

    <label>Motivo obligatorio</label>
    <textarea id="editMotivo"></textarea>

    <button class="btn blue" onclick="guardarEdicionFichaje('${esc(id)}')">Guardar cambio</button>
  </div>`;
}

async function guardarEdicionFichaje(id){
  const fecha=el("editFecha").value;
  const hora=el("editHora").value;
  const motivo=el("editMotivo").value.trim();

  if(!fecha || !hora){
    alert("Falta fecha u hora");
    return;
  }

  if(!motivo){
    alert("El motivo es obligatorio");
    return;
  }

  try{
    await api("/rest/v1/fichajes?id=eq."+encodeURIComponent(id),{
      method:"PATCH",
      headers:{"Prefer":"return=representation"},
      body:{
        fecha:fecha+"T"+hora+":00",
        modificado:true,
        motivo_modificacion:motivo,
        editado_por:String(user.id),
        editado_en:new Date().toISOString()
      }
    });

    await cargarHistorialUsuario();
  }catch(e){
    alert("Error: "+e.message);
  }
}

async function nuevaAusencia(){
  const tipo=prompt("Tipo: vacaciones, baja, permiso, ausencia");
  if(!tipo)return;

  const inicio=prompt("Fecha inicio (YYYY-MM-DD)");
  if(!inicio)return;

  const fin=prompt("Fecha fin (YYYY-MM-DD)");
  if(!fin)return;

  const motivo=prompt("Motivo / comentario")||"";

  try{
    await api("/rest/v1/ausencias_usuario",{
      method:"POST",
      headers:{"Prefer":"return=representation"},
      body:{
        user_id:String(usuarioAbierto.id),
        tipo,
        fecha_inicio:inicio,
        fecha_fin:fin,
        motivo,
        estado:"aprobada"
      }
    });

    await cargarHistorialUsuario();
  }catch(e){
    alert("Error: "+e.message);
  }
}

function marcarTabConfig(nombre){
  document.querySelectorAll(".tab").forEach(b=>b.classList.remove("active"));
  document.querySelectorAll(".tab").forEach(b=>{
    const t=b.textContent.toLowerCase();
    if(nombre==="horas" && t.includes("horas"))b.classList.add("active");
    if(nombre==="festivos" && t.includes("festivos"))b.classList.add("active");
    if(nombre==="ausencias" && t.includes("ausencias"))b.classList.add("active");
    if(nombre==="usuario" && t.includes("usuario"))b.classList.add("active");
    if(nombre==="saldos" && t.includes("saldos"))b.classList.add("active");
  });
}

async function generarInforme(){
  await cargarBase();

  const mes=String(el("mes").value).padStart(2,"0");
  const anio=el("anio").value;
  const ini=`${anio}-${mes}-01`;
  const fin=`${anio}-${mes}-31`;

  let cerrado=await cierreDeMes(Number(mes),Number(anio));
  let data=await api("/rest/v1/horas_extra?select=*&order=id.desc");

  if(!mando()){
    data=data.filter(h=>String(h.user_id)===String(user.id));
  }

  data=data.filter(h=>{
    const f=String(h.fecha || h.created_at || "");
    return !f || (f>=ini && f<=fin);
  });

  const porUser={};
  let total=0;

  data.forEach(h=>{
    const u=String(h.user_id);
    const t=nombreTipo(h.tipo_id);

    if(!porUser[u])porUser[u]={total:0,tipos:{}};
    if(!porUser[u].tipos[t])porUser[u].tipos[t]={min:0,eur:0};

    porUser[u].tipos[t].min+=Number(h.minutos||0);
    porUser[u].tipos[t].eur+=Number(h.total||0);
    porUser[u].total+=Number(h.total||0);
    total+=Number(h.total||0);
  });

  let html=`
  <div class="card">
    <h2>Informe ${mes}/${anio}</h2>
    <span class="badge">${cerrado?"MES CERRADO":"MES ABIERTO"}</span>
  </div>`;

  Object.keys(porUser).forEach(u=>{
    html+=`
    <div class="card">
      <h3>${esc(nombreUsuario(u))}</h3>
      <table>
        <tr><th>Tipo</th><th>Min</th><th>€</th></tr>`;

    Object.keys(porUser[u].tipos).forEach(t=>{
      const v=porUser[u].tipos[t];
      html+=`<tr><td>${esc(t)}</td><td>${v.min}</td><td>${v.eur.toFixed(2)}</td></tr>`;
    });

    html+=`
      </table>
      <br><b>Total usuario: ${porUser[u].total.toFixed(2)} €</b>
    </div>`;
  });

  html+=`<div class="card"><h2>Total empresa: ${total.toFixed(2)} €</h2></div>`;

  el("res").innerHTML=html;
}

async function cerrarMes(){
  if(!admin())return;

  const mes=Number(el("mes").value);
  const anio=Number(el("anio").value);

  if(await cierreDeMes(mes,anio)){
    alert("Ese mes ya está cerrado.");
    return;
  }

  if(!confirm("¿Cerrar mes y marcar horas como pagadas?"))return;

  const mm=String(mes).padStart(2,"0");
  const ini=`${anio}-${mm}-01`;
  const fin=`${anio}-${mm}-31`;

  await api("/rest/v1/horas_extra?fecha=gte."+ini+"&fecha=lte."+fin,{
    method:"PATCH",
    headers:{"Prefer":"return=representation"},
    body:{
      estado:"pagadas",
      pagada:true,
      fecha_pago:new Date().toISOString(),
      validado_usuario:true,
      validado_admin:true,
      admin_confirmo_pago:true,
      usuario_confirmo_cobro:true
    }
  });

  await api("/rest/v1/cierre_mensual",{
    method:"POST",
    headers:{"Prefer":"return=representation"},
    body:{
      mes,
      anio,
      cerrado:true,
      cerrado_por:String(user.id)
    }
  });

  await generarInforme();
}

async function reabrirMes(){
  if(!admin())return;

  const mes=Number(el("mes").value);
  const anio=Number(el("anio").value);

  if(!confirm("¿Reabrir mes? Las horas quedan pagadas, pero el mes deja de estar bloqueado."))return;

  await api("/rest/v1/cierre_mensual?mes=eq."+mes+"&anio=eq."+anio,{
    method:"PATCH",
    headers:{"Prefer":"return=representation"},
    body:{cerrado:false}
  });

  await generarInforme();
}

    if(!ultimoLocal){
      msg.className="warn";
      msg.textContent="Aviso: este usuario aún no tiene fichajes.";
      return;
    }
    const tipo=ultimoLocal.tipo;
    if(tipo==="entrada"||tipo==="fin_descanso"||tipo==="fin_comida"){
      msg.className="ok";
      msg.textContent="Estado actual: trabajando.";
    }else if(tipo==="inicio_comida"){
      msg.className="warn";
      msg.textContent="Aviso: comida abierta. Revisar si se ha olvidado cerrar.";
    }else if(tipo==="inicio_descanso"){
      msg.className="warn";
      msg.textContent="Aviso: descanso abierto. Revisar si se ha olvidado cerrar.";
    }else if(tipo==="salida"){
      msg.className="ok";
      msg.textContent="Estado actual: jornada cerrada.";
    }else{
      msg.className="warn";
      msg.textContent="Estado no reconocido: "+tipo;
    }
  }catch(e){
    msg.className="error";
    msg.textContent=e.message;
  }
}
