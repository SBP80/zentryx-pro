<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zentryx V2600</title>

<style>
body{margin:0;font-family:Arial;background:#eef2f7}
.top{background:#0f172a;color:white;padding:20px}
h1{margin:0}
.wrap{padding:16px}

.card{background:white;border-radius:12px;padding:16px;margin-bottom:12px}
.btn{padding:12px;border:none;border-radius:8px;margin:4px;font-weight:bold}
.big{width:100%;font-size:20px}

.green{background:#16a34a;color:white}
.blue{background:#2563eb;color:white}
.gray{background:#e5e7eb}
.dark{background:#111827;color:white}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
}

.menu-btn{
padding:20px;
font-size:18px;
border-radius:12px;
border:none;
background:#111827;
color:white;
}
</style>
</head>

<body>

<div class="top">
<h1>Zentryx V2600</h1>
<button class="btn gray" onclick="salir()">Salir</button>
</div>

<div class="wrap" id="app"></div>

<script>
const URL="https://idtaamivqbiuxtjywuux.supabase.co";
const KEY="sb_publishable_ToDLKonbF2QnTXi56o1nfQ_10IdaPJx";

let user=null;

// ================= BASE =================
function api(p,o={}){
return fetch(URL+p,{
method:o.method||"GET",
headers:{
apikey:KEY,
Authorization:"Bearer "+KEY,
"Content-Type":"application/json"
},
body:o.body?JSON.stringify(o.body):undefined
}).then(r=>r.json());
}

function salir(){
localStorage.removeItem("usuario");
location.href="./index.html";
}

function cargarSesion(){
user=JSON.parse(localStorage.getItem("usuario"));
if(!user){
location.href="./index.html";
return false;
}
return true;
}

// ================= INICIO =================
function vistaInicio(){
document.getElementById("app").innerHTML=`

<div class="card">
<h2>${user.nombre||user.usuario}</h2>
<p>${user.rol}</p>
</div>

<div class="card">
<h3>Acceso rápido</h3>

<div class="grid">

<button class="menu-btn" onclick="vistaFichar()">Fichar</button>
<button class="menu-btn" onclick="vistaHoras()">Horas</button>

<button class="menu-btn" onclick="vistaUsuarios()">Usuarios</button>
<button class="menu-btn" onclick="vistaInformes()">Informes</button>

</div>

</div>

<div class="card">
<h3>Estado</h3>
<p>Aquí irán avisos, alertas, agenda, etc</p>
</div>

`;
}

// ================= FICHAJE =================
function vistaFichar(){
document.getElementById("app").innerHTML=`
<div class="card">
<button class="btn gray" onclick="vistaInicio()">←</button>

<h2>Fichaje</h2>

<button class="btn big green" onclick="fichar()">FICHAR</button>

</div>
`;
}

async function fichar(){
await api("/rest/v1/fichajes",{
method:"POST",
body:{
user_id:user.id,
tipo:"entrada"
}
});
alert("Fichaje registrado");
}

// ================= HORAS =================
async function vistaHoras(){
const data=await api("/rest/v1/horas_extra?select=*&user_id=eq."+user.id);

document.getElementById("app").innerHTML=`
<div class="card">
<button class="btn gray" onclick="vistaInicio()">←</button>
<h2>Horas extra</h2>
</div>

${data.map(h=>`
<div class="card">
${h.minutos} min - ${h.total} €
</div>
`).join("")}
`;
}

// ================= USUARIOS =================
async function vistaUsuarios(){

const data=await api("/rest/v1/users?select=*");

document.getElementById("app").innerHTML=`
<div class="card">
<button class="btn gray" onclick="vistaInicio()">←</button>
<h2>Usuarios</h2>
</div>

${data.map(u=>`
<div class="card">
<b>${u.nombre||""}</b><br>
${u.usuario}<br>
${u.rol}
</div>
`).join("")}
`;
}

// ================= INFORMES =================
function vistaInformes(){
document.getElementById("app").innerHTML=`
<div class="card">
<button class="btn gray" onclick="vistaInicio()">←</button>

<h2>Informes</h2>

<button class="btn blue" onclick="window.print()">Imprimir</button>

</div>
`;
}

// ================= INIT =================
if(cargarSesion()){
vistaInicio();
}
</script>

</body>
</html>
