<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zentryx V2527.2</title>
<style>
:root{--dark:#0f172a;--bg:#eef2f7;--card:#fff;--line:#d1d5db;--text:#111827;--muted:#6b7280;--blue:#2563eb;--green:#16a34a;--red:#dc2626;--gray:#e5e7eb}
body{margin:0;background:var(--bg);font-family:Arial}
.header{background:var(--dark);color:#fff;padding:20px}
.card{background:#fff;border-radius:16px;padding:16px;margin:12px}
.btn{padding:14px;border-radius:12px;border:0;font-weight:bold;margin-top:8px}
.green{background:var(--green);color:#fff}
.blue{background:var(--blue);color:#fff}
.gray{background:var(--gray)}
.note-fixed{position:fixed;top:80px;right:10px;background:#fff;border:2px solid #000;padding:10px;border-radius:10px;max-width:150px}
</style>
</head>
<body>

<div class="header">
<h1>Zentryx V2527.2</h1>
<div id="fecha"></div>
<div id="hora"></div>
</div>

<div id="app"></div>

<script>

// ===== RELOJ =====
function actualizarTiempo(){
  const d=new Date();
  document.getElementById("hora").innerText=d.toLocaleTimeString();
  document.getElementById("fecha").innerText=d.toLocaleDateString("es-ES",{weekday:"long",year:"numeric",month:"long",day:"numeric"});
}
setInterval(actualizarTiempo,1000);
actualizarTiempo();

// ===== STORAGE =====
function getNotas(){return JSON.parse(localStorage.getItem("notas")||"[]")}
function saveNotas(n){localStorage.setItem("notas",JSON.stringify(n))}

// ===== FICHAJE =====
function getHoy(){return new Date().toISOString().split("T")[0]}
function getF(){return JSON.parse(localStorage.getItem("fich")||"[]")}
function saveF(f){localStorage.setItem("fich",JSON.stringify(f))}

function estado(){
 let r=getF().find(x=>x.fecha===getHoy());
 if(!r)return "Sin fichar";
 if(r.entrada && !r.salida)return "Trabajando desde "+r.entrada;
 return "Jornada finalizada";
}

function fichar(){
 let f=getF();
 let r=f.find(x=>x.fecha===getHoy());
 let h=new Date().toTimeString().slice(0,5);

 if(!r){
   f.push({fecha:getHoy(),entrada:h});
 }else if(!r.salida){
   r.salida=h;
 }else{
   alert("Ya completado");
 }
 saveF(f);
 render();
}

// ===== NOTAS =====
function crearNota(){
 let txt=prompt("Escribe nota");
 if(!txt)return;

 let fecha=prompt("Fecha aviso (YYYY-MM-DD) opcional");
 let hora=prompt("Hora aviso (HH:MM) opcional");
 let fija=confirm("¿Fijar permanente?");

 let n=getNotas();
 n.push({txt,fecha,hora,fija});
 saveNotas(n);
 render();
}

// ===== UI =====
function render(){

 let notas=getNotas();
 let fija=notas.find(n=>n.fija);

 document.getElementById("app").innerHTML=`

 <div class="card">
 <h2>${estado()}</h2>
 <button class="btn green" onclick="fichar()">Fichar</button>
 </div>

 <div class="card">
 <h2>Notas rápidas</h2>
 <button class="btn blue" onclick="crearNota()">+ Nota</button>
 ${notas.map(n=>`<p>${n.txt}</p>`).join("")}
 </div>

 `;

 // fija
 let old=document.getElementById("fija");
 if(old)old.remove();

 if(fija){
   let d=document.createElement("div");
   d.className="note-fixed";
   d.id="fija";
   d.innerText=fija.txt;
   document.body.appendChild(d);
 }

}

render();

</script>

</body>
</html>
