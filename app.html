<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zentryx V2503</title>

<style>
body{margin:0;font-family:Arial;background:#eef2f7;color:#111827}
.top{background:#0f172a;color:white;padding:20px}
.wrap{padding:16px}
.card{background:white;border-radius:12px;padding:16px;margin-bottom:12px}
.btn{padding:12px;border:none;border-radius:8px;margin:4px;font-weight:bold}
.big{width:100%;font-size:18px}
.green{background:#16a34a;color:white}
.blue{background:#2563eb;color:white}
.gray{background:#e5e7eb}
.dark{background:#111827;color:white}
.badge{background:#e5e7eb;padding:6px 10px;border-radius:999px}
input,select{width:100%;padding:10px;margin:6px 0;border-radius:8px;border:1px solid #ccc}
.tabs{display:flex;gap:6px;margin-bottom:10px}
.tab{padding:10px;background:#e5e7eb;border-radius:8px;cursor:pointer}
.tab.active{background:#111827;color:white}
</style>
</head>

<body>

<div class="top">
<h2>Zentryx V2503</h2>
<button class="btn gray" onclick="salir()">Salir</button>
</div>

<div class="wrap" id="app"></div>

<script>
const URL="https://idtaamivqbiuxtjywuux.supabase.co";
const KEY="sb_publishable_ToDLKonbF2QnTXi56o1nfQ_10IdaPJx";

let user=null;
let usuariosCache=[];

// ================= BASE =================
function api(p,o={}){
return fetch(URL+p,{
method:o.method||"GET",
headers:{
apikey:KEY,
Authorization:"Bearer "+KEY,
"Content-Type":"application/json"
},
body:o.body?JSON.stringify(o.body):undefined
}).then(r=>r.json());
}

function salir(){
localStorage.removeItem("usuario");
location.href="./index.html";
}

function cargarSesion(){
user=JSON.parse(localStorage.getItem("usuario"));
if(!user){
location.href="./index.html";
return false;
}
return true;
}

// ================= INICIO =================
function inicio(){
document.getElementById("app").innerHTML=`
<div class="card">
<h2>${user.nombre||user.usuario}</h2>
<p>${user.rol}</p>
</div>

<div class="card">
<button class="btn big green" onclick="fichar()">FICHAR</button>
</div>

<div class="card">
<button class="btn blue" onclick="vistaHoras()">Horas</button>
<button class="btn blue" onclick="vistaUsuarios()">Usuarios</button>
<button class="btn blue" onclick="vistaInformes()">Informes</button>
</div>
`;
}

// ================= FICHAJE =================
async function fichar(){
await api("/rest/v1/fichajes",{method:"POST",body:{user_id:user.id,tipo:"entrada"}});
alert("Fichaje registrado");
}

// ================= HORAS =================
async function vistaHoras(){
const data=await api("/rest/v1/horas_extra?select=*&user_id=eq."+user.id);

document.getElementById("app").innerHTML=`
<div class="card">
<button class="btn gray" onclick="inicio()">←</button>
<h2>Horas</h2>
</div>

${data.map(h=>`
<div class="card">
${h.minutos} min - ${h.total} €
</div>
`).join("")}
`;
}

// ================= USUARIOS =================
async function vistaUsuarios(){
usuariosCache=await api("/rest/v1/users?select=*");

document.getElementById("app").innerHTML=`
<div class="card">
<button class="btn gray" onclick="inicio()">←</button>
<h2>Usuarios</h2>
</div>

${usuariosCache.map(u=>`
<div class="card" onclick="abrirUsuario('${u.id}')">
<b>${u.nombre||""}</b><br>
${u.usuario}<br>
${u.rol}
</div>
`).join("")}
`;
}

async function abrirUsuario(id){
const u=usuariosCache.find(x=>x.id==id);

document.getElementById("app").innerHTML=`
<div class="card">
<button class="btn gray" onclick="vistaUsuarios()">←</button>
<h2>${u.nombre||"Usuario"}</h2>
</div>

<div class="tabs">
<div class="tab active" onclick="tabUsuario('${id}','datos')">Datos</div>
<div class="tab" onclick="tabUsuario('${id}','docs')">Documentos</div>
<div class="tab" onclick="tabUsuario('${id}','horarios')">Horarios</div>
<div class="tab" onclick="tabUsuario('${id}','historial')">Historial</div>
</div>

<div id="contenidoUsuario"></div>
`;

tabUsuario(id,"datos");
}

function tabUsuario(id,tab){

const u=usuariosCache.find(x=>x.id==id);

if(tab==="datos"){
document.getElementById("contenidoUsuario").innerHTML=`

<div class="card">
<label>Nombre</label>
<input id="nombre" value="${u.nombre||""}">

<label>Usuario</label>
<input id="usuario" value="${u.usuario||""}">

<label>Teléfono</label>
<input id="tel" value="${u.telefono||""}">

<label>Email</label>
<input id="email" value="${u.email||""}">

<label>Rol</label>
<select id="rol">
<option ${u.rol==="operario"?"selected":""}>operario</option>
<option ${u.rol==="encargado"?"selected":""}>encargado</option>
<option ${u.rol==="administrativo"?"selected":""}>administrativo</option>
<option ${u.rol==="admin"?"selected":""}>admin</option>
</select>

<button class="btn blue" onclick="guardarUsuario('${id}')">Guardar</button>
</div>
`;
}

if(tab==="docs"){
document.getElementById("contenidoUsuario").innerHTML=`
<div class="card">
<h3>Documentos</h3>
<p>Próximo paso: DNI, fotos, archivos</p>
</div>`;
}

if(tab==="horarios"){
document.getElementById("contenidoUsuario").innerHTML=`
<div class="card">
<h3>Horarios</h3>
<p>Próximo paso: horarios por días</p>
</div>`;
}

if(tab==="historial"){
document.getElementById("contenidoUsuario").innerHTML=`
<div class="card">
<h3>Historial</h3>
<p>Próximo paso: fichajes y horas</p>
</div>`;
}
}

async function guardarUsuario(id){
await api("/rest/v1/users?id=eq."+id,{
method:"PATCH",
body:{
nombre:document.getElementById("nombre").value,
usuario:document.getElementById("usuario").value,
telefono:document.getElementById("tel").value,
email:document.getElementById("email").value,
rol:document.getElementById("rol").value
}
});
alert("Guardado");
vistaUsuarios();
}

// ================= INFORMES =================
function vistaInformes(){
document.getElementById("app").innerHTML=`
<div class="card">
<button class="btn gray" onclick="inicio()">←</button>
<h2>Informes</h2>
<button class="btn blue" onclick="window.print()">Imprimir</button>
</div>
`;
}

// ================= INIT =================
if(cargarSesion()){
inicio();
}
</script>

</body>
</html>
