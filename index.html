<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Zentryx</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    body {
      font-family: Arial;
      background: #f5f5f5;
      margin: 0;
      padding: 20px;
    }

    .card {
      background: white;
      padding: 20px;
      border-radius: 12px;
      max-width: 400px;
      margin: auto;
      margin-top: 40px;
    }

    input {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      border-radius: 8px;
      border: 1px solid #ccc;
    }

    button {
      width: 100%;
      padding: 12px;
      margin-top: 15px;
      border-radius: 8px;
      border: none;
      background: #2d6cdf;
      color: white;
      font-weight: bold;
    }

    #app {
      display: none;
    }

    #cambioPass {
      display: none;
    }

    img {
      display: block;
      margin: auto;
      margin-bottom: 10px;
    }
  </style>
</head>

<body>

<!-- LOGIN -->
<div id="login" class="card">
  <h2>Zentryx</h2>

  <input id="usuario" placeholder="Usuario">
  <input id="password" type="password" placeholder="Contraseña">

  <button id="btnLogin">Entrar</button>
</div>

<!-- CAMBIO PASSWORD -->
<div id="cambioPass" class="card">
  <h2>Crear contraseña</h2>

  <input id="nuevaPassword" type="password" placeholder="Nueva contraseña">

  <button id="btnGuardarPassword">Guardar</button>
</div>

<!-- APP -->
<div id="app" class="card">

  <h2>Bienvenido</h2>

  <!-- FOTO -->
  <img id="fotoUser" src="" width="80" height="80" style="border-radius:50%">

  <!-- SUBIR FOTO -->
  <input type="file" id="fotoUsuario" accept="image/*">

  <button id="btnSubirFoto">Subir foto</button>

  <hr>

  <h3>Crear usuario</h3>

  <input id="nombre" placeholder="Nombre">
  <input id="usuarioNuevo" placeholder="Usuario">

  <button id="btnCrearUsuario">Crear usuario</button>

</div>

<script>

// ===============================
// CONFIG SUPABASE
// ===============================
const supabaseUrl = 'https://TU_URL.supabase.co';
const supabaseKey = 'TU_KEY';
const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

// ===============================
// LOGIN
// ===============================
async function login() {
  const usuario = document.getElementById('usuario').value;
  const password = document.getElementById('password').value;

  const { data, error } = await supabase
    .from('users')
    .select('*')
    .eq('usuario', usuario)
    .single();

  if (error || !data || data.password !== password) {
    alert('Usuario o contraseña incorrectos');
    return;
  }

  localStorage.setItem('user', JSON.stringify(data));

  if (data.password_pendiente) {
    mostrarCambioPassword(data.id);
  } else {
    cargarApp();
  }
}

// ===============================
// CAMBIO PASSWORD
// ===============================
async function guardarNuevaPassword() {
  const nueva = document.getElementById('nuevaPassword').value;

  await supabase
    .from('users')
    .update({
      password: nueva,
      password_pendiente: false
    })
    .eq('id', window.userCambioPass);

  cargarApp();
}

// ===============================
// SUBIR FOTO
// ===============================
async function subirFoto() {
  const fileInput = document.getElementById('fotoUsuario');
  const user = JSON.parse(localStorage.getItem('user'));

  if (fileInput.files.length === 0) {
    alert('Selecciona una imagen');
    return;
  }

  const file = fileInput.files[0];
  const nombre = `user_${user.id}_${Date.now()}.jpg`;

  const { error } = await supabase.storage
    .from('usuarios')
    .upload(nombre, file, { upsert: true });

  if (error) {
    alert('Error subiendo');
    return;
  }

  const { data } = supabase.storage
    .from('usuarios')
    .getPublicUrl(nombre);

  await supabase
    .from('users')
    .update({ foto_url: data.publicUrl })
    .eq('id', user.id);

  user.foto_url = data.publicUrl;
  localStorage.setItem('user', JSON.stringify(user));

  document.getElementById('fotoUser').src = data.publicUrl;
}

// ===============================
// CREAR USUARIO
// ===============================
async function crearUsuario() {
  const nombre = document.getElementById('nombre').value;
  const usuario = document.getElementById('usuarioNuevo').value;

  await supabase.from('users').insert([{
    nombre,
    usuario,
    password: '',
    password_pendiente: true,
    rol: 'operario'
  }]);

  alert('Usuario creado');
}

// ===============================
// UI
// ===============================
function cargarApp() {
  document.getElementById('login').style.display = 'none';
  document.getElementById('cambioPass').style.display = 'none';
  document.getElementById('app').style.display = 'block';

  const user = JSON.parse(localStorage.getItem('user'));

  document.getElementById('fotoUser').src =
    user.foto_url || 'https://via.placeholder.com/80';
}

function mostrarCambioPassword(id) {
  window.userCambioPass = id;
  document.getElementById('login').style.display = 'none';
  document.getElementById('cambioPass').style.display = 'block';
}

// ===============================
// EVENTOS
// ===============================
document.getElementById('btnLogin').onclick = login;
document.getElementById('btnGuardarPassword').onclick = guardarNuevaPassword;
document.getElementById('btnCrearUsuario').onclick = crearUsuario;
document.getElementById('btnSubirFoto').onclick = subirFoto;

</script>

</body>
</html>
