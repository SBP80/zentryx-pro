<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zentryx</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body {
  font-family: Arial;
  background: #eef2f7;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.box {
  background: white;
  padding: 30px;
  border-radius: 12px;
  width: 300px;
}

input {
  width: 100%;
  padding: 12px;
  margin: 10px 0;
}

button {
  width: 100%;
  padding: 12px;
  background: #0d1b2a;
  color: white;
  border: none;
}
</style>
</head>

<body>

<div class="box">
  <h2>Zentryx</h2>

  <input id="usuario" placeholder="Usuario">
  <input id="password" type="password" placeholder="Contraseña">

  <button onclick="login()">Entrar</button>

  <div id="estado"></div>
</div>

<script>

const supabase = window.supabase.createClient(
  "https://idtaamivqbiuxtjywuux.supabase.co",
  "sb_publishable_ToDLKonbF2QnTXi56o1nfQ_10IdaPJx"
);

async function login() {

  const usuario = document.getElementById("usuario").value;
  const password = document.getElementById("password").value;

  document.getElementById("estado").innerText = "Comprobando...";

  try {

    const { data, error } = await supabase
      .from("users")
      .select("*")
      .eq("usuario", usuario)
      .eq("password", password)
      .single();

    if (error || !data) {
      document.getElementById("estado").innerText = "Error login";
      return;
    }

    localStorage.setItem("usuario", JSON.stringify(data));

    document.getElementById("estado").innerText = "OK entrando...";

    setTimeout(() => {
      window.location.href = "app.html";
    }, 500);

  } catch (e) {
    document.getElementById("estado").innerText = "Fallo: " + e.message;
  }
}

</script>

</body>
</html>
