<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Zentryx</title>
</head>

<body style="margin:0;font-family:Arial;background:#f3f4f6;">

  <div style="
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
  ">
    <div style="
      width:100%;
      max-width:400px;
      background:#fff;
      border-radius:16px;
      padding:20px;
      box-shadow:0 10px 30px rgba(0,0,0,0.1);
    ">

      <h2 style="margin-top:0;">Zentryx</h2>

      <input 
        id="usuario" 
        placeholder="Usuario"
        style="width:100%;height:45px;margin-bottom:10px;padding:0 10px;border:1px solid #ccc;border-radius:10px;"
      >

      <input 
        id="password" 
        type="password" 
        placeholder="Contraseña"
        style="width:100%;height:45px;margin-bottom:10px;padding:0 10px;border:1px solid #ccc;border-radius:10px;"
      >

      <button 
        onclick="login()" 
        style="width:100%;height:45px;background:#111;color:#fff;border:none;border-radius:10px;"
      >
        Entrar
      </button>

    </div>
  </div>

  <!-- SUPABASE -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <script>
    const supabase = window.supabase.createClient(
      "https://idtaamivqbiuxtjywuux.supabase.co",
      "sb_publishable_ToDLKonbF2QnTXi56o1nfQ_10IdaPJx"
    );

    async function login() {
      const usuario = document.getElementById("usuario").value;
      const password = document.getElementById("password").value;

      const { data, error } = await supabase
        .from("users")
        .select("*")
        .eq("usuario", usuario)
        .eq("password", password)
        .single();

      if (error || !data) {
        alert("Usuario o contraseña incorrectos");
        return;
      }

      // guardar sesión
      localStorage.setItem("usuario", JSON.stringify(data));

      // ir a la app
      window.location.href = "app.html";
    }
  </script>

</body>
</html>
