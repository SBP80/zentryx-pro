<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Zentryx V201</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body{
      font-family:Arial,sans-serif;
      background:#eef2f7;
      display:flex;
      justify-content:center;
      align-items:center;
      min-height:100vh;
      margin:0;
      padding:20px;
      box-sizing:border-box;
    }
    .box{
      background:#fff;
      padding:30px;
      border-radius:16px;
      width:100%;
      max-width:380px;
      box-sizing:border-box;
      box-shadow:0 10px 30px rgba(0,0,0,.1);
    }
    input{
      width:100%;
      padding:14px;
      margin:10px 0;
      border-radius:10px;
      border:1px solid #ccc;
      box-sizing:border-box;
      font-size:16px;
    }
    button{
      width:100%;
      padding:14px;
      border:none;
      border-radius:10px;
      background:#0d1b2a;
      color:#fff;
      font-weight:bold;
      font-size:16px;
    }
    #msg{
      margin-top:12px;
      font-size:15px;
      white-space:pre-wrap;
    }
    .ver{
      color:#b91c1c;
      font-size:28px;
      font-weight:800;
      margin-bottom:12px;
    }
  </style>
</head>
<body>

  <div class="box">
    <div class="ver">VERSIÓN 201</div>
    <h2 style="margin-top:0;">Zentryx</h2>
    <p>Acceso al sistema</p>

    <input id="usuario" placeholder="Usuario">
    <input id="password" type="password" placeholder="Contraseña">

    <button id="btnLogin" type="button">Entrar</button>

    <div id="msg">Página cargada.</div>
  </div>

  <script>
    const msg = document.getElementById("msg");
    const btnLogin = document.getElementById("btnLogin");

    const supabase = window.supabase.createClient(
      "https://idtaamivqbiuxtjywuux.supabase.co",
      "sb_publishable_ToDLKonbF2QnTXi56o1nfQ_10IdaPJx"
    );

    btnLogin.addEventListener("click", async function () {
      const usuario = document.getElementById("usuario").value.trim();
      const password = document.getElementById("password").value.trim();

      msg.style.color = "#374151";
      msg.textContent = "Comprobando...";

      if (!usuario || !password) {
        msg.style.color = "#b91c1c";
        msg.textContent = "Escribe usuario y contraseña.";
        return;
      }

      try {
        const { data, error } = await supabase
          .from("users")
          .select("*")
          .eq("usuario", usuario)
          .eq("password", password)
          .single();

        if (error || !data) {
          msg.style.color = "#b91c1c";
          msg.textContent = "Usuario o contraseña incorrectos.";
          return;
        }

        localStorage.setItem("usuario", JSON.stringify(data));
        msg.style.color = "#15803d";
        msg.textContent = "Login correcto. Entrando...";

        setTimeout(() => {
          window.location.href = "./app.html";
        }, 400);
      } catch (e) {
        msg.style.color = "#b91c1c";
        msg.textContent = "Error: " + e.message;
      }
    });
  </script>

</body>
</html>
