<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Zentryx</title>
</head>
<body style="margin:0;font-family:Arial;background:#f3f4f6;">

  <div style="
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:20px;
    box-sizing:border-box;
  ">
    <div style="
      width:100%;
      max-width:420px;
      background:#ffffff;
      border-radius:18px;
      padding:22px;
      box-sizing:border-box;
      box-shadow:0 10px 30px rgba(0,0,0,0.08);
      border:1px solid #d1d5db;
    ">
      <h1 style="margin:0 0 8px 0;font-size:32px;">Zentryx</h1>
      <p style="margin:0 0 18px 0;color:#6b7280;">Acceso al sistema</p>

      <input
        id="usuario"
        type="text"
        placeholder="Usuario"
        style="
          width:100%;
          height:48px;
          margin-bottom:10px;
          padding:0 14px;
          border:1px solid #d1d5db;
          border-radius:12px;
          box-sizing:border-box;
          font-size:16px;
        "
      >

      <input
        id="password"
        type="password"
        placeholder="Contraseña"
        style="
          width:100%;
          height:48px;
          margin-bottom:12px;
          padding:0 14px;
          border:1px solid #d1d5db;
          border-radius:12px;
          box-sizing:border-box;
          font-size:16px;
        "
      >

      <button
        id="loginBtn"
        type="button"
        style="
          width:100%;
          height:50px;
          border:none;
          border-radius:12px;
          background:#0f172a;
          color:#ffffff;
          font-size:16px;
          font-weight:700;
        "
      >
        Entrar
      </button>

      <div id="msg" style="margin-top:12px;font-size:14px;color:#b91c1c;"></div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <script>
    const SUPABASE_URL = "https://idtaamivqbiuxtjywuux.supabase.co";
    const SUPABASE_KEY = "sb_publishable_ToDLKonbF2QnTXi56o1nfQ_10IdaPJx";

    const msg = document.getElementById("msg");

    if (!window.supabase) {
      msg.textContent = "Error cargando Supabase";
    } else {
      const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

      document.getElementById("loginBtn").addEventListener("click", async () => {
        const usuario = document.getElementById("usuario").value.trim();
        const password = document.getElementById("password").value.trim();

        msg.textContent = "";

        if (!usuario || !password) {
          msg.textContent = "Escribe usuario y contraseña";
          return;
        }

        msg.style.color = "#374151";
        msg.textContent = "Comprobando...";

        try {
          const { data, error } = await supabaseClient
            .from("users")
            .select("*")
            .eq("usuario", usuario)
            .eq("password", password)
            .single();

          if (error || !data) {
            msg.style.color = "#b91c1c";
            msg.textContent = "Usuario o contraseña incorrectos";
            return;
          }

          localStorage.setItem("usuario", JSON.stringify(data));
          window.location.href = "./app.html";
        } catch (e) {
          msg.style.color = "#b91c1c";
          msg.textContent = "Error conectando con la base de datos";
        }
      });
    }
  </script>

</body>
</html>
