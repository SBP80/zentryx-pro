<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zentryx</title>

<style>
body {
  font-family: Arial;
  background: #f0f2f5;
  margin: 0;
}

.container {
  padding: 20px;
}

.card {
  background: white;
  padding: 20px;
  border-radius: 15px;
  margin-bottom: 15px;
}

button {
  padding: 12px;
  border-radius: 10px;
  border: none;
  margin: 5px;
}

.btn {
  background: #0b2239;
  color: white;
}

.btn-red {
  background: red;
  color: white;
}

.btn-accion {
  background: #ddd;
}
</style>
</head>

<body>

<div class="container">

<!-- LOGIN -->
<div id="login">
  <div class="card">
    <h2>Zentryx</h2>
    <input id="usuario" placeholder="Usuario"><br><br>
    <input id="password" placeholder="Contraseña" type="password"><br><br>
    <button class="btn" onclick="login()">Entrar</button>
    <p id="error" style="color:red;"></p>
  </div>
</div>

<!-- PANEL -->
<div id="panel" style="display:none;">

  <div class="card">
    <h2>Panel</h2>
    <button onclick="mostrarUsuarios()">Usuarios</button>
    <button onclick="logout()">Salir</button>
  </div>

  <!-- USUARIOS -->
  <div id="usuarios" style="display:none;">
    
    <div class="card">
      <h3>Nuevo usuario</h3>
      <input id="nombre" placeholder="Nombre"><br><br>
      <input id="user" placeholder="Usuario"><br><br>
      <input id="pass" placeholder="Contraseña"><br><br>
      <input id="direccion" placeholder="Dirección"><br><br>
      <button class="btn" onclick="guardarUsuario()">Guardar</button>
    </div>

    <div id="listado"></div>

  </div>

  <!-- FICHA -->
  <div id="ficha" style="display:none;">
    <div class="card">
      <h3>Ficha</h3>
      <input id="ficha-nombre"><br><br>
      <input id="ficha-usuario"><br><br>
      <input id="ficha-password"><br><br>
      <input id="ficha-direccion"><br><br>

      <button class="btn" onclick="guardarCambios()">Guardar cambios</button>

      <hr>

      <h4>Acciones rápidas</h4>

      <button class="btn-accion" onclick="abrirGoogleMaps()">Google Maps</button>
      <button class="btn-accion" onclick="abrirWaze()">Waze</button>
      <button class="btn-accion" onclick="abrirAppleMaps()">Apple Maps</button>

    </div>
  </div>

</div>

</div>

<script>

// --- LOGIN ---
function login(){
  let u = document.getElementById('usuario').value;
  let p = document.getElementById('password').value;

  if(u === 'admin' && p === 'admin'){
    document.getElementById('login').style.display='none';
    document.getElementById('panel').style.display='block';
  } else {
    document.getElementById('error').innerText='Error';
  }
}

function logout(){
  location.reload();
}

// --- DATOS ---
let usuarios = JSON.parse(localStorage.getItem('usuarios')) || [];
let editIndex = null;

// --- MOSTRAR USUARIOS ---
function mostrarUsuarios(){
  document.getElementById('usuarios').style.display='block';
  document.getElementById('ficha').style.display='none';
  pintarUsuarios();
}

function pintarUsuarios(){
  let html = '';

  usuarios.forEach((u,i)=>{
    html += `
    <div class="card">
      <b>${u.nombre}</b><br>
      Usuario: ${u.usuario}<br>
      <button onclick="abrirFicha(${i})">Abrir</button>
      <button class="btn-red" onclick="eliminar(${i})">Eliminar</button>
    </div>
    `;
  });

  document.getElementById('listado').innerHTML = html;
}

// --- GUARDAR ---
function guardarUsuario(){
  let nuevo = {
    nombre: nombre.value,
    usuario: user.value,
    password: pass.value,
    direccion: direccion.value
  };

  usuarios.push(nuevo);
  localStorage.setItem('usuarios', JSON.stringify(usuarios));
  pintarUsuarios();
}

// --- ELIMINAR ---
function eliminar(i){
  usuarios.splice(i,1);
  localStorage.setItem('usuarios', JSON.stringify(usuarios));
  pintarUsuarios();
}

// --- FICHA ---
function abrirFicha(i){
  editIndex = i;

  let u = usuarios[i];

  document.getElementById('usuarios').style.display='none';
  document.getElementById('ficha').style.display='block';

  document.getElementById('ficha-nombre').value = u.nombre;
  document.getElementById('ficha-usuario').value = u.usuario;
  document.getElementById('ficha-password').value = u.password;
  document.getElementById('ficha-direccion').value = u.direccion;
}

function guardarCambios(){
  usuarios[editIndex] = {
    nombre: document.getElementById('ficha-nombre').value,
    usuario: document.getElementById('ficha-usuario').value,
    password: document.getElementById('ficha-password').value,
    direccion: document.getElementById('ficha-direccion').value
  };

  localStorage.setItem('usuarios', JSON.stringify(usuarios));
  mostrarUsuarios();
}

// --- MAPAS ---
function obtenerDireccion(){
  return document.getElementById('ficha-direccion').value;
}

function abrirGoogleMaps(){
  let d = obtenerDireccion();
  window.open(`https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(d)}`);
}

function abrirWaze(){
  let d = obtenerDireccion();
  window.open(`https://waze.com/ul?q=${encodeURIComponent(d)}&navigate=yes`);
}

function abrirAppleMaps(){
  let d = obtenerDireccion();
  window.open(`https://maps.apple.com/?q=${encodeURIComponent(d)}`);
}

</script>

</body>
</html>
