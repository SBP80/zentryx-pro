<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Zentryx Login V800</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body{
      margin:0;
      font-family:Arial,sans-serif;
      background:#eef2f7;
      display:flex;
      justify-content:center;
      align-items:center;
      min-height:100vh;
      padding:20px;
      box-sizing:border-box;
    }
    .box{
      width:100%;
      max-width:420px;
      background:#fff;
      border-radius:18px;
      padding:28px;
      box-sizing:border-box;
      box-shadow:0 10px 30px rgba(0,0,0,.08);
    }
    .ver{
      color:#ff4d4f;
      font-size:28px;
      font-weight:800;
      margin-bottom:10px;
    }
    h1{
      margin:0 0 10px 0;
      font-size:36px;
    }
    p{
      margin:0 0 20px 0;
      color:#374151;
      font-size:18px;
    }
    input{
      width:100%;
      height:54px;
      border:1px solid #d1d5db;
      border-radius:14px;
      padding:0 16px;
      box-sizing:border-box;
      font-size:18px;
      margin-bottom:12px;
      outline:none;
    }
    button{
      width:100%;
      height:54px;
      border:none;
      border-radius:14px;
      background:#0d1b2a;
      color:#fff;
      font-size:22px;
      font-weight:700;
    }
    #msg{
      margin-top:14px;
      min-height:24px;
      font-size:16px;
      white-space:pre-wrap;
    }
    .ok{ color:#15803d; font-weight:700; }
    .error{ color:#b91c1c; font-weight:700; }
    .muted{ color:#4b5563; }
  </style>
</head>
<body>

  <div class="box">
    <div class="ver">LOGIN V800</div>
    <h1>Zentryx</h1>
    <p>Acceso al sistema</p>

    <input id="usuario" type="text" placeholder="Usuario" autocomplete="username">
    <input id="password" type="password" placeholder="Contraseña" autocomplete="current-password">

    <button id="btnLogin" type="button">Entrar</button>

    <div id="msg" class="muted">Página cargada.</div>
  </div>

  <script>
    const SUPABASE_URL = "https://idtaamivqbiuxtjywuux.supabase.co";
    const SUPABASE_KEY = "AQUI_VA_TU_CLAVE";

    const btnLogin = document.getElementById("btnLogin");
    const msg = document.getElementById("msg");
    const inputUsuario = document.getElementById("usuario");
    const inputPassword = document.getElementById("password");

    function setMsg(texto, clase) {
      msg.className = clase;
      msg.textContent = texto;
    }

    function normalizarUsuario(valor) {
      return String(valor || "").trim().toLowerCase();
    }

    function guardarSesion(usuario) {
      localStorage.setItem("usuario", JSON.stringify(usuario));
    }

    async function login() {
      const usuario = normalizarUsuario(inputUsuario.value);
      const password = String(inputPassword.value || "").trim();

      if (!usuario || !password) {
        setMsg("Escribe usuario y contraseña.", "error");
        return;
      }

      btnLogin.disabled = true;
      setMsg("Comprobando...", "muted");

      try {
        const url =
          SUPABASE_URL +
          "/rest/v1/users?select=*&usuario=eq." +
          encodeURIComponent(usuario) +
          "&password=eq." +
          encodeURIComponent(password) +
          "&limit=1";

        const res = await fetch(url, {
          method: "GET",
          headers: {
            "apikey": SUPABASE_KEY,
            "Authorization": "Bearer " + SUPABASE_KEY,
            "Content-Type": "application/json"
          }
        });

        const texto = await res.text();
        let data = [];

        try {
          data = texto ? JSON.parse(texto) : [];
        } catch {
          data = [];
        }

        if (!res.ok) {
          setMsg("Error de conexión con la base de datos.", "error");
          btnLogin.disabled = false;
          return;
        }

        if (!Array.isArray(data) || data.length === 0) {
          setMsg("Usuario o contraseña incorrectos.", "error");
          btnLogin.disabled = false;
          return;
        }

        guardarSesion(data[0]);
        setMsg("Login correcto. Entrando...", "ok");

        setTimeout(() => {
          window.location.href = "./app.html?v=610";
        }, 400);

      } catch (e) {
        setMsg("Error de red: " + e.message, "error");
        btnLogin.disabled = false;
      }
    }

    btnLogin.addEventListener("click", login);

    inputPassword.addEventListener("keydown", function(e) {
      if (e.key === "Enter") login();
    });

    inputUsuario.addEventListener("keydown", function(e) {
      if (e.key === "Enter") login();
    });
  </script>

</body>
</html>
