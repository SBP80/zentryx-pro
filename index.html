<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Zentryx Login V1000</title>
  <style>
    body{margin:0;font-family:Arial,sans-serif;background:#eef2f7;display:flex;justify-content:center;align-items:center;min-height:100vh;padding:20px;box-sizing:border-box;}
    .box{width:100%;max-width:420px;background:#fff;border-radius:18px;padding:28px;box-sizing:border-box;box-shadow:0 10px 30px rgba(0,0,0,.08);}
    .version{color:#ef4444;font-size:28px;font-weight:800;margin-bottom:10px;}
    h1{margin:0 0 10px 0;font-size:38px;}
    p{margin:0 0 20px 0;color:#374151;font-size:18px;}
    input{width:100%;height:54px;border:1px solid #d1d5db;border-radius:14px;padding:0 16px;box-sizing:border-box;font-size:18px;margin-bottom:12px;}
    button{width:100%;height:56px;border:none;border-radius:14px;background:#0f172a;color:white;font-size:22px;font-weight:800;}
    #msg{margin-top:14px;font-size:16px;min-height:24px;font-weight:700;}
    .ok{color:#15803d}.error{color:#b91c1c}.info{color:#374151}
  </style>
</head>
<body>

<div class="box">
  <div class="version">LOGIN V1000</div>
  <h1>Zentryx</h1>
  <p>Acceso al sistema</p>

  <input id="usuario" type="text" placeholder="Usuario" autocomplete="username">
  <input id="password" type="password" placeholder="Contraseña" autocomplete="current-password">

  <button id="btnLogin" type="button">Entrar</button>
  <div id="msg" class="info">Página cargada.</div>
</div>

<script>
const SUPABASE_URL = "https://idtaamivqbiuxtjywuux.supabase.co";
const SUPABASE_KEY = "sb_publishable_ToDLKonbF2QnTXi56o1nfQ_10IdaPJx";

const inputUsuario = document.getElementById("usuario");
const inputPassword = document.getElementById("password");
const btnLogin = document.getElementById("btnLogin");
const msg = document.getElementById("msg");

function mensaje(texto, tipo){
  msg.textContent = texto;
  msg.className = tipo;
}

function limpiarUsuario(valor){
  return String(valor || "").trim().toLowerCase();
}

async function sha256(texto){
  const buffer = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(texto));
  return Array.from(new Uint8Array(buffer)).map(b => b.toString(16).padStart(2,"0")).join("");
}

async function api(path, opciones = {}){
  const res = await fetch(SUPABASE_URL + path, {
    method: opciones.method || "GET",
    headers: {
      "apikey": SUPABASE_KEY,
      "Authorization": "Bearer " + SUPABASE_KEY,
      "Content-Type": "application/json",
      ...(opciones.headers || {})
    },
    body: opciones.body ? JSON.stringify(opciones.body) : undefined
  });

  const texto = await res.text();
  let data = null;

  try{ data = texto ? JSON.parse(texto) : null; }
  catch{ data = texto; }

  if(!res.ok){
    throw new Error(typeof data === "string" ? data : JSON.stringify(data));
  }

  return data;
}

async function login(){
  const usuario = limpiarUsuario(inputUsuario.value);
  const passwordPlano = String(inputPassword.value || "").trim();

  if(!usuario || !passwordPlano){
    mensaje("Escribe usuario y contraseña.", "error");
    return;
  }

  btnLogin.disabled = true;
  mensaje("Comprobando...", "info");

  try{
    const data = await api(
      "/rest/v1/users?select=*&usuario=ilike." +
      encodeURIComponent(usuario) +
      "&limit=1"
    );

    if(!Array.isArray(data) || data.length === 0){
      mensaje("Usuario o contraseña incorrectos.", "error");
      btnLogin.disabled = false;
      return;
    }

    const user = data[0];
    const passwordHash = await sha256(passwordPlano);

    const coincideHash = user.password === passwordHash;
    const coincideAntigua = user.password === passwordPlano;

    if(!coincideHash && !coincideAntigua){
      mensaje("Usuario o contraseña incorrectos.", "error");
      btnLogin.disabled = false;
      return;
    }

    if(coincideAntigua){
      await api("/rest/v1/users?id=eq." + encodeURIComponent(user.id), {
        method: "PATCH",
        headers: {"Prefer":"return=representation"},
        body: { password: passwordHash }
      });
      user.password = passwordHash;
    }

    localStorage.setItem("usuario", JSON.stringify(user));
    mensaje("Login correcto. Entrando...", "ok");

    setTimeout(function(){
      window.location.href = "./app.html?v=1000";
    }, 400);

  }catch(e){
    mensaje("Error: " + e.message, "error");
    btnLogin.disabled = false;
  }
}

btnLogin.addEventListener("click", login);
inputUsuario.addEventListener("keydown", e => { if(e.key === "Enter") login(); });
inputPassword.addEventListener("keydown", e => { if(e.key === "Enter") login(); });
</script>

</body>
</html>
