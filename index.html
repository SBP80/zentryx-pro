<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Zentryx V202</title>
  <style>
    body{
      font-family:Arial,sans-serif;
      background:#eef2f7;
      display:flex;
      justify-content:center;
      align-items:center;
      min-height:100vh;
      margin:0;
      padding:20px;
      box-sizing:border-box;
    }
    .box{
      background:#fff;
      padding:30px;
      border-radius:16px;
      width:100%;
      max-width:380px;
      box-sizing:border-box;
      box-shadow:0 10px 30px rgba(0,0,0,.1);
    }
    input{
      width:100%;
      padding:14px;
      margin:10px 0;
      border-radius:10px;
      border:1px solid #ccc;
      box-sizing:border-box;
      font-size:16px;
    }
    button{
      width:100%;
      padding:14px;
      border:none;
      border-radius:10px;
      background:#0d1b2a;
      color:#fff;
      font-weight:bold;
      font-size:16px;
    }
    #msg{
      margin-top:12px;
      font-size:15px;
      white-space:pre-wrap;
    }
    .ver{
      color:#b91c1c;
      font-size:28px;
      font-weight:800;
      margin-bottom:12px;
    }
  </style>
</head>
<body>

  <div class="box">
    <div class="ver">VERSIÓN 202</div>
    <h2 style="margin-top:0;">Zentryx</h2>
    <p>Acceso al sistema</p>

    <input id="usuario" placeholder="Usuario">
    <input id="password" type="password" placeholder="Contraseña">

    <button id="btnLogin" type="button">Entrar</button>

    <div id="msg">Página cargada.</div>
  </div>

  <script>
    const btnLogin = document.getElementById("btnLogin");
    const msg = document.getElementById("msg");

    const SUPABASE_URL = "https://idtaamivqbiuxtjywuux.supabase.co";
    const SUPABASE_KEY = "sb_publishable_ToDLKonbF2QnTXi56o1nfQ_10IdaPJx";

    btnLogin.addEventListener("click", login);

    async function login() {
      const usuario = document.getElementById("usuario").value.trim();
      const password = document.getElementById("password").value.trim();

      if (!usuario || !password) {
        msg.style.color = "#b91c1c";
        msg.textContent = "Escribe usuario y contraseña.";
        return;
      }

      msg.style.color = "#374151";
      msg.textContent = "Comprobando...";

      try {
        const url =
          SUPABASE_URL +
          "/rest/v1/users?select=*&usuario=eq." +
          encodeURIComponent(usuario) +
          "&password=eq." +
          encodeURIComponent(password) +
          "&limit=1";

        const res = await fetch(url, {
          method: "GET",
          headers: {
            "apikey": SUPABASE_KEY,
            "Authorization": "Bearer " + SUPABASE_KEY,
            "Content-Type": "application/json"
          }
        });

        if (!res.ok) {
          const texto = await res.text();
          msg.style.color = "#b91c1c";
          msg.textContent = "Error HTTP " + res.status + ":\n" + texto;
          return;
        }

        const data = await res.json();

        if (!Array.isArray(data) || data.length === 0) {
          msg.style.color = "#b91c1c";
          msg.textContent = "Usuario o contraseña incorrectos.";
          return;
        }

        localStorage.setItem("usuario", JSON.stringify(data[0]));

        msg.style.color = "#15803d";
        msg.textContent = "Login correcto. Entrando...";

        setTimeout(() => {
          window.location.href = "./app.html";
        }, 400);

      } catch (e) {
        msg.style.color = "#b91c1c";
        msg.textContent = "Error de conexión:\n" + e.message;
      }
    }
  </script>

</body>
</html>
