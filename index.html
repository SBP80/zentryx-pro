<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Zentryx Test</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #eef2f7;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      padding: 20px;
      box-sizing: border-box;
    }
    .box {
      background: white;
      padding: 30px;
      border-radius: 16px;
      width: 100%;
      max-width: 380px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
      box-sizing: border-box;
    }
    input {
      width: 100%;
      padding: 14px;
      margin: 10px 0;
      border-radius: 10px;
      border: 1px solid #ccc;
      box-sizing: border-box;
      font-size: 16px;
    }
    button {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 10px;
      background: #0d1b2a;
      color: white;
      font-weight: bold;
      font-size: 16px;
    }
    #msg {
      margin-top: 12px;
      font-size: 14px;
      color: #15803d;
      white-space: pre-wrap;
    }
  </style>
</head>
<body>

  <div class="box">
    <h2 style="margin-top:0;">Zentryx</h2>
    <p>Prueba de botón</p>

    <input id="usuario" placeholder="Usuario">
    <input id="password" type="password" placeholder="Contraseña">

    <button id="btnLogin" type="button">Entrar</button>

    <div id="msg">Página de prueba cargada.</div>
  </div>

  <script>
    const btn = document.getElementById("btnLogin");
    const msg = document.getElementById("msg");

    btn.addEventListener("click", function () {
      msg.textContent = "El botón sí responde.";
      alert("Botón funcionando");
    });
  </script>

</body>
</html>
